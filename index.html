<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - FINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .preview-box { 
            width: 100%; height: 300px; background: #111; border-radius: 20px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; overflow: hidden;
        }
        canvas { display: none; } /* Video uchun kadrlar bu yerda chiziladi */
        #display-text { font-size: 24px; font-weight: bold; color: var(--accent); padding: 20px; text-align: center; }
        .controls { background: #181818; padding: 20px; border-radius: 20px; text-align: left; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; }
        input { background: #252525; color: #fff; }
        .btn-download { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        #status { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="preview-box" id="render-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="720" height="720"></canvas>

    <div class="controls">
        <label>MP3 tanlang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        
        <label>LRC tanlang:</label>
        <input type="file" id="lrc-input" accept=".lrc">

        <button class="btn-download" id="start-btn" onclick="processVideo()">VIDEONI YASASH VA YUKLASH</button>
        <div id="status">Fayllarni yuklang va tugmani bosing.</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');

    let lyrics = [];
    let audioBlobUrl = '';

    document.getElementById('audio-input').onchange = (e) => {
        audioBlobUrl = URL.createObjectURL(e.target.files[0]);
        status.innerText = "Audio yuklandi.";
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: m.input.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            status.innerText = "LRC yuklandi.";
        };
        reader.readAsText(e.target.files[0]);
    };

    async function processVideo() {
        if (!audioBlobUrl || lyrics.length === 0) return alert("Avval fayllarni tanlang!");

        startBtn.disabled = true;
        startBtn.innerText = "VIDEO TAYYORLANMOQDA...";

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);
            
            // Yuklash mantiqi
            const link = document.createElement('a');
            link.href = url;
            link.download = `LyricVideo_${Date.now()}.mp4`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            status.innerText = "Video telefon xotirasiga yuborildi!";
            startBtn.disabled = false;
            startBtn.innerText = "VIDEONI YASASH VA YUKLASH";
        };

        recorder.start();
        renderFrames(recorder);
    }

    function renderFrames(recorder) {
        let startTime = performance.now();
        const duration = lyrics[lyrics.length - 1].t + 2; // Oxirgi so'zdan keyin 2 sek kutish

        function draw() {
            let now = (performance.now() - startTime) / 1000;
            
            // Fonni chizish
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Matnni topish
            const currentLyric = lyrics.findLast(l => now >= l.t);
            const text = currentLyric ? currentLyric.text : "...";
            displayText.innerText = text; // Preview uchun

            // Canvas-ga matn chizish
            ctx.fillStyle = "#00e676";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            status.innerText = `Jarayon: ${Math.floor((now/duration)*100)}%`;

            if (now < duration) {
                requestAnimationFrame(draw);
            } else {
                recorder.stop();
            }
        }
        draw();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
