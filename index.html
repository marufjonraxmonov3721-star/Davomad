<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; --nav: #1a1a1a; --danger: #ff3e3e; --accent: #ffcc00; --boss: #ff0055; --friend: #00d4ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; position: relative; }
        
        /* Visualizer Canvas - Rasmdagi yashil barlar */
        #visualizer { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; z-index: 1; pointer-events: none; opacity: 0.8; }

        /* Loading Animation */
        #loading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { display: flex; align-items: center; gap: 5px; height: 50px; }
        .bar { width: 8px; height: 20px; background: var(--primary); border-radius: 10px; animation: scaleY 1s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes scaleY { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }

        #app-container { height: 100vh; display: none; flex-direction: column; position: relative; z-index: 2; }
        .page { flex: 1; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        /* Category Selection Styles */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 15px; }
        .cat-btn { background: #1a1a1a; border: 1px solid #333; padding: 18px 10px; border-radius: 18px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .cat-btn:active { transform: scale(0.95); background: #222; }
        .cat-icon { font-size: 26px; }

        /* Game UI - Rasmdagi effektlar */
        .game-card { width: 100%; max-width: 400px; background: rgba(21, 21, 21, 0.9); padding: 30px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); text-align: center; position: relative; transition: 0.3s; z-index: 5; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .vinyl { 
            width: 180px; height: 180px; margin: 20px auto; 
            background: radial-gradient(circle, #222 0%, #111 40%, #000 100%); 
            border-radius: 50%; border: 8px solid #1a1a1a; 
            position: relative; z-index: 6;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.05);
            transition: transform 0.5s ease;
        }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #disc-center { position:absolute; inset:65px; background:var(--primary); border-radius:50%; border:6px solid #000; box-shadow: 0 0 15px var(--primary); }

        /* Variantlar chiqishi - Musiqa pleyer uslubi */
        .options-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; 
            opacity: 0; transform: translateY(20px); pointer-events: none; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        .options-grid.show-options { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .option-btn { 
            background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 16px 10px; 
            border-radius: 20px; width: 100%; cursor: pointer; font-size: 14px; 
            font-weight: 600; transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .option-btn:active { transform: scale(0.95); }
        .start-btn { background: var(--primary); color: #000; border: none; font-size: 18px; padding: 18px; margin-top: 10px; border-radius: 20px; font-weight: bold;}
        
        .correct { background: var(--primary) !important; color: #000 !important; border-color: var(--primary) !important; }
        .wrong { background: var(--danger) !important; border-color: var(--danger) !important; }

        .lives-container { font-size: 18px; color: var(--primary); letter-spacing: 2px; }

        #combo-badge {
            position: absolute; top: 80px; right: 20px; background: var(--accent); color: #000;
            padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 14px;
            display: none; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        
        .combo-flame { 
            position: absolute; inset: -5px; border-radius: 35px; border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent); pointer-events: none; animation: flamePulse 0.5s infinite alternate;
            display: none;
        }
        @keyframes flamePulse { from { opacity: 0.3; transform: scale(1); } to { opacity: 0.8; transform: scale(1.05); } }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .floating-text {
            position: absolute; color: var(--primary); font-weight: bold; font-size: 20px;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        #result-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .result-card {
            background: var(--card); border: 1px solid #333; width: 100%; max-width: 350px;
            border-radius: 30px; padding: 40px 20px; text-align: center; animation: slideUp 0.4s ease-out;
            position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #555; cursor: pointer; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .leaderboard-card { width: 100%; max-width: 400px; height: 85vh; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; display: flex; flex-direction: column; }
        .rank-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .rank-tab { flex: 1; background: #222; border: 1px solid #333; padding: 8px; border-radius: 8px; color: #888; font-size: 11px; cursor: pointer; text-align: center; font-weight: bold; }
        .rank-tab.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .rank-list-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .rank-item { display: flex; align-items: center; background: #222; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); }
        .rank-num { width: 35px; font-weight: bold; color: var(--primary); font-size: 14px; }
        .rank-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-score-box { text-align: right; }
        .rank-score { font-weight: bold; color: var(--primary); font-size: 14px; display: block; }
        .rank-lvl { font-size: 9px; color: #666; display: block; }

        .profile-card { width: 100%; max-width: 400px; background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid #222; text-align: center; }
        .avatar-circle { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #000; border: 4px solid #222; overflow: hidden; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        .stat-item { background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }

        .nav-bar { height: 70px; background: var(--nav); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; transition: 0.3s; }
        .nav-item { color: #555; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        .hidden-nav { transform: translateY(100%); height: 0; padding: 0; border: none; overflow: hidden; }

        #offline-notice {
            position: fixed; top: -100px; left: 0; right: 0;
            background: rgba(255, 62, 62, 0.95); color: white; padding: 15px; text-align: center; font-weight: bold; 
            z-index: 5000; transition: 0.5s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        #offline-notice.show { top: 0; }

        .boss-active #main-game-card { border-color: var(--boss); box-shadow: 0 0 30px rgba(255, 0, 85, 0.6); }
        .boss-active .vinyl { border-color: var(--boss); }
        .boss-active #disc-center { background: var(--boss) !important; }
        .boss-active::before { 
            content: ''; position: fixed; inset: 0; border: 8px solid var(--boss); 
            z-index: 999; pointer-events: none; animation: bossPulse 1s infinite;
        }
        @keyframes bossPulse { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }
        .boss-title { color: var(--boss); font-weight: 900; animation: blink 0.8s infinite; text-shadow: 0 0 10px var(--boss); }
    </style>
</head>
<body>

<canvas id="visualizer"></canvas>

<div id="offline-notice">
    <span>⚠️ Internet aloqasi yo'q!</span>
</div>

<div id="loading-screen">
    <div class="loader">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <h1 style="color:var(--primary); margin-top:20px; letter-spacing: 2px;">SongLyrics</h1>
</div>

<div id="result-modal">
    <div class="result-card">
        <span class="close-modal" onclick="closeResultModal()">✕</span>
        <h1 id="result-title" style="color:var(--primary); margin-bottom:10px;">O'yin tugadi!</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 800; color: #fff; margin-bottom: 5px;">0</div>
        <p id="final-level" style="color:var(--primary); font-weight: bold; margin-bottom: 25px;">BOSQICH: 1</p>
        <button class="start-btn" onclick="restartGame()" style="width: 100%;">QAYTA O'YNASH</button>
    </div>
</div>

<div id="app-container">
    <div id="page-game" class="page active-page">
        <div class="game-card" id="main-game-card">
            <div id="combo-flame" class="combo-flame"></div>
            <div id="combo-badge">COMBO x1</div>
            
            <div id="game-ui" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items: center; font-size:14px; color:var(--primary); font-weight:bold; margin-bottom: 20px;">
                    <div id="game-stats-left" style="text-align: left;">
                        <span id="score" style="font-size: 18px;">BALL: 0</span><br>
                        <span id="round-counter" style="font-size: 11px; color: rgba(255,255,255,0.5);">BOSQICH: 1 | SAVOL: 1/5</span>
                    </div>
                    <div style="text-align: right;">
                        <div id="lives" class="lives-container">🎵🎵🎵</div>
                        <span id="timer" style="font-size: 18px; display: block; margin-top: 4px; color: #fff;">--</span>
                    </div>
                </div>
                
                <div class="vinyl" id="disc">
                    <div id="disc-center"></div>
                </div>
                
                <p id="status" style="color:rgba(255,255,255,0.8); font-size:14px; margin: 15px 0; height: 20px; font-weight: bold; letter-spacing: 0.5px;"></p>
                
                <div id="options-box" class="options-grid"></div>
            </div>
            
            <div id="pre-game">
                <h2 style="margin-bottom:10px;">Kategoriyani tanlang</h2>
                <div class="cat-grid">
                    <button class="cat-btn" onclick="startGame('uzbek')"><span class="cat-icon">🇺🇿</span><span>O'zbekcha</span></button>
                    <button class="cat-btn" onclick="startGame('russian')"><span class="cat-icon">🇷🇺</span><span>Ruscha</span></button>
                    <button class="cat-btn" onclick="startGame('english')"><span class="cat-icon">🇺🇸</span><span>Inglizcha</span></button>
                    <button class="cat-btn" onclick="startGame('trend')"><span class="cat-icon">🔥</span><span>Trend</span></button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-rank" class="page">
        <div class="leaderboard-card">
            <h2 style="color:var(--primary); text-align:center; margin-bottom:15px;">REYTINGLAR</h2>
            <div class="rank-tabs">
                <div class="rank-tab active" id="limit-10" onclick="setRankLimit(10)">TOP 10</div>
                <div class="rank-tab" id="limit-100" onclick="setRankLimit(100)">TOP 100</div>
                <div class="rank-tab" id="limit-1000" onclick="setRankLimit(1000)">TOP 1000</div>
            </div>
            <div class="rank-list-container" id="rank-list"></div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-card">
            <div class="avatar-circle" id="profile-avatar">👤</div>
            <h2 id="profile-name">Ism</h2>
            <p id="profile-id" style="color:#666; font-size:12px; margin-bottom: 25px;"></p>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-label">Best Level</div><div class="stat-value" id="best-level">1</div></div>
                <div class="stat-item"><div class="stat-label">Best Score</div><div class="stat-value" id="best-score">0</div></div>
                <div class="stat-item"><div class="stat-label">Total XP</div><div class="stat-value" id="total-xp">0</div></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar" id="bottom-nav">
        <div class="nav-item active" onclick="showPage('game', this)"><span class="nav-icon">🎮</span><span>O'yin</span></div>
        <div class="nav-item" onclick="showPage('rank', this)"><span class="nav-icon">🏆</span><span>Reyting</span></div>
        <div class="nav-item" onclick="showPage('profile', this)"><span class="nav-icon">👤</span><span>Profil</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, query, orderByChild, limitToLast, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Mehmon" };
    let allQuestions = [], questions = [], currentIdx = 0, score = 0, lives = 3, timerInterval, audio = new Audio();
    audio.crossOrigin = "anonymous";
    let isPlaying = false, comboCount = 0, currentCategory = 'uzbek', currentLevel = 1, isBossRound = false;
    let bossQuestion = null, adminTimerSettings = {}, usedQuestions = new Set(), rankLimit = 10;

    let audioContext, analyser, dataArray, canvas, ctx, animationId;

    function setupVisualizer() {
        if (audioContext) return;
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioContext.destination);
        analyser.fftSize = 64; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function drawVisualizer() {
        animationId = requestAnimationFrame(drawVisualizer);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barWidth = (canvas.width / dataArray.length) * 1.5;
        let x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            const barHeight = (dataArray[i] / 255) * canvas.height * 0.7;
            const gradient = ctx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
            if(isBossRound) { gradient.addColorStop(0, '#ff0055'); gradient.addColorStop(1, 'rgba(255,0,85,0.1)'); } 
            else { gradient.addColorStop(0, '#00ff88'); gradient.addColorStop(1, 'rgba(0,255,136,0.1)'); }
            ctx.fillStyle = gradient;
            ctx.fillRect(x, canvas.height - barHeight, barWidth - 4, barHeight);
            x += barWidth;
        }
    }

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            loadProfileData();
        }, 2000);
    };

    window.startGame = async (category) => {
        if (!navigator.onLine) { tg.showAlert("Internet kerak!"); return; }
        setupVisualizer();
        if (audioContext.state === 'suspended') audioContext.resume();
        drawVisualizer();

        currentCategory = category;
        isPlaying = true;
        currentLevel = 1;
        currentIdx = 0;
        score = 0;
        lives = 3;
        
        document.getElementById('bottom-nav').classList.add('hidden-nav');
        document.getElementById('pre-game').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        try {
            const setSnap = await get(ref(db, 'settings/timer'));
            if(setSnap.exists()) adminTimerSettings = setSnap.val();
        } catch(e) {}

        initGame();
    };

    async function initGame() {
        const snap = await get(ref(db, `questions/${currentCategory}`));
        if(snap.exists()) {
            allQuestions = Object.keys(snap.val()).map(key => ({ ...snap.val()[key], firebaseId: key }));
            loadLevelQuestions();
        }
    }

    function loadLevelQuestions() {
        isBossRound = false;
        document.body.classList.remove('boss-active');
        const levelData = allQuestions.filter(q => (q.level || 1) == currentLevel && !usedQuestions.has(q.firebaseId));
        const normal = levelData.filter(q => !q.is_boss);
        const bosses = levelData.filter(q => q.is_boss);
        
        if(normal.length > 0) {
            questions = normal.sort(() => Math.random() - 0.5).slice(0, 5);
            bossQuestion = bosses.length > 0 ? bosses[0] : null;
            currentIdx = 0;
            loadRound();
        } else { endGame(false); }
    }

    async function loadRound() {
        if(!isPlaying || lives <= 0) return;
        
        let q;
        const optionsBox = document.getElementById('options-box');
        const disc = document.getElementById('disc');
        
        optionsBox.classList.remove('show-options'); 
        disc.style.transform = "scale(1)";

        if(currentIdx >= questions.length) { 
            if(bossQuestion && !isBossRound) { isBossRound = true; q = bossQuestion; document.body.classList.add('boss-active'); } 
            else { currentLevel++; loadLevelQuestions(); return; }
        } else { q = questions[currentIdx]; }
        
        usedQuestions.add(q.firebaseId);
        optionsBox.innerHTML = "";
        document.getElementById('status').innerText = "Yuklanmoqda...";

        const musicUrl = await fetchMusic(q.search_term);
        if(musicUrl) {
            audio.src = musicUrl;
            audio.onplay = () => {
                disc.classList.add('spinning');
                document.getElementById('status').innerText = "Diqqat bilan eshiting...";
                startTimer(isBossRound ? (adminTimerSettings.boss || 15) : (adminTimerSettings.levels?.[currentLevel] || 10));
            };
            audio.play();
        }

        const correctText = q.options[q.correct];
        [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = (e) => handleAnswer(opt, correctText, btn, e, q);
            optionsBox.appendChild(btn);
        });
    }

    function handleAnswer(selected, correct, btn, e, q) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.classList.add('correct');
            let pts = isBossRound ? (q.score || 50) : (q.score || 10);
            score += pts;
            showFloatingText(`+${pts}`, e.clientX, e.clientY);
            comboCount++;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            lives--;
            comboCount = 0;
        }
        
        document.getElementById('score').innerText = "BALL: " + score;
        updateLivesUI();
        setTimeout(() => { if(lives > 0) { currentIdx++; loadRound(); } else { endGame(true); } }, 1500);
    }

    function startTimer(t) {
        document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerInterval);
                audio.pause();
                document.getElementById('disc').classList.remove('spinning');
                document.getElementById('disc').style.transform = "scale(0.85)";
                document.getElementById('status').innerText = "Kim aytgan?";
                document.getElementById('options-box').classList.add('show-options');
            }
        }, 1000);
    }

    async function fetchMusic(term) {
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=1&entity=song`);
            const data = await res.json();
            return data.results[0]?.previewUrl;
        } catch (e) { return null; }
    }

    function updateLivesUI() {
        document.getElementById('lives').innerText = "🎵".repeat(Math.max(0, lives)) + "🔘".repeat(Math.max(0, 3 - lives));
    }

    function showFloatingText(text, x, y) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function endGame(isOver) {
        isPlaying = false;
        clearInterval(timerInterval);
        audio.pause();
        document.getElementById('result-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-level').innerText = "ERISHILGAN BOSQICH: " + currentLevel;
        saveScore();
    }

    async function saveScore() {
        const userRef = ref(db, `leaderboard/${user.id}`);
        const snap = await get(userRef);
        const old = snap.exists() ? snap.val() : { score: 0, level: 1 };
        await update(userRef, {
            name: user.first_name + (user.last_name ? " " + user.last_name : ""),
            score: Math.max(score, old.score),
            level: Math.max(currentLevel, old.level),
            total_xp: increment(score),
            id: user.id
        });
    }

    window.restartGame = () => { location.reload(); };
    window.closeResultModal = () => { location.reload(); };
    
    window.showPage = (pageId, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active-page');
        el.classList.add('active');
        if(pageId === 'rank') loadLeaderboard();
    };

    async function loadLeaderboard() {
        const list = document.getElementById('rank-list');
        list.innerHTML = "Yuklanmoqda...";
        const snap = await get(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(rankLimit)));
        if(snap.exists()) {
            list.innerHTML = "";
            let arr = []; snap.forEach(c => arr.push(c.val()));
            arr.sort((a,b) => b.score - a.score).forEach((u, i) => {
                list.innerHTML += `<div class="rank-item"><div class="rank-num">#${i+1}</div><div class="rank-name">${u.name}</div><div class="rank-score-box"><span class="rank-score">${u.score}</span></div></div>`;
            });
        }
    }

    async function loadProfileData() {
        document.getElementById('profile-name').innerText = user.first_name;
        document.getElementById('profile-id').innerText = "ID: " + user.id;
        const snap = await get(ref(db, `leaderboard/${user.id}`));
        if(snap.exists()){
            const d = snap.val();
            document.getElementById('best-score').innerText = d.score || 0;
            document.getElementById('best-level').innerText = d.level || 1;
            document.getElementById('total-xp').innerText = d.total_xp || 0;
        }
    }
</script>
</body>
</html>
