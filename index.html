<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption & Music Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; margin: 0; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        canvas { width: 100%; border-radius: 10px; margin-top: 10px; display: block; background: #000; }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: none; background: #2c2c2e; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #2481cc; color: white; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 10px; font-size: 14px; color: #aaa; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Caption & Music Editor</h2>
    
    <input type="file" id="videoUpload" accept="video/*">
    <input type="file" id="audioUpload" accept="audio/*">

    <div style="display: flex; gap: 10px;">
        <input type="number" id="startTime" placeholder="Boshlanishi (sek)" value="0">
        <input type="number" id="duration" placeholder="Davomiyligi" value="5">
    </div>

    <textarea id="captionInput" placeholder="Matnni yozing..."></textarea>

    <canvas id="previewCanvas" width="640" height="360"></canvas>
    
    <button class="btn" id="renderBtn">Videoni Saqlash va Botga Yuborish</button>
    <div id="status"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const videoInput = document.getElementById('videoUpload');
    const audioInput = document.getElementById('audioUpload');
    const captionInput = document.getElementById('captionInput');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let videoEl = document.createElement('video');
    let audioEl = new Audio();
    let isDrawing = false;

    videoInput.onchange = (e) => {
        const file = e.target.files[0];
        videoEl.src = URL.createObjectURL(file);
        videoEl.muted = true;
        videoEl.loop = true;
        videoEl.play();
        if(!isDrawing) { isDrawing = true; drawFrame(); }
    };

    audioInput.onchange = (e) => {
        const file = e.target.files[0];
        audioEl.src = URL.createObjectURL(file);
    };

    function drawFrame() {
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.shadowBlur = 8;
        ctx.shadowColor = "black";
        
        const text = captionInput.value;
        const lines = text.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, canvas.width / 2, (canvas.height / 2) + (i * 45));
        });

        requestAnimationFrame(drawFrame);
    }

    document.getElementById('renderBtn').onclick = async () => {
        if (!videoInput.files[0]) return alert("Video yuklang!");
        
        status.innerText = "Video tayyorlanmoqda va botga yuborilmoqda...";
        
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            
            // 1. Telefonga saqlash
            const url = URL.createObjectURL(videoBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "caption_video.mp4";
            a.click();

            // 2. Botga yuborish (Telegram API)
            const chatId = tg.initDataUnsafe.user.id;
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', videoBlob, 'video.mp4');
            formData.append('caption', captionInput.value);

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.innerText = "Tayyor! Video yuklab olindi va botga yuborildi. ✅";
                    setTimeout(() => tg.close(), 3000);
                } else {
                    status.innerText = "Xatolik: Botga yuborib bo'lmadi.";
                }
            } catch (err) {
                status.innerText = "Tarmoq xatosi!";
            }
        };

        // Montajni boshlash
        videoEl.currentTime = 0;
        audioEl.currentTime = document.getElementById('startTime').value;
        videoEl.play();
        audioEl.play();
        recorder.start();

        const duration = document.getElementById('duration').value * 1000;
        setTimeout(() => {
            recorder.stop();
            videoEl.pause();
            audioEl.pause();
        }, duration);
    };
</script>

</body>
</html>
