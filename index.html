<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texnik Ishlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Telegram tizim ranglariga ulanish */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --accent-color: #f1c40f;
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); /* Butun fonni tizimga moslaydi */
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .maintenance-container {
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* Tungi va kunduzgi rejim uchun karton effekti */
        .card {
            background-color: var(--secondary-bg);
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .icon-box {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: rotate 4s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            border: 1.5px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 15px 0;
            font-weight: 800;
            text-transform: uppercase;
        }

        p {
            color: var(--hint-color);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(128, 128, 128, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            width: 40%;
            height: 100%;
            background: var(--accent-color);
            position: absolute;
            animation: loading 2s infinite ease-in-out;
            border-radius: 10px;
        }

        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="card">
            <div class="icon-box">⚙️</div>
            <br>
            <div class="status-badge">MAINTENANCE IN PROGRESS</div>
            <h1>Texnik Ishlar</h1>
            <p>
                O'yin sifatini yaxshilash maqsadida qisqa tanaffus e'lon qilindi. 
                Tez orada yangi imkoniyatlar bilan qaytamiz!
            </p>
            
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Telegram tepasidagi (header) rangni ham tizimga moslaymiz
        tg.setHeaderColor('bg_color');
        tg.setBackgroundColor('bg_color');
    </script>
</body>
</html>
