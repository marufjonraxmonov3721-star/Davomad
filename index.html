<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border-radius: 20px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }

        #display-text { font-size: 30px; font-weight: bold; color: var(--accent); padding: 30px; line-height: 1.4; text-shadow: 0 0 20px rgba(0,230,118,0.5); }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; }
        
        .trim-group { display: flex; gap: 10px; margin: 10px 0; }
        .trim-group div { flex: 1; }

        input, button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="preview-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1080"></canvas>

    <div class="controls">
        <label style="font-size: 11px; color: #888;">MP3 va LRC fayllarni yuklang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <label style="font-size: 11px; color: #888;">Qirqish oralig'i (soniyalarda):</label>
        <div class="trim-group">
            <div>
                <input type="number" id="trim-start" value="0" step="0.1" placeholder="Boshi">
            </div>
            <div>
                <input type="number" id="trim-end" value="30" step="0.1" placeholder="Oxiri">
            </div>
        </div>

        <div id="status-text">Fayllarni tanlang va "YASASH"ni bosing</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">HD VIDEONI YASASH VA BOTGA YUBORISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');

    let lyrics = [];
    let audioFile = null;

    // Sizning ma'lumotlaringiz
    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    document.getElementById('audio-input').onchange = (e) => {
        audioFile = e.target.files[0];
        statusText.innerText = "Audio yuklandi.";
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "LRC yuklandi.";
        };
        reader.readAsText(e.target.files[0]);
    };

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Avval hamma fayllarni yuklang!");

        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        if (duration <= 0) return alert("Vaqt xato kiritildi!");

        startBtn.disabled = true;
        
        // 1. Audio tizimi (Ovozni tiniq qilish)
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);

        // 2. Video Recorder (10Mbps Bitrate)
        const stream = canvas.captureStream(30);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));

        const recorder = new MediaRecorder(stream, {
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: 10000000 
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "BOTGA YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            
            // Telegram API orqali yuborish
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Lyric_HD_${Date.now()}.mp4`);
            formData.append('caption', "✅ HD Lyric Video tayyor bo'ldi!\n\nID: " + MY_ID);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusText.innerText = "✅ BOTGA YUBORILDI!";
                    tg.showAlert("Tayyor! Botga xabar yuborildi.");
                } else {
                    alert("Botga yuborishda xatolik yuz berdi.");
                }
            } catch (err) {
                alert("Tarmoq xatosi: " + err.message);
            }

            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        // 3. Renderlash (Canvasga chizish)
        function drawFrame() {
            const now = audioTag.currentTime;
            
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";
            displayText.innerText = text;

            ctx.fillStyle = "#00e676";
            ctx.font = "bold 60px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            statusText.innerText = `JARAYON: ${Math.floor(((now - startT) / duration) * 100)}%`;

            if (now < endT && !audioTag.paused) {
                requestAnimationFrame(drawFrame);
            } else {
                audioTag.pause();
                recorder.stop();
            }
        }
        drawFrame();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
