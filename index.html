<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Professional</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* Asosiy Ro'yxat */
        .list-screen { padding: 20px; }
        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer;
        }
        .song-card b { font-size: 1.1rem; display: block; }
        .song-card span { color: #888; font-size: 0.9rem; }

        /* Pleyer Ekrani */
        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }

        #lyric-container {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px;
            text-align: center; box-sizing: border-box;
        }

        #current-lyric {
            font-size: 2.2rem; font-weight: 800; line-height: 1.3;
            transition: 0.3s; filter: blur(0);
        }

        /* Animatsiya xatolikni oldini olish uchun */
        .new-line { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .artist-name {
            position: absolute; bottom: 50px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .close-btn {
            position: absolute; top: 25px; left: 25px; z-index: 10001;
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            width: 45px; height: 45px; border-radius: 50%; font-size: 20px;
        }

        /* YouTube Pleyer (Shaffof qatlam) */
        #player-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        #player { opacity: 0.01; } /* Faqat Play tugmasi bosilishi uchun */
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h2 style="color: var(--accent)">Pleylist</h2>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        
        <div id="lyric-container">
            <div id="current-lyric">Musiqani yoqing...</div>
            <div class="artist-name" id="player-artist"></div>
        </div>

        <div id="player-wrapper">
            <div id="player"></div>
        </div>
    </div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var player, currentLyrics = [], syncInterval;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '300', width: '300',
            playerVars: { 'playsinline': 1, 'controls': 1 },
            events: { 'onStateChange': onStateChange }
        });
    }

    function onStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('player-wrapper').style.pointerEvents = "none";
            startSync();
        } else {
            stopSync();
        }
    }

    function startSync() {
        stopSync(); // Dublikatni oldini olish
        syncInterval = setInterval(() => {
            const now = player.getCurrentTime();
            const hit = currentLyrics.findLast(l => now >= l.time);
            
            if (hit) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== hit.text) {
                    el.innerText = hit.text;
                    el.classList.remove('new-line');
                    void el.offsetWidth;
                    el.classList.add('new-line');
                }
            }
        }, 100);
    }

    function stopSync() { clearInterval(syncInterval); }

    function openPlayer(data) {
        // MUHIM: Avvalgi matnlarni tozalash (Xatolikni to'g'irlash)
        document.getElementById('current-lyric').innerText = "Musiqani yoqing...";
        document.getElementById('player-artist').innerText = data.artist;
        document.getElementById('player-wrapper').style.pointerEvents = "auto";
        
        currentLyrics = parseLRC(data.lyrics || "");
        
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        
        player.loadVideoById(data.youtubeId);
    }

    function closePlayer() {
        stopSync();
        player.stopVideo(); // Musiqani to'xtatish
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const listDiv = document.getElementById('songs-list');
        listDiv.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `<div><b>${data.track}</b><span>${data.artist}</span></div> <b style="color:var(--accent)">▶</b>`;
            card.onclick = () => openPlayer(data);
            listDiv.appendChild(card);
        });
    });
</script>
</body>
</html>
