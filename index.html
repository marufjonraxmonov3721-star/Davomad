<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Quiz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #000; --accent: #ff0000; --blue: #00f2ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--tg-theme-bg); color: #fff; margin: 0; overflow: hidden; }
        
        /* Arsenal Style Header */
        .header { padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); background: #111; }
        .score-board { display: flex; justify-content: space-around; font-weight: bold; color: var(--blue); }

        /* Video Area */
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; pointer-events: none; }
        
        /* Lyrics Area */
        .lyrics-box { height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .current-lyric { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--blue); }
        .input-area { width: 90%; margin: auto; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #111; color: #fff; font-size: 18px; text-align: center; outline: none; }
        input:focus { border-color: var(--blue); }

        /* Game Over Screen */
        #game-over { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-board">
            <span>BALL: <span id="score">0</span></span>
            <span id="timer">00:00</span>
        </div>
    </div>

    <div id="player-container">
        <div id="player"></div>
    </div>

    <div class="lyrics-box">
        <div class="current-lyric" id="display-lyric">Tayyormisiz?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="So'zni yozing..." autocomplete="off">
    </div>
</div>

<div id="game-over">
    <h1 style="color: var(--accent);">O'YIN TUGADI!</h1>
    <h2 id="final-score">Ball: 0</h2>
    <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 10px; border:none; background: var(--blue);">QAYTA BOSHLASH</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const tg = window.Telegram.WebApp;
    tg.expand(); // Telegramda to'liq ekran ochish

    let player, lyrics = [], currentLineIdx = 0, score = 0;
    const inputField = document.getElementById('userInput');

    // 1. Bazadan tasodifiy qo'shiqni olish
    async function loadTrack() {
        const snap = await getDocs(collection(db, "tracklist"));
        const tracks = snap.docs.map(d => d.data());
        const track = tracks[Math.floor(Math.random() * tracks.length)];
        
        // LRC Parsing
        lyrics = track.lyrics.split('\n').map(l => {
            const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), txt: m[3].trim() } : null;
        }).filter(x => x);

        initPlayer(track.youtubeId);
    }

    function initPlayer(id) {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: id,
            playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
            events: { 'onStateChange': (e) => {
                if(e.data == 1) setInterval(updateGame, 100);
            }}
        });
    }

    function updateGame() {
        const now = player.getCurrentTime();
        const line = lyrics.find((l, i) => l.t <= now && i >= currentLineIdx);
        
        if(line && line.txt) {
            // So'zni yashirish (oxirgi so'zni nuqtalar bilan ko'rsatish)
            const words = line.txt.split(' ');
            const targetWord = words.pop();
            document.getElementById('display-lyric').innerText = words.join(' ') + " ...";
            
            // Tekshirish
            inputField.oninput = () => {
                if(inputField.value.toLowerCase().trim() === targetWord.toLowerCase().trim()) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    inputField.value = "";
                    currentLineIdx++;
                    tg.HapticFeedback.notificationOccurred('success'); // Vibratsiya
                }
            };
        }

        // Vaqt tugasa
        if(player.getDuration() > 0 && now >= player.getDuration() - 1) {
            endGame();
        }
    }

    async function endGame() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-score').innerText = "Ball: " + score;
        
        // Reytingga yozish
        await addDoc(collection(db, "leaderboard"), {
            name: tg.initDataUnsafe.user?.first_name || "Guest",
            score: score,
            date: new Date()
        });
    }

    window.onload = loadTrack;
</script>
</body>
</html>
