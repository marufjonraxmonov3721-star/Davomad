<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Cinematic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* Pleylist */
        .list-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .song-card {
            background: #111; padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer;
        }
        .song-card:active { transform: scale(0.97); background: #1a1a1a; }
        .song-info b { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .song-info span { color: #888; font-size: 0.9rem; }

        /* Pleyer Ekrani */
        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; overflow: hidden;
        }

        /* Chiroyli Dinamik Fon */
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--accent); border-radius: 50%;
            filter: blur(120px); opacity: 0.15; animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(50%, 50%); }
        }

        /* Matn Qatlami */
        #lyric-container {
            position: relative; z-index: 5; height: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; box-sizing: border-box; text-align: center;
        }

        #current-lyric {
            font-size: 2.5rem; font-weight: 800; line-height: 1.2;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .lyric-in { animation: lyricFadeIn 0.6s ease; }
        @keyframes lyricFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Yopish tugmasi */
        .close-btn {
            position: absolute; top: 25px; left: 25px; z-index: 10;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 20px;
        }

        /* YouTube Pleyer (Yashirin) */
        #yt-hidden { position: absolute; top: -100px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h2 style="color: var(--accent); margin-bottom: 25px;">Musiqalar</h2>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        
        <div class="animated-bg"><div class="glow"></div></div>
        
        <div id="lyric-container">
            <div id="current-lyric">Tayyorlanmoqda...</div>
        </div>

        <div id="yt-hidden"><div id="player"></div></div>
        
        <div style="position:absolute; bottom:40px; width:100%; text-align:center; color:var(--accent); font-weight:bold; letter-spacing:3px; font-size:12px; z-index:5;" id="artist-tag"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncTask;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '10', width: '10',
            playerVars: { 'playsinline': 1, 'controls': 0, 'modestbranding': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            startSync();
        } else {
            stopSync();
        }
    }

    function startSync() {
        stopSync();
        syncTask = setInterval(() => {
            const now = ytPlayer.getCurrentTime();
            const line = currentLyrics.findLast(l => now >= l.time);
            
            if (line) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== line.text) {
                    el.innerText = line.text;
                    el.classList.remove('lyric-in');
                    void el.offsetWidth;
                    el.classList.add('lyric-in');
                }
            }
        }, 100);
    }

    function stopSync() { clearInterval(syncTask); }

    function openPlayer(data) {
        document.getElementById('current-lyric').innerText = "...";
        document.getElementById('artist-tag').innerText = data.artist.toUpperCase();
        currentLyrics = parseLRC(data.lyrics || "");
        
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        
        ytPlayer.loadVideoById(data.youtubeId);
    }

    function closePlayer() {
        stopSync();
        ytPlayer.stopVideo();
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `
                <div class="song-info"><b>${data.track}</b><span>${data.artist}</span></div>
                <div style="color:var(--accent); font-size:20px;">▶</div>
            `;
            div.onclick = () => openPlayer(data);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
