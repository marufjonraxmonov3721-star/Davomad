<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LRC Maker Pro - Precision Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00e676; --bg: #0a0a0a; --surface: #1a1a1a;
            --gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: white; 
            margin: 0; padding: 0; text-align: center; user-select: none; 
        }
        .header { padding: 20px; background: var(--surface); border-bottom: 1px solid #333; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .card { background: var(--surface); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: 800; }
        
        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #000; color: #fff; font-size: 14px; outline: none; 
        }

        .sync-area { 
            height: 120px; display: flex; align-items: center; justify-content: center; 
            background: #000; border-radius: 15px; margin: 15px 0; border: 2px solid var(--accent);
            font-size: 18px; font-weight: 700; color: var(--accent); padding: 10px;
        }

        .tap-btn { 
            background: var(--gradient); color: #000; font-weight: 900; border: none; 
            width: 100%; padding: 25px; border-radius: 20px; font-size: 20px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3);
            transition: 0.2s; margin: 10px 0;
        }
        .tap-btn:active { transform: scale(0.95); opacity: 0.8; }
        .tap-btn:disabled { background: #333; color: #666; box-shadow: none; }

        .control-btns { display: flex; gap: 10px; }
        .btn-sub { flex: 1; background: #333; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        
        #status { font-size: 13px; color: var(--accent); margin-top: 15px; font-weight: 700; }
        
        .playing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(0, 230, 118, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 20px;">LRC Maker Pro</h1>
        <p style="margin:5px 0 0; font-size: 10px; color: var(--accent);">ANIQ SINXRONLASH TIZIMI</p>
    </div>

    <div class="container">
        <div class="card">
            <label>1. Musiqa tanlang</label>
            <input type="file" id="audio-file" accept="audio/*">
            
            <div class="control-btns">
                <div style="flex:1">
                    <label>Start (s)</label>
                    <input type="number" id="start-time" value="0" step="0.1">
                </div>
                <button class="btn-sub" style="margin-top:25px;" onclick="audio.play()">Eshitish</button>
                <button class="btn-sub" style="margin-top:25px; background:#cc3300;" onclick="audio.pause()">To'xtatish</button>
            </div>
        </div>

        <div class="card">
            <label>2. Matnni kiriting</label>
            <textarea id="lyrics-text" rows="5" placeholder="Har bir qatorni yangi satrdan yozing..."></textarea>
        </div>

        <div class="sync-area" id="display-line">Navbatdagi qator...</div>

        <button id="tap-btn" class="tap-btn" onclick="handleTap()" disabled>TAP (BOSING)</button>
        
        <div id="status">Audio yuklanishini kuting...</div>

        <button class="btn-sub" style="width:100%; margin-top:20px; background:white; color:black; padding:18px; border-radius:15px;" onclick="sendToBot()">LRC FAYLNI BOTGA YUBORISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const audio = new Audio();
    let lyricsArray = [];
    let syncedResults = [];
    let currentIndex = 0;
    let isRunning = false;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    document.getElementById('audio-file').onchange = (e) => {
        const file = e.target.files[0];
        audio.src = URL.createObjectURL(file);
        document.getElementById('tap-btn').disabled = false;
        document.getElementById('status').innerText = "✅ Audio tayyor. Matnni yozib TAPni bosing.";
    };

    function handleTap() {
        const text = document.getElementById('lyrics-text').value;
        const lines = text.split('\n').filter(l => l.trim() !== "");
        
        if (lines.length === 0) return alert("Avval matn kiriting!");

        if (!isRunning) {
            // Boshlash
            isRunning = true;
            lyricsArray = lines;
            syncedResults = [];
            currentIndex = 0;
            audio.currentTime = parseFloat(document.getElementById('start-time').value) || 0;
            audio.play();
            document.getElementById('tap-btn').classList.add('playing');
            updateDisplay();
            document.getElementById('status').innerText = "⏱ Sinxronlash ketyapti...";
        } else {
            // Vaqtni muhrlash
            syncedResults.push({
                time: audio.currentTime,
                text: lyricsArray[currentIndex]
            });
            
            currentIndex++;

            if (currentIndex >= lyricsArray.length) {
                completeSync();
            } else {
                updateDisplay();
            }
        }
        
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function updateDisplay() {
        document.getElementById('display-line').innerText = lyricsArray[currentIndex];
    }

    function completeSync() {
        isRunning = false;
        audio.pause();
        document.getElementById('tap-btn').classList.remove('playing');
        document.getElementById('display-line').innerText = "TAMOM!";
        document.getElementById('status').innerText = "✅ Sinxronlash tugadi. Endi yuboring!";
    }

    function formatLRC() {
        let content = "[ti:LRC Maker Pro]\n[ar:User]\n";
        syncedResults.forEach(item => {
            let m = Math.floor(item.time / 60);
            let s = (item.time % 60).toFixed(2);
            let timeStr = `[${m.toString().padStart(2, '0')}:${s.toString().padStart(5, '0')}]`;
            content += timeStr + item.text + "\n";
        });
        return content;
    }

    async function sendToBot() {
        if (syncedResults.length === 0) return alert("Avval sinxronlashni bajaring!");
        
        document.getElementById('status').innerText = "📤 Botga yuborilmoqda...";
        
        const lrcText = formatLRC();
        const blob = new Blob([lrcText], { type: 'text/plain' });
        const fileName = "lyrics_" + Date.now() + ".lrc";

        const formData = new FormData();
        formData.append('chat_id', MY_ID);
        formData.append('document', blob, fileName);
        formData.append('caption', "📄 Yangi LRC fayl tayyor!\n✅ Barcha vaqtlar aniqlandi.");

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('status').innerText = "🚀 BOTGA YUBORILDI!";
                tg.showConfirm("LRC fayl botingizga yuborildi!");
            } else {
                alert("Yuborishda xatolik yuz berdi.");
            }
        } catch (e) {
            alert("Aloqa xatosi!");
        }
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
