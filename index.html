<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | Lyric Focus</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --bg-color: #0c0c0e;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        .header {
            padding: 25px 20px;
            text-align: left;
            background: rgba(12, 12, 14, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h1 { margin: 0; font-size: 26px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-fill-color: transparent; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 0; font-size: 13px; color: #a1a1aa; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #e4e4e7; }

        .color-selector { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .color-selector::-webkit-scrollbar { display: none; }
        .color-option { 
            min-width: 65px; height: 90px; border-radius: 18px; cursor: pointer; 
            border: 2.5px solid transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .color-option.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        input[type="file"] { display: none; }
        .file-label {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #1f1f23; padding: 16px; border-radius: 18px; cursor: pointer; transition: 0.2s;
            margin-bottom: 12px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .file-label:active { transform: scale(0.98); background: #27272a; }

        .trim-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-top: 10px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group span { font-size: 11px; color: #71717a; margin-bottom: 5px; margin-left: 5px; }

        select, .num-input, .range-input {
            width: 100%; background: #09090b; border: 1px solid #27272a; border-radius: 14px;
            padding: 14px; color: #fff; font-size: 15px; box-sizing: border-box;
        }

        .range-input { padding: 5px; cursor: pointer; height: 10px; accent-color: #bc1888; }

        .row { display: flex; gap: 12px; }

        .preview-wrapper {
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 30px; overflow: hidden; margin-top: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        canvas { width: 100%; height: 100%; }

        .btn-main {
            width: 100%; padding: 20px; background: var(--primary-gradient);
            color: white; border: none; border-radius: 20px; margin-top: 30px;
            font-weight: 700; font-size: 17px; cursor: pointer;
            box-shadow: 0 12px 24px rgba(220, 39, 67, 0.3);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.96); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(12, 12, 14, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 18px 0;
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000;
        }
        .nav-item { color: #52525b; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-item.active { color: #bc1888; }
        .nav-item i { font-size: 22px; }

        #status { margin-top: 18px; text-align: center; font-size: 14px; color: #bc1888; font-weight: 600; }
        .lyrics-preview { font-size: 12px; color: #38bdf8; margin-top: 8px; text-align: center; font-weight: 500; }
        
        .timeline-info { display: flex; justify-content: space-between; font-size: 12px; color: #a1a1aa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>InstaCaption</h1>
        <p>Dynamic Focus Lyric Video</p>
    </div>

    <div class="container">
        <div class="glass-card">
            <label><i class="fa-solid fa-palette"></i> Fon va Vizual effektlar</label>
            <div class="color-selector" id="colorSelector">
                <div class="color-option active" style="background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);" data-color1="#000000" data-color2="#1a1a1a"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-color1="#667eea" data-color2="#764ba2"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);" data-color1="#f5576c" data-color2="#f093fb"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #434343 0%, #000000 100%);" data-color1="#434343" data-color2="#000000"></div>
            </div>

            <label><i class="fa-solid fa-cloud-arrow-up"></i> Fayllarni yuklang</label>
            
            <label for="imageUpload" class="file-label"><i class="fa-solid fa-image"></i> <span id="imageName">Fon rasmi (ixtiyoriy)</span></label>
            <input type="file" id="imageUpload" accept="image/*">

            <label for="audioUpload" class="file-label"><i class="fa-solid fa-music"></i> <span id="audioName">Qo'shiq (.mp3)</span></label>
            <input type="file" id="audioUpload" accept="audio/*">

            <label for="lrcUpload" class="file-label"><i class="fa-solid fa-file-lines"></i> <span id="lrcName">LRC matn (.lrc)</span></label>
            <input type="file" id="lrcUpload" accept=".lrc">
            <div id="lyricsStatus" class="lyrics-preview"></div>
        </div>

        <div class="glass-card">
            <label><i class="fa-solid fa-font"></i> Matn sozlamalari</label>
            <div class="input-group">
                <span>Matn o'lchami (px)</span>
                <input type="range" id="fontSize" class="range-input" min="30" max="120" value="65">
            </div>
            
            <label style="margin-top: 15px;"><i class="fa-solid fa-scissors"></i> Qirqish (Timeline)</label>
            <div class="trim-box">
                <div class="input-group">
                    <span>Boshlanish nuqtasi: <b id="startTimeVal">0.0s</b></span>
                    <input type="range" id="startTime" class="range-input" min="0" max="100" step="0.1" value="0">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <span>Video davomiyligi: <b id="durationVal">15s</b></span>
                    <input type="range" id="duration" class="range-input" min="5" max="60" step="1" value="15">
                </div>
                <div class="timeline-info">
                    <span id="audioTotalTime">Audio yuklanmagan</span>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <span>Video sifati</span>
                    <select id="videoQuality">
                        <option value="8000000">Ultra HD (4K)</option>
                        <option value="4000000" selected>HD (1080p)</option>
                        <option value="1500000">Standart (720p)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="preview-wrapper" id="previewArea">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; font-size: 12px;">PREVIEW</div>
        </div>
        
        <button class="btn-main" id="renderBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> VIDEONI TAYYORLASH
        </button>
        <div id="status"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Asosiy</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Tez kunda!')"><i class="fa-solid fa-layer-group"></i>Shablonlar</a>
        <a href="#" class="nav-item" onclick="tg.showConfirm('Yordam kerakmi?')"><i class="fa-solid fa-circle-question"></i>Yordam</a>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();
    tg.ready();

    const audioInput = document.getElementById('audioUpload');
    const lrcInput = document.getElementById('lrcUpload');
    const imageInput = document.getElementById('imageUpload');
    const fontSizeInput = document.getElementById('fontSize');
    const startTimeInput = document.getElementById('startTime');
    const durationInput = document.getElementById('duration');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const colorOptions = document.querySelectorAll('.color-option');

    let audioEl = new Audio();
    audioEl.crossOrigin = "anonymous";
    let lyrics = [];
    let bgColor1 = "#000000";
    let bgColor2 = "#1a1a1a";
    let bgImage = null;
    
    // Audio Context uchun
    let audioCtx, analyser, dataArray;
    let particles = [];

    // Particles initialize
    for(let i=0; i<50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 4 + 1,
            speed: Math.random() * 1.5 + 0.5,
            opacity: Math.random()
        });
    }

    // Timeline yangilanishi
    startTimeInput.oninput = () => {
        document.getElementById('startTimeVal').innerText = startTimeInput.value + 's';
        audioEl.currentTime = parseFloat(startTimeInput.value);
    };
    durationInput.oninput = () => {
        document.getElementById('durationVal').innerText = durationInput.value + 's';
    };

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const result = [];
        const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;

        lines.forEach(line => {
            const matches = line.match(timeExp);
            if (matches) {
                const text = line.replace(timeExp, '').trim();
                matches.forEach(m => {
                    const parts = m.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                    const time = parseInt(parts[1]) * 60 + parseInt(parts[2]) + parseInt(parts[3]) / 100;
                    if(text) result.push({ time, text });
                });
            }
        });
        return result.sort((a, b) => a.time - b.time);
    }

    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => { bgImage = img; };
            img.src = url;
            document.getElementById('imageName').innerText = file.name.substring(0, 15);
        }
    };

    lrcInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                lyrics = parseLRC(event.target.result);
                document.getElementById('lrcName').innerText = file.name;
                document.getElementById('lyricsStatus').innerText = "Matn yuklandi: " + lyrics.length + " qator";
            };
            reader.readAsText(file);
        }
    };

    colorOptions.forEach(opt => {
        opt.onclick = () => {
            colorOptions.forEach(b => b.classList.remove('active'));
            opt.classList.add('active');
            bgColor1 = opt.dataset.color1;
            bgColor2 = opt.dataset.color2;
            bgImage = null; // Agar rang tanlansa rasmni o'chiramiz
            tg.HapticFeedback.impactOccurred('light');
        };
    });

    audioInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const url = URL.createObjectURL(file);
            audioEl.src = url;
            document.getElementById('audioName').innerText = file.name.substring(0, 20);
            
            audioEl.onloadedmetadata = () => {
                startTimeInput.max = audioEl.duration.toFixed(1);
                document.getElementById('audioTotalTime').innerText = "Jami: " + audioEl.duration.toFixed(1) + "s";
            };
            setupAudioAnalyser();
        }
    };

    function setupAudioAnalyser() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audioEl);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
    }

    function drawFocusLyrics() {
        // 1. Fon (Rasm yoki Gradient)
        ctx.save();
        if(bgImage) {
            // Rasm va Blur effekti
            ctx.filter = 'blur(15px) brightness(0.6)';
            ctx.drawImage(bgImage, -50, -50, canvas.width + 100, canvas.height + 100);
            ctx.filter = 'none';
        } else {
            let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, bgColor1);
            bgGrad.addColorStop(1, bgColor2);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.restore();

        // 2. Particles (Zarrachalar)
        particles.forEach(p => {
            p.y -= p.speed;
            if(p.y < 0) p.y = canvas.height;
            ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // 3. Audio Visualizer (Waveform barlari)
        if(analyser && !audioEl.paused) {
            analyser.getByteFrequencyData(dataArray);
            const barWidth = (canvas.width / dataArray.length) * 2;
            let barX = 0;
            for(let i = 0; i < dataArray.length; i++) {
                let barHeight = (dataArray[i] / 255) * 200;
                ctx.fillStyle = `rgba(255, 255, 255, 0.4)`;
                ctx.fillRect(barX, canvas.height - barHeight, barWidth - 1, barHeight);
                barX += barWidth;
            }
        }

        // 4. Lyrics (Matnlar)
        if (lyrics.length === 0) {
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.font = "30px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Tayyor", canvas.width/2, canvas.height/2);
            return;
        }

        const currentTime = audioEl.currentTime;
        const currentFontSize = parseInt(fontSizeInput.value);
        
        let activeIdx = -1;
        for (let i = 0; i < lyrics.length; i++) {
            if (currentTime >= lyrics[i].time) activeIdx = i;
        }

        if (activeIdx === -1) return;

        let group = [];
        let pairStartIdx = (activeIdx % 2 === 0) ? activeIdx : activeIdx - 1;
        
        if (lyrics[pairStartIdx]) group.push({ ...lyrics[pairStartIdx], order: 0, gIdx: pairStartIdx });
        if (lyrics[pairStartIdx + 1]) group.push({ ...lyrics[pairStartIdx + 1], order: 1, gIdx: pairStartIdx + 1 });

        const centerY = canvas.height * 0.48;
        const lineSpacing = currentFontSize * 1.8;

        group.forEach((lyric) => {
            const words = lyric.text.split(' ');
            const nextTime = lyrics[lyric.gIdx + 1] ? lyrics[lyric.gIdx + 1].time : lyric.time + 3;
            const duration = nextTime - lyric.time;
            const lineProgress = Math.max(0, Math.min(1, (currentTime - lyric.time) / duration));
            const highlightedWordIndex = Math.floor(lineProgress * words.length);

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const drawY = centerY + (lyric.order * lineSpacing);

            ctx.font = `700 ${currentFontSize}px 'SF Pro Display'`;
            const totalWidth = words.reduce((acc, word) => acc + ctx.measureText(word + " ").width, 0);
            let currentX = (canvas.width - totalWidth) / 2;

            words.forEach((word, wIdx) => {
                const isCurrentWordLine = (activeIdx === lyric.gIdx);
                const isWordHighlighted = isCurrentWordLine && wIdx <= highlightedWordIndex;

                if (isWordHighlighted) {
                    ctx.fillStyle = "#ffffff";
                    ctx.globalAlpha = 1.0;
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = "rgba(255,255,255,0.9)";
                } else if (currentTime > lyric.time && !isCurrentWordLine) {
                    ctx.fillStyle = "#ffffff";
                    ctx.globalAlpha = 0.2;
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = "#ffffff";
                    ctx.globalAlpha = 0.45;
                    ctx.shadowBlur = 0;
                }

                const wordWidth = ctx.measureText(word).width;
                ctx.fillText(word, currentX + wordWidth/2, drawY);
                currentX += ctx.measureText(word + " ").width;
            });
        });

        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
    }

    function animate() {
        drawFocusLyrics();
        requestAnimationFrame(animate);
    }
    animate();

    document.getElementById('renderBtn').onclick = async () => {
        if (!audioInput.files[0] || lyrics.length === 0) {
            tg.HapticFeedback.notificationOccurred('error');
            return tg.showPopup({message: "Audio va LRC yuklang!"});
        }

        if(audioCtx && audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        
        const startTime = parseFloat(startTimeInput.value);
        const duration = parseFloat(durationInput.value);
        const quality = document.getElementById('videoQuality').value;

        status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> VFX va Audio render qilinmoqda...';
        tg.HapticFeedback.impactOccurred('medium');

        const dest = audioCtx.createMediaStreamDestination();
        const sourceNode = audioCtx.createMediaElementSource(audioEl);
        sourceNode.connect(dest);
        sourceNode.connect(audioCtx.destination);

        const videoStream = canvas.captureStream(60);
        const combinedStream = new MediaStream([
            ...videoStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
        ]);

        const recorder = new MediaRecorder(combinedStream, { 
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: parseInt(quality)
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', tg.initDataUnsafe.user?.id);
            formData.append('video', videoBlob, 'insta_lyric_vfx.mp4');
            formData.append('caption', "✨ VFX & Lyrics tayyor!");

            try {
                status.innerHTML = 'Telegramga yuborilmoqda...';
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: 'POST', body: formData });
                status.innerHTML = 'Muvaffaqiyatli! ✅';
                tg.HapticFeedback.notificationOccurred('success');
            } catch (err) { status.innerText = "Yuborishda xato!"; }
        };

        audioEl.currentTime = startTime;
        audioEl.play();
        recorder.start();

        setTimeout(() => {
            recorder.stop();
            audioEl.pause();
        }, duration * 1000);
    };
</script>

</body>
</html>
