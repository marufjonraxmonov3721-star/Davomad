<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 15px; text-align: center; }
        .preview-box { width: 100%; height: 280px; background: #121212; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        #text-render { font-size: 24px; font-weight: bold; color: var(--accent); padding: 20px; text-shadow: 0 0 10px rgba(0,230,118,0.5); }
        .controls { background: #181818; padding: 20px; border-radius: 20px; text-align: left; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="preview-box" id="capture-zone">
        <div id="text-render">Matn topilmadi</div>
    </div>

    <div class="controls">
        <label style="font-size:12px; color:#888;">MP3 fayl:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        
        <label style="font-size:12px; color:#888;">LRC fayl:</label>
        <input type="file" id="lrc-input" accept=".lrc">

        <audio id="player" controls style="width: 100%; margin: 10px 0;"></audio>

        <button class="btn-save" id="save-btn" onclick="handleExport()">BRAUZERDA OCHISH VA SAQLASH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const player = document.getElementById('player');
    const textRender = document.getElementById('text-render');
    const saveBtn = document.getElementById('save-btn');
    let lyrics = [];

    document.getElementById('audio-input').onchange = (e) => {
        player.src = URL.createObjectURL(e.target.files[0]);
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x && x.text);
            textRender.innerText = "LRC Yuklandi!";
        };
        reader.readAsText(e.target.files[0]);
    };

    player.ontimeupdate = () => {
        const active = lyrics.findLast(l => player.currentTime >= l.t);
        if (active) textRender.innerText = active.text;
    };

    // Tugma bosilganda ishlaydigan asosiy funksiya
    function handleExport() {
        if (!player.src || lyrics.length === 0) {
            alert("Fayllar yuklanmagan!");
            return;
        }

        try {
            // Telegram ichidan Chrome/Safari-ga o'tishga majburlash usuli
            const currentUrl = window.location.href;
            
            // Telegram bot orqali tashqi brauzerda ochish
            if (window.Telegram && tg.initData) {
                tg.openLink(currentUrl, {try_instant_view: false});
            } else {
                // Agar oddiy brauzerda bo'lsa, eksportni boshlash
                startRecording();
            }
        } catch (err) {
            alert("Xatolik: " + err.message);
        }
    }

    async function startRecording() {
        saveBtn.innerText = "YOZILMOQDA...";
        saveBtn.disabled = true;
        
        const chunks = [];
        const stream = document.getElementById('capture-zone').captureStream(30);
        
        // Audio xavfsiz ulanishi
        const audioStream = player.captureStream ? player.captureStream() : player.mozCaptureStream();
        audioStream.getAudioTracks().forEach(t => stream.addTrack(t));

        const recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank'); // Yangi oynada ochish
            saveBtn.innerText = "BRAUZERDA OCHISH VA SAQLASH";
            saveBtn.disabled = false;
        };

        player.currentTime = 0;
        recorder.start();
        player.play();

        player.onended = () => recorder.stop();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
