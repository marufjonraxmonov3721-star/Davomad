<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
            --card-bg: #1a1a1a;
            --win-green: #2ecc71;
            --draw-gray: #7f8c8d;
            --loss-red: #e74c3c;
            --ef-blue: #004dff;
            --nav-bg: #111111;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            -webkit-user-select: none;
            padding: 15px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* --- UI CARDS --- */
        .div-card {
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-bottom: 3px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }
        .div-num { font-size: 32px; font-weight: 900; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .div-title { color: #f1c40f; font-size: 24px; font-weight: 800; text-transform: uppercase; }

        .phase-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
        }
        .phase-label {
            display: block;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .phase-time {
            display: block;
            color: #2ecc71;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
        }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { 
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 10px;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-icon { font-size: 24px; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 900; color: #fff; }

        /* --- RULES INFO --- */
        .rules-panel {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #333;
        }
        .rule-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .rule-label { color: #aaa; }
        .rule-val { color: #fff; font-weight: bold; }
        .rule-val.plus { color: #2ecc71; }
        .rule-val.minus { color: #e74c3c; }

        .promotion-text { color: #aaa; font-size: 13px; text-align: center; margin-top: 10px; line-height: 1.4; }
        .relegation-warning { 
            color: #ff4757; 
            font-weight: 900; 
            display: none; 
            margin-top: 10px; 
            text-align: center;
            text-transform: uppercase;
            animation: blink 0.8s infinite; 
            font-size: 12px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- TIMER --- */
        #timer-container {
            width: 100%;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 20px;
            border: 2px solid #222;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        #timer-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
        }
        #display { font-size: 64px; font-weight: 900; color: var(--accent-color); font-family: 'Courier New', monospace; z-index: 1; }
        .target-text { font-size: 14px; color: #666; letter-spacing: 2px; font-weight: bold; z-index: 1; margin-bottom: 5px; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 10px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-main:active { transform: scale(0.95); }
        .start { background: linear-gradient(to bottom, #2ecc71, #27ae60); color: white; }
        .stop { background: linear-gradient(to bottom, #e74c3c, #c0392b); color: white; }

        /* --- REYTING --- */
        .ef-header { padding: 10px 0; margin-bottom: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: flex-end; }
        .ef-main-title { color: #f1c40f; font-weight: 800; font-size: 26px; text-transform: uppercase; }

        .ef-row {
            background: linear-gradient(90deg, #1a1a1a 0%, #111 100%);
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-left: 4px solid #333;
            transition: 0.3s;
        }
        .ef-row.me { 
            border-left: 4px solid var(--accent-color); 
            background: linear-gradient(90deg, #2c2c2c 0%, #1a1a1a 100%);
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.1);
        }

        .ef-rank-num { width: 35px; font-size: 20px; font-weight: 900; color: #555; font-style: italic; }
        .ef-row:nth-child(1) .ef-rank-num { color: #ffd700; font-size: 24px; }
        .ef-row:nth-child(2) .ef-rank-num { color: #c0c0c0; }
        .ef-row:nth-child(3) .ef-rank-num { color: #cd7f32; }

        .ef-avatar-container { position: relative; margin: 0 15px; }
        .ef-avatar { 
            width: 50px; height: 50px; 
            border-radius: 12px; 
            background: #222; 
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .ef-div-tag {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--accent-color);
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 5px;
            border-radius: 5px;
        }

        .ef-info-main { flex: 1; }
        .ef-name { font-weight: 800; font-size: 16px; color: #fff; }
        .ef-meta { font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; margin-top: 2px; }

        .ef-points-area { text-align: right; }
        .ef-points-val { font-weight: 900; font-size: 20px; color: #fff; font-family: monospace; }
        .ef-points-label { display: block; font-size: 9px; color: var(--accent-color); font-weight: bold; }

        /* --- NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70px;
            background: var(--nav-bg);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #222; z-index: 2000;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            color: #555; font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        .ef-mini-btn {
            width: 100%; background: #111; border: 1px solid var(--accent-color);
            color: var(--accent-color); padding: 18px; border-radius: 12px;
            font-size: 14px; font-weight: 900; text-transform: uppercase; margin-top: 10px;
        }

        #last-result { 
            text-align: center; font-weight: 900; font-size: 18px; 
            margin: 15px 0; min-height: 24px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-page" class="page active">
        <div class="div-card">
            <div class="header-row">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="div-badge">
                        <span class="div-num" id="user-div-icon">10</span>
                    </div>
                    <div class="div-title">Divizion <span id="user-div-title">10</span></div>
                </div>
                <div class="phase-container">
                    <span class="phase-label">Mavsum Tugashi</span>
                    <span class="phase-time" id="phase-date">20/04/2026 06:59</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-icon">📈</span>
                    <div class="stat-info">
                        <span class="stat-label">Reyting</span>
                        <span class="stat-value" id="user-pts">0</span>
                    </div>
                </div>
                <div class="stat-box">
                    <span class="stat-icon">👑</span>
                    <div class="stat-info">
                        <span class="stat-label">O'rin</span>
                        <span class="stat-value" id="user-rank-pos">#---</span>
                    </div>
                </div>
            </div>

            <p class="relegation-warning" id="danger-info">DIQQAT: DIVIZIONDAN TUSHIB KETISH XAVFI!</p>
        </div>

        <div class="rules-panel">
            <div class="rule-item">
                <span class="rule-label">Yaqinlik chegarasi:</span>
                <span class="rule-val" id="rule-limit">±0.050s</span>
            </div>
            <div class="rule-item">
                <span class="rule-label">G'alaba uchun:</span>
                <span class="rule-val plus" id="rule-plus">+30 ball</span>
            </div>
            <div class="rule-item">
                <span class="rule-label">Mag'lubiyat uchun:</span>
                <span class="rule-val minus" id="rule-minus">-30 ball</span>
            </div>
            <p class="promotion-text" id="promo-info">Yuklanmoqda...</p>
        </div>

        <div id="timer-container">
            <div class="target-text" id="target-label">MAQSAD: 10.000s</div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result"></p>
    </div>

    <div id="rank-page" class="page">
        <div class="ef-header">
            <span class="ef-main-title">Reyting</span>
            <div style="color: #666; font-size: 10px; font-weight: bold;" id="ranking-time"></div>
        </div>

        <div class="ef-ranking-list" id="ef-list-container">
            </div>

        <button class="ef-mini-btn" onclick="scrollToMe()">Mening o'rnimni ko'rsat</button>
        <div style="height: 30px;"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('game-page', this)">
            <div class="nav-icon">🎮</div>
            <span>O'yin</span>
        </div>
        <div class="nav-item" onclick="showPage('rank-page', this)">
            <div class="nav-icon">🏆</div>
            <span>Reyting</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfiguratsiya siz bergan ma'lumotlar asosida
        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        let startTime;
        let timerInterval;
        let isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 0, division: 10, isWarning: false };
        let fullLeaderboard = [];

        // Soatni yangilash
        const now = new Date();
        document.getElementById('ranking-time').innerText = `YANGILANGAN: ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

        // Ma'lumotlarni bazadan olish
        onValue(ref(db, 'settings/phase'), (snapshot) => {
            if (snapshot.exists()) document.getElementById('phase-date').innerText = snapshot.val();
        });

        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            updateGameUI();
        });

        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = snapshot.val();
                document.getElementById('user-div-icon').innerText = myCurrentData.division || 10;
                document.getElementById('user-div-title').innerText = myCurrentData.division || 10;
                document.getElementById('user-pts').innerText = (myCurrentData.points || 0).toLocaleString();
                updateGameUI();
            } else {
                // Yangi o'yinchi bo'lsa
                update(ref(db, 'leaderboard/' + myId), { 
                    name: myName, points: 100, division: 10, isWarning: false 
                });
            }
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            const currentPoints = myCurrentData.points || 0;
            
            if (divSettings && divSettings[d]) {
                const rules = divSettings[d];
                document.getElementById('target-label').innerText = `MAQSAD: ${rules.target.toFixed(3)}s`;
                document.getElementById('rule-limit').innerText = `±${rules.nearLimit.toFixed(3)}s`;
                document.getElementById('rule-plus').innerText = `+${rules.plusPoints} ball`;
                document.getElementById('rule-minus').innerText = `-${rules.minusPoints} ball`;
                
                let infoText = "";
                if (d > 1) {
                    infoText += `Siz ${rules.promotionPoints.toLocaleString()} ball to'plasangiz, Divizion ${d-1}ga ko'tarilasiz. `;
                } else {
                    infoText = "Siz eng yuqori Diviziondasiz! O'rningizni saqlang.";
                }
                
                if (d < 10) {
                    infoText += `\nPastki chegara: ${rules.relegationPoints} ball.`;
                }
                document.getElementById('promo-info').innerText = infoText;

                // Xavfni tekshirish
                const dangerZone = (rules.relegationPoints || 0) + 30;
                if (d < 10 && currentPoints <= dangerZone) {
                    document.getElementById('danger-info').style.display = 'block';
                } else {
                    document.getElementById('danger-info').style.display = 'none';
                }
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            const resultText = document.getElementById('last-result');
            let currentDiv = myCurrentData.division || 10;
            
            // Standart qoidalar (agar bazada bo'lmasa)
            const rules = (divSettings && divSettings[currentDiv]) ? divSettings[currentDiv] : { 
                target: 10.000, nearLimit: 0.050, plusPoints: 30, minusPoints: 30, promotionPoints: 500, relegationPoints: 50 
            };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP"; btn.className = "btn-main stop";
                resultText.innerText = "";
                tg.HapticFeedback.impactOccurred('medium');
                
                timerInterval = setInterval(() => {
                    display.innerText = ((Date.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START"; btn.className = "btn-main start";

                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                
                let pointChange = 0; 
                let newDivision = currentDiv; 
                let newPoints = myCurrentData.points || 0;
                let newWarning = myCurrentData.isWarning || false;

                // 1. ANIQ URGANDA (0.000)
                if (diffStr === "0.000") {
                    pointChange = 100;
                    newPoints += pointChange;
                    if (currentDiv > 1) newDivision = currentDiv - 1;
                    newWarning = false;
                    resultText.style.color = "#f1c40f";
                    resultText.innerText = `DAHSHAT! ANIQ URILDI! +${pointChange}`;
                    tg.HapticFeedback.notificationOccurred('success');
                } 
                // 2. CHEGARA ICHIDA (YUTUQLI)
                else if (diffVal <= rules.nearLimit) {
                    pointChange = parseInt(rules.plusPoints); 
                    newPoints += pointChange;
                    newWarning = false;
                    resultText.style.color = "#2ecc71";
                    resultText.innerText = `Zo'r! +${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('success');
                } 
                // 3. UZOQLASHIB KETGANDA (MAG'LUBIYAT)
                else {
                    pointChange = -parseInt(rules.minusPoints); 
                    newPoints += pointChange;
                    if (newPoints < 0) newPoints = 0;
                    resultText.style.color = "#e74c3c";
                    resultText.innerText = `Uzoq! ${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('error');
                }

                // Divizionni ko'tarish logic
                if (newDivision > 1 && newPoints >= rules.promotionPoints) {
                    newDivision -= 1;
                    newPoints = 100; // Yangi divizionda 100 balldan boshlash
                    newWarning = false;
                    tg.showAlert(`Tabriklaymiz! Siz Divizion ${newDivision}ga ko'tarildingiz!`);
                }
                
                // Diviziondan tushish (1 marta imkoniyat bilan)
                if (newDivision < 10 && newPoints < (rules.relegationPoints || 0)) {
                    if (newWarning) {
                        newDivision += 1;
                        newPoints = 150; 
                        newWarning = false;
                        tg.showAlert("Afsus! Ballar kamligi sababli pastki divizionga tushib ketdingiz.");
                    } else {
                        newWarning = true;
                        tg.showAlert("OGOHLANTIRISH! Ballaringiz tushish chegarasidan past. Keyingi mag'lubiyatda divizioningiz pasayadi!");
                    }
                }

                // Bazaga yangilash
                update(ref(db, 'leaderboard/' + myId), { 
                    name: myName, 
                    points: newPoints, 
                    division: newDivision, 
                    isWarning: newWarning,
                    lastTime: finalTime.toFixed(3)
                });
            }
        };

        // Reytingni yangilash
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            fullLeaderboard = Object.entries(data).map(([id, val]) => ({id, ...val}))
                .sort((a, b) => {
                    if (a.division !== b.division) return a.division - b.division;
                    return (b.points || 0) - (a.points || 0);
                });
            
            const myRankIndex = fullLeaderboard.findIndex(p => String(p.id) === String(myId));
            document.getElementById('user-rank-pos').innerText = myRankIndex !== -1 ? `#${myRankIndex + 1}` : "#---";
            renderRanking();
        });

        function renderRanking() {
            const container = document.getElementById('ef-list-container');
            container.innerHTML = '';
            fullLeaderboard.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = `ef-row ${String(p.id) === String(myId) ? 'me' : ''}`;
                if(String(p.id) === String(myId)) row.id = "my-rank-row";
                
                row.innerHTML = `
                    <div class="ef-rank-num">${i+1}</div>
                    <div class="ef-avatar-container">
                        <div class="ef-avatar">⏱️</div>
                        <div class="ef-div-tag">D${p.division || 10}</div>
                    </div>
                    <div class="ef-info-main">
                        <div class="ef-name">${p.name}</div>
                        <div class="ef-meta">GLOBAL PLAYER</div>
                    </div>
                    <div class="ef-points-area">
                        <span class="ef-points-val">${(p.points || 0).toLocaleString()}</span>
                        <span class="ef-points-label">RATING</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.showPage = (pageId, navEl) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        };

        window.scrollToMe = () => {
            const me = document.getElementById('my-rank-row');
            if(me) {
                me.scrollIntoView({ behavior: 'smooth', block: 'center' });
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Siz hali reytingda emassiz.");
            }
        };

    </script>
</body>
</html>
