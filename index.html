<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
            --card-bg: #1a1a1a;
            --win-green: #2ecc71;
            --draw-gray: #7f8c8d;
            --loss-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            -webkit-user-select: none;
            padding: 15px;
            overflow-x: hidden;
        }

        .div-card {
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #333;
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: linear-gradient(45deg, #2c3e50, #00008b);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .div-num { font-size: 28px; font-weight: 900; color: white; }
        .div-title { color: #f1c40f; font-size: 22px; font-weight: bold; }

        .phase-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
        }
        .phase-label { display: block; font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .phase-time { display: block; color: #2ecc71; font-size: 11px; font-weight: bold; font-family: monospace; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-box { display: flex; align-items: center; gap: 10px; }
        .stat-icon { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .promotion-text { color: #888; font-size: 12px; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }

        #timer-container {
            width: 100%;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 20px;
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        #display { font-size: 50px; font-weight: bold; color: var(--accent-color); font-family: monospace; }
        .target-text { font-size: 12px; color: #555; letter-spacing: 1px; }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .start { background: #2ecc71; color: white; }
        .stop { background: #e74c3c; color: white; }

        /* Ranking Button Style */
        .btn-ranking {
            background: linear-gradient(to right, #0088cc, #004466);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }

        /* Ranking Modal */
        #ranking-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }
        .modal-title { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        .close-btn { color: white; font-size: 24px; cursor: pointer; padding: 5px 15px; }

        .filter-bar {
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: #0a0a0a;
            white-space: nowrap;
        }
        .filter-chip {
            padding: 6px 15px;
            border-radius: 20px;
            background: #222;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
        }
        .filter-chip.active { background: var(--accent-color); color: black; font-weight: bold; }

        .ranking-list { flex: 1; overflow-y: auto; padding: 10px; }
        .rank-item {
            background: #161616; margin-bottom: 8px; padding: 15px;
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .rank-info { display: flex; align-items: center; gap: 15px; }
        .rank-pos { font-size: 18px; font-weight: 900; color: #f1c40f; width: 30px; }
        .rank-points { text-align: right; }
        .rank-val { color: var(--accent-color); font-weight: bold; font-size: 16px; }
        .rank-diff { font-size: 11px; color: #555; font-family: monospace; }
    </style>
</head>
<body>

    <div class="div-card">
        <div class="header-row">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="div-badge">
                    <span class="div-num" id="user-div-icon">?</span>
                </div>
                <div class="div-title">Division <span id="user-div-title">...</span></div>
            </div>
            <div class="phase-container">
                <span class="phase-label">Mavsum Tugashi</span>
                <span class="phase-time" id="phase-date">Yuklanmoqda...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">Rating</span>
                    <span class="stat-value" id="user-pts">0</span>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👑</div>
                <div class="stat-info">
                    <span class="stat-label">Ranking</span>
                    <span class="stat-value" id="user-rank-pos">#---</span>
                </div>
            </div>
        </div>
        <p class="promotion-text" id="promo-info">Yuklanmoqda...</p>
    </div>

    <div id="timer-container">
        <div class="target-text" id="target-label">MAQSAD: 10.000s</div>
        <div id="display">0.000</div>
    </div>

    <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
    <button class="btn-main btn-ranking" onclick="toggleRanking(true)">📊 RANKING RANKING</button>
    
    <p id="last-result" style="text-align: center; font-weight: bold; margin-bottom: 30px;"></p>

    <div id="ranking-modal">
        <div class="modal-header">
            <span class="modal-title">Rating Ranking</span>
            <span class="close-btn" onclick="toggleRanking(false)">✕</span>
        </div>
        <div class="filter-bar" id="div-filters">
            <div class="filter-chip active" onclick="filterByDiv(0)">Barchasi</div>
            </div>
        <div class="ranking-list" id="ranking-content">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        let startTime, timerInterval, isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 0, division: 10 };
        let allPlayers = [];
        let activeFilter = 0;

        // Modalni boshqarish
        window.toggleRanking = (show) => {
            document.getElementById('ranking-modal').style.display = show ? 'flex' : 'none';
            if(show) renderRanking();
        };

        // Phase sanasini olish
        onValue(ref(db, 'settings/phase'), (snapshot) => {
            document.getElementById('phase-date').innerText = snapshot.exists() ? snapshot.val() : "2026";
        });

        // Divizion sozlamalarini olish va filtrlarni yaratish
        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            const filterBar = document.getElementById('div-filters');
            filterBar.innerHTML = `<div class="filter-chip ${activeFilter === 0 ? 'active' : ''}" onclick="filterByDiv(0)">Barchasi</div>`;
            for(let i=1; i<=10; i++) {
                filterBar.innerHTML += `<div class="filter-chip ${activeFilter === i ? 'active' : ''}" onclick="filterByDiv(${i})">Div ${i}</div>`;
            }
            updateGameUI();
        });

        window.filterByDiv = (divNum) => {
            activeFilter = divNum;
            const chips = document.querySelectorAll('.filter-chip');
            chips.forEach((c, idx) => c.classList.toggle('active', idx === divNum));
            renderRanking();
        };

        // Shaxsiy ma'lumotlar
        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = snapshot.val();
                document.getElementById('user-div-icon').innerText = myCurrentData.division || 10;
                document.getElementById('user-div-title').innerText = myCurrentData.division || 10;
                document.getElementById('user-pts').innerText = (myCurrentData.points || 0).toLocaleString();
                updateGameUI();
            } else {
                update(ref(db, 'leaderboard/' + myId), { name: myName, points: 100, division: 10 });
            }
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            if (divSettings && divSettings[d]) {
                const rules = divSettings[d];
                document.getElementById('target-label').innerText = `MAQSAD: ${rules.target.toFixed(3)}s`;
                document.getElementById('promo-info').innerText = d > 1 
                    ? `Siz ${rules.promotionPoints.toLocaleString()} ball to'plasangiz, Division ${d-1}ga ko'tarilasiz.`
                    : `Siz eng yuqori diviziondasiz!`;
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            const currentDiv = myCurrentData.division || 10;
            const rules = divSettings?.[currentDiv] || { target: 10.000, nearLimit: 0.050, plusPoints: 30, minusPoints: 30, promotionPoints: 500 };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP";
                btn.className = "btn-main stop";
                tg.HapticFeedback.impactOccurred('medium');
                timerInterval = setInterval(() => {
                    display.innerText = ((Date.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START"; btn.className = "btn-main start";

                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                let newDivision = currentDiv;
                let newPoints = myCurrentData.points || 0;

                if (diffStr === "0.000" && currentDiv > 1) {
                    newDivision = currentDiv - 1; newPoints += 100;
                    document.getElementById('last-result').innerText = `DAHSHAT! DIVIZIONGA SAKRASH!`;
                } else if (diffVal <= rules.nearLimit) {
                    newPoints += parseInt(rules.plusPoints);
                    document.getElementById('last-result').innerText = `Zo'r! +${rules.plusPoints} ball`;
                    if (newPoints >= rules.promotionPoints && currentDiv > 1) newDivision = currentDiv - 1;
                } else {
                    newPoints = Math.max(0, newPoints - parseInt(rules.minusPoints));
                    document.getElementById('last-result').innerText = `Uzoq! -${rules.minusPoints} ball`;
                }

                update(ref(db, 'leaderboard/' + myId), {
                    name: myName, points: newPoints, division: newDivision, bestDiff: diffStr, lastTime: finalTime.toFixed(3)
                });
            }
        };

        // Barcha o'yinchilarni yuklash
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            allPlayers = Object.entries(data).map(([id, val]) => ({id, ...val}))
                .sort((a, b) => a.division !== b.division ? a.division - b.division : (b.points || 0) - (a.points || 0));
            
            const myRankIndex = allPlayers.findIndex(p => p.id === myId);
            document.getElementById('user-rank-pos').innerText = myRankIndex !== -1 ? `#${myRankIndex + 1}` : "#---";
            if(document.getElementById('ranking-modal').style.display === 'flex') renderRanking();
        });

        function renderRanking() {
            const container = document.getElementById('ranking-content');
            container.innerHTML = '';
            
            const filtered = activeFilter === 0 ? allPlayers : allPlayers.filter(p => p.division === activeFilter);
            
            filtered.forEach((p, i) => {
                container.innerHTML += `
                    <div class="rank-item" style="${p.id === myId ? 'border: 1px solid #f1c40f;' : ''}">
                        <div class="rank-info">
                            <span class="rank-pos">${i+1}</span>
                            <div>
                                <div style="font-weight:bold;">${p.name}</div>
                                <div style="font-size:10px; color:#666;">Div ${p.division || 10}</div>
                            </div>
                        </div>
                        <div class="rank-points">
                            <div class="rank-val">${(p.points || 0).toLocaleString()}</div>
                            <div class="rank-diff">${p.bestDiff || '0.000'}s</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
