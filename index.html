<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time League - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Tim qora va tilla rang mavzusi */
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #D4AF37; /* Tilla rang */
            --gold-light: #F9E27E;
            --card-bg: #000000;
            --win-green: #2ecc71;
            --draw-gray: #7f8c8d;
            --loss-red: #e74c3c;
            --ef-blue: #004dff;
            --nav-bg: #000000;
            --border-color: #222222;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: var(--accent-color);
            -webkit-user-select: none;
            padding: 15px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- DAXSHAT LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            overflow: hidden;
        }

        .loader-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-clock-main {
            font-size: 50px;
            filter: drop-shadow(0 0 10px var(--accent-color));
            animation: pulseClock 1.5s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseClock {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .loader-text-wrapper {
            margin-top: 30px;
            text-align: center;
        }

        .loader-text {
            color: var(--accent-color);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            font-style: italic;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Division Card Styling */
        .div-card {
            background: #000000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            transition: 0.5s;
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: #000;
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            padding: 5px 12px;
            display: flex;
            align-items: center; gap: 10px;
        }
        .div-num { font-size: 28px; font-weight: 900; color: #fff; }
        .div-title { color: var(--accent-color); font-size: 22px; font-weight: bold; }

        .phase-container {
            padding: 4px 10px;
            text-align: right;
        }
        .phase-label { display: block; font-size: 9px; color: #555; text-transform: uppercase; }
        .phase-time { display: block; color: var(--accent-color); font-size: 11px; font-weight: bold; font-family: monospace; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .stat-box { display: flex; align-items: center; gap: 10px; }
        .stat-icon { width: 40px; height: 40px; background: transparent; border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #555; }
        .stat-value { font-size: 18px; font-weight: bold; color: #fff; }

        .info-btn {
            position: absolute;
            top: -10px;
            right: -5px;
            background: var(--accent-color);
            color: black;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #000;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #000;
            width: 90%;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-title { color: var(--accent-color); font-size: 18px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        
        .div-info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        .div-info-table th { color: #555; padding: 8px 4px; border-bottom: 1px solid var(--border-color); }
        .div-info-table td { padding: 8px 4px; border-bottom: 1px solid var(--border-color); color: #fff; }

        .modal-close-btn {
            margin-top: 20px;
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .promotion-text { color: #555; font-size: 12px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; }

        #timer-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            padding: 20px 0;
            transition: 0.5s;
        }

        .embedded-info {
            width: 90%;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .info-line { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        .info-label { color: #555; font-size: 12px; }
        .info-val { font-size: 13px; font-weight: bold; font-family: monospace; color: #fff; }
        .target-box { border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; }

        #display { font-size: 60px; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', monospace; transition: 0.3s; }
        .current-time-label { font-size: 12px; color: #555; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .start { background: var(--accent-color); color: black; }
        .stop { background: #fff; color: black; }

        /* Ranking Styles */
        .ef-header { padding: 10px 0; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .ef-main-title { color: var(--accent-color); font-weight: 800; font-size: 24px; text-transform: uppercase; }
        .ef-row {
            background: #000;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
        }
        .ef-row.me { border: 1px solid var(--accent-color); }
        .ef-rank-num { width: 35px; font-size: 18px; font-weight: 900; color: #555; }
        .ef-avatar { width: 48px; height: 48px; border-radius: 10px; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        .ef-div-tag { position: absolute; bottom: -5px; right: -5px; background: var(--accent-color); color: black; font-size: 9px; font-weight: 900; padding: 2px 4px; border-radius: 4px; }
        .ef-info-main { flex: 1; margin: 0 15px; }
        .ef-name { font-weight: 700; font-size: 16px; color: #fff; }
        .ef-points-val { font-weight: 900; font-size: 18px; color: var(--accent-color); font-family: monospace; }
        
        .settings-container { background: #000; border-radius: 15px; padding: 20px; border: 1px solid var(--border-color); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: var(--accent-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #111; border: 1px solid var(--accent-color); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            z-index: 2000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #444; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .ef-mini-btn { width: 100%; background: #000; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 10px; }

        /* Effects - Faqat border va rangga ta'sir qiladi */
        @keyframes neonPulse { 0%, 100% { border-color: var(--accent-color); box-shadow: 0 0 5px var(--accent-color); } 50% { border-color: #fff; box-shadow: 0 0 15px var(--accent-color); } }
        .effect-neon { animation: neonPulse 2s infinite; }
        .effect-gold { border-color: var(--accent-color) !important; filter: drop-shadow(0 0 5px var(--accent-color)); }
        .effect-rainbow { border: 1px solid #fff !important; animation: blink 1s infinite; }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-wrapper">
            <div class="loader-ring"></div>
            <div class="loader-clock-main">🕒</div>
        </div>
        <div class="loader-text-wrapper">
            <h1 class="loader-text">TIME LEAGUE</h1>
        </div>
    </div>

    <div id="game-page" class="page active">
        <div class="div-card" id="main-div-card">
            <div class="info-btn" onclick="openRules()">i</div>
            <div class="header-row">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="div-badge" id="div-badge-bg">
                        <span class="div-num" id="user-div-icon">?</span>
                    </div>
                    <div class="div-title">Division <span id="user-div-title">...</span></div>
                </div>
                <div class="phase-container">
                    <span class="phase-label">Season</span>
                    <span class="phase-time" id="phase-date">...</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-label">Points</span>
                        <span class="stat-value" id="user-pts">0</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <span class="stat-label">Win Rate</span>
                        <span class="stat-value" id="user-win-rate">0%</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">👑</div>
                    <div class="stat-info">
                        <span class="stat-label">Rank</span>
                        <span class="stat-value" id="user-rank-pos">#---</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-info">
                        <span class="stat-label">W/L</span>
                        <span class="stat-value" id="user-wl-stat">0/0</span>
                    </div>
                </div>
            </div>

            <p class="promotion-text" id="promo-info">Loading...</p>
            <p id="danger-info" style="color:red; font-size:10px; display:none; text-align:center;">⚠️ RELEGATION DANGER</p>
        </div>

        <div id="timer-container">
            <div class="embedded-info">
                <div class="info-line target-box" id="target-ui-box">
                    <div class="info-label">🎯 TARGET</div>
                    <div class="info-val" id="target-label">10.000s</div>
                </div>
                <div class="info-line">
                    <div class="info-label">Limit</div>
                    <div class="info-val" id="limit-label">±0.050s</div>
                </div>
            </div>

            <div class="current-time-label">Current Time</div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result" style="text-align: center; font-weight: bold; margin-bottom: 10px; min-height: 20px;"></p>
    </div>

    <div id="rank-page" class="page">
        <div class="ef-header">
            <span class="ef-main-title">RANKING</span>
        </div>
        <div class="ef-ranking-list" id="ef-list-container"></div>
        <button class="ef-mini-btn" onclick="scrollToMe()">MY RANK</button>
    </div>

    <div id="settings-page" class="page">
        <div class="ef-header">
            <span class="ef-main-title">SETTINGS</span>
        </div>
        <div class="settings-container">
            <div class="setting-item">
                <span class="setting-label">Sound</span>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle" checked onchange="toggleSound(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="rulesModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">Division Info</div>
            <table class="div-info-table">
                <thead>
                    <tr><th>DIV</th><th>PROMO</th><th>RELEG</th></tr>
                </thead>
                <tbody id="div-table-body"></tbody>
            </table>
            <button class="modal-close-btn" onclick="closeRules()">CLOSE</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('game-page', this)">
            <div class="nav-icon">🎮</div>
            <span>Game</span>
        </div>
        <div class="nav-item" onclick="showPage('rank-page', this)">
            <div class="nav-icon">🏆</div>
            <span>Rank</span>
        </div>
        <div class="nav-item" onclick="showPage('settings-page', this)">
            <div class="nav-icon">⚙️</div>
            <span>Settings</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        let startTime, timerInterval, isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 100, division: 10, isWarning: false, wins: 0, losses: 0, isRegistered: false };
        let fullLeaderboard = [];
        let loadedResources = { settings: false, divisions: false, leaderboard: false, sounds: false };
        let gameSounds = { tick: null, click: null, win: null, lose: null, promo: null, relegate: null, jackpot: null };
        let isSoundEnabled = localStorage.getItem('soundEnabled') !== 'false';

        document.getElementById('sound-toggle').checked = isSoundEnabled;

        window.toggleSound = (enabled) => {
            isSoundEnabled = enabled;
            localStorage.setItem('soundEnabled', enabled);
            tg.HapticFeedback.selectionChanged();
        };

        function checkAllLoaded() {
            if (loadedResources.settings && loadedResources.divisions && loadedResources.leaderboard && loadedResources.sounds) {
                setTimeout(() => {
                    const loader = document.getElementById('loading-screen');
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 1000);
            }
        }

        onValue(ref(db, 'settings/sounds'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                if(data.tick) gameSounds.tick = new Audio(data.tick);
                if(data.click) gameSounds.click = new Audio(data.click);
                if(data.win) gameSounds.win = new Audio(data.win);
                if(data.lose) gameSounds.lose = new Audio(data.lose);
                if(data.promo) gameSounds.promo = new Audio(data.promo);
                if(data.relegate) gameSounds.relegate = new Audio(data.relegate);
                if(data.jackpot) gameSounds.jackpot = new Audio(data.jackpot);
            }
            loadedResources.sounds = true;
            checkAllLoaded();
        });

        function playSound(type) {
            if (isSoundEnabled && gameSounds[type]) {
                gameSounds[type].currentTime = 0;
                gameSounds[type].play().catch(e => console.log(e));
            }
        }

        window.openRules = () => {
            renderDivTable();
            document.getElementById('rulesModal').style.display = 'flex';
        };
        window.closeRules = () => { document.getElementById('rulesModal').style.display = 'none'; };

        function renderDivTable() {
            const tbody = document.getElementById('div-table-body');
            tbody.innerHTML = '';
            if(!divSettings) return;
            Object.keys(divSettings).sort((a,b) => a-b).forEach(dNum => {
                const s = divSettings[dNum];
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>D${dNum}</td><td>${s.promotionPoints || '-'}</td><td>${s.relegationPoints || '0'}</td>`;
                tbody.appendChild(tr);
            });
        }

        onValue(ref(db, 'settings/phase'), (s) => {
            document.getElementById('phase-date').innerText = s.exists() ? s.val() : "2026";
            loadedResources.settings = true;
            checkAllLoaded();
        });

        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            updateGameUI();
            loadedResources.divisions = true;
            checkAllLoaded();
        });

        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = { ...snapshot.val(), isRegistered: true };
                document.getElementById('user-div-icon').innerText = myCurrentData.division || 10;
                document.getElementById('user-div-title').innerText = myCurrentData.division || 10;
                document.getElementById('user-pts').innerText = (myCurrentData.points || 0).toLocaleString();
                const total = (myCurrentData.wins || 0) + (myCurrentData.losses || 0);
                document.getElementById('user-win-rate').innerText = (total > 0 ? Math.round((myCurrentData.wins / total) * 100) : 0) + "%";
                document.getElementById('user-wl-stat').innerText = `${myCurrentData.wins || 0}/${myCurrentData.losses || 0}`;
                updateGameUI();
            }
            loadedResources.leaderboard = true;
            checkAllLoaded();
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            const pts = myCurrentData.points || 0;
            if (divSettings && divSettings[d]) {
                const rules = divSettings[d];
                const divColor = rules.color || '#D4AF37';
                
                // Divizion badge rangini bazadan olish
                document.getElementById('div-badge-bg').style.borderColor = divColor.includes('gradient') ? '#D4AF37' : divColor;
                
                const timerBox = document.getElementById('timer-container');
                const mainCard = document.getElementById('main-div-card');

                [timerBox, mainCard].forEach(el => {
                    el.className = el.className.replace(/effect-\w+/g, '').trim();
                    if(rules.effect && rules.effect !== 'none') el.classList.add(rules.effect);
                    el.style.borderColor = divColor.includes('gradient') ? '#D4AF37' : divColor;
                });

                document.getElementById('target-label').innerText = `${rules.target.toFixed(3)}s`;
                document.getElementById('promo-info').innerText = `Next: ${rules.promotionPoints} pts | Releg: ${rules.relegationPoints} pts`;
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            let currentDiv = myCurrentData.division || 10;
            const rules = divSettings[currentDiv] || { target: 10.0, nearLimit: 0.05, plusPoints: 30, minusPoints: 30 };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP"; btn.className = "btn-main stop";
                playSound('tick'); 
                timerInterval = setInterval(() => { display.innerText = ((Date.now() - startTime) / 1000).toFixed(3); }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START"; btn.className = "btn-main start";
                
                let soundToPlay = 'click';
                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                let pointChange = 0, newDivision = currentDiv, newPoints = myCurrentData.points || 0, newWarning = myCurrentData.isWarning || false;

                if (diffStr === "0.000") {
                    newPoints = parseInt(rules.jackpotPoints || 100); 
                    newDivision = parseInt(rules.jackpotJumpDiv || (currentDiv > 1 ? currentDiv - 1 : 1));
                    soundToPlay = 'jackpot';
                } else if (diffVal <= rules.nearLimit) {
                    newPoints += parseInt(rules.plusPoints);
                    soundToPlay = 'win';
                } else {
                    newPoints -= parseInt(rules.minusPoints);
                    if (newPoints < 0) newPoints = 0;
                    soundToPlay = 'lose';
                }

                if (diffStr !== "0.000" && newDivision > 1 && newPoints >= rules.promotionPoints) {
                    newDivision -= 1; soundToPlay = 'promo';
                }
                
                if (newDivision < 10 && newPoints < (rules.relegationPoints || 0)) {
                    if (newWarning) { newDivision += 1; newWarning = false; soundToPlay = 'relegate'; }
                    else { newWarning = true; }
                }

                playSound(soundToPlay);
                update(ref(db, 'leaderboard/' + myId), { 
                    name: myName, points: newPoints, division: newDivision, 
                    lastTime: finalTime.toFixed(3), isWarning: newWarning,
                    wins: (myCurrentData.wins || 0) + (diffVal <= rules.nearLimit ? 1 : 0),
                    losses: (myCurrentData.losses || 0) + (diffVal > rules.nearLimit ? 1 : 0)
                });
            }
        };

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            fullLeaderboard = Object.entries(data).map(([id, val]) => ({id, ...val}))
                .sort((a, b) => (a.division !== b.division) ? a.division - b.division : (b.points || 0) - (a.points || 0));
            const idx = fullLeaderboard.findIndex(p => String(p.id) === String(myId));
            document.getElementById('user-rank-pos').innerText = idx !== -1 ? `#${idx + 1}` : "#---";
            renderRanking();
        });

        function renderRanking() {
            const container = document.getElementById('ef-list-container');
            container.innerHTML = '';
            fullLeaderboard.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = `ef-row ${String(p.id) === String(myId) ? 'me' : ''}`;
                if(String(p.id) === String(myId)) row.id = "my-rank-row";
                const rowDivColor = (divSettings && divSettings[p.division]) ? divSettings[p.division].color : '#D4AF37';
                row.innerHTML = `
                    <div class="ef-rank-num">${i+1}</div>
                    <div class="ef-avatar">⏱️<div class="ef-div-tag" style="background:${rowDivColor}">D${p.division || 10}</div></div>
                    <div class="ef-info-main"><div class="ef-name">${p.name}</div></div>
                    <div class="ef-points-val">${(p.points || 0).toLocaleString()}</div>
                `;
                container.appendChild(row);
            });
        }

        window.showPage = (pId, nav) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            nav.classList.add('active');
        };

        window.scrollToMe = () => {
            const me = document.getElementById('my-rank-row');
            if(me) me.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };
    </script>
</body>
</html>
