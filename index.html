<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | Lyric Focus</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Pacifico&family=Playfair+Display:ital,wght@1,900&family=Roboto+Mono:wght@700&family=Space+Grotesk:wght@700&family=Unbounded:wght@900&family=Inter:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --bg-color: #0c0c0e;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        .header {
            padding: 25px 20px;
            text-align: left;
            background: rgba(12, 12, 14, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h1 { margin: 0; font-size: 26px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-fill-color: transparent; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 0; font-size: 13px; color: #a1a1aa; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #e4e4e7; }

        .preset-grid, .selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .preset-btn, .select-btn { 
            background: #1f1f23; border: 1px solid #333; color: #fff; padding: 10px; 
            border-radius: 12px; font-size: 12px; cursor: pointer; transition: 0.2s;
            text-align: center;
        }
        .preset-btn.active, .select-btn.active { border-color: #bc1888; background: rgba(188, 24, 136, 0.1); }

        .color-selector { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .color-selector::-webkit-scrollbar { display: none; }
        .color-option { 
            min-width: 65px; height: 90px; border-radius: 18px; cursor: pointer; 
            border: 2.5px solid transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .color-option.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        input[type="file"] { display: none; }
        .file-label {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #1f1f23; padding: 16px; border-radius: 18px; cursor: pointer; transition: 0.2s;
            margin-bottom: 12px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .file-label:active { transform: scale(0.98); background: #27272a; }

        .offset-controls { display: flex; align-items: center; justify-content: space-between; background: #09090b; padding: 10px; border-radius: 14px; margin-top: 5px; }
        .offset-btn { background: #27272a; border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        .trim-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-top: 10px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group span { font-size: 11px; color: #71717a; margin-bottom: 5px; margin-left: 5px; }

        select, .range-input {
            width: 100%; background: #09090b; border: 1px solid #27272a; border-radius: 14px;
            padding: 14px; color: #fff; font-size: 15px; box-sizing: border-box;
        }

        .range-input { padding: 5px; cursor: pointer; height: 10px; accent-color: #bc1888; }

        .preview-wrapper {
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 30px; overflow: hidden; margin-top: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        canvas { width: 100%; height: 100%; display: block; }

        .player-controls {
            display: flex; justify-content: center; gap: 20px; margin-top: 15px;
        }
        .control-circle {
            width: 50px; height: 50px; border-radius: 50%; background: #1f1f23;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-main {
            width: 100%; padding: 20px; background: var(--primary-gradient);
            color: white; border: none; border-radius: 20px; margin-top: 30px;
            font-weight: 700; font-size: 17px; cursor: pointer;
            box-shadow: 0 12px 24px rgba(220, 39, 67, 0.3);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.96); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(12, 12, 14, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 18px 0;
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000;
        }
        .nav-item { color: #52525b; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-item.active { color: #bc1888; }
        .nav-item i { font-size: 22px; }

        #status { margin-top: 18px; text-align: center; font-size: 14px; color: #bc1888; font-weight: 600; min-height: 20px; }
        .lyrics-preview { font-size: 12px; color: #38bdf8; margin-top: 8px; text-align: center; font-weight: 500; }
        .timeline-info { display: flex; justify-content: space-between; font-size: 12px; color: #a1a1aa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>InstaCaption</h1>
        <p>Smart Lyric Video Editor</p>
    </div>

    <div class="container">
        <div class="preview-wrapper" id="previewArea">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; font-size: 12px;">PREVIEW</div>
        </div>

        <div class="player-controls">
            <div class="control-circle" id="prevBtn"><i class="fa-solid fa-rotate-left"></i></div>
            <div class="control-circle" id="playBtn" style="background: #bc1888;"><i class="fa-solid fa-play"></i></div>
            <div class="control-circle" id="stopBtn"><i class="fa-solid fa-stop"></i></div>
        </div>

        <div class="glass-card" style="margin-top: 25px;">
            <label><i class="fa-solid fa-font"></i> 1. Shriftni tanlang (10 xil)</label>
            <div class="selection-grid" id="fontGrid">
                <button class="select-btn active" onclick="setFont('Inter')">Classic</button>
                <button class="select-btn" style="font-family: 'Montserrat'" onclick="setFont('Montserrat')">Montserrat</button>
                <button class="select-btn" style="font-family: 'Anton'" onclick="setFont('Anton')">Anton</button>
                <button class="select-btn" style="font-family: 'Bebas Neue'" onclick="setFont('Bebas Neue')">Bebas</button>
                <button class="select-btn" style="font-family: 'Dancing Script'" onclick="setFont('Dancing Script')">Dancing</button>
                <button class="select-btn" style="font-family: 'Pacifico'" onclick="setFont('Pacifico')">Pacifico</button>
                <button class="select-btn" style="font-family: 'Playfair Display'" onclick="setFont('Playfair Display')">Playfair</button>
                <button class="select-btn" style="font-family: 'Space Grotesk'" onclick="setFont('Space Grotesk')">Space</button>
                <button class="select-btn" style="font-family: 'Roboto Mono'" onclick="setFont('Roboto Mono')">Mono</button>
                <button class="select-btn" style="font-family: 'Unbounded'" onclick="setFont('Unbounded')">Unbound</button>
            </div>

            <label><i class="fa-solid fa-wand-magic-sparkles"></i> 2. Effektlarni tanlang (10 xil)</label>
            <div class="selection-grid" id="effectGrid">
                <button class="select-btn active" onclick="setEffect('default')">None</button>
                <button class="select-btn" onclick="setEffect('fade')">Fade</button>
                <button class="select-btn" onclick="setEffect('zoom')">Zoom</button>
                <button class="select-btn" onclick="setEffect('neon')">Neon</button>
                <button class="select-btn" onclick="setEffect('glitch')">Glitch</button>
                <button class="select-btn" onclick="setEffect('slide')">Slide</button>
                <button class="select-btn" onclick="setEffect('blur')">Blur</button>
                <button class="select-btn" onclick="setEffect('shake')">Shake</button>
                <button class="select-btn" onclick="setEffect('rainbow')">RGB</button>
                <button class="select-btn" onclick="setEffect('karaoke')">Karaoke</button>
            </div>

            <label><i class="fa-solid fa-palette"></i> Fon rangini tanlang</label>
            <div class="color-selector" id="colorSelector">
                <div class="color-option active" style="background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);" data-color1="#000000" data-color2="#1a1a1a"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-color1="#667eea" data-color2="#764ba2"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);" data-color1="#f5576c" data-color2="#f093fb"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #434343 0%, #000000 100%);" data-color1="#434343" data-color2="#000000"></div>
            </div>

            <label><i class="fa-solid fa-cloud-arrow-up"></i> Fayllarni yuklang</label>
            <label for="imageUpload" class="file-label"><i class="fa-solid fa-image"></i> <span id="imageName">Fon rasmi (Ixtiyoriy)</span></label>
            <input type="file" id="imageUpload" accept="image/*">
            
            <label for="audioUpload" class="file-label"><i class="fa-solid fa-music"></i> <span id="audioName">Qo'shiq (.mp3)</span></label>
            <input type="file" id="audioUpload" accept="audio/*">

            <label for="lrcUpload" class="file-label"><i class="fa-solid fa-file-lines"></i> <span id="lrcName">LRC matn (.lrc)</span></label>
            <input type="file" id="lrcUpload" accept=".lrc">
            
            <div id="lrcEditor" style="margin-top: 10px;">
                <span style="font-size: 11px; color: #a1a1aa;">LRC Editor (Matnni vaqtga moslash):</span>
                <div class="offset-controls">
                    <button class="offset-btn" onclick="adjustOffset(-0.2)">-0.2s</button>
                    <span id="offsetVal" style="font-weight: bold;">0.0s</span>
                    <button class="offset-btn" onclick="adjustOffset(0.2)">+0.2s</button>
                </div>
            </div>
            <div id="lyricsStatus" class="lyrics-preview"></div>
        </div>

        <div class="glass-card">
            <label><i class="fa-solid fa-font"></i> Matn sozlamalari</label>
            <div class="input-group">
                <span>O'lcham: <b id="fontSizeVal">65px</b></span>
                <input type="range" id="fontSize" class="range-input" min="30" max="150" value="65">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <span>Pozitsiya: <b id="textPosVal">48%</b></span>
                <input type="range" id="textPosition" class="range-input" min="0.1" max="0.9" step="0.01" value="0.48">
            </div>
            
            <label style="margin-top: 15px;"><i class="fa-solid fa-scissors"></i> Timeline (Qirqish)</label>
            <div class="trim-box">
                <div class="input-group">
                    <span>Boshlanish: <b id="startTimeVal">0.0s</b></span>
                    <input type="range" id="startTime" class="range-input" min="0" max="100" step="0.1" value="0">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <span>Davomiyligi: <b id="durationVal">15s</b></span>
                    <input type="range" id="duration" class="range-input" min="5" max="60" step="1" value="15">
                </div>
                <div class="timeline-info">
                    <span id="audioTotalTime">Audio yuklanmagan</span>
                </div>
            </div>
        </div>

        <div id="status"></div>
        <button class="btn-main" id="renderBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> VIDEONI TAYYORLASH VA YUBORISH
        </button>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Montaj</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Tez kunda yangi shablonlar!')"><i class="fa-solid fa-layer-group"></i>Shablon</a>
        <a href="#" class="nav-item" onclick="tg.showConfirm('Yordam kerakmi?')"><i class="fa-solid fa-circle-question"></i>Yordam</a>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();
    tg.ready();

    const audioInput = document.getElementById('audioUpload');
    const lrcInput = document.getElementById('lrcUpload');
    const imageInput = document.getElementById('imageUpload');
    const fontSizeInput = document.getElementById('fontSize');
    const startTimeInput = document.getElementById('startTime');
    const durationInput = document.getElementById('duration');
    const textPositionInput = document.getElementById('textPosition');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');

    let audioEl = new Audio();
    audioEl.crossOrigin = "anonymous";
    let lyrics = [];
    let lrcOffset = 0;
    let bgColor1 = "#000000";
    let bgColor2 = "#1a1a1a";
    let bgImage = null;
    let isRendering = false;
    let currentFont = "Inter";
    let currentEffect = "default";
    let currentPreset = {
        textColor: "#ffffff",
        shadowBlur: 30,
        shadowColor: "rgba(255,255,255,0.9)",
        secondaryAlpha: 0.45
    };

    function setFont(font) {
        currentFont = font;
        document.querySelectorAll('#fontGrid .select-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(font.split(' ')[0].toLowerCase()) || btn.style.fontFamily.includes(font));
        });
        tg.HapticFeedback.impactOccurred('light');
    }

    function setEffect(effect) {
        currentEffect = effect;
        document.querySelectorAll('#effectGrid .select-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(effect));
        });
        tg.HapticFeedback.impactOccurred('light');
    }

    fontSizeInput.oninput = () => document.getElementById('fontSizeVal').innerText = fontSizeInput.value + 'px';
    textPositionInput.oninput = () => document.getElementById('textPosVal').innerText = Math.round(textPositionInput.value * 100) + '%';
    startTimeInput.oninput = () => {
        document.getElementById('startTimeVal').innerText = startTimeInput.value + 's';
        if (!audioEl.paused) audioEl.pause();
        audioEl.currentTime = parseFloat(startTimeInput.value);
    };
    durationInput.oninput = () => document.getElementById('durationVal').innerText = durationInput.value + 's';

    playBtn.onclick = () => {
        if (audioEl.src) {
            if (audioEl.paused) {
                audioEl.play();
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audioEl.pause();
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        } else {
            tg.showAlert("Avval qo'shiq yuklang!");
        }
    };
    document.getElementById('stopBtn').onclick = () => {
        audioEl.pause();
        audioEl.currentTime = parseFloat(startTimeInput.value);
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    };
    document.getElementById('prevBtn').onclick = () => {
        audioEl.currentTime = Math.max(0, audioEl.currentTime - 2);
    };

    function adjustOffset(val) {
        lrcOffset += val;
        document.getElementById('offsetVal').innerText = lrcOffset.toFixed(1) + 's';
    }

    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => bgImage = img;
                img.src = event.target.result;
                document.getElementById('imageName').innerText = file.name.substring(0, 15);
            };
            reader.readAsDataURL(file);
        }
    };

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const result = [];
        const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;
        lines.forEach(line => {
            const matches = line.match(timeExp);
            if (matches) {
                const text = line.replace(timeExp, '').trim();
                matches.forEach(m => {
                    const parts = m.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                    const time = parseInt(parts[1]) * 60 + parseInt(parts[2]) + parseInt(parts[3]) / 100;
                    if(text) result.push({ time, text });
                });
            }
        });
        return result.sort((a, b) => a.time - b.time);
    }

    lrcInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                lyrics = parseLRC(event.target.result);
                document.getElementById('lrcName').innerText = file.name;
                document.getElementById('lyricsStatus').innerText = "Matn yuklandi: " + lyrics.length + " qator";
            };
            reader.readAsText(file);
        }
    };

    document.querySelectorAll('.color-option').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.color-option').forEach(b => b.classList.remove('active'));
            opt.classList.add('active');
            bgColor1 = opt.dataset.color1;
            bgColor2 = opt.dataset.color2;
            bgImage = null;
        };
    });

    audioInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            audioEl.src = URL.createObjectURL(file);
            audioEl.onloadedmetadata = () => {
                startTimeInput.max = audioEl.duration.toFixed(1);
                document.getElementById('audioTotalTime').innerText = "Jami davomiylik: " + audioEl.duration.toFixed(1) + "s";
            };
            document.getElementById('audioName').innerText = file.name.substring(0, 20);
        }
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImage) {
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, bgColor1);
            grad.addColorStop(1, bgColor2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (lyrics.length === 0) {
            ctx.fillStyle = "white";
            ctx.font = "40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Matn va qo'shiqni yuklang", canvas.width/2, canvas.height/2);
            requestAnimationFrame(draw);
            return;
        }

        const currentTime = audioEl.currentTime - lrcOffset;
        const currentFontSize = parseInt(fontSizeInput.value);
        let activeIdx = -1;
        for (let i = 0; i < lyrics.length; i++) {
            if (currentTime >= lyrics[i].time) activeIdx = i;
        }

        if (activeIdx !== -1) {
            const lyric = lyrics[activeIdx];
            const nextTime = lyrics[activeIdx + 1] ? lyrics[activeIdx + 1].time : lyric.time + 3;
            const progress = Math.max(0, Math.min(1, (currentTime - lyric.time) / (nextTime - lyric.time)));
            ctx.textAlign = "center";
            ctx.font = `bold ${currentFontSize}px "${currentFont}"`;
            ctx.fillStyle = currentPreset.textColor;
            const x = canvas.width / 2;
            const y = canvas.height * parseFloat(textPositionInput.value);
            ctx.save();
            applyVisualEffect(currentEffect, progress, x, y, lyric.text, currentFontSize);
            ctx.restore();
        }
        requestAnimationFrame(draw);
    }

    function applyVisualEffect(effect, p, x, y, text, fs) {
        switch(effect) {
            case 'fade':
                ctx.globalAlpha = p < 0.2 ? p * 5 : (p > 0.8 ? (1 - p) * 5 : 1);
                ctx.fillText(text, x, y);
                break;
            case 'zoom':
                const s = 0.8 + (p * 0.4);
                ctx.translate(x, y);
                ctx.scale(s, s);
                ctx.fillText(text, 0, 0);
                break;
            case 'neon':
                ctx.shadowColor = currentPreset.shadowColor || "#00f2ff";
                ctx.shadowBlur = 20 + Math.sin(Date.now() / 200) * 10;
                ctx.fillText(text, x, y);
                break;
            case 'glitch':
                if(Math.random() > 0.9) {
                    ctx.fillStyle = "#ff00ff"; ctx.fillText(text, x + 5, y);
                    ctx.fillStyle = "#00ffff"; ctx.fillText(text, x - 5, y);
                }
                ctx.fillStyle = "white"; ctx.fillText(text, x, y);
                break;
            case 'slide':
                ctx.fillText(text, x, y + (1 - p) * 50);
                break;
            case 'blur':
                const b = p < 0.2 ? (0.2 - p) * 100 : 0;
                ctx.filter = `blur(${b}px)`;
                ctx.fillText(text, x, y);
                break;
            case 'shake':
                const sh = Math.sin(Date.now() / 50) * 5;
                ctx.fillText(text, x + sh, y + sh);
                break;
            case 'rainbow':
                const h = (Date.now() / 20) % 360;
                ctx.fillStyle = `hsl(${h}, 100%, 70%)`;
                ctx.fillText(text, x, y);
                break;
            case 'karaoke':
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.fillText(text, x, y);
                const tw = ctx.measureText(text).width;
                ctx.save();
                ctx.beginPath();
                ctx.rect(x - tw/2, y - fs, tw * p, fs * 2);
                ctx.clip();
                ctx.fillStyle = "white";
                ctx.fillText(text, x, y);
                ctx.restore();
                break;
            default:
                ctx.shadowBlur = currentPreset.shadowBlur;
                ctx.shadowColor = currentPreset.shadowColor;
                ctx.fillText(text, x, y);
        }
    }

    draw();

    document.getElementById('renderBtn').onclick = async () => {
        if (!audioEl.src || lyrics.length === 0) return tg.showAlert("Audio va LRC fayllarni yuklang!");
        if (isRendering) return;

        isRendering = true;
        status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Video render qilinmoqda...';
        tg.HapticFeedback.impactOccurred('heavy');

        const startTime = parseFloat(startTimeInput.value);
        const duration = parseFloat(durationInput.value);

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaElementSource(audioEl);
        const destination = audioContext.createMediaStreamDestination();
        source.connect(destination);
        source.connect(audioContext.destination);

        audioEl.pause();
        audioEl.currentTime = startTime;

        // Render jarayonini optimallashtirish: 30 FPS barqarorroq va qotishlarni kamaytiradi
        const videoStream = canvas.captureStream(30);
        const audioStream = destination.stream;
        
        const combinedStream = new MediaStream([
            ...videoStream.getVideoTracks(),
            ...audioStream.getAudioTracks()
        ]);

        // Bitreytni oshirish sifatni yaxshilaydi va "pixelation" qotishlarini oldini oladi
        const recorder = new MediaRecorder(combinedStream, { 
            mimeType: 'video/webm;codecs=vp9,opus', 
            videoBitsPerSecond: 8000000 
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const fd = new FormData();
            fd.append('chat_id', tg.initDataUnsafe.user?.id);
            fd.append('video', blob, 'lyric_video.mp4');
            fd.append('caption', "✅ InstaCaption orqali tayyorlandi!");

            try {
                status.innerHTML = 'Yuborilmoqda...';
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: 'POST', body: fd });
                status.innerHTML = 'Muvaffaqiyatli yuborildi! ✅';
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { 
                status.innerText = "Xatolik yuz berdi."; 
            }
            isRendering = false;
            audioContext.close();
        };

        recorder.start();
        audioEl.play();

        setTimeout(() => {
            if (recorder.state === "recording") {
                recorder.stop();
                audioEl.pause();
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }, duration * 1000);
    };
</script>
