<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | NextGen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;700&family=Unbounded:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0050; 
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .preview-section {
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
            overflow: hidden;
        }

        canvas {
            height: 90%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
        }

        /* Video Trimmer Styles */
        .trimmer-container {
            width: 90%;
            height: 60px;
            background: #111;
            border-radius: 10px;
            margin: 15px 0;
            position: relative;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        #trimmerIndicator {
            position: absolute;
            height: 100%;
            background: rgba(255, 0, 80, 0.3);
            border-left: 3px solid var(--accent);
            border-right: 3px solid var(--accent);
            cursor: pointer;
        }

        .editor-sheet {
            width: 100%;
            background: #0a0a0a;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 20px;
            border-top: 1px solid var(--border);
            z-index: 10;
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scroll-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        .choice-card {
            min-width: 90px;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            font-size: 13px;
        }
        .choice-card.active {
            border-color: var(--accent);
            background: rgba(255, 0, 80, 0.1);
        }

        .control-group {
            background: var(--glass);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            margin-top: 10px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .upload-btn {
            background: var(--glass);
            border: 1px dashed #444;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 13px;
        }

        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .play-circle {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .render-area {
            padding: 20px 0;
            text-align: center;
        }
        .btn-glow {
            background: white;
            color: black;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
        }

        #renderStatus {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="renderStatus">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 50px; color: var(--accent);"></i>
        <p id="statusMsg" style="margin-top: 20px; font-weight: bold; letter-spacing: 1px;">VIDEO TAYYORLANMOQDA...</p>
    </div>

    <div class="preview-section">
        <canvas id="mainCanvas" width="1080" height="1920"></canvas>
    </div>

    <div class="trimmer-container" id="trimmer">
        <div id="trimmerIndicator" style="left: 0; width: 30%;"></div>
    </div>

    <div class="playback-controls">
        <div class="play-circle" id="masterPlay"><i class="fas fa-play"></i></div>
    </div>

    <div class="editor-sheet">
        <div class="upload-grid">
            <div class="upload-btn" onclick="document.getElementById('audioIn').click()">
                <i class="fas fa-music"></i> <br> <span id="audioLabel">Musiqa</span>
                <input type="file" id="audioIn" hidden accept="audio/*">
            </div>
            <div class="upload-btn" onclick="document.getElementById('lrcIn').click()">
                <i class="fas fa-file-alt"></i> <br> <span id="lrcLabel">LRC Matn</span>
                <input type="file" id="lrcIn" hidden accept=".lrc">
            </div>
        </div>

        <div class="section-title"><i class="fas fa-sliders"></i> Matn O'lchami</div>
        <div class="control-group">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>Kattalik</span>
                <span id="fontSizeDisplay">80px</span>
            </div>
            <input type="range" id="fontSizeIn" min="30" max="250" value="80">
        </div>

        <div class="section-title"><i class="fas fa-wand-magic-sparkles"></i> Effektlar</div>
        <div class="scroll-row" id="fxRow">
            <div class="choice-card active" data-fx="highlight">Highlight</div>
            <div class="choice-card" data-fx="minimal">Minimal</div>
            <div class="choice-card" data-fx="liquid">Liquid</div>
            <div class="choice-card" data-fx="neon">Neon</div>
            <div class="choice-card" data-fx="glitch">Glitch</div>
        </div>

        <div class="section-title"><i class="fas fa-font"></i> Shriftlar</div>
        <div class="scroll-row" id="fontRow">
            <div class="choice-card active" style="font-family: 'Inter'">Modern</div>
            <div class="choice-card" style="font-family: 'Unbounded'">Bold</div>
            <div class="choice-card" style="font-family: 'Playfair Display'">Luxury</div>
            <div class="choice-card" style="font-family: 'Space Grotesk'">Tech</div>
        </div>

        <div class="render-area">
            <button class="btn-glow" id="startRender">VIDEONI SAQLASH VA YUBORISH</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const audio = new Audio();
    let lyrics = [];
    let currentFx = 'highlight';
    let currentFont = 'Inter';
    let fontSize = 80;
    
    let trimStart = 0;
    let trimDuration = 15;

    // Trimmer Logikasi
    const trimmer = document.getElementById('trimmer');
    const indicator = document.getElementById('trimmerIndicator');

    trimmer.onclick = (e) => {
        const rect = trimmer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const percent = x / rect.width;
        trimStart = percent * audio.duration;
        audio.currentTime = trimStart;
        updateTrimmer();
    };

    function updateTrimmer() {
        if (!audio.duration) return;
        const startP = (trimStart / audio.duration) * 100;
        const widthP = (trimDuration / audio.duration) * 100;
        indicator.style.left = startP + "%";
        indicator.style.width = widthP + "%";
    }

    const masterPlay = document.getElementById('masterPlay');
    const fontSizeIn = document.getElementById('fontSizeIn');

    function parseLRC(text) {
        const lines = text.split('\n');
        const lrc = [];
        const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        lines.forEach(line => {
            const match = line.match(regex);
            if (match) {
                const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 100;
                const lyric = line.replace(regex, '').trim();
                if (lyric) lrc.push({ time, text: lyric });
            }
        });
        return lrc.sort((a,b) => a.time - b.time);
    }

    document.getElementById('audioIn').onchange = (e) => {
        const file = e.target.files[0];
        audio.src = URL.createObjectURL(file);
        audio.onloadedmetadata = () => {
            document.getElementById('audioLabel').innerText = "Tayyor ✅";
            updateTrimmer();
        };
    };

    document.getElementById('lrcIn').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = parseLRC(ev.target.result);
            document.getElementById('lrcLabel').innerText = "Tayyor ✅";
        };
        reader.readAsText(file);
    };

    fontSizeIn.oninput = () => {
        fontSize = fontSizeIn.value;
        document.getElementById('fontSizeDisplay').innerText = fontSize + "px";
    };

    masterPlay.onclick = () => {
        if (audio.paused) { audio.play(); masterPlay.innerHTML = '<i class="fas fa-pause"></i>'; }
        else { audio.pause(); masterPlay.innerHTML = '<i class="fas fa-play"></i>'; }
    };

    function renderFrame() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const now = audio.currentTime;
        const activeIndex = lyrics.findLastIndex(l => l.time <= now);
        const active = lyrics[activeIndex];

        if (active) {
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `900 ${fontSize}px ${currentFont}`;
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const elapsed = now - active.time;

            if (currentFx === 'highlight') {
                // Asosiy xira matn
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillText(active.text, x, y);
                
                // Yonuvchi effekt (Aktiv qism)
                const progress = Math.min(elapsed * 1.5, 1); 
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, canvas.width * progress, canvas.height);
                ctx.clip();
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'white';
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
                ctx.restore();
            } else if (currentFx === 'minimal') {
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            } else if (currentFx === 'neon') {
                ctx.shadowBlur = 30;
                ctx.shadowColor = var(--accent);
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            } else if (currentFx === 'liquid') {
                const s = 1 + Math.sin(elapsed * 4) * 0.08;
                ctx.translate(x, y);
                ctx.scale(s, s);
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, 0, 0);
            } else if (currentFx === 'glitch') {
                if (Math.random() > 0.8) {
                    ctx.fillStyle = var(--accent);
                    ctx.fillText(active.text, x + 5, y);
                }
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            }
            ctx.restore();
        }
        requestAnimationFrame(renderFrame);
    }

    document.getElementById('startRender').onclick = async () => {
        if (!audio.src || lyrics.length === 0) return tg.showAlert("Fayllarni yuklang!");

        const status = document.getElementById('renderStatus');
        status.style.display = 'flex';

        const stream = canvas.captureStream(30);
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(dest);
        source.connect(audioCtx.destination);

        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        const recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            document.getElementById('statusMsg').innerText = "YUBORILMOQDA...";
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', tg.initDataUnsafe.user.id);
            formData.append('video', blob, 'insta_lyric.mp4');

            try {
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: 'POST', body: formData });
                tg.showAlert("Tayyor! Botga yuborildi ✅");
            } catch (err) {
                tg.showAlert("Xatolik yuz berdi!");
            }
            status.style.display = 'none';
        };

        audio.currentTime = trimStart;
        recorder.start();
        audio.play();

        setTimeout(() => {
            recorder.stop();
            audio.pause();
        }, trimDuration * 1000);
    };

    document.querySelectorAll('.choice-card').forEach(card => {
        card.onclick = function() {
            this.parentElement.querySelectorAll('.choice-card').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            if (this.dataset.fx) currentFx = this.dataset.fx;
            if (this.style.fontFamily) currentFont = this.style.fontFamily;
            tg.HapticFeedback.impactOccurred('light');
        };
    });

    renderFrame();
</script>
</body>
</html>
