<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | NextGen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;700&family=Unbounded:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0050; /* TikTok/Insta vibe */
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. Katta Preview qismi - fokus markazda */
        .preview-section {
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
            overflow: hidden;
        }

        canvas {
            height: 90%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
        }

        /* 2. Boshqaruv paneli - pastdan chiqadigan "Sheet" uslubida */
        .editor-sheet {
            width: 100%;
            background: #0a0a0a;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 20px;
            border-top: 1px solid var(--border);
            margin-top: -20px;
            z-index: 10;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 3. Horizontal tanlovlar (Horizontal Scroller) */
        .scroll-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        .choice-card {
            min-width: 100px;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .choice-card.active {
            border-color: var(--accent);
            background: rgba(255, 0, 80, 0.1);
        }

        /* 4. Yuklash tugmalari */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .upload-btn {
            background: var(--glass);
            border: 1px dashed #444;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 13px;
        }

        /* 5. Asosiy Render tugmasi - Futuristic */
        .render-area {
            padding: 30px 0;
            text-align: center;
        }
        .btn-glow {
            background: white;
            color: black;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn-glow:active { transform: scale(0.95); }

        /* Loader */
        #renderStatus {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="renderStatus">
        <i class="fas fa-compact-disc fa-spin" style="font-size: 50px; color: var(--accent);"></i>
        <p style="margin-top: 20px; font-weight: bold;">VIDEO TAYYORLANMOQDA...</p>
        <span id="progressText">0%</span>
    </div>

    <div class="preview-section">
        <canvas id="mainCanvas" width="1080" height="1920"></canvas>
    </div>

    <div class="editor-sheet">
        <div class="upload-grid">
            <div class="upload-btn" onclick="document.getElementById('audioIn').click()">
                <i class="fas fa-music"></i> <br> Musiqa
                <input type="file" id="audioIn" hidden accept="audio/*">
            </div>
            <div class="upload-btn" onclick="document.getElementById('lrcIn').click()">
                <i class="fas fa-file-alt"></i> <br> LRC Matn
                <input type="file" id="lrcIn" hidden accept=".lrc">
            </div>
        </div>

        <div class="section-title"><i class="fas fa-wand-magic-sparkles"></i> Vizual Effektlar</div>
        <div class="scroll-row" id="fxRow">
            <div class="choice-card active" data-fx="minimal">Minimal</div>
            <div class="choice-card" data-fx="liquid">Liquid</div>
            <div class="choice-card" data-fx="glitch">Glitch</div>
            <div class="choice-card" data-fx="neon">Neon Night</div>
            <div class="choice-card" data-fx="bounce">Bounce</div>
        </div>

        <div class="section-title"><i class="fas fa-text-height"></i> Shrift Uslubi</div>
        <div class="scroll-row" id="fontRow">
            <div class="choice-card active" style="font-family: 'Inter'">Modern</div>
            <div class="choice-card" style="font-family: 'Unbounded'">Bold</div>
            <div class="choice-card" style="font-family: 'Playfair Display'">Luxury</div>
            <div class="choice-card" style="font-family: 'Space Grotesk'">Tech</div>
        </div>

        <div class="render-area">
            <button class="btn-glow" id="startRender">VIDEONI EKSPORT QILISH</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Unumdorlik uchun alpha o'chirildi
    const audio = new Audio();
    let lyrics = [];
    let currentFx = 'minimal';
    let currentFont = 'Inter';

    // 1. LRC Parser (O'ta aniq variant)
    function parseLRC(text) {
        const lines = text.split('\n');
        const lrc = [];
        const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        
        lines.forEach(line => {
            const match = line.match(regex);
            if (match) {
                const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 100;
                const lyric = line.replace(regex, '').trim();
                if (lyric) lrc.push({ time, text: lyric });
            }
        });
        return lrc;
    }

    // 2. Fayl yuklash boshqaruvi
    document.getElementById('audioIn').onchange = (e) => {
        const file = e.target.files[0];
        audio.src = URL.createObjectURL(file);
        tg.HapticFeedback.impactOccurred('medium');
    };

    document.getElementById('lrcIn').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = parseLRC(ev.target.result);
            tg.HapticFeedback.notificationOccurred('success');
        };
        reader.readAsText(file);
    };

    // 3. Animatsiya Dvigateli (Hech qanday qotishlarsiz)
    function renderFrame() {
        // Fon
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const now = audio.currentTime;
        const active = lyrics.filter(l => l.time <= now).pop();

        if (active) {
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Effektlar logikasi
            applyFX(active.text, now - active.time);
            
            ctx.restore();
        } else {
            ctx.fillStyle = '#444';
            ctx.font = '30px Inter';
            ctx.textAlign = 'center';
            ctx.fillText("MUSIQA VA LRC YUKLANG", canvas.width/2, canvas.height/2);
        }

        requestAnimationFrame(renderFrame);
    }

    function applyFX(text, elapsed) {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        
        ctx.font = `900 80px ${currentFont}`;
        
        if (currentFx === 'minimal') {
            ctx.fillStyle = 'white';
            ctx.fillText(text, x, y);
        } 
        else if (currentFx === 'neon') {
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff0050';
            ctx.fillStyle = 'white';
            ctx.fillText(text, x, y);
        }
        else if (currentFx === 'liquid') {
            const scale = 1 + Math.sin(elapsed * 5) * 0.05;
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = 'white';
            ctx.fillText(text, 0, 0);
        }
    }

    // 4. Eksport tizimi (MediaRecorder optimizatsiyasi)
    document.getElementById('startRender').onclick = async () => {
        if (!audio.src || lyrics.length === 0) {
            tg.showAlert("Avval fayllarni yuklang!");
            return;
        }

        const stream = canvas.captureStream(30); // 30 FPS barqaror
        const recorder = new MediaRecorder(stream, {
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: 5000000 // 5Mbps - aniq va tiniq
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            // Bu yerda botga yuborish kodi bo'ladi
            tg.showAlert("Video tayyor! Botga yuborilmoqda...");
            document.getElementById('renderStatus').style.display = 'none';
        };

        document.getElementById('renderStatus').style.display = 'flex';
        recorder.start();
        audio.currentTime = 0;
        audio.play();

        // Qo'shiq tugagach yoki 15 sekunddan keyin to'xtatish
        setTimeout(() => {
            recorder.stop();
            audio.pause();
        }, 15000); 
    };

    // Selektsiyalarni boshqarish
    document.querySelectorAll('.choice-card').forEach(card => {
        card.onclick = function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.choice-card').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            
            if (parent.id === 'fxRow') currentFx = this.dataset.fx;
            if (parent.id === 'fontRow') currentFont = this.style.fontFamily;
            
            tg.HapticFeedback.impactOccurred('light');
        }
    });

    // Start
    renderFrame();

</script>
</body>
</html>
