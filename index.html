<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | AutoPlay Cinematic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* Pleylist Ekrani */
        .list-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .song-card {
            background: #111; padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer; transition: 0.2s;
        }
        .song-card:active { transform: scale(0.97); background: #1a1a1a; }
        .song-info b { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .song-info span { color: #888; font-size: 0.9rem; }

        /* Pleyer Ekrani */
        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
        }

        /* Fon Animatsiyasi */
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #121212 0%, #000 100%);
            z-index: 1;
        }
        .glow {
            position: absolute; width: 400px; height: 400px;
            background: var(--accent); border-radius: 50%;
            filter: blur(150px); opacity: 0.12; animation: moveGlow 20s infinite alternate;
        }
        @keyframes moveGlow { from { transform: translate(-30%, -30%); } to { transform: translate(60%, 60%); } }

        /* Matn Qatlami */
        #lyric-container {
            position: relative; z-index: 5; height: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; box-sizing: border-box; text-align: center;
        }
        #current-lyric {
            font-size: 2.3rem; font-weight: 800; line-height: 1.25;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.4s ease;
        }
        .lyric-in { animation: lyricIn 0.5s ease; }
        @keyframes lyricIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Yopish tugmasi */
        .close-btn {
            position: absolute; top: 25px; left: 25px; z-index: 10;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 20px;
            cursor: pointer;
        }

        /* YouTube Yashirin */
        #yt-hidden { position: absolute; top: -100px; left: -100px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        
        .artist-tag {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: var(--accent); font-weight: bold; letter-spacing: 3px;
            font-size: 11px; z-index: 5; opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h2 style="color: var(--accent); margin: 10px 0 25px 5px;">Musiqalar</h2>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div class="animated-bg"><div class="glow"></div></div>
        
        <div id="lyric-container">
            <div id="current-lyric">Yuklanmoqda...</div>
        </div>

        <div id="yt-hidden"><div id="player"></div></div>
        <div class="artist-tag" id="artist-tag"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncTask, playerReady = false;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100', width: '100',
            playerVars: { 
                'playsinline': 1, 
                'controls': 0, 
                'disablekb': 1,
                'rel': 0
            },
            events: { 
                'onReady': () => { playerReady = true; },
                'onStateChange': onPlayerStateChange 
            }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            startSync();
        } else {
            stopSync();
        }
    }

    function startSync() {
        stopSync();
        syncTask = setInterval(() => {
            const now = ytPlayer.getCurrentTime();
            const line = currentLyrics.findLast(l => now >= l.time);
            
            if (line) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== line.text) {
                    el.innerText = line.text;
                    el.classList.remove('lyric-in');
                    void el.offsetWidth;
                    el.classList.add('lyric-in');
                }
            }
        }, 100);
    }

    function stopSync() { clearInterval(syncTask); }

    function openPlayer(data) {
        if (!playerReady) return; // Pleyer hali tayyor bo'lmasa ishlamaydi

        // UI tayyorlash
        document.getElementById('current-lyric').innerText = "Tayyorlanmoqda...";
        document.getElementById('artist-tag').innerText = data.artist.toUpperCase();
        currentLyrics = parseLRC(data.lyrics || "");
        
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        
        // Videoni yuklash va avtomatik boshlash
        ytPlayer.loadVideoById({
            videoId: data.youtubeId,
            suggestedQuality: 'small'
        });
        // Ba'zi qurilmalarda yuklanishi bilan autoplay bo'lmasa, majburiy play beramiz
        ytPlayer.playVideo();
    }

    function closePlayer() {
        stopSync();
        ytPlayer.stopVideo();
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function parseLRC(lrc) {
        if (!lrc) return [];
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const listContainer = document.getElementById('songs-list');
        listContainer.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `
                <div class="song-info">
                    <b>${data.track}</b>
                    <span>${data.artist}</span>
                </div>
                <div style="color:var(--accent); font-size:22px;">▶</div>
            `;
            // KARTANI BOSGANDA PLAY BO'LISHI
            card.onclick = () => openPlayer(data);
            listContainer.appendChild(card);
        });
    });
</script>
</body>
</html>
