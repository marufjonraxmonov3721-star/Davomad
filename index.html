<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; --nav: #1a1a1a; --danger: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }
        
        #loading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { display: flex; align-items: center; gap: 5px; height: 50px; }
        .bar { width: 8px; height: 20px; background: var(--primary); border-radius: 10px; animation: scaleY 1s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes scaleY { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }

        #app-container { height: 100vh; display: none; flex-direction: column; }
        .page { flex: 1; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        .game-card { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .vinyl { width: 150px; height: 150px; margin: 20px auto; background: radial-gradient(circle, #333 5%, #111 30%, #000 100%); border-radius: 50%; border: 5px solid #222; position: relative; overflow: hidden; }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .option-btn, .start-btn { background: #222; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 12px; margin-top: 10px; width: 100%; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        .start-btn { background: var(--primary); color: #000; border: none; font-size: 18px; padding: 18px; }
        .correct { background: var(--primary) !important; color: #000 !important; }
        .wrong { background: var(--danger) !important; }

        .lives-container { font-size: 18px; color: var(--danger); letter-spacing: 2px; }

        #result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .result-card { background: var(--card); border: 1px solid #333; width: 100%; max-width: 350px; border-radius: 30px; padding: 40px 20px; text-align: center; animation: slideUp 0.4s ease-out; position: relative; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .leaderboard-card { width: 100%; max-width: 400px; height: 80vh; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; overflow-y: auto; }
        .rank-item { display: flex; align-items: center; background: #222; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); }
        .rank-num { width: 30px; font-weight: bold; color: var(--primary); }
        .rank-name { flex: 1; font-size: 14px; }
        .rank-score { font-weight: bold; color: var(--primary); }

        /* Profile Styles */
        .profile-card { width: 100%; max-width: 400px; background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid #222; text-align: center; }
        .avatar-container { width: 100px; height: 100px; margin: 0 auto 20px; position: relative; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); display: none; }
        .avatar-placeholder { width: 100%; height: 100%; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #000; border: 3px solid #222; }
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        .stat-item { background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }

        .nav-bar { height: 70px; background: var(--nav); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; transition: 0.3s; }
        .nav-item { color: #555; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        .hidden-nav { transform: translateY(100%); height: 0; padding: 0; border: none; overflow: hidden; }

        #offline-notice { position: fixed; top: -100px; left: 0; right: 0; background: rgba(255, 62, 62, 0.95); color: white; padding: 15px; text-align: center; font-weight: bold; z-index: 5000; transition: 0.5s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #offline-notice.show { top: 0; }
    </style>
</head>
<body>

<div id="offline-notice"><span>⚠️ Internet aloqasi yo'q!</span></div>

<div id="loading-screen">
    <div class="loader"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <h1 style="color:var(--primary); margin-top:20px; letter-spacing: 2px;">SongLyrics</h1>
</div>

<div id="result-modal">
    <div class="result-card">
        <h1 id="result-title" style="color:var(--primary); margin-bottom:10px;">O'yin tugadi!</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 800; color: #fff; margin-bottom: 30px;">0</div>
        <button class="start-btn" onclick="restartGame()">QAYTA O'YNASH</button>
        <p onclick="closeResultModal()" style="margin-top:15px; color:#555; cursor:pointer;">Yopish</p>
    </div>
</div>

<div id="app-container">
    <div id="page-game" class="page active-page">
        <div class="game-card">
            <div id="game-ui" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 10px;">
                    <span id="score" style="color:var(--primary)">BALL: 0</span>
                    <div id="lives" class="lives-container">❤️❤️❤️</div>
                    <span id="timer" style="color:var(--primary)">15</span>
                </div>
                <div class="vinyl" id="disc"><div style="position:absolute; inset:55px; background:var(--primary); border-radius:50%; border:5px solid #000;"></div></div>
                <p id="status" style="color:#888; font-size:12px; height: 18px; margin-bottom:10px;"></p>
                <div id="options-box"></div>
            </div>
            <div id="pre-game">
                <h2>Tayyormisiz?</h2>
                <p style="color:#666; margin: 15px 0;">Musiqa minusini eshitib toping!</p>
                <button class="start-btn" onclick="startGame()">BOSHLASH</button>
            </div>
        </div>
    </div>

    <div id="page-rank" class="page">
        <div class="leaderboard-card">
            <h2 style="color:var(--primary); text-align:center; margin-bottom:20px;">TOP O'YINCHILAR</h2>
            <div id="rank-list"></div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-card">
            <div class="avatar-container">
                <img id="user-photo" class="avatar-img" src="" alt="Avatar">
                <div id="user-initial" class="avatar-placeholder">👤</div>
            </div>
            <h2 id="profile-name">Foydalanuvchi</h2>
            <p id="profile-id" style="color:#666; font-size:12px;"></p>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Eng yuqori natija</div>
                    <div class="stat-value" id="best-score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Rejim</div>
                    <div class="stat-value" style="font-size:16px;">Instrumental (Minus)</div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bar" id="bottom-nav">
        <div class="nav-item active" onclick="showPage('game', this)"><span class="nav-icon">🎮</span><span>O'yin</span></div>
        <div class="nav-item" onclick="showPage('rank', this)"><span class="nav-icon">🏆</span><span>Reyting</span></div>
        <div class="nav-item" onclick="showPage('profile', this)"><span class="nav-icon">👤</span><span>Profil</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, update, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Mehmon" };
    let questions = [], currentIdx = 0, score = 0, lives = 3, timerInterval, audio = new Audio();
    let isPlaying = false;

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            loadProfileData();
        }, 2500);
    };

    window.showPage = (pageId, el) => {
        if(isPlaying) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active-page');
        el.classList.add('active');
        if(pageId === 'rank') loadLeaderboard();
        if(pageId === 'profile') loadProfileData();
    };

    window.startGame = () => {
        isPlaying = true;
        document.getElementById('bottom-nav').classList.add('hidden-nav');
        document.getElementById('pre-game').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        initGame();
    };

    window.restartGame = () => {
        currentIdx = 0; score = 0; lives = 3;
        document.getElementById('score').innerText = "BALL: 0";
        updateLivesUI();
        document.getElementById('result-modal').style.display = 'none';
        startGame();
    };

    async function initGame() {
        const snap = await get(ref(db, 'questions'));
        if(snap.exists()) {
            questions = Object.values(snap.val()).sort(() => 0.5 - Math.random());
            loadRound();
        }
    }

    async function loadRound() {
        if(lives <= 0) { endGame(true); return; }
        if(currentIdx >= questions.length) { endGame(false); return; }
        
        const q = questions[currentIdx];
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = "";
        document.getElementById('disc').classList.remove('spinning');
        document.getElementById('status').innerText = "Minus qidirilmoqda...";

        // Qidiruvga "instrumental" qo'shildi o'yinni qiyinlashtirish uchun
        const musicUrl = await fetchMusic(q.search_term + " instrumental");
        if(musicUrl) {
            audio.src = musicUrl;
            audio.play().then(() => { 
                document.getElementById('disc').classList.add('spinning'); 
                startTimer(15); 
                document.getElementById('status').innerText = "Eshiting va toping..."; 
            });
        } else {
            currentIdx++; loadRound(); return;
        }

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                if(i === q.correct) {
                    btn.classList.add('correct'); score += 10;
                    document.getElementById('score').innerText = "BALL: " + score;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    btn.classList.add('wrong'); lives--; updateLivesUI();
                    tg.HapticFeedback.notificationOccurred('error');
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1200);
            };
            optionsBox.appendChild(btn);
        });
    }

    async function fetchMusic(term) {
        try {
            // "instrumental" yoki "karaoke" qidirish orqali qiyinchilik oshiriladi
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=5&entity=song`);
            const data = await res.json();
            return data.results[0]?.previewUrl;
        } catch (e) { return null; }
    }

    function startTimer(t) {
        document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timerInterval); lives--; updateLivesUI(); currentIdx++; loadRound(); }
        }, 1000);
    }

    function updateLivesUI() {
        document.getElementById('lives').innerText = "❤️".repeat(Math.max(0, lives)) + "🖤".repeat(Math.max(0, 3-lives));
    }

    function endGame(isGameOver) {
        isPlaying = false;
        document.getElementById('bottom-nav').classList.remove('hidden-nav');
        clearInterval(timerInterval); audio.pause();
        saveScore();
        document.getElementById('final-score').innerText = score;
        document.getElementById('result-modal').style.display = 'flex';
    }

    async function saveScore() {
        if (score <= 0) return;
        const userRef = ref(db, `leaderboard/${user.id}`);
        const snap = await get(userRef);
        if (!snap.exists() || score > snap.val().score) {
            await update(userRef, { name: user.first_name, score: score, id: user.id });
        }
    }

    async function loadLeaderboard() {
        const listDiv = document.getElementById('rank-list');
        listDiv.innerHTML = "Yuklanmoqda...";
        const snap = await get(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10)));
        if(snap.exists()) {
            listDiv.innerHTML = "";
            let data = [];
            snap.forEach(c => data.push(c.val()));
            data.reverse().forEach((u, i) => {
                listDiv.innerHTML += `<div class="rank-item"><div class="rank-num">${i+1}</div><div class="rank-name">${u.name}</div><div class="rank-score">${u.score}</div></div>`;
            });
        }
    }

    async function loadProfileData() {
        document.getElementById('profile-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
        document.getElementById('profile-id').innerText = "ID: " + user.id;
        
        // Telegram rasm qismi
        const photoImg = document.getElementById('user-photo');
        const initialDiv = document.getElementById('user-initial');
        if (user.photo_url) {
            photoImg.src = user.photo_url;
            photoImg.style.display = 'block';
            initialDiv.style.display = 'none';
        } else {
            initialDiv.innerText = user.first_name.charAt(0);
        }

        const snap = await get(ref(db, `leaderboard/${user.id}`));
        document.getElementById('best-score').innerText = snap.exists() ? snap.val().score : "0";
    }

    window.closeResultModal = () => {
        document.getElementById('result-modal').style.display = 'none';
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('pre-game').style.display = 'block';
    };
</script>
</body>
</html>
