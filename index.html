<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; --nav: #1a1a1a; --danger: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Loading Animation */
        #loading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { display: flex; align-items: center; gap: 5px; height: 50px; }
        .bar { width: 8px; height: 20px; background: var(--primary); border-radius: 10px; animation: scaleY 1s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes scaleY { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }

        #app-container { height: 100vh; display: none; flex-direction: column; }
        .page { flex: 1; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        /* Game UI */
        .game-card { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .vinyl { width: 150px; height: 150px; margin: 20px auto; background: radial-gradient(circle, #333 5%, #111 30%, #000 100%); border-radius: 50%; border: 5px solid #222; position: relative; }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .option-btn, .start-btn { background: #222; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 12px; margin-top: 10px; width: 100%; cursor: pointer; font-size: 15px; font-weight: bold; }
        .start-btn { background: var(--primary); color: #000; border: none; font-size: 18px; padding: 18px; }
        .correct { background: var(--primary) !important; color: #000 !important; }
        .wrong { background: var(--danger) !important; }

        .lives-container { font-size: 18px; color: var(--danger); letter-spacing: 2px; }

        /* Leaderboard UI */
        .leaderboard-card { width: 100%; max-width: 400px; height: 80vh; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; overflow-y: auto; }
        .rank-item { display: flex; align-items: center; background: #222; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); }
        .rank-num { width: 30px; font-weight: bold; color: var(--primary); }
        .rank-name { flex: 1; font-size: 14px; }
        .rank-score { font-weight: bold; color: var(--primary); }

        /* Navigation */
        .nav-bar { height: 70px; background: var(--nav); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: #555; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <h1 style="color:var(--primary); margin-top:20px; letter-spacing: 2px;">SongLyrics</h1>
</div>

<div id="app-container">
    <div id="page-game" class="page active-page">
        <div class="game-card">
            <div id="game-ui" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items: center; font-size:14px; color:var(--primary); font-weight:bold; margin-bottom: 10px;">
                    <span id="score">BALL: 0</span>
                    <div id="lives" class="lives-container">❤️❤️❤️</div>
                    <span id="timer">15</span>
                </div>
                <div class="vinyl" id="disc"><div style="position:absolute; inset:55px; background:var(--primary); border-radius:50%; border:5px solid #000;"></div></div>
                <p id="status" style="color:#888; font-size:12px; height: 18px;"></p>
                <div id="options-box"></div>
            </div>
            
            <div id="pre-game">
                <h2 style="margin-bottom:10px;">Tayyormisiz?</h2>
                <p style="color:#666; margin-bottom:20px;">3 ta joningiz bor. Xato qilmaslikka harakat qiling!</p>
                <button class="start-btn" onclick="startGame()">BOSHLASH</button>
            </div>
        </div>
    </div>

    <div id="page-rank" class="page">
        <div class="leaderboard-card">
            <h2 style="color:var(--primary); text-align:center; margin-bottom:20px;">TOP O'YINCHILAR</h2>
            <div id="rank-list"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('game', this)">
            <span class="nav-icon">🎮</span>
            <span>O'yin</span>
        </div>
        <div class="nav-item" onclick="showPage('rank', this)">
            <span class="nav-icon">🏆</span>
            <span>Reyting</span>
        </div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Mehmon" };
    let questions = [], currentIdx = 0, score = 0, lives = 3, timerInterval, audio = new Audio();

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }, 2500);
    };

    window.showPage = (pageId, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active-page');
        el.classList.add('active');
        if(pageId === 'rank') loadLeaderboard();
    };

    window.startGame = () => {
        document.getElementById('pre-game').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        initGame();
    };

    async function initGame() {
        const snap = await get(ref(db, 'questions'));
        if(snap.exists()) {
            questions = Object.values(snap.val()).sort(() => 0.5 - Math.random());
            loadRound();
        }
    }

    async function loadRound() {
        if(lives <= 0 || currentIdx >= questions.length) { 
            await saveScore();
            tg.showPopup({ 
                title: lives <= 0 ? "O'yin tugadi!" : "G'alaba!",
                message: `Sizning natijangiz: ${score} ball.` 
            }, () => { location.reload(); });
            return; 
        }
        
        const q = questions[currentIdx];
        const status = document.getElementById('status');
        const optionsBox = document.getElementById('options-box');
        const disc = document.getElementById('disc');

        optionsBox.innerHTML = "";
        disc.classList.remove('spinning');
        audio.pause();
        status.innerText = "Musiqa qidirilmoqda...";

        const musicUrl = await fetchMusic(q.search_term);
        if(musicUrl) {
            audio.src = musicUrl;
            audio.play().then(() => { disc.classList.add('spinning'); startTimer(); status.innerText = "Eshiting..."; });
        } else {
            currentIdx++; loadRound(); return;
        }

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                if(i === q.correct) {
                    btn.classList.add('correct'); score += 10;
                    document.getElementById('score').innerText = "BALL: " + score;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    btn.classList.add('wrong'); 
                    btns[q.correct].classList.add('correct');
                    lives--;
                    updateLivesUI();
                    tg.HapticFeedback.notificationOccurred('error');
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            };
            optionsBox.appendChild(btn);
        });
    }

    function updateLivesUI() {
        const livesEl = document.getElementById('lives');
        livesEl.innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
    }

    async function fetchMusic(term, isRetry = false) {
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=10&entity=song`);
            const data = await res.json();
            const soloTracks = data.results.filter(t => !["&", "feat", "with", " va "].some(m => t.artistName.toLowerCase().includes(m) || t.trackName.toLowerCase().includes(m)));
            if (soloTracks.length > 0) return soloTracks[0].previewUrl;
            if (!isRetry && term.includes('-')) return await fetchMusic(term.split('-')[0].trim(), true);
            return data.results[0]?.previewUrl;
        } catch (e) { return null; }
    }

    function startTimer() {
        let t = 15; document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { 
                clearInterval(timerInterval); 
                lives--; 
                updateLivesUI();
                currentIdx++; 
                loadRound(); 
            }
        }, 1000);
    }

    async function saveScore() {
        if (score <= 0) return;
        const userRef = ref(db, `leaderboard/${user.id}`);
        const snap = await get(userRef);
        const oldScore = snap.exists() ? snap.val().score : 0;
        if (score > oldScore) {
            await set(userRef, {
                name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                score: score,
                id: user.id
            });
        }
    }

    async function loadLeaderboard() {
        const listDiv = document.getElementById('rank-list');
        listDiv.innerHTML = "<p style='text-align:center; color:#555;'>Yuklanmoqda...</p>";
        const rankQuery = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10));
        const snap = await get(rankQuery);
        if(snap.exists()) {
            listDiv.innerHTML = "";
            const rawData = [];
            snap.forEach(child => { rawData.push(child.val()); });
            rawData.reverse().forEach((u, index) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                if(u.id == user.id) item.style.borderColor = "#ffcc00";
                item.innerHTML = `<div class="rank-num">${index + 1}</div><div class="rank-name">${u.name}</div><div class="rank-score">${u.score}</div>`;
                listDiv.appendChild(item);
            });
        } else {
            listDiv.innerHTML = "<p style='text-align:center; color:#555;'>Hali o'yinchilar yo'q</p>";
        }
    }
</script>
</body>
</html>
