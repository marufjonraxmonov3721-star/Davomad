<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | 100% Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Ro'yxat */
        .list-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer;
        }

        /* Pleyer Ekrani */
        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); z-index: 9999;
        }

        /* Matn maydoni */
        #lyric-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 70%;
            z-index: 2; display: flex; align-items: center; justify-content: center;
            padding: 30px; box-sizing: border-box; text-align: center;
        }
        #current-lyric { font-size: 2.2rem; font-weight: 800; line-height: 1.3; }

        /* MUHIM: Markaziy Play Tugmasi */
        #central-play-btn {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: var(--accent); color: #000; border: none;
            width: 85px; height: 85px; border-radius: 50%; font-size: 32px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(29, 185, 84, 0.5);
        }

        /* Pastki sozlamalar */
        #style-panel {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            padding: 20px; box-sizing: border-box; z-index: 3; border-top: 1px solid #333;
        }
        .setting-row { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .style-btn {
            background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px;
            border-radius: 20px; font-size: 0.8rem; white-space: nowrap;
        }
        .style-btn.active { background: var(--accent); color: #000; }

        .close-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10001;
            background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff;
            width: 40px; height: 40px; border-radius: 50%;
        }

        #yt-hidden { position: absolute; top: -1000px; left: -1000px; visibility: hidden; }

        /* Animatsiyalar */
        .anim-fade { animation: fadeIn 0.4s ease; }
        .anim-slide { animation: slideIn 0.4s ease; }
        .anim-zoom { animation: zoomIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h2 style="color: var(--accent); text-align:center;">SongLyrics</h2>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        
        <button id="central-play-btn" onclick="forceStart()">▶</button>
        
        <div id="lyric-container">
            <div id="current-lyric">Tayyor</div>
        </div>

        <div id="yt-hidden"><div id="player"></div></div>

        <div id="style-panel">
            <div style="font-size: 0.7rem; color: #888;">SHRIFT</div>
            <div class="setting-row" id="font-settings">
                <button class="style-btn active" onclick="changeFont('sans-serif', this)">Oddiy</button>
                <button class="style-btn" onclick="changeFont('serif', this)">Klassik</button>
                <button class="style-btn" onclick="changeFont('cursive', this)">Qo'lyozma</button>
            </div>
            <div style="font-size: 0.7rem; color: #888; margin-top: 10px;">EFFEKT</div>
            <div class="setting-row" id="anim-settings">
                <button class="style-btn active" onclick="changeAnim('anim-fade', this)">Fade</button>
                <button class="style-btn" onclick="changeAnim('anim-slide', this)">Slide</button>
                <button class="style-btn" onclick="changeAnim('anim-zoom', this)">Zoom</button>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncTimer, isReady = false, pendingVideoId = "";
    var activeAnim = 'anim-fade';

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '10', width: '10',
            playerVars: { 'playsinline': 1, 'controls': 0, 'enablejsapi': 1 },
            events: { 
                'onReady': () => { isReady = true; },
                'onStateChange': (e) => { if(e.data == YT.PlayerState.PLAYING) startLyrics(); else stopLyrics(); }
            }
        });
    }

    function startLyrics() {
        stopLyrics();
        syncTimer = setInterval(() => {
            const time = ytPlayer.getCurrentTime();
            const line = currentLyrics.findLast(l => time >= l.time);
            if (line) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== line.text) {
                    el.innerText = line.text;
                    el.className = ''; void el.offsetWidth;
                    el.classList.add(activeAnim);
                }
            }
        }, 100);
    }

    function stopLyrics() { clearInterval(syncTimer); }

    function openPlayer(data) {
        pendingVideoId = data.youtubeId;
        currentLyrics = parseLRC(data.lyrics || "");
        document.getElementById('current-lyric').innerText = "Musiqani yoqing";
        document.getElementById('central-play-btn').style.display = 'flex';
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
    }

    function forceStart() {
        if(!isReady) return;
        document.getElementById('central-play-btn').style.display = 'none';
        document.getElementById('current-lyric').innerText = "...";
        ytPlayer.loadVideoById(pendingVideoId);
        ytPlayer.playVideo();
    }

    function closePlayer() {
        stopLyrics(); ytPlayer.stopVideo();
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function changeFont(f, b) { document.getElementById('current-lyric').style.fontFamily = f; updateUI(b, 'font-settings'); }
    function changeAnim(a, b) { activeAnim = a; updateUI(b, 'anim-settings'); }
    function updateUI(btn, id) { 
        const items = document.getElementById(id).getElementsByClassName('style-btn');
        for(let i of items) i.classList.remove('active'); btn.classList.add('active');
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `<div><b>${data.track}</b><span>${data.artist}</span></div> <div style="color:var(--accent);">▶</div>`;
            card.onclick = () => openPlayer(data);
            list.appendChild(card);
        });
    });
</script>
</body>
</html>
