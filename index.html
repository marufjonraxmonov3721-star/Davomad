<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lyrics Master | Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Pleylist */
        .list-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222;
        }

        /* O'yin ekrani */
        #game-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }

        /* Video qatlami - Markazlashtirilgan */
        #video-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: flex; align-items: center; justify-content: center;
        }
        
        #player { width: 100%; height: 100%; }

        /* O'yin elementlari */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: rgba(0,0,0,0.5); /* Video ustida qora qatlam */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }

        #score-display { position: absolute; top: 50px; left: 20px; font-weight: bold; color: var(--accent); font-size: 1.2rem; }
        
        #lyric-box { font-size: 2rem; font-weight: 800; margin-bottom: 20px; text-shadow: 0 0 15px #000; }
        .missing { color: var(--accent); border-bottom: 2px dashed var(--accent); }

        .input-box {
            pointer-events: auto; position: absolute; bottom: 100px; width: 80%;
            background: rgba(255,255,255,0.1); border: 2px solid var(--accent);
            padding: 15px; border-radius: 15px; color: #fff; text-align: center;
            font-size: 1.2rem; outline: none; backdrop-filter: blur(10px);
        }

        .close-btn {
            position: absolute; top: 20px; right: 20px; z-index: 10001;
            background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 24px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h1 style="color: var(--accent); text-align:center;">LYRICS MASTER</h1>
        <p style="text-align:center; color:#888;">Musiqani toping va Insta'da ulashing!</p>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="game-screen">
        <button class="close-btn" onclick="closeGame()">✕</button>
        <div id="video-layer"><div id="player"></div></div>
        
        <div id="overlay">
            <div id="score-display">BALL: <span id="ball">0</span></div>
            <div id="lyric-box">Tayyorlaning...</div>
            <input type="text" class="input-box" id="guess-input" placeholder="So'zni yozing..." autocomplete="off">
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var ytPlayer, currentLyrics = [], syncTimer, currentWord = "", ball = 0;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            playerVars: { 'autoplay': 1, 'controls': 0, 'showinfo': 0, 'rel': 0, 'playsinline': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) startLoop();
        else stopLoop();
    }

    function startLoop() {
        stopLoop();
        syncTimer = setInterval(() => {
            const now = ytPlayer.getCurrentTime();
            const hit = currentLyrics.findLast(l => now >= l.time);
            if (hit && document.getElementById('lyric-box').innerText !== hit.text) {
                processLyric(hit.text);
            }
        }, 100);
    }

    function stopLoop() { clearInterval(syncTimer); }

    function processLyric(text) {
        let words = text.split(' ');
        if (words.length > 3) {
            let idx = Math.floor(Math.random() * words.length);
            currentWord = words[idx].replace(/[.,!]/g, "").toLowerCase();
            words[idx] = `<span class="missing">???</span>`;
            document.getElementById('lyric-box').innerHTML = words.join(' ');
        } else {
            document.getElementById('lyric-box').innerText = text;
        }
    }

    // Tekshirish
    document.getElementById('guess-input').addEventListener('input', function(e) {
        if (e.target.value.trim().toLowerCase() === currentWord) {
            ball += 10;
            document.getElementById('ball').innerText = ball;
            e.target.value = "";
            document.getElementById('lyric-box').style.color = "#00ff00";
            setTimeout(() => document.getElementById('lyric-box').style.color = "#fff", 500);
        }
    });

    function openGame(data) {
        currentLyrics = parseLRC(data.lyrics);
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        ytPlayer.loadVideoById(data.youtubeId);
    }

    function closeGame() {
        stopLoop();
        ytPlayer.stopVideo();
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
        ball = 0;
        document.getElementById('ball').innerText = "0";
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<div><b>${d.track}</b><br><small>${d.artist}</small></div> <div>🔥</div>`;
            div.onclick = () => openGame(d);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
