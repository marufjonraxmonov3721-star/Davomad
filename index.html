<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time League - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
            --card-bg: #1a1a1a;
            --win-green: #2ecc71;
            --draw-gray: #7f8c8d;
            --loss-red: #e74c3c;
            --ef-blue: #004dff;
            --nav-bg: #111111;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            -webkit-user-select: none;
            padding: 15px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- DAXSHAT LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            overflow: hidden;
        }

        .loader-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }

        .loader-ring::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px solid transparent;
            border-left: 2px solid #fff;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }

        .loader-clock-main {
            font-size: 50px;
            filter: drop-shadow(0 0 10px var(--accent-color));
            animation: pulseClock 1.5s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseClock { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        .loader-text {
            color: var(--accent-color);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 30px;
            font-style: italic;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Division Card Styling */
        .div-card {
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            transition: 0.5s;
        }

        /* Animated Effects */
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 5px #fff, 0 0 10px var(--div-color); border-color: var(--div-color); }
            50% { box-shadow: 0 0 15px #fff, 0 0 25px var(--div-color); border-color: #fff; }
        }
        @keyframes goldFlow {
            0%, 100% { border-color: #ffd700; filter: drop-shadow(0 0 2px #ffd700); }
            50% { border-color: #fff; filter: drop-shadow(0 0 10px #ffd700); }
        }
        @keyframes rainbowBorder {
            0% { border-color: red; } 20% { border-color: yellow; } 40% { border-color: green; }
            60% { border-color: cyan; } 80% { border-color: blue; } 100% { border-color: magenta; }
        }
        .effect-neon { animation: neonPulse 2s infinite; }
        .effect-gold { animation: goldFlow 2s infinite; }
        .effect-rainbow { animation: rainbowBorder 3s infinite linear; }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: linear-gradient(45deg, #2c3e50, #00008b);
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            padding: 5px 12px;
            display: flex;
            align-items: center; gap: 10px;
        }
        .div-num { font-size: 28px; font-weight: 900; color: white; }
        .div-title { color: var(--accent-color); font-size: 22px; font-weight: bold; }

        .phase-container { background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: right; }
        .phase-label { display: block; font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .phase-time { display: block; color: #2ecc71; font-size: 11px; font-weight: bold; font-family: monospace; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .stat-icon { width: 32px; height: 32px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 16px; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 15px; font-weight: bold; }

        .win-rate-container { margin-top: 15px; background: #222; height: 6px; border-radius: 3px; overflow: hidden; position: relative; }
        .win-rate-bar { height: 100%; background: var(--win-green); transition: 1s; width: 0%; }

        .info-btn { position: absolute; top: -10px; right: -5px; background: var(--accent-color); color: black; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; z-index: 10; cursor: pointer; border: 2px solid #000; }

        #timer-container { width: 100%; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; padding: 20px 0; }
        .target-box { background: rgba(241, 196, 15, 0.05); padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(241, 196, 15, 0.1); width: 80%; display: flex; justify-content: space-between; align-items: center; }
        #display { font-size: 60px; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', monospace; }

        .btn-main { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.2s; margin-bottom: 15px; text-transform: uppercase; }
        .start { background: linear-gradient(to bottom, #2ecc71, #27ae60); color: white; box-shadow: 0 4px 0 #1e8449; }
        .stop { background: linear-gradient(to bottom, #e74c3c, #c0392b); color: white; box-shadow: 0 4px 0 #922b21; }

        .ef-row { background: linear-gradient(90deg, #1a1a1a 0%, #111 100%); margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; padding: 12px 15px; border-left: 4px solid var(--div-border, transparent); }
        .ef-row.me { background: linear-gradient(90deg, #2c2c2c 0%, #1a1a1a 100%); border-left-width: 6px; }
        .ef-avatar { width: 48px; height: 48px; border-radius: 10px; background: #252525; display: flex; align-items: center; justify-content: center; position: relative; }
        .ef-div-tag { position: absolute; bottom: -5px; right: -5px; background: var(--div-color, #f1c40f); color: black; font-size: 9px; font-weight: 900; padding: 2px 4px; border-radius: 4px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #666; font-size: 12px; font-weight: bold; }
        .nav-item.active { color: var(--accent-color); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 90%; max-width: 350px; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-wrapper">
            <div class="loader-ring"></div>
            <div class="loader-clock-main">🕒</div>
        </div>
        <h1 class="loader-text">TIME LEAGUE</h1>
    </div>

    <div id="game-page" class="page active">
        <div class="div-card" id="main-div-card">
            <div class="info-btn" onclick="openRules()">i</div>
            <div class="header-row">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="div-badge" id="div-badge-main">
                        <span class="div-num" id="user-div-icon">10</span>
                    </div>
                    <div class="div-title">Divizion <span id="user-div-title">10</span></div>
                </div>
                <div class="phase-container">
                    <span class="phase-label">Mavsum yakuni</span>
                    <span class="phase-time" id="phase-date">...</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-label">Ball</span>
                        <span class="stat-value" id="user-pts">0</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-info">
                        <span class="stat-label">Win %</span>
                        <span class="stat-value" id="user-winrate">0%</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span class="stat-label">Aniq</span>
                        <span class="stat-value" id="user-wins">0</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">❌</div>
                    <div class="stat-info">
                        <span class="stat-label">Xato</span>
                        <span class="stat-value" id="user-loss">0</span>
                    </div>
                </div>
            </div>
            <div class="win-rate-container"><div class="win-rate-bar" id="win-bar"></div></div>
        </div>

        <div id="timer-container">
            <div class="target-box">
                <span style="font-size:11px; font-weight:800; color:var(--accent-color)">🎯 MAQSAD:</span>
                <span id="target-label" style="font-family:monospace; font-weight:bold">10.000s</span>
            </div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result" style="text-align: center; font-weight: bold; margin-bottom: 10px; min-height: 20px;"></p>
    </div>

    <div id="rank-page" class="page">
        <div style="padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px;">
            <span style="color: #f1c40f; font-weight: 800; font-size: 24px;">REYTING</span>
        </div>
        <div id="ef-list-container"></div>
    </div>

    <div id="settings-page" class="page">
        <div style="padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px;">
            <span style="color: #f1c40f; font-weight: 800; font-size: 24px;">SOZLAMALAR</span>
        </div>
        <div style="background:#1a1a1a; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
            <span>O'yin ovozi</span>
            <input type="checkbox" id="sound-toggle" checked onchange="isSoundEnabled = this.checked">
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('game-page', this)"><span>🎮 O'yin</span></div>
        <div class="nav-item" onclick="showPage('rank-page', this)"><span>🏆 Reyting</span></div>
        <div class="nav-item" onclick="showPage('settings-page', this)"><span>⚙️ Sozlamalar</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_123";
        const myName = user?.first_name || "O'yinchi";

        let startTime, timerInterval, isRunning = false;
        let divSettings = {};
        let myData = { points: 0, division: 10, wins: 0, loss: 0 };
        let gameSounds = {};
        let isSoundEnabled = true;

        // Ovozlar va Sozlamalarni yuklash
        onValue(ref(db, 'settings'), (snap) => {
            const s = snap.val();
            if(s.sounds) {
                Object.keys(s.sounds).forEach(k => gameSounds[k] = new Audio(s.sounds[k]));
            }
            if(s.divisions) {
                divSettings = s.divisions;
                updateVisuals();
            }
            if(s.phase) document.getElementById('phase-date').innerText = s.phase;
            document.getElementById('loading-screen').style.display = 'none';
        });

        // Mening ma'lumotlarim
        onValue(ref(db, 'leaderboard/' + myId), (snap) => {
            if(snap.exists()) {
                myData = snap.val();
                if(!myData.wins) myData.wins = 0;
                if(!myData.loss) myData.loss = 0;
                renderMyStats();
                updateVisuals();
            }
        });

        function renderMyStats() {
            const total = (myData.wins || 0) + (myData.loss || 0);
            const wr = total > 0 ? Math.round((myData.wins / total) * 100) : 0;
            document.getElementById('user-pts').innerText = myData.points;
            document.getElementById('user-wins').innerText = myData.wins;
            document.getElementById('user-loss').innerText = myData.loss;
            document.getElementById('user-winrate').innerText = wr + "%";
            document.getElementById('win-bar').style.width = wr + "%";
        }

        function updateVisuals() {
            const d = myData.division || 10;
            const s = divSettings[d];
            if(s) {
                const card = document.getElementById('main-div-card');
                card.style.setProperty('--div-color', s.color);
                card.style.borderColor = s.color;
                card.className = "div-card " + (s.effect || "");
                
                document.getElementById('div-badge-main').style.borderColor = s.color;
                document.getElementById('user-div-icon').innerText = d;
                document.getElementById('user-div-title').innerText = d;
                document.getElementById('target-label').innerText = s.target.toFixed(3) + "s";
                document.documentElement.style.setProperty('--accent-color', s.color);
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const d = myData.division || 10;
            const rules = divSettings[d];

            if(!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP"; btn.className = "btn-main stop";
                if(isSoundEnabled && gameSounds.tick) gameSounds.tick.play();
                timerInterval = setInterval(() => {
                    document.getElementById('display').innerText = ((Date.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                btn.innerText = "START"; btn.className = "btn-main start";
                
                const diff = Math.abs(rules.target - finalTime);
                let pChange = 0, isWin = false;

                if(diff <= rules.nearLimit) {
                    pChange = rules.plusPoints;
                    isWin = true;
                    showRes("ZO'R! ✅", "#2ecc71", 'win');
                } else {
                    pChange = -rules.minusPoints;
                    showRes("XATO! ❌", "#e74c3c", 'lose');
                }

                let newPts = (myData.points || 0) + pChange;
                if(newPts < 0) newPts = 0;

                let newDiv = d;
                if(isWin && newPts >= rules.promotionPoints && d > 1) {
                    newDiv = d - 1;
                    tg.showAlert("Yangi Divizion: " + newDiv);
                }
                if(!isWin && newPts < (rules.relegationPoints || 0) && d < 10) {
                    newDiv = d + 1;
                    tg.showAlert("Pastga tushdingiz: D" + newDiv);
                }

                update(ref(db, 'leaderboard/' + myId), {
                    points: newPts,
                    division: newDiv,
                    wins: (myData.wins || 0) + (isWin ? 1 : 0),
                    loss: (myData.loss || 0) + (isWin ? 0 : 1),
                    name: myName
                });
            }
        };

        function showRes(t, c, s) {
            const el = document.getElementById('last-result');
            el.innerText = t; el.style.color = c;
            if(isSoundEnabled && gameSounds[s]) gameSounds[s].play();
        }

        // Reytingni chiqarish (Divizion ranglari bilan)
        onValue(ref(db, 'leaderboard'), (snap) => {
            const list = document.getElementById('ef-list-container');
            list.innerHTML = '';
            const data = Object.entries(snap.val() || {}).sort((a,b) => a[1].division - b[1].division || b[1].points - a[1].points);
            
            data.forEach(([id, p], i) => {
                const s = divSettings[p.division || 10] || {color: '#f1c40f'};
                const row = document.createElement('div');
                row.className = `ef-row ${id === myId ? 'me' : ''}`;
                row.style.setProperty('--div-border', s.color);
                row.style.setProperty('--div-color', s.color);
                row.innerHTML = `
                    <div style="width:30px; font-weight:bold; color:#888">${i+1}</div>
                    <div class="ef-avatar">👤<div class="ef-div-tag" style="background:${s.color}">D${p.division}</div></div>
                    <div style="flex:1; margin-left:15px; font-weight:bold">${p.name}</div>
                    <div style="font-weight:900">${p.points}</div>
                `;
                list.appendChild(row);
            });
        });

        window.showPage = (id, nav) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            nav.classList.add('active');
        };
    </script>
</body>
</html>
