<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Songlyrics Pro v5.0 - Ultra Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00e676; 
            --accent-glow: rgba(0, 230, 118, 0.4);
            --bg: #050505; 
            --surface: #121212;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            text-align: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-header {
            padding: 20px;
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .app-icon {
            width: 52px; height: 52px;
            background: var(--gradient);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 26px; color: #000;
            box-shadow: 0 5px 20px var(--accent-glow);
        }
        .app-info h1 { font-size: 19px; margin: 0; font-weight: 800; }
        .app-info p { font-size: 11px; color: var(--accent); margin: 0; font-weight: 700; text-transform: uppercase; }

        .preview-box { 
            width: 270px; height: 480px; background: #000; border-radius: 36px; 
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            border: 8px solid #1a1a1a; position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            perspective: 1000px;
        }

        #display-text { 
            font-size: 20px; font-weight: 900; color: var(--accent); 
            padding: 30px; line-height: 1.2; 
            z-index: 10; position: absolute; width: 100%; box-sizing: border-box;
            text-transform: uppercase;
        }
        
        #preview-bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: blur(5px); }
        .viz-bar-container { position: absolute; bottom: 20px; display: flex; gap: 2px; height: 40px; align-items: flex-end; z-index: 5; }
        .viz-bar { width: 3px; background: var(--accent); border-radius: 2px; }

        canvas { display: none; }

        .main-container { padding: 0 16px 150px 16px; max-width: 500px; margin: 0 auto; }
        .section-title { text-align: left; font-size: 13px; color: var(--text-dim); margin: 25px 0 12px 6px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #222; }

        .controls { background: var(--surface); padding: 20px; border-radius: 24px; text-align: left; border: 1px solid #252525; margin-bottom: 15px; }
        .select-group { display: flex; gap: 10px; margin: 10px 0; }
        .file-card { flex: 1; background: var(--glass); border: 2px dashed #444; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-card:hover { border-color: var(--accent); }

        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; }
        input[type=range] { -webkit-appearance: none; height: 6px; background: #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); padding: 20px; border-top: 1px solid #222; z-index: 1000; }
        .btn-download { background: var(--gradient); color: #000; font-weight: 800; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; box-shadow: 0 10px 20px var(--accent-glow); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-icon">S</div>
        <div class="app-info">
            <h1>Songlyrics Pro v5.0</h1>
            <p id="engine-status">Engine: IDLE • 60FPS Enabled</p>
        </div>
    </div>

    <div class="main-container">
        <div class="preview-box" id="p-box">
            <img id="preview-bg-img" src="" style="display:none">
            <div id="display-text">Lirikani kuting...</div>
            <div class="viz-bar-container" id="viz-container"></div>
        </div>

        <canvas id="video-canvas" width="1080" height="1920"></canvas>

        <div class="section-title">📦 Media & Fon</div>
        <div class="controls">
            <div class="select-group">
                <div class="file-card" onclick="document.getElementById('audio-input').click()">🎵 Audio</div>
                <div class="file-card" onclick="document.getElementById('lrc-input').click()">📄 LRC</div>
                <div class="file-card" onclick="document.getElementById('bg-input').click()">🖼 Fon</div>
            </div>
            <input type="file" id="audio-input" accept="audio/*" style="display:none">
            <input type="file" id="lrc-input" accept=".lrc" style="display:none">
            <input type="file" id="bg-input" accept="image/*" style="display:none">
            
            <label>Fonning xiraligi (Blur)</label>
            <input type="range" id="bg-blur" min="0" max="20" value="5" oninput="updateLivePreview()">
        </div>

        <div class="section-title">🎭 Vizual Effektlar</div>
        <div class="controls">
            <label>Vibratsiya (Shake) kuchi</label>
            <input type="range" id="shake-power" min="0" max="10" value="0" oninput="updateLivePreview()">
            
            <label>Zarralar (Particles)</label>
            <select id="particle-type" onchange="updateLivePreview()">
                <option value="none">Yo'q</option>
                <option value="snow">Qor uchqunlari</option>
                <option value="stars">Yulduzlar</option>
            </select>
        </div>

        <div class="section-title">✍️ Matn & Suv belgisi</div>
        <div class="controls">
            <input type="text" id="watermark-text" placeholder="Suv belgisi (Masalan: @username)" oninput="updateLivePreview()">
            <select id="font-style" onchange="updateLivePreview()">
                <option value="Inter">Modern Inter</option>
                <option value="'Playfair Display'">Classic Serif</option>
                <option value="'JetBrains Mono'">Tech Mono</option>
            </select>
            <input type="color" id="text-color" value="#00e676" oninput="updateLivePreview()">
        </div>

        <div class="section-title">⚙️ Eksport Sozlamalari</div>
        <div class="controls">
            <label>Sifat (Quality)</label>
            <select id="export-quality">
                <option value="1">720p (Tezkor)</option>
                <option value="1.5" selected>1080p (Tavsiya etiladi)</option>
                <option value="2">4K (Eng yuqori)</option>
            </select>
        </div>

        <p id="status-text">Tizim tayyor</p>
    </div>

    <div class="bottom-nav">
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">Videoni Tayyorlash</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const previewBgImg = document.getElementById('preview-bg-img');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');

    let lyrics = [];
    let audioFile = null;
    let bgImage = null;
    let particles = [];

    // Vizualizator uchun bar yaratish
    for(let i=0; i<15; i++) {
        let bar = document.createElement('div');
        bar.className = 'viz-bar';
        document.getElementById('viz-container').appendChild(bar);
    }

    function updateLivePreview() {
        const color = document.getElementById('text-color').value;
        const blur = document.getElementById('bg-blur').value;
        const font = document.getElementById('font-style').value;

        displayText.style.color = color;
        displayText.style.fontFamily = font;
        previewBgImg.style.filter = `blur(${blur}px)`;
        
        document.querySelectorAll('.viz-bar').forEach(b => b.style.background = color);
        
        // Haptic feedback (Telegram)
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    document.getElementById('bg-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            bgImage = new Image();
            bgImage.src = ev.target.result;
            previewBgImg.src = ev.target.result;
            previewBgImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('audio-input').onchange = (e) => {
        audioFile = e.target.files[0];
        statusText.innerText = "🎵 Audio yuklandi";
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseFloat("0." + m[3]), text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "✅ Lirikalar sinxronlandi";
        };
        reader.readAsText(e.target.files[0]);
    };

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Audio va LRC faylni yuklang!");
        
        startBtn.disabled = true;
        const scale = parseFloat(document.getElementById('export-quality').value);
        canvas.width = 1080 * scale;
        canvas.height = 1920 * scale;

        const audioTag = new Audio(URL.createObjectURL(audioFile));
        const stream = canvas.captureStream(60);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            statusText.innerText = "📤 Botga yuborilmoqda...";
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const fd = new FormData();
            fd.append('chat_id', '8533456947');
            fd.append('video', blob, 'render.mp4');
            await fetch(`https://api.telegram.org/bot8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw/sendVideo`, { method: 'POST', body: fd });
            startBtn.disabled = false;
            statusText.innerText = "✅ Tayyor!";
        };

        recorder.start();
        audioTag.play();

        function drawFrame() {
            if (audioTag.paused || audioTag.ended) { recorder.stop(); return; }

            const now = audioTag.currentTime;
            const current = lyrics.filter(l => now >= l.t).pop();
            const color = document.getElementById('text-color').value;
            const watermark = document.getElementById('watermark-text').value;

            // 1. Fon chizish
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(bgImage) {
                ctx.globalAlpha = 0.4;
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
            }

            // 2. Vizualizator animatsiyasi
            document.querySelectorAll('.viz-bar').forEach(b => {
                let h = Math.random() * 40 + 10;
                b.style.height = h + "px";
            });

            // 3. Matnni chizish
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.fillStyle = color;
            ctx.font = `900 ${100 * scale}px ${document.getElementById('font-style').value}`;
            ctx.textAlign = "center";
            ctx.shadowBlur = 30;
            ctx.shadowColor = color;
            if(current) ctx.fillText(current.text.toUpperCase(), 0, 0);
            ctx.restore();

            // 4. Suv belgisi
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.font = `${40 * scale}px Inter`;
            ctx.fillText(watermark, canvas.width/2, canvas.height - 100);

            requestAnimationFrame(drawFrame);
        }
        drawFrame();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
