<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Maker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* AMOLED Qora dizayn */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; color: #1DB954; } /* Spotify-ga o'xshash yashil */

        .upload-section {
            border: 2px dashed #333;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        audio {
            width: 100%;
            margin: 20px 0;
            filter: invert(100%);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #121212;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-send {
            background-color: #ffffff;
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn-send:active {
            transform: scale(0.98);
            background-color: #ccc;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Caption Maker</h2>
    
    <div class="upload-section" onclick="document.getElementById('audioFile').click()">
        <span>Musiqa tanlash (MP3)</span>
        <input type="file" id="audioFile" accept="audio/*" style="display: none;">
    </div>

    <div id="playerArea" style="display: none;">
        <audio id="audioPlayer" controls></audio>
        <p style="font-size: 14px; color: #bbb;">Matnni shu yerga yozing:</p>
        <textarea id="captionText" placeholder="Har bir qatorni yangi satrdan yozing..."></textarea>
        
        <button class="btn-send" onclick="sendToBot()">Videoni yaratish</button>
    </div>

    <div class="status">Bot Token: ...qO6dE</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Ilovani to'liq ekranga yoyish

    const audioFileInput = document.getElementById('audioFile');
    const audioPlayer = document.getElementById('audioPlayer');
    const playerArea = document.getElementById('playerArea');

    // Fayl tanlanganda pleyerni ko'rsatish
    audioFileInput.onchange = function() {
        const files = this.files;
        if (files.length > 0) {
            const url = URL.createObjectURL(files[0]);
            audioPlayer.src = url;
            playerArea.style.display = 'block';
        }
    };

    function sendToBot() {
        const text = document.getElementById('captionText').value;
        
        if (!text) {
            tg.showAlert("Iltimos, matnni kiriting!");
            return;
        }

        // Telegram Botga ma'lumot yuborish
        const data = {
            action: "create_video",
            caption: text,
            fileName: audioFileInput.files[0].name
        };

        tg.sendData(JSON.stringify(data)); // Botga JSON formatda yuboradi
        tg.close(); // Ilovani yopish
    }
</script>

</body>
</html>
