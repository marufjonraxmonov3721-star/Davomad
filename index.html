<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Local Save & Crop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #E1306C; --accent: #1DB954; --bg: #0b0b0b; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; }

        .header { padding: 20px; text-align: center; background: #111; border-bottom: 1px solid #222; }
        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }

        .content { padding: 15px; height: calc(100vh - 120px); overflow-y: auto; }
        .song-card {
            background: #181818; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #222;
        }
        .song-card b { display: block; font-size: 1.1rem; }
        .song-card span { color: #888; font-size: 0.9rem; }

        /* Crop/Editor Panel */
        #editor-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        .preview-box {
            width: 100%; aspect-ratio: 9/16; background: #111; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #crop-lyrics {
            position: absolute; width: 100%; text-align: center; padding: 20px;
            font-size: 2rem; font-weight: 900; text-shadow: 0 0 20px #000; z-index: 10;
        }
        .controls { padding: 20px; background: #111; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; }
        
        input[type=range] { width: 100%; accent-color: var(--primary); margin: 15px 0; }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px;
        }
        .btn-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; }
        .btn-back { background: #333; color: #fff; }

        #player { position: absolute; top: -9999px; } /* Yashirin pleyer */
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header"><h2>SongLyrics</h2></div>
        <div class="tabs">
            <div class="tab active" id="tab-all" onclick="switchTab('all')">Barchasi</div>
            <div class="tab" id="tab-saved" onclick="switchTab('saved')">Saqlanganlar</div>
        </div>
        <div class="content" id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="editor-screen">
        <div class="preview-box">
            <div id="crop-lyrics">Matn...</div>
            <div id="player"></div> </div>

        <div class="controls">
            <div style="text-align: center;">Vaqtni tanlang: <b id="crop-time">0s - 15s</b></div>
            <input type="range" id="start-slider" min="0" value="0">
            
            <button class="btn btn-insta" onclick="shareToInstagram()">📲 Instagram Story-da ulashish</button>
            <button class="btn btn-back" onclick="closeEditor()">⬅️ Orqaga</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var player, currentLyrics = [], startPos = 0, currentSongData = null;
    let currentTab = 'all';

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0',
            playerVars: { 'playsinline': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            setInterval(() => {
                let now = player.getCurrentTime();
                if (now >= startPos + 15) player.seekTo(startPos); // 15s loop
                
                let hit = currentLyrics.findLast(l => now >= l.time);
                if (hit) document.getElementById('crop-lyrics').innerText = hit.text;
            }, 100);
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-all').classList.toggle('active', tab === 'all');
        document.getElementById('tab-saved').classList.toggle('active', tab === 'saved');
        renderSongs();
    }

    // LocalStorage-ga saqlash
    function saveToLocal(data) {
        let saved = JSON.parse(localStorage.getItem('my_songs') || '[]');
        if (!saved.find(s => s.youtubeId === data.youtubeId)) {
            saved.push(data);
            localStorage.setItem('my_songs', JSON.stringify(saved));
            tg.showScanQrPopup({text: "Qo'shiq saqlandi!"}); // Kichik bildirishnoma
        }
        openEditor(data);
    }

    function openEditor(data) {
        currentSongData = data;
        currentLyrics = parseLRC(data.lyrics || "");
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('editor-screen').style.display = 'block';
        
        const slider = document.getElementById('start-slider');
        slider.oninput = function() {
            startPos = parseInt(this.value);
            document.getElementById('crop-time').innerText = `${startPos}s - ${startPos + 15}s`;
            player.seekTo(startPos);
        };
        
        player.loadVideoById(data.youtubeId, startPos);
        player.playVideo();
    }

    function closeEditor() {
        player.stopVideo();
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('editor-screen').style.display = 'none';
    }

    async function shareToInstagram() {
        const text = document.getElementById('crop-lyrics').innerText;
        if (navigator.share) {
            await navigator.share({
                title: 'SongLyrics Instagram Story',
                text: `🎵 ${currentSongData.track} - ${text}`,
                url: window.location.href
            });
        }
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allSongs = [];

    onSnapshot(collection(db, "tracklist"), (snap) => {
        allSongs = [];
        snap.forEach(doc => allSongs.push(doc.data()));
        renderSongs();
    });

    window.renderSongs = function() {
        const listDiv = document.getElementById('songs-list');
        listDiv.innerHTML = '';
        const songs = (currentTab === 'all') ? allSongs : JSON.parse(localStorage.getItem('my_songs') || '[]');

        if (songs.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#555;">Hozircha qo\'shiqlar yo\'q</p>';
            return;
        }

        songs.forEach(data => {
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<div><b>${data.track}</b><span>${data.artist}</span></div> <b style="color:var(--accent)">✂️</b>`;
            div.onclick = () => saveToLocal(data);
            listDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
