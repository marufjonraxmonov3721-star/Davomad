<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - Global Music Search</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 240px; height: 426px; background: #000; border-radius: 20px; 
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 20px; line-height: 1.4; 
            text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease; 
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 500px; overflow-y: auto; }
        
        /* Qidiruv Bo'limi Style */
        .search-box { position: sticky; top: 0; background: #141414; z-index: 100; padding-bottom: 10px; }
        .search-input-wrapper { display: flex; gap: 5px; }
        .search-results { display: grid; gap: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; background: #1a1a1a; border-radius: 10px; }
        .result-item { display: flex; align-items: center; gap: 10px; background: #222; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .result-item:hover { background: #333; }
        .result-item img { width: 40px; height: 40px; border-radius: 5px; }
        .result-info { font-size: 13px; flex: 1; }
        .result-info b { display: block; color: var(--accent); }

        .trim-group, .select-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 140px; }

        input, button, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; position: sticky; bottom: 0; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }

        .range-slider { position: relative; height: 40px; margin: 10px 0; background: #222; border-radius: 10px; overflow: hidden; }
        .range-fill { position: absolute; height: 100%; background: rgba(0, 230, 118, 0.2); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        /* Animatsiyalar */
        .anim-fade { animation: fadeIn 0.5s ease forwards; }
        .anim-zoom { animation: zoomIn 0.5s ease forwards; }
        .anim-slideUp { animation: slideUp 0.5s ease forwards; }
        .anim-rotate { animation: rotateIn 0.5s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-180deg); opacity: 0; } to { transform: rotate(0); opacity: 1; } }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1920"></canvas>

    <div class="controls">
        <div class="search-box">
            <label>🔍 Musiqa qidirish (YouTube kabi):</label>
            <div class="search-input-wrapper">
                <input type="text" id="query-input" placeholder="Xamdam Sobirov - 20-mart">
                <button onclick="searchMusic()" style="width: 80px; margin: 8px 0;">TOP</button>
            </div>
            <div class="search-results" id="search-results"></div>
        </div>

        <label>📁 Yoki o'zingiz yuklang (MP3 & LRC):</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <div class="select-group">
            <div>
                <label>Matn hajmi:</label>
                <input type="range" id="font-size-slider" min="30" max="180" value="80" oninput="updateLivePreview()">
            </div>
            <div>
                <label>Shrift Stili:</label>
                <select id="font-style" onchange="updateLivePreview()">
                    <option value="sans-serif">Standart Sans</option>
                    <option value="serif">Klassik Serif</option>
                    <option value="monospace">Texno Mono</option>
                    <option value="cursive">Qo'lyozma</option>
                    <option value="Impact">Qalin Impact</option>
                </select>
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Animatsiya:</label>
                <select id="anim-style" onchange="updateLivePreview()">
                    <option value="none">Yo'q</option>
                    <option value="fade">Fade</option>
                    <option value="zoom">Zoom</option>
                    <option value="slideUp">SlideUp</option>
                    <option value="rotate">Rotate</option>
                    <option value="bounce">Bounce</option>
                    <option value="pulse">Pulse</option>
                </select>
            </div>
            <div>
                <label>Fon Effekti:</label>
                <select id="effect-style" onchange="updateLivePreview()">
                    <option value="black">Deep Black</option>
                    <option value="neon">Neon</option>
                    <option value="vignette">Vignette</option>
                </select>
            </div>
        </div>

        <label>Qirqish vaqtini belgilash:</label>
        <div class="range-slider" id="trim-slider-container">
            <div class="range-fill" id="range-fill"></div>
        </div>
        <div class="trim-group">
            <input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()">
            <input type="number" id="trim-end" value="30" step="0.1" oninput="syncSliders()">
        </div>

        <div id="status-text">Fayl kutilmoqda</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">VIDEONI YASASH VA YUBORISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const resultsDiv = document.getElementById('search-results');

    let lyrics = [];
    let audioBlobUrl = null;
    let fullDuration = 30;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    // GLOBAL QIDIRUV FUNKSIYASI
    async function searchMusic() {
        const query = document.getElementById('query-input').value;
        if(!query) return;
        statusText.innerText = "Qidirilmoqda...";
        resultsDiv.innerHTML = "";

        try {
            // Deezer API orqali qidiruv
            const response = await fetch(`https://api.deezer.com/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            data.data.forEach(track => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <img src="${track.album.cover_small}">
                    <div class="result-info">
                        <b>${track.title}</b>
                        ${track.artist.name}
                    </div>
                `;
                item.onclick = () => selectTrack(track);
                resultsDiv.appendChild(item);
            });
            statusText.innerText = "Natijalar topildi.";
        } catch (e) {
            statusText.innerText = "Qidiruvda xato!";
        }
    }

    async function selectTrack(track) {
        statusText.innerText = "Yuklanmoqda...";
        audioBlobUrl = track.preview; // Deezer 30 soniyali demo beradi
        
        // Bu yerda o'zingizning bazangizdan yoki tashqi bazadan matnni olish mumkin
        // Hozircha namunaviy lirika yuklanadi
        lyrics = [{t:0, text: track.title}, {t:5, text: track.artist.name}, {t:10, text: "Tayyorlaning..."}];
        
        fullDuration = 30;
        document.getElementById('trim-end').value = 30;
        syncSliders();
        statusText.innerText = "Musiqa tanlandi: " + track.title;
    }

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || 30;
        document.getElementById('range-fill').style.left = (start / 30) * 100 + "%";
        document.getElementById('range-fill').style.width = ((end - start) / 30) * 100 + "%";
    }

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        displayText.style.fontSize = (size / 4) + "px";
        displayText.style.fontFamily = document.getElementById('font-style').value;
        const anim = document.getElementById('anim-style').value;
        displayText.className = anim !== 'none' ? "anim-" + anim : "";
    }

    // Videoni yasash jarayoni (Aynan sizning kodingizdagi HD tizim)
    async function startHDProcess() {
        if (!audioBlobUrl) return alert("Musiqa tanlanmagan!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(audioBlobUrl);
        audioTag.currentTime = startT;
        audioTag.crossOrigin = "anonymous";

        const stream = canvas.captureStream(60); 
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `HD_Video.mp4`);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
            statusText.innerText = "✅ BOTGA YUBORILDI!";
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        function drawFrame() {
            const now = audioTag.currentTime;
            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";

            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
            ctx.font = `bold ${document.getElementById('font-size-slider').value}px ${document.getElementById('font-style').value}`;
            ctx.textAlign = "center"; ctx.fillStyle = "#00e676";
            ctx.fillText(text, 540, 960);

            statusText.innerText = `JARAYON: ${Math.floor(((now - startT)/duration)*100)}%`;
            if (now < endT && !audioTag.paused) requestAnimationFrame(drawFrame);
            else { recorder.stop(); audioTag.pause(); }
        }
        drawFrame();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
