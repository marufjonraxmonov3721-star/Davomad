<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lyrics Sniper | Perfect Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00f2ff; --fake: #ffffff; --red: #ff0055; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* Menu */
        #menu-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; text-align: center; }
        .song-card { 
            background: #111; padding: 20px; border-radius: 15px; margin-bottom: 15px;
            border: 1px solid #333; display: flex; justify-content: space-between; align-items: center;
        }

        /* Game Screen */
        #game-screen { display: none; position: fixed; inset: 0; z-index: 100; background: #000; }
        #video-bg { position: absolute; inset: 0; opacity: 0.15; pointer-events: none; }
        #player { width: 100%; height: 100%; }

        .hud { position: absolute; top: 40px; width: 100%; z-index: 105; display: flex; justify-content: space-around; font-size: 1.3rem; text-shadow: 0 0 10px #000; }

        /* Game Lanes */
        #game-board { position: absolute; inset: 0; display: flex; z-index: 10; }
        .lane { position: relative; flex: 1; border-right: 1px solid rgba(255,255,255,0.05); height: 100%; }

        /* Tiles */
        .tile {
            position: absolute; width: 90%; left: 5%; height: 65px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 0.85rem; font-weight: 900;
            text-transform: uppercase; cursor: pointer; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .tile.real { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .tile.fake { background: var(--fake); color: #000; }

        #fail-line { position: absolute; bottom: 90px; width: 100%; height: 4px; background: var(--red); z-index: 5; box-shadow: 0 0 20px var(--red); }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="color: var(--accent);">LYRICS SNIPER</h1>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="game-screen">
        <div id="video-bg"><div id="player"></div></div>
        <div class="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>COMBO: <span id="combo">0</span></div>
        </div>
        <div id="game-board">
            <div class="lane" id="lane-0"></div>
            <div class="lane" id="lane-1"></div>
            <div class="lane" id="lane-2"></div>
            <div class="lane" id="lane-3"></div>
        </div>
        <div id="fail-line"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let ytPlayer, lyrics = [], currentIdx = -1, score = 0, combo = 0, isLive = false;
    let activeTiles = [];
    let lastSpawnTime = 0; 
    const fakes = ["XATO", "BOMBA", "YO'Q", "TO'XTA", "CHALGI", "TEZKOR"];

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            playerVars: { 'controls': 0, 'rel': 0, 'disablekb': 1, 'playsinline': 1 },
            events: { 'onStateChange': (e) => { if(e.data == 1) { isLive = true; requestAnimationFrame(gameLoop); } } }
        });
    }

    // requestAnimationFrame - eng aniq vaqtni ta'minlaydi (setInterval dan yaxshi)
    function gameLoop() {
        if(!isLive) return;

        const now = ytPlayer.getCurrentTime();
        
        // Matnni tekshirish
        const hit = lyrics.findLastIndex(l => now >= l.time);
        if (hit !== currentIdx && hit !== -1) {
            currentIdx = hit;
            spawnWords(lyrics[currentIdx].text);
        }

        // So'zlarni harakatlantirish
        moveTiles();

        requestAnimationFrame(gameLoop);
    }

    function spawnWords(text) {
        const words = text.split(' ').filter(w => w.length > 1);
        
        words.forEach((word, i) => {
            // Har bir so'z orasida vertikal masofa saqlash
            setTimeout(() => {
                createTile(word, false);
                // Har 2 ta to'g'ri so'zdan keyin bitta chalg'ituvchi chiqishi
                if(Math.random() > 0.5) createTile(fakes[Math.floor(Math.random()*fakes.length)], true);
            }, i * 300); // 300ms kechikish bilan chiqarish (ustma-ust tushmasligi uchun)
        });
    }

    function createTile(word, isFake) {
        const laneIdx = Math.floor(Math.random() * 4);
        const laneEl = document.getElementById(`lane-${laneIdx}`);
        const el = document.createElement('div');
        el.className = `tile ${isFake ? 'fake' : 'real'}`;
        el.innerText = word;
        
        const obj = {
            el: el,
            y: -80,
            isFake: isFake,
            speed: 4 + (score / 1200) // Ballga qarab tezlik oshadi
        };

        el.onclick = () => {
            if(isFake) {
                score = Math.max(0, score - 50);
                combo = 0;
                el.style.background = "red";
                setTimeout(() => el.remove(), 100);
            } else {
                score += 10 + combo;
                combo++;
                el.remove();
                activeTiles = activeTiles.filter(t => t !== obj);
            }
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = combo;
        };

        laneEl.appendChild(el);
        activeTiles.push(obj);
    }

    function moveTiles() {
        const limit = window.innerHeight - 150;
        for (let i = activeTiles.length - 1; i >= 0; i--) {
            let t = activeTiles[i];
            t.y += t.speed;
            t.el.style.top = t.y + 'px';

            if (t.y > limit) {
                if (!t.isFake) {
                    isLive = false;
                    ytPlayer.stopVideo();
                    alert("O'YIN TUGADI! BALL: " + score);
                    location.reload();
                } else {
                    t.el.remove();
                    activeTiles.splice(i, 1);
                }
            }
        }
    }

    function startLevel(data) {
        lyrics = parseLRC(data.lyrics);
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        ytPlayer.loadVideoById(data.youtubeId);
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<div><b>${d.track}</b><br><small>${d.artist}</small></div> <span>O'YINNI BOSHLASH ▶</span>`;
            div.onclick = () => startLevel(d);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
