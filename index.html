<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lyrics Master | Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg-color: #000; --accent: #00f2ff; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Outfit', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Glavnaya */
        #home { padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .hero-title { font-size: 2.5rem; background: linear-gradient(45deg, #00f2ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .track-list { margin-top: 30px; display: grid; gap: 15px; }
        .track-item {
            background: #111; border: 1px solid #222; padding: 15px;
            border-radius: 15px; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; cursor: pointer;
        }
        .track-item:active { transform: scale(0.95); border-color: var(--accent); }

        /* Game Screen */
        #game { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
        #video-bg { position: absolute; inset: 0; opacity: 0.4; filter: blur(5px); z-index: 1; }
        
        .game-overlay {
            position: relative; z-index: 2; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px 20px; box-sizing: border-box;
        }

        .score-box { font-size: 1.2rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .lyrics-display {
            font-size: 2.2rem; font-weight: 800; text-align: center;
            line-height: 1.2; transition: 0.4s;
        }
        .missing-word {
            border-bottom: 3px dashed var(--accent);
            color: var(--accent); padding: 0 10px;
        }

        .input-area { margin-bottom: 40px; text-align: center; }
        input {
            background: rgba(255,255,255,0.1); border: 2px solid var(--accent);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 1.2rem;
            width: 80%; outline: none; text-align: center;
        }

        /* Modal Natija */
        #result-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200; align-items: center; justify-content: center; flex-direction: column;
        }
        .card {
            background: linear-gradient(135deg, #111, #000); border: 2px solid var(--accent);
            padding: 40px; border-radius: 25px; text-align: center; width: 80%;
        }
        .share-btn {
            background: var(--accent); color: #000; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; margin-top: 20px; border: none;
        }
    </style>
</head>
<body>

    <div id="home">
        <h1 class="hero-title">LYRICS MASTER</h1>
        <p style="color: #666;">Matnni toping va reytingni yoring!</p>
        <div class="track-list" id="list">Yuklanmoqda...</div>
    </div>

    <div id="game">
        <div id="video-bg"><div id="player"></div></div>
        <div class="game-overlay">
            <div class="score-box">BALL: <span id="score">0</span></div>
            <div class="lyrics-display" id="lyrics-text">Tayyorlaning...</div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Yashiringan so'zni yozing..." autocomplete="off">
            </div>
        </div>
    </div>

    <div id="result-modal">
        <div class="card">
            <h2 style="color: var(--accent);">NATIJA</h2>
            <h1 id="final-score">0%</h1>
            <p>Siz musiqani zo'r bilasiz!</p>
            <button class="share-btn" onclick="shareToInsta()">INSTAGRAM STORY</button>
            <p onclick="location.reload()" style="margin-top: 20px; font-size: 0.8rem; color: #555;">YANA O'YNASH</p>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let ytPlayer, lyrics = [], currentIdx = -1, score = 0, total = 0;
    let isGameActive = false;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 },
            events: { 'onStateChange': (e) => { if(e.data == 1) gameLoop(); } }
        });
    }

    function gameLoop() {
        setInterval(() => {
            if(!isGameActive) return;
            const now = ytPlayer.getCurrentTime();
            const hit = lyrics.findLastIndex(l => now >= l.time);
            
            if (hit !== currentIdx && hit !== -1) {
                currentIdx = hit;
                displayLyric(lyrics[currentIdx]);
            }
        }, 100);
    }

    function displayLyric(line) {
        const words = line.text.split(' ');
        if(words.length > 3) {
            const missingIdx = Math.floor(Math.random() * words.length);
            const correctWord = words[missingIdx].replace(/[.,!]/g, "").toLowerCase();
            const placeholder = words[missingIdx].replace(/./g, "*");
            
            words[missingIdx] = `<span class="missing-word">${placeholder}</span>`;
            document.getElementById('lyrics-text').innerHTML = words.join(' ');
            
            // Tekshirish
            const input = document.getElementById('user-input');
            input.value = "";
            input.oninput = () => {
                if(input.value.trim().toLowerCase() === correctWord) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    input.style.borderColor = "#00ff00";
                    setTimeout(() => input.style.borderColor = "var(--accent)", 500);
                    input.value = "TO'G'RI!";
                }
            };
        } else {
            document.getElementById('lyrics-text').innerText = line.text;
        }
    }

    function startGame(data) {
        lyrics = parseLRC(data.lyrics);
        total = lyrics.length;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        isGameActive = true;
        ytPlayer.loadVideoById(data.youtubeId);
        
        // O'yin tugashi (masalan 30 soniyadan keyin)
        setTimeout(() => {
            isGameActive = false;
            ytPlayer.stopVideo();
            document.getElementById('result-modal').style.display = 'flex';
            document.getElementById('final-score').innerText = score + " ball";
        }, 45000); 
    }

    function shareToInsta() {
        // Bu qismda foydalanuvchi screenshot olib share qiladi
        tg.showAlert("Screenshot oling va bizni belgilab Instagram-ga qo'ying!");
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            const item = document.createElement('div');
            item.className = 'track-item';
            item.innerHTML = `<div><b>${d.track}</b><br><small>${d.artist}</small></div>`;
            item.onclick = () => startGame(d);
            listDiv.appendChild(item);
        });
    });
</script>
</body>
</html>
