<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 40px 20px; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; box-sizing: border-box; background: #222; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #0088cc; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Insta Saver</h2>
        <input type="text" id="url" placeholder="Instagram linkini kiriting...">
        <button onclick="send()">Videonini Botga yuborish</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function send() {
            const link = document.getElementById('url').value;
            if(link.includes('instagram.com')) { 
                tg.sendData(link); 
                tg.close(); 
            } else {
                alert("Iltimos, to'g'ri Instagram linkini kiriting!");
            }
        }
    </script>
</body>
</html>
