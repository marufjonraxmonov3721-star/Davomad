<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaction Battle TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1c1c1c;
            --tg-theme-button-color: #3498db;
            --accent-color: #2ecc71;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Sahifalar */
        .page {
            display: none;
            height: calc(100vh - 70px);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .active-page { display: block; }

        /* O'yin maydoni */
        #game-area {
            width: 100%;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            font-size: 26px;
            font-weight: 800;
            transition: all 0.15s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-transform: uppercase;
            text-align: center;
        }

        .waiting { background-color: #2c3e50; border: 5px solid #34495e; }
        .ready { background-color: #e74c3c; border: 5px solid #c0392b; }
        .go { background-color: #2ecc71; border: 5px solid #27ae60; transform: scale(1.02); }

        /* Navigatsiya */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #262626;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item.active { color: var(--tg-theme-button-color); }

        .nav-item svg { width: 26px; height: 26px; margin-bottom: 4px; }

        /* Reyting */
        .rank-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rank-info { display: flex; align-items: center; }
        .rank-number { font-weight: 900; color: #f1c40f; margin-right: 12px; width: 25px; }

        button#startBtn {
            background: var(--tg-theme-button-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        #user-greeting { font-size: 14px; color: #aaa; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="page-games" class="page active-page">
        <div id="user-greeting">Yuklanmoqda...</div>
        
        <div id="game-area" class="waiting" onclick="handleClick()">
            <span>O'yinni boshlashni kuting</span>
        </div>
        
        <button id="startBtn" onclick="startGame()">Hamma uchun start berish</button>
        <p id="my-last-score" style="text-align: center; color: var(--accent-color); font-weight: bold; margin-top: 20px; min-height: 24px;"></p>
    </div>

    <div id="page-rating" class="page">
        <h2 style="margin-top:0">Top O'yinchilar</h2>
        <div id="leaderboard-list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('games', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21,16.5L12,21.5L3,16.5V7.5L12,2.5L21,7.5V16.5Z"/></svg>
            <span>O'yin</span>
        </div>
        <div class="nav-item" onclick="showPage('rating', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16,11V3H8V11H2V21H22V11H16M10,5H14V11H10V5M4,13H8V19H4V13M20,19H16V13H20V19Z"/></svg>
            <span>Reyting</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomRef = ref(db, 'rooms/global_room');

        // Telegram ma'lumotlarini olish
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi") + (user?.last_name ? " " + user.last_name : "");

        document.getElementById('user-greeting').innerText = `Salom, ${user?.first_name || "Do'stim"}! 👋`;

        // Avtomatik ro'yxatdan o'tish (Login)
        set(ref(db, 'rooms/global_room/players/' + myId), {
            name: myName,
            score: null,
            lastSeen: serverTimestamp()
        });

        let currentStatus = "waiting";
        let startTime = 0;

        window.showPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active-page');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        };

        window.startGame = () => {
            tg.HapticFeedback.impactOccurred('medium');
            const delay = Math.floor(Math.random() * 3000) + 2000;
            update(roomRef, { status: 'ready', startTime: null });
            
            setTimeout(() => {
                update(roomRef, { 
                    status: 'go', 
                    startTime: Date.now() 
                });
            }, delay);
        };

        window.handleClick = () => {
            if (currentStatus === 'go' && startTime) {
                const reaction = (Date.now() - startTime) / 1000;
                update(ref(db, 'rooms/global_room/players/' + myId), {
                    score: reaction.toFixed(3)
                });
                document.getElementById('my-last-score').innerText = `Natijangiz: ${reaction.toFixed(3)}s`;
                startTime = null;
                tg.HapticFeedback.notificationOccurred('success');
            } else if (currentStatus === 'ready') {
                tg.HapticFeedback.notificationOccurred('error');
                alert("Erta bosdingiz! Diqqatli bo'ling.");
            }
        };

        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            currentStatus = data.status;
            startTime = data.startTime;
            const area = document.getElementById('game-area');

            if (currentStatus === 'ready') {
                area.className = 'ready';
                area.innerHTML = '<span>TAYYOR...</span>';
            } else if (currentStatus === 'go') {
                area.className = 'go';
                area.innerHTML = '<span>BOSING!!!</span>';
            } else {
                area.className = 'waiting';
                area.innerHTML = '<span>O\'yin kutilmoqda...</span>';
            }

            // Leaderboard
            const players = data.players || {};
            const leaderboard = document.getElementById('leaderboard-list');
            leaderboard.innerHTML = '';
            
            const sorted = Object.values(players)
                .filter(p => p.score !== null)
                .sort((a, b) => parseFloat(a.score) - parseFloat(b.score))
                .slice(0, 15); // Top 15 talik

            sorted.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                item.innerHTML = `
                    <div class="rank-info">
                        <span class="rank-number">#${index+1}</span>
                        <span style="font-weight:600">${p.name}</span>
                    </div>
                    <div style="font-family: monospace; font-size: 16px;">${p.score}s</div>
                `;
                leaderboard.appendChild(item);
            });
        });
    </script>
</body>
</html>
