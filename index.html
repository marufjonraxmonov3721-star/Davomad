<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Test Platform - Offline Ready</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --gold: #b8860b;
            --gold-glow: #8b6b0d;
            --text: #2d3436;
            --wrong: #d63031;
            --right: #27ae60;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .back-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            cursor: pointer;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .quiz-top-bar {
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }
        .mode-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: bold; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .progress-indicator { color: var(--text); font-size: 13px; font-weight: bold; }
        .timer-box { color: var(--wrong); font-size: 16px; font-weight: bold; }

        /* Matn hajmi optimallashtirildi */
        .question-text {
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 20px;
            text-align: left;
        }
        
        /* Rasmlar hajmi optimallashtirildi */
        .question-text img, .opt-btn img {
            max-width: 100%;
            max-height: 250px; /* Haddan tashqari katta rasmlarni cheklash */
            object-fit: contain;
            display: block;
            margin: 10px auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            background: #fff;
        }

        .options-list { display: grid; gap: 10px; }
        .opt-btn {
            background: var(--card);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(13px, 3.8vw, 15px);
            text-align: left;
            transition: 0.2s;
            line-height: 1.3;
        }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn.correct { background: var(--right) !important; border-color: var(--right); color: white; }
        .opt-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); color: white; }

        .gold-btn {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 6px 0;
            font-size: 14px;
        }

        .subject-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        @media (min-width: 480px) { .subject-grid { grid-template-columns: 1fr 1fr; } }

        .subject-card { 
            padding: 20px; 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer; 
            background: var(--card);
            font-weight: bold;
            color: var(--gold);
        }

        .hidden { display: none !important; }
        #final-score { font-size: 50px; margin: 10px 0; text-align: center; color: var(--gold); font-weight: 800; }
        
        #scr-res { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-menu">
        <h2 style="text-align: center; color: var(--gold); font-size: 22px; font-weight: 800; margin-bottom: 5px;">TEST PORTAL</h2>
        <p id="cache-status" style="text-align: center; font-size: 10px; color: #999; margin-bottom: 15px;">Xotira tekshirilmoqda...</p>
        <div id="list-subs" class="subject-grid">Yuklanmoqda...</div>
        
        <div id="mode-box" class="hidden" style="margin-top: 20px;">
            <button class="back-btn" onclick="goBackToMenu()">✕ Bekor qilish</button>
            <h3 id="sub-name" style="text-align: center; color: var(--text); margin-bottom: 15px; font-size: 18px;"></h3>
            <button class="gold-btn" onclick="startTest('practice')">Mashq Rejimi</button>
            <button class="gold-btn" style="background: #2d3436; margin-top: 8px;" onclick="startTest('exam')">Imtihon Rejimi</button>
        </div>
    </div>

    <div id="scr-quiz" class="hidden">
        <button class="back-btn" onclick="confirmExit()">✕ Chiqish</button>
        <div class="quiz-top-bar">
            <span id="label-mode" class="mode-label">MASHQ REJIMIDAGI</span>
            <div class="info-row">
                <div id="quiz-progress" class="progress-indicator">SAVOL: 1 / 10</div>
                <div id="timer-val" class="timer-box hidden">35:00</div>
            </div>
        </div>

        <div id="text-q" class="question-text">Savol yuklanmoqda...</div>
        <div id="list-opts" class="options-list"></div>
    </div>

    <div id="scr-res" class="hidden" style="text-align: center;">
        <h2 id="res-title" style="margin-top: 0;">TEST YAKUNLANDI</h2>
        <div id="final-score">0</div>
        <p id="res-detail" style="margin-bottom: 20px; color: #636e72; font-size: 15px;"></p>
        <button class="gold-btn" onclick="location.reload()">BOSH SAHIFA</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrDiJYCjjlTwUnZGvoSevawlO55yNCLs",
        authDomain: "raxmonov-22df0.firebaseapp.com",
        projectId: "raxmonov-22df0",
        databaseURL: "https://raxmonov-22df0-default-rtdb.firebaseio.com",
        storageBucket: "raxmonov-22df0.firebasestorage.app",
        messagingSenderId: "624672987926",
        appId: "1:624672987926:web:729132d8edb03c6f134e37"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allData = {};
    let rawQuestions = [];
    let currentSet = [];
    let idx = 0;
    let corrects = 0;
    let mode = '';
    let timer;
    let sec = 35 * 60;

    async function loadSubjects() {
        const cacheStatus = document.getElementById('cache-status');
        const localData = localStorage.getItem('quiz_data_cache');
        
        // 1. Oflayn rejim: Avval xotirani tekshiramiz
        if (localData) {
            allData = JSON.parse(localData);
            displaySubjects(allData);
            cacheStatus.innerText = "Xotiradan yuklandi (Oflayn rejim)";
            
            // Orqafonda yangilanish borligini tekshiramiz (ixtiyoriy)
            checkUpdate();
        } else {
            // 2. Agar xotirada bo'lmasa, onlayn yuklaymiz
            fetchFromFirebase();
        }
    }

    async function fetchFromFirebase() {
        const cacheStatus = document.getElementById('cache-status');
        cacheStatus.innerText = "Onlayn yangilanmoqda...";
        try {
            const snap = await get(ref(db, 'savollar'));
            if (snap.exists()) {
                allData = snap.val();
                localStorage.setItem('quiz_data_cache', JSON.stringify(allData));
                displaySubjects(allData);
                cacheStatus.innerText = "Ma'lumotlar yangilandi";
            }
        } catch (e) {
            cacheStatus.innerText = "Internet yo'q!";
        }
    }

    // Yangi fan qo'shilganini tekshirish uchun kichik funksiya
    async function checkUpdate() {
        try {
            const snap = await get(ref(db, 'savollar'));
            if (snap.exists()) {
                const newData = JSON.stringify(snap.val());
                if (localStorage.getItem('quiz_data_cache') !== newData) {
                    localStorage.setItem('quiz_data_cache', newData);
                    allData = snap.val();
                    displaySubjects(allData);
                    document.getElementById('cache-status').innerText = "Yangi fanlar qo'shildi!";
                }
            }
        } catch (e) { console.log("Offline mode: update skip"); }
    }

    function displaySubjects(data) {
        const box = document.getElementById('list-subs');
        box.innerHTML = "";
        Object.keys(data).forEach(s => {
            const d = document.createElement('div');
            d.className = 'subject-card';
            d.innerText = s;
            d.onclick = () => {
                rawQuestions = Object.values(data[s]);
                document.getElementById('sub-name').innerText = s;
                document.getElementById('mode-box').classList.remove('hidden');
                document.getElementById('list-subs').classList.add('hidden');
            };
            box.appendChild(d);
        });
    }

    loadSubjects();

    window.goBackToMenu = () => {
        document.getElementById('mode-box').classList.add('hidden');
        document.getElementById('list-subs').classList.remove('hidden');
    };

    window.confirmExit = () => {
        if(confirm("Testni to'xtatib chiqasizmi?")) location.reload();
    };

    window.startTest = (m) => {
        mode = m; idx = 0; corrects = 0;
        if (mode === 'exam') {
            currentSet = rawQuestions.sort(() => Math.random() - 0.5).slice(0, 35);
            document.getElementById('timer-val').classList.remove('hidden');
            document.getElementById('label-mode').innerText = "IMTIHON REJIMIDAGI";
            sec = 35 * 60;
            runClock();
        } else {
            currentSet = [...rawQuestions];
            document.getElementById('timer-val').classList.add('hidden');
            document.getElementById('label-mode').innerText = "MASHQ REJIMIDAGI";
        }
        document.getElementById('scr-menu').classList.add('hidden');
        document.getElementById('scr-quiz').classList.remove('hidden');
        renderQuestion();
    };

    function renderQuestion() {
        const q = currentSet[idx];
        document.getElementById('quiz-progress').innerText = `SAVOL: ${idx + 1} / ${currentSet.length}`;
        document.getElementById('text-q').innerHTML = q.question; 
        const box = document.getElementById('list-opts');
        box.innerHTML = "";

        const variants = [
            { t: q.options[0], ok: true },
            ...q.options.slice(1).map(opt => ({ t: opt, ok: false }))
        ].sort(() => Math.random() - 0.5);

        variants.forEach(v => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerHTML = v.t;
            b.onclick = () => handleAnswer(b, v.ok, q.options[0]);
            box.appendChild(b);
        });
        window.scrollTo(0,0);
    }

    function handleAnswer(btn, isOk, correctText) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        if (isOk) { btn.classList.add('correct'); corrects++; } 
        else { 
            btn.classList.add('wrong'); 
            if(mode === 'practice') {
                btns.forEach(b => { if(b.innerHTML === correctText) b.classList.add('correct'); });
            }
        }
        setTimeout(() => {
            idx++;
            if (idx < currentSet.length) renderQuestion();
            else finishTest();
        }, mode === 'practice' ? 1200 : 500);
    }

    function runClock() {
        timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (sec <= 0) finishTest();
        }, 1000);
    }

    function finishTest() {
        clearInterval(timer);
        document.getElementById('scr-quiz').classList.add('hidden');
        document.getElementById('scr-res').classList.remove('hidden');
        const score = Math.round((corrects / currentSet.length) * 70);
        document.getElementById('final-score').innerText = `${score} BALL`;
        document.getElementById('res-detail').innerText = `Jami ${currentSet.length} savoldan ${corrects} tasiga to'g'ri javob berdingiz.`;
        const title = document.getElementById('res-title');
        if(score >= 42) { title.innerText = "TABRIKLAYMIZ! O'TDINGIZ"; title.style.color = "#27ae60"; } 
        else { title.innerText = "YIQILDINGIZ"; title.style.color = "#d63031"; }
    }
</script>
</body>
</html>
