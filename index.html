<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Instagram Export</title>
    <style>
        :root { --primary: #E1306C; --bg: #000; } /* Instagram rangi */
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; }
        .container { padding: 20px; }
        
        /* Video maydoni (Stories formati 9:16) */
        #video-canvas {
            display: none; width: 100%; max-width: 350px; aspect-ratio: 9/16;
            background: #000; border-radius: 20px; margin: 20px auto;
            position: relative; border: 2px solid #333; overflow: hidden;
        }

        #lyric-overlay {
            position: absolute; width: 100%; top: 50%; transform: translateY(-50%);
            text-align: center; font-size: 2.2rem; font-weight: 900; padding: 20px;
            box-sizing: border-box; text-shadow: 0 0 20px rgba(225, 48, 108, 0.8);
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            color: #fff; border: none; padding: 15px 30px; border-radius: 30px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        .slider-box { background: #111; padding: 20px; border-radius: 20px; margin-top: 20px; }
        input[type=range] { width: 100%; accent-color: #dc2743; }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h2 style="text-align:center">Instagram Story Maker</h2>
        <div id="list"></div>

        <div id="editor" style="display:none;">
            <div id="video-canvas">
                <div id="lyric-overlay">Matn bu yerda chiqadi...</div>
            </div>

            <div class="slider-box">
                <p style="text-align:center; margin:0 0 10px;">Vaqtni tanlang: <b id="time-label">0:00 - 0:15</b></p>
                <input type="range" id="start-range" min="0" value="0">
                <button class="btn-insta" id="share-btn">📲 Instagram Story-ga yuborish</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#888; width:100%; margin-top:15px;">⬅️ Orqaga</button>
            </div>
        </div>
    </div>

    <div id="player"></div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var player, currentLyrics = [], startTime = 0, endTime = 15;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '0', width: '0', events: { 'onStateChange': onPlayerStateChange } });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            setInterval(() => {
                let now = player.getCurrentTime();
                if (now >= startTime + 15) player.seekTo(startTime); // 15 sekundlik qirqish

                let hit = currentLyrics.findLast(l => now >= l.time);
                if (hit) document.getElementById('lyric-overlay').innerText = hit.text;
            }, 100);
        }
    }

    // INSTAGRAMGA YUBORISH
    document.getElementById('share-btn').onclick = async () => {
        const text = document.getElementById('lyric-overlay').innerText;
        
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'SongLyrics Story',
                    text: `Musiqa: ${document.getElementById('lyric-overlay').innerText}`,
                    url: window.location.href // Instagram Stories-ga havola sifatida boradi
                });
            } catch (err) {
                console.log("Share bekor qilindi");
            }
        } else {
            alert("Brauzeringiz ulashish funksiyasini qo'llab-quvvatlamaydi.");
        }
    };

    function openEditor(data) {
        document.getElementById('list').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        document.getElementById('video-canvas').style.display = 'block';
        currentLyrics = parseLyrics(data.lyrics || "");
        
        document.getElementById('start-range').oninput = function() {
            startTime = parseInt(this.value);
            document.getElementById('time-label').innerText = `${startTime}s - ${startTime+15}s`;
            player.loadVideoById(data.youtubeId, startTime);
        };
        
        player.loadVideoById(data.youtubeId, startTime);
    }

    function parseLyrics(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3] } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase configingiz (o'zingizniki bilan almashtiring)
    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.style = "background:#111; padding:15px; margin-bottom:10px; border-radius:12px; cursor:pointer;";
            div.innerHTML = `<b>${data.track}</b><br><small>${data.artist}</small>`;
            div.onclick = () => openEditor(data);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
