<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
            --card-bg: #1a1a1a;
            --win-green: #2ecc71;
            --draw-gray: #7f8c8d;
            --loss-red: #e74c3c;
            --ef-blue: #004dff;
            --nav-bg: #111111;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            -webkit-user-select: none;
            padding: 15px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .page { display: none; }
        .page.active { display: block; }

        .div-card {
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #333;
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: linear-gradient(45deg, #2c3e50, #00008b);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .div-num { font-size: 28px; font-weight: 900; color: white; }
        .div-title { color: #f1c40f; font-size: 22px; font-weight: bold; }

        .phase-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
        }
        .phase-label {
            display: block;
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .phase-time {
            display: block;
            color: #2ecc71;
            font-size: 11px;
            font-weight: bold;
            font-family: monospace;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-box { display: flex; align-items: center; gap: 10px; }
        .stat-icon { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .promotion-text { color: #888; font-size: 12px; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .relegation-warning { color: #e74c3c; font-weight: bold; display: none; margin-top: 5px; animation: blink 1s infinite; }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        #timer-container {
            width: 100%;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 20px;
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        #display { font-size: 50px; font-weight: bold; color: var(--accent-color); font-family: monospace; }
        .target-text { font-size: 12px; color: #555; letter-spacing: 1px; }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .start { background: #2ecc71; color: white; }
        .stop { background: #e74c3c; color: white; }

        .ef-header {
            padding: 10px 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
        }
        .ef-main-title { color: #f1c40f; font-weight: 800; font-size: 24px; text-transform: uppercase; }

        .ef-ranking-list { padding: 5px 0; }

        .ef-row {
            background: linear-gradient(90deg, #1a1a1a 0%, #111 100%);
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .ef-row.me { 
            border-left: 4px solid var(--accent-color); 
            background: linear-gradient(90deg, #2c2c2c 0%, #1a1a1a 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .ef-rank-num { 
            width: 35px; 
            font-size: 18px; 
            font-weight: 900; 
            color: #888; 
            font-style: italic;
        }
        .ef-row.me .ef-rank-num { color: var(--accent-color); }
        
        .ef-row:nth-child(1) .ef-rank-num { color: #ffd700; font-size: 22px; }
        .ef-row:nth-child(2) .ef-rank-num { color: #c0c0c0; }
        .ef-row:nth-child(3) .ef-rank-num { color: #cd7f32; }

        .ef-avatar-container {
            position: relative;
            margin: 0 15px;
        }
        .ef-avatar { 
            width: 48px; height: 48px; 
            border-radius: 10px; 
            background: #252525; 
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .ef-div-tag {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--accent-color);
            color: black;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 4px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .ef-info-main { flex: 1; display: flex; flex-direction: column; }
        .ef-name { font-weight: 700; font-size: 16px; color: #fff; margin-bottom: 2px; }
        .ef-meta { font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; }

        .ef-points-area { text-align: right; }
        .ef-points-val { font-weight: 900; font-size: 18px; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .ef-points-label { display: block; font-size: 9px; color: var(--accent-color); font-weight: bold; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 2000;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .ef-list-footer {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-bottom: 30px;
        }
        .ef-mini-btn {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="game-page" class="page active">
        <div class="div-card">
            <div class="header-row">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="div-badge">
                        <span class="div-num" id="user-div-icon">?</span>
                    </div>
                    <div class="div-title">Divizion <span id="user-div-title">...</span></div>
                </div>
                <div class="phase-container">
                    <span class="phase-label">Mavsum Tugashi</span>
                    <span class="phase-time" id="phase-date">Yuklanmoqda...</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-label">Reyting</span>
                        <span class="stat-value" id="user-pts">0</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">👑</div>
                    <div class="stat-info">
                        <span class="stat-label">O'rin</span>
                        <span class="stat-value" id="user-rank-pos">#---</span>
                    </div>
                </div>
            </div>
            <p class="promotion-text" id="promo-info">Yuklanmoqda...</p>
            <p class="relegation-warning" id="danger-info">DIQQAT: DIVIZIONDAN TUSHIB KETISH XAVFI!</p>
        </div>

        <div id="timer-container">
            <div class="target-text" id="target-label">MAQSAD: 10.000s</div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result" style="text-align: center; font-weight: bold; margin-bottom: 30px;"></p>
    </div>

    <div id="rank-page" class="page">
        <div class="ef-header">
            <span class="ef-main-title">Reyting</span>
            <div style="color: #555; font-size: 10px; font-weight: bold; margin-top: 4px;" id="ranking-time"></div>
        </div>

        <div class="ef-ranking-list" id="ef-list-container">
            </div>

        <div class="ef-list-footer">
            <button class="ef-mini-btn" onclick="scrollToMe()">Mening o'rnim</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('game-page', this)">
            <div class="nav-icon">🎮</div>
            <span>O'yin</span>
        </div>
        <div class="nav-item" onclick="showPage('rank-page', this)">
            <div class="nav-icon">🏆</div>
            <span>Reyting</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        let startTime;
        let timerInterval;
        let isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 0, division: 10, isWarning: false };
        let fullLeaderboard = [];

        const now = new Date();
        document.getElementById('ranking-time').innerText = `YANGILANGAN: ${now.toLocaleDateString()} ${now.getHours()}:${now.getMinutes()}`;

        onValue(ref(db, 'settings/phase'), (snapshot) => {
            document.getElementById('phase-date').innerText = snapshot.exists() ? snapshot.val() : "2026";
        });

        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            updateGameUI();
        });

        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = snapshot.val();
                document.getElementById('user-div-icon').innerText = myCurrentData.division || 10;
                document.getElementById('user-div-title').innerText = myCurrentData.division || 10;
                document.getElementById('user-pts').innerText = (myCurrentData.points || 0).toLocaleString();
                updateGameUI();
            } else {
                update(ref(db, 'leaderboard/' + myId), { name: myName, points: 100, division: 10, isWarning: false });
            }
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            const currentPoints = myCurrentData.points || 0;
            if (divSettings && divSettings[d]) {
                const rules = divSettings[d];
                document.getElementById('target-label').innerText = `MAQSAD: ${rules.target.toFixed(3)}s`;
                
                let text = "";
                if (d > 1) {
                    text += `YUQORIGA: ${rules.promotionPoints.toLocaleString()} ball. `;
                }
                if (d < 10) {
                    text += `PASTGA: ${rules.relegationPoints.toLocaleString()} ball.`;
                }
                document.getElementById('promo-info').innerText = text || "Siz eng yuqori diviziondasiz!";

                // Relegation warning check
                const dangerZone = (rules.relegationPoints || 0) + 20;
                if (d < 10 && currentPoints <= dangerZone) {
                    document.getElementById('danger-info').style.display = 'block';
                } else {
                    document.getElementById('danger-info').style.display = 'none';
                }
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            let currentDiv = myCurrentData.division || 10;
            const rules = divSettings && divSettings[currentDiv] ? divSettings[currentDiv] : { target: 10.000, nearLimit: 0.050, plusPoints: 30, minusPoints: 30, promotionPoints: 500, relegationPoints: 50 };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP"; btn.className = "btn-main stop";
                tg.HapticFeedback.impactOccurred('medium');
                timerInterval = setInterval(() => {
                    display.innerText = ((Date.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START"; btn.className = "btn-main start";

                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                let pointChange = 0; 
                let newDivision = currentDiv; 
                let newPoints = myCurrentData.points || 0;
                let newWarning = myCurrentData.isWarning || false;

                if (diffStr === "0.000") {
                    pointChange = 100;
                    newPoints += pointChange;
                    if (currentDiv > 1) newDivision = currentDiv - 1;
                    newWarning = false; // Sakraganda warning o'chadi
                    document.getElementById('last-result').style.color = "#f1c40f";
                    document.getElementById('last-result').innerText = `DAHSHAT! DIVIZIONGA SAKRASH! +${pointChange}`;
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (diffVal <= rules.nearLimit) {
                    pointChange = parseInt(rules.plusPoints); 
                    newPoints += pointChange;
                    newWarning = false; // Yutsa warning o'chadi
                    document.getElementById('last-result').style.color = "#2ecc71";
                    document.getElementById('last-result').innerText = `Zo'r! +${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    pointChange = -parseInt(rules.minusPoints); 
                    newPoints += pointChange;
                    if (newPoints < 0) newPoints = 0;
                    document.getElementById('last-result').style.color = "#e74c3c";
                    document.getElementById('last-result').innerText = `Uzoq! ${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('error');
                }

                // Promotion logic
                if (newDivision > 1 && newPoints >= rules.promotionPoints) {
                    newDivision -= 1;
                    newWarning = false;
                }
                
                // Relegation logic with 1-time warning
                if (newDivision < 10 && newPoints < (rules.relegationPoints || 0)) {
                    if (newWarning) {
                        // Allaqachon ogohlantirilgan, endi tushadi
                        newDivision += 1;
                        newWarning = false;
                        tg.showAlert("Afsus! Ballaringiz kamligi sababli pastki divizionga tushdingiz.");
                    } else {
                        // Birinchi marta chegara ostiga tushdi - Ogohlantirish
                        newWarning = true;
                        tg.showAlert("DIQQAT! Ballaringiz tushish chegarasidan pastladi. Keyingi safar ham yutqazsangiz divizioningiz pasayadi!");
                    }
                }

                update(ref(db, 'leaderboard/' + myId), { 
                    name: myName, points: newPoints, division: newDivision, bestDiff: diffStr, lastTime: finalTime.toFixed(3), isWarning: newWarning
                });
            }
        };

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            fullLeaderboard = Object.entries(data).map(([id, val]) => ({id, ...val}))
                .sort((a, b) => {
                    if (a.division !== b.division) return a.division - b.division;
                    return (b.points || 0) - (a.points || 0);
                });
            
            const myRankIndex = fullLeaderboard.findIndex(p => String(p.id) === String(myId));
            document.getElementById('user-rank-pos').innerText = myRankIndex !== -1 ? `#${myRankIndex + 1}` : "#---";
            renderRanking();
        });

        function renderRanking() {
            const container = document.getElementById('ef-list-container');
            container.innerHTML = '';
            fullLeaderboard.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = `ef-row ${String(p.id) === String(myId) ? 'me' : ''}`;
                if(String(p.id) === String(myId)) row.id = "my-rank-row";
                
                row.innerHTML = `
                    <div class="ef-rank-num">${i+1}</div>
                    <div class="ef-avatar-container">
                        <div class="ef-avatar">⏱️</div>
                        <div class="ef-div-tag">D${p.division || 10}</div>
                    </div>
                    <div class="ef-info-main">
                        <div class="ef-name">${p.name}</div>
                        <div class="ef-meta">Global Player</div>
                    </div>
                    <div class="ef-points-area">
                        <span class="ef-points-val">${(p.points || 0).toLocaleString()}</span>
                        <span class="ef-points-label">RATING</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.showPage = (pageId, navEl) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        };

        window.scrollToMe = () => {
            const me = document.getElementById('my-rank-row');
            if(me) {
                me.scrollIntoView({ behavior: 'smooth', block: 'center' });
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Siz hali reytingda emassiz.");
            }
        };

    </script>
</body>
</html>
