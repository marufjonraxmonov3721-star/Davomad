<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System (Captions Lite Edition)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #00e676; 
            --bg: #0a0a0a; 
            --surface: #161616;
            --card: #222222;
            --text: #ffffff;
            --text-dim: #999999;
            --gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            text-align: center;
            line-height: 1.6;
        }

        /* Modern App Bar */
        .header {
            background: var(--surface);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: left;
        }
        .app-logo {
            width: 45px;
            height: 45px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }
        .header-titles h1 { font-size: 17px; margin: 0; letter-spacing: 0.5px; }
        .header-titles p { font-size: 11px; color: var(--accent); margin: 0; font-weight: 700; text-transform: uppercase; }

        /* Preview Area */
        .preview-container {
            padding: 20px;
            perspective: 1000px;
        }
        .preview-box { 
            width: 260px; height: 462px; background: #000; border-radius: 30px; 
            margin: 0 auto; display: flex; align-items: center; justify-content: center;
            border: 5px solid #282828; position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 25px; line-height: 1.3; 
            text-shadow: 0 0 20px rgba(0,230,118,0.4); 
            z-index: 5; transition: all 0.3s ease;
            position: absolute; width: 100%; box-sizing: border-box;
        }
        
        canvas { display: none; }

        /* Scrollable Content */
        .content {
            padding: 0 15px 120px 15px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Play Market Chips */
        .tags-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 20px 0;
            scrollbar-width: none;
        }
        .tag {
            background: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            border: 1px solid #333;
            color: var(--text-dim);
            font-weight: 600;
        }
        .tag.active {
            background: rgba(0, 230, 118, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 12px 5px;
        }
        .section-header h2 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
        
        .controls-card { 
            background: var(--surface); 
            padding: 20px; 
            border-radius: 24px; 
            text-align: left; 
            border: 1px solid #2a2a2a;
            box-shadow: var(--shadow);
        }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        /* Modern Inputs */
        input[type="number"], select { 
            width: 100%; padding: 14px; border-radius: 14px; 
            border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 14px;
            outline: none; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        /* File Upload Cards */
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .upload-card {
            background: #1a1a1a;
            border: 2px dashed #333;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-card:hover { border-color: var(--accent); background: rgba(0,230,118,0.05); }
        .upload-card i { font-size: 24px; display: block; margin-bottom: 8px; }

        /* Range Slider Custom */
        input[type=range] { -webkit-appearance: none; background: #333; height: 6px; border-radius: 10px; width: 100%; margin: 15px 0; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; 
            background: var(--accent); cursor: pointer; border: 3px solid #fff;
        }

        /* Action Bar */
        .action-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 22, 22, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .btn-main { 
            background: var(--gradient); 
            color: #000; font-weight: 800; border: none; cursor: pointer; 
            width: 100%; max-width: 400px;
            padding: 18px; border-radius: 20px; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.2);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); }
        .btn-main:disabled { background: #333; color: #666; box-shadow: none; }
        
        #status-text { font-size: 12px; color: var(--accent); margin-bottom: 10px; font-weight: 600; }
        label { font-size: 11px; color: #777; font-weight: 700; display: block; margin-bottom: 8px; margin-left: 4px; }

        .time-labels { display: flex; justify-content: space-between; font-family: monospace; color: var(--accent); font-size: 12px; margin-top: 10px; }
        .timeline { position: relative; height: 8px; background: #333; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .timeline-fill { position: absolute; height: 100%; background: var(--gradient); border-radius: 10px; transition: 0.3s; }

        /* Animations */
        .anim-fade { animation: fadeIn 0.4s ease forwards; }
        .anim-zoom { animation: zoomIn 0.4s ease forwards; }
        .anim-slideUp { animation: slideUp 0.4s ease forwards; }
        .anim-rotate { animation: rotateIn 0.4s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }
        .anim-glitch { animation: glitch 0.3s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-10deg) scale(0.9); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes bounceIn { 
            0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes glitch { 0% { text-shadow: 2px 0 #ff0000; } 50% { text-shadow: -2px 0 #0000ff; } 100% { text-shadow: 2px 0 #ff0000; } }

    </style>
</head>
<body>

    <header class="header">
        <div class="app-logo">S</div>
        <div class="header-titles">
            <h1>Songlyrics Pro</h1>
            <p>V4.0 Ultra Sync Edition</p>
        </div>
    </header>

    <div class="content">
        <div class="tags-wrapper">
            <div class="tag active">HDR Support</div>
            <div class="tag">60 FPS</div>
            <div class="tag">Amoled Optimized</div>
            <div class="tag">No Lag</div>
            <div class="tag">HD Audio</div>
        </div>

        <div class="preview-container">
            <div class="preview-box" id="p-box">
                <div id="display-text">Tayyor holatda...</div>
            </div>
        </div>

        <canvas id="video-canvas" width="1080" height="1920"></canvas>

        <div class="section-header"><h2>Fayllar</h2></div>
        <div class="controls-card">
            <div class="upload-grid">
                <div class="upload-card" onclick="document.getElementById('audio-input').click()">
                    <i>🎵</i><label>Audio</label>
                    <input type="file" id="audio-input" accept="audio/mp3" style="display:none">
                </div>
                <div class="upload-card" onclick="document.getElementById('lrc-input').click()">
                    <i>📝</i><label>Matn (LRC)</label>
                    <input type="file" id="lrc-input" accept=".lrc" style="display:none">
                </div>
            </div>
        </div>

        <div class="section-header"><h2>Dizayn</h2></div>
        <div class="controls-card">
            <label>Matn o'lchami</label>
            <input type="range" id="font-size-slider" min="30" max="180" value="85" oninput="updateLivePreview()">
            
            <div class="grid-input">
                <div>
                    <label>Shrift</label>
                    <select id="font-style" onchange="updateLivePreview()">
                        <option value="sans-serif">Modern</option>
                        <option value="serif">Classic</option>
                        <option value="Impact">Bold Impact</option>
                        <option value="monospace">Tech</option>
                    </select>
                </div>
                <div>
                    <label>Rang</label>
                    <input type="color" id="text-color" value="#00e676" style="height:50px; padding:2px" oninput="updateLivePreview()">
                </div>
            </div>

            <div class="grid-input">
                <div>
                    <label>Joylashuv</label>
                    <select id="text-position" onchange="updateLivePreview()">
                        <option value="center">Markaz</option>
                        <option value="top">Yuqori</option>
                        <option value="bottom">Past</option>
                    </select>
                </div>
                <div>
                    <label>Animatsiya</label>
                    <select id="anim-style" onchange="updateLivePreview()">
                        <option value="none">Yo'q</option>
                        <option value="fade">Fade</option>
                        <option value="zoom">Pop</option>
                        <option value="slideUp">Slide</option>
                        <option value="pulse">Beat</option>
                        <option value="glitch">Glitch</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-header"><h2>Vaqt Oralig'i</h2></div>
        <div class="controls-card">
            <div class="timeline"><div class="timeline-fill" id="range-fill"></div></div>
            <div class="time-labels">
                <span id="label-start">00:00.0</span>
                <span id="label-end">00:30.0</span>
            </div>
            <div class="grid-input" style="margin-top:15px">
                <div><label>Start (s)</label><input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()"></div>
                <div><label>End (s)</label><input type="number" id="trim-end" value="30" step="0.1" oninput="syncSliders()"></div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <div id="status-text">Barcha tizimlar normal</div>
        <button class="btn-main" id="start-btn" onclick="startHDProcess()">RENDER & EKSPORT</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const previewBox = document.getElementById('p-box');
    const rangeFill = document.getElementById('range-fill');

    let lyrics = [];
    let audioFile = null;
    let fullDuration = 30;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    }

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || fullDuration;
        const left = (start / fullDuration) * 100;
        const width = ((end - start) / fullDuration) * 100;
        rangeFill.style.left = left + "%";
        rangeFill.style.width = width + "%";
        document.getElementById('label-start').innerText = formatTime(start);
        document.getElementById('label-end').innerText = formatTime(end);
    }

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const color = document.getElementById('text-color').value;
        const pos = document.getElementById('text-position').value;
        const anim = document.getElementById('anim-style').value;
        
        displayText.style.fontSize = (size / 5) + "px";
        displayText.style.fontFamily = font;
        displayText.style.color = color;

        if(pos === 'top') { displayText.style.top = "10%"; displayText.style.bottom = "auto"; displayText.style.transform = "none"; }
        else if(pos === 'bottom') { displayText.style.bottom = "10%"; displayText.style.top = "auto"; displayText.style.transform = "none"; }
        else { displayText.style.top = "50%"; displayText.style.transform = "translateY(-50%)"; }

        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;
    }

    document.getElementById('audio-input').onchange = (e) => { 
        audioFile = e.target.files[0]; 
        const tempAudio = new Audio(URL.createObjectURL(audioFile));
        tempAudio.onloadedmetadata = () => {
            fullDuration = tempAudio.duration;
            document.getElementById('trim-end').value = fullDuration.toFixed(1);
            syncSliders();
            statusText.innerText = "Audio tayyor: " + audioFile.name;
        };
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseFloat("0." + m[3]), text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "Matn yuklandi (" + lyrics.length + " qator)";
        };
        reader.readAsText(e.target.files[0]);
    };

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let lines = [];
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (context.measureText(testLine).width > maxWidth && n > 0) {
                lines.push(line); line = words[n] + ' ';
            } else { line = testLine; }
        }
        lines.push(line);
        let startY = y - ((lines.length - 1) * lineHeight) / 2;
        lines.forEach((l, i) => context.fillText(l, x, startY + (i * lineHeight)));
    }

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Fayllarni yuklang!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;

        const stream = canvas.captureStream(60); 
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
        
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 25000000 });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `hd_render.mp4`);
            formData.append('caption', "✅ HD Rendering Tayyor!");

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if (response.ok) statusText.innerText = "✅ TAYYOR!";
            } catch (err) { alert(err.message); }
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            if (audioTag.paused || audioTag.ended || audioTag.currentTime >= endT) {
                recorder.stop(); audioTag.pause(); return;
            }
            const now = audioTag.currentTime;
            let current = lyrics.filter(l => now >= l.t).pop();
            const text = current ? current.text : "";
            
            if (text !== lastText) { lastText = text; animStartTime = performance.now(); }
            let animProgress = Math.min((performance.now() - animStartTime) / 300, 1);

            ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, 1080, 1920);

            const size = parseInt(document.getElementById('font-size-slider').value);
            const color = document.getElementById('text-color').value;
            const anim = document.getElementById('anim-style').value;
            const pos = document.getElementById('text-position').value;

            ctx.save();
            let y = 960;
            if(pos === 'top') y = 400; if(pos === 'bottom') y = 1520;
            ctx.translate(540, y);
            
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') { let s = 0.8 + animProgress*0.2; ctx.scale(s,s); }
            if(anim === 'slideUp') ctx.translate(0, (1-animProgress)*60);
            if(anim === 'pulse') { let s = 1 + Math.sin(performance.now()/150)*0.04; ctx.scale(s,s); }
            
            ctx.fillStyle = color; ctx.shadowBlur = 40; ctx.shadowColor = color;
            ctx.font = `bold ${size}px ${document.getElementById('font-style').value}`;
            ctx.textAlign = "center";
            if(text) wrapText(ctx, text.toUpperCase(), 0, 0, 950, size * 1.3);
            ctx.restore();

            statusText.innerText = `RENDER: ${Math.floor(((now - startT)/duration)*100)}%`;
            requestAnimationFrame(drawFrame);
        }
        drawFrame();
    }

    tg.ready();
    tg.expand();
    updateLivePreview();
</script>
</body>
</html>
