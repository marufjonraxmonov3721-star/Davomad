<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | NextGen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;700&family=Unbounded:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0050; 
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-section {
            width: 100%;
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        canvas {
            height: 95%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .trimmer-wrapper {
            width: 90%;
            padding: 10px 0;
        }
        .trimmer-container {
            width: 100%;
            height: 40px;
            background: #111;
            border-radius: 8px;
            position: relative;
            border: 1px solid var(--border);
            overflow: hidden;
            touch-action: none;
        }
        #trimmerIndicator {
            position: absolute;
            height: 100%;
            background: rgba(255, 0, 80, 0.3);
            border-left: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            left: 0;
            width: 30%;
        }

        .editor-sheet {
            width: 100%;
            background: #080808;
            border-top: 1px solid var(--border);
            padding: 20px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            position: relative;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            margin: 15px 0 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .scroll-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        .choice-card {
            min-width: 85px;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .choice-card.active {
            border-color: var(--accent);
            background: rgba(255, 0, 80, 0.1);
            color: white;
        }

        .control-group {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            border-radius: 5px;
            background: #222;
            outline: none;
            margin: 10px 0;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .upload-btn {
            background: var(--glass);
            border: 1px dashed #333;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        .playback-area {
            margin-bottom: 5px;
        }
        .play-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; margin: 0 auto;
            cursor: pointer;
        }

        .render-area {
            padding-top: 10px;
            padding-bottom: 30px;
        }
        .btn-main {
            background: white;
            color: black;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
        }

        #renderStatus {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="renderStatus">
        <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--accent);"></i>
        <p id="statusMsg" style="margin-top: 20px; font-size: 14px; font-weight: bold;">VIDEO TAYYORLANMOQDA...</p>
    </div>

    <div class="preview-section">
        <canvas id="mainCanvas" width="1080" height="1920"></canvas>
    </div>

    <div class="trimmer-wrapper">
        <div class="trimmer-container" id="trimmer">
            <div id="trimmerIndicator"></div>
        </div>
    </div>

    <div class="playback-area">
        <div class="play-btn" id="masterPlay"><i class="fas fa-play"></i></div>
    </div>

    <div class="editor-sheet">
        <div class="upload-grid">
            <div class="upload-btn" id="audioTrigger">
                <i class="fas fa-music"></i> <br> <span id="audioLabel">Musiqa</span>
                <input type="file" id="audioIn" hidden accept="audio/*">
            </div>
            <div class="upload-btn" id="lrcTrigger">
                <i class="fas fa-file-alt"></i> <br> <span id="lrcLabel">LRC Matn</span>
                <input type="file" id="lrcIn" hidden accept=".lrc">
            </div>
        </div>

        <div class="section-title"><i class="fas fa-clock"></i> Vaqt va Tezlik</div>
        <div class="control-group">
            <div style="display:flex; justify-content:space-between; font-size:11px;">
                <span>Video Davomiyligi</span>
                <span id="durationVal">15s</span>
            </div>
            <input type="range" id="durationIn" min="5" max="60" value="15">
            
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:10px;">
                <span>Matn Yonish Tezligi</span>
                <span id="speedVal">1.0x</span>
            </div>
            <input type="range" id="speedIn" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="section-title"><i class="fas fa-text-height"></i> Matn O'lchami</div>
        <div class="control-group">
            <div style="display:flex; justify-content:space-between; font-size:11px;">
                <span>Kattalik</span>
                <span id="fontSizeVal">80px</span>
            </div>
            <input type="range" id="fontSizeIn" min="30" max="220" value="80">
        </div>

        <div class="section-title"><i class="fas fa-magic"></i> Vizual Effektlar</div>
        <div class="scroll-row" id="fxRow">
            <div class="choice-card active" data-fx="highlight">Highlight</div>
            <div class="choice-card" data-fx="minimal">Minimal</div>
            <div class="choice-card" data-fx="neon">Neon</div>
            <div class="choice-card" data-fx="liquid">Liquid</div>
            <div class="choice-card" data-fx="glitch">Glitch</div>
        </div>

        <div class="section-title"><i class="fas fa-font"></i> Shrift Turi</div>
        <div class="scroll-row" id="fontRow">
            <div class="choice-card active" data-font="'Inter', sans-serif">Modern</div>
            <div class="choice-card" data-font="'Unbounded', sans-serif">Bold</div>
            <div class="choice-card" data-font="'Playfair Display', serif">Luxury</div>
            <div class="choice-card" data-font="'Space Grotesk', sans-serif">Tech</div>
        </div>

        <div class="render-area">
            <button class="btn-main" id="startRender">EKSPORT QILISH</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const botToken = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const audio = new Audio();
    let lyrics = [];
    let currentFx = 'highlight';
    let currentFont = "'Inter', sans-serif";
    let fontSize = 80;
    
    let trimStart = 0;
    let trimDuration = 15;
    let textSpeed = 1.0;

    document.getElementById('audioTrigger').onclick = () => document.getElementById('audioIn').click();
    document.getElementById('lrcTrigger').onclick = () => document.getElementById('lrcIn').click();

    const trimmer = document.getElementById('trimmer');
    const indicator = document.getElementById('trimmerIndicator');

    trimmer.addEventListener('pointerdown', (e) => {
        const move = (ev) => {
            const rect = trimmer.getBoundingClientRect();
            let x = ev.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width - (rect.width * (trimDuration/audio.duration))));
            const percent = x / rect.width;
            trimStart = percent * (audio.duration || 0);
            audio.currentTime = trimStart;
            updateTrimmerUI();
        };
        const stop = () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', stop);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', stop);
        move(e);
    });

    function updateTrimmerUI() {
        if (!audio.duration) return;
        const startP = (trimStart / audio.duration) * 100;
        const widthP = (trimDuration / audio.duration) * 100;
        indicator.style.left = startP + "%";
        indicator.style.width = widthP + "%";
    }

    document.getElementById('durationIn').oninput = function() {
        trimDuration = parseInt(this.value);
        document.getElementById('durationVal').innerText = trimDuration + "s";
        updateTrimmerUI();
    };

    document.getElementById('speedIn').oninput = function() {
        textSpeed = parseFloat(this.value);
        document.getElementById('speedVal').innerText = textSpeed.toFixed(1) + "x";
    };

    document.getElementById('audioIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        audio.src = URL.createObjectURL(file);
        audio.onloadedmetadata = () => {
            document.getElementById('audioLabel').innerText = "OK ✅";
            updateTrimmerUI();
        };
    };

    document.getElementById('lrcIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = parseLRC(ev.target.result);
            document.getElementById('lrcLabel').innerText = "OK ✅";
        };
        reader.readAsText(file);
    };

    function parseLRC(text) {
        const lines = text.split('\n');
        const lrc = [];
        const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        lines.forEach(line => {
            const match = line.match(regex);
            if (match) {
                const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 100;
                const lyric = line.replace(regex, '').trim();
                if (lyric) lrc.push({ time, text: lyric });
            }
        });
        return lrc.sort((a,b) => a.time - b.time);
    }

    document.getElementById('fontSizeIn').oninput = function() {
        fontSize = this.value;
        document.getElementById('fontSizeVal').innerText = fontSize + "px";
    };

    document.getElementById('masterPlay').onclick = () => {
        if (audio.paused) {
            audio.play();
            document.getElementById('masterPlay').innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            document.getElementById('masterPlay').innerHTML = '<i class="fas fa-play"></i>';
        }
    };

    function render() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const now = audio.currentTime;
        const activeIndex = lyrics.findLastIndex(l => l.time <= now);
        const active = lyrics[activeIndex];

        if (active) {
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `900 ${fontSize}px ${currentFont}`;
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const elapsed = now - active.time;

            if (currentFx === 'highlight') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillText(active.text, x, y);
                
                const nextTime = lyrics[activeIndex + 1] ? lyrics[activeIndex + 1].time : active.time + 3;
                const duration = (nextTime - active.time) / textSpeed;
                const progress = Math.min(elapsed / duration, 1);
                
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, canvas.width * progress, canvas.height);
                ctx.clip();
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'white';
                ctx.fillText(active.text, x, y);
                ctx.restore();
            } else if (currentFx === 'minimal') {
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            } else if (currentFx === 'neon') {
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff0050';
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            } else if (currentFx === 'liquid') {
                const scale = 1 + Math.sin(elapsed * 5) * 0.05;
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, 0, 0);
            } else if (currentFx === 'glitch') {
                if (Math.random() > 0.8) {
                    ctx.fillStyle = '#ff0050';
                    ctx.fillText(active.text, x + 4, y);
                }
                ctx.fillStyle = 'white';
                ctx.fillText(active.text, x, y);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = '#333';
            ctx.font = '30px Inter';
            ctx.textAlign = 'center';
            ctx.fillText("PREVIEW AREA", canvas.width/2, canvas.height/2);
        }
        requestAnimationFrame(render);
    }

    document.querySelectorAll('.choice-card').forEach(card => {
        card.onclick = function() {
            const row = this.parentElement;
            row.querySelectorAll('.choice-card').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            if (row.id === 'fxRow') currentFx = this.dataset.fx;
            if (row.id === 'fontRow') currentFont = this.dataset.font;
            tg.HapticFeedback.impactOccurred('light');
        };
    });

    document.getElementById('startRender').onclick = async () => {
        if (!audio.src || lyrics.length === 0) {
            tg.showAlert("Musiqa va LRC faylini tanlang!");
            return;
        }

        const status = document.getElementById('renderStatus');
        status.style.display = 'flex';

        const stream = canvas.captureStream(30);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const dest = audioCtx.createMediaStreamDestination();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(dest);
        source.connect(audioCtx.destination);

        const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        const recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 6000000 });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            document.getElementById('statusMsg').innerText = "BOTGA YUBORILMOQDA...";
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', tg.initDataUnsafe.user.id);
            formData.append('video', blob, 'lyric_video.mp4');

            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                if(res.ok) tg.showAlert("Video botga yuborildi! ✅");
                else tg.showAlert("Yuborishda xato!");
            } catch (err) {
                tg.showAlert("Tarmoq xatosi!");
            }
            status.style.display = 'none';
        };

        audio.currentTime = trimStart;
        recorder.start();
        audio.play();

        setTimeout(() => {
            recorder.stop();
            audio.pause();
            audio.currentTime = trimStart;
        }, trimDuration * 1000);
    };

    render();
</script>
</body>
</html>
