
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRC Caption Maker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-color: #ff5722; /* Rasmga mosroq rang */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0a; 
            color: white; 
            text-align: center; 
            padding: 15px;
            margin: 0;
        }

        /* Preview Oynasi */
        .preview-area {
            width: 100%; 
            height: 250px; 
            border-radius: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin-bottom: 20px; 
            background: #1a1a1a; 
            border: 2px solid #333;
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
        }

        #caption-display { 
            padding: 20px;
            transition: all 0.3s ease;
            max-width: 90%;
            word-wrap: break-word;
        }

        /* Matn Stillari */
        .style-classic { font-size: 24px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        .style-neon { font-size: 26px; color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #0088cc, 0 0 30px #0088cc; font-family: 'Courier New', monospace; }
        .style-minimal { font-size: 18px; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .style-bold { font-size: 32px; font-weight: 900; -webkit-text-stroke: 1px black; color: #ffcc00; font-style: italic; }
        .style-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); border-radius: 10px; padding: 10px 20px; font-size: 22px; }

        /* Boshqaruv elementlari */
        .controls {
            background: #181818;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            margin-bottom: 50px;
        }

        .section-title { font-size: 16px; font-weight: bold; color: var(--accent-color); margin: 15px 0 10px; border-left: 3px solid var(--accent-color); padding-left: 10px; }

        label { display: block; margin: 10px 0 5px; font-size: 13px; color: #aaa; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            background: #252525; 
            color: white; 
            border: 1px solid #333; 
            box-sizing: border-box;
        }

        /* Trim (Qirqish) Slider */
        .trim-box { display: flex; gap: 10px; align-items: center; }
        .trim-box input { width: 50%; }

        .btn-main { 
            background: var(--accent-color); 
            color: white; 
            padding: 15px; 
            border: none; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        audio { width: 100%; margin: 15px 0; filter: invert(100%); }

        .status-info { font-size: 12px; color: #777; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="preview-area" id="preview-box">
        <div id="caption-display" class="style-classic">Caption Maker Pro</div>
    </div>

    <div class="controls">
        <div class="section-title">FAYLLAR</div>
        <label>Musiqa yuklash (MP3):</label>
        <input type="file" id="audio-input" accept="audio/mp3">

        <label>LRC faylni yuklash:</label>
        <input type="file" id="lrc-input" accept=".lrc">

        <div class="section-title">QIRQISH (TRIM)</div>
        <div class="trim-box">
            <div>
                <label>Boshlanishi (sek):</label>
                <input type="number" id="start-time" value="0" min="0">
            </div>
            <div>
                <label>Tugashi (sek):</label>
                <input type="number" id="end-time" value="0" min="0">
            </div>
        </div>

        <div class="section-title">EKSPORT SOZLAMALARI</div>
        <label>Sifat (Resolution):</label>
        <select id="res-select">
            <option value="480">480p (Past)</option>
            <option value="720">720p (O'rtacha)</option>
            <option value="1080" selected>1080p (Tavsiya etiladi)</option>
            <option value="4000">2k/4k (Ultra HD)</option>
        </select>

        <label>Kadr tezligi (Frame Rate):</label>
        <select id="fps-select">
            <option value="24">24 fps</option>
            <option value="30" selected>30 fps</option>
            <option value="60">60 fps</option>
        </select>

        <div class="section-title">DIZAYN</div>
        <label>Matn stili:</label>
        <select id="style-select">
            <option value="style-classic">Klassik</option>
            <option value="style-neon">Neon Chiroq</option>
            <option value="style-minimal">Minimalist</option>
            <option value="style-bold">Qalin Italic</option>
            <option value="style-glass">Oynasimon</option>
        </select>

        <label>Fon rangi:</label>
        <input type="color" id="bg-color" value="#1a1a1a">

        <audio id="audio-player" controls></audio>
        
        <button class="btn-main" id="save-btn" onclick="saveProject()">SAQLASH (SAVE)</button>
        <div class="status-info" id="file-size-info">Taxminiy hajm: 0.0 MB</div>
    </div>

<script>
    let lyrics = [];
    const tg = window.Telegram.WebApp;
    const audioPlayer = document.getElementById('audio-player');
    const captionDisplay = document.getElementById('caption-display');
    const previewBox = document.getElementById('preview-box');
    const styleSelect = document.getElementById('style-select');
    const startTimeInput = document.getElementById('start-time');
    const endTimeInput = document.getElementById('end-time');
    const fileSizeInfo = document.getElementById('file-size-info');
    const saveBtn = document.getElementById('save-btn');

    // Stil va Rang o'zgarishi
    styleSelect.onchange = () => captionDisplay.className = styleSelect.value;
    document.getElementById('bg-color').oninput = (e) => previewBox.style.backgroundColor = e.target.value;

    // MP3 yuklash va davomiylikni aniqlash
    document.getElementById('audio-input').onchange = function(e) {
        if(e.target.files[0]) {
            const url = URL.createObjectURL(e.target.files[0]);
            audioPlayer.src = url;
            audioPlayer.onloadedmetadata = () => {
                endTimeInput.value = Math.floor(audioPlayer.duration);
                updateEstimatedSize();
            };
        }
    };

    // LRC o'qish
    document.getElementById('lrc-input').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => parseLRC(ev.target.result);
        reader.readAsText(file);
    };

    function parseLRC(lrcText) {
        lyrics = [];
        const lines = lrcText.split('\n');
        const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        lines.forEach(line => {
            const match = timeReg.exec(line);
            if (match) {
                const totalSeconds = parseInt(match[1]) * 60 + parseInt(match[2]) + (parseInt(match[3]) / 100);
                const text = line.replace(timeReg, '').trim();
                if (text) lyrics.push({ time: totalSeconds, text: text });
            }
        });
        captionDisplay.innerText = "LRC yuklandi!";
    }

    // Sinxronizatsiya va Trim tekshiruvi
    audioPlayer.ontimeupdate = function() {
        const current = audioPlayer.currentTime;
        const start = parseFloat(startTimeInput.value);
        const end = parseFloat(endTimeInput.value);

        if (current < start) audioPlayer.currentTime = start;
        if (current > end) {
            audioPlayer.pause();
            audioPlayer.currentTime = start;
        }

        const active = lyrics.findLast(l => current >= l.time);
        if (active && captionDisplay.innerText !== active.text) {
            captionDisplay.innerText = active.text;
        }
    };

    function updateEstimatedSize() {
        const duration = endTimeInput.value - startTimeInput.value;
        const res = document.getElementById('res-select').value;
        const size = (duration * (res / 100)).toFixed(1);
        fileSizeInfo.innerText = `Taxminiy hajm: ${size} MB`;
    }

    [startTimeInput, endTimeInput, document.getElementById('res-select')].forEach(el => {
        el.onchange = updateEstimatedSize;
    });

    function saveProject() {
        if (!audioPlayer.src) {
            tg.showAlert("Avval musiqa yuklang!");
            return;
        }

        let progress = 0;
        saveBtn.disabled = true;
        tg.MainButton.show();
        
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 10) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                finishExport();
            }
            saveBtn.innerText = `YUKLANMOQDA: ${progress}%`;
            tg.MainButton.setText(`EKSPORT: ${progress}%`);
        }, 200);
    }

    function finishExport() {
        const res = document.getElementById('res-select').value;
        tg.showAlert(`Muvaffaqiyatli yakunlandi! Video ${res}p sifatda tayyor.`);
        saveBtn.disabled = false;
        saveBtn.innerText = "SAQLASH (SAVE)";
        tg.MainButton.hide();

        // Haqiqiy faylni yuklab olish (Simulyatsiya uchun)
        const link = document.createElement('a');
        link.href = audioPlayer.src; // Bu yerda aslida video blob bo'ladi
        link.download = `caption_video_${res}p.mp4`;
        link.click();
    }

    tg.ready();
</script>
</body>
</html>
