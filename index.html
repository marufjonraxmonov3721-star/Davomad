<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 240px; height: 426px; background: #000; border-radius: 20px; 
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 20px; line-height: 1.4; 
            text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease; 
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 400px; overflow-y: auto; }
        
        .trim-group, .select-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 140px; }

        input, button, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        input[type=range] { -webkit-appearance: none; background: #333; height: 8px; border: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; position: sticky; bottom: 0; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }

        .trim-info { display: flex; justify-content: space-between; font-family: monospace; color: var(--accent); font-size: 12px; margin-bottom: 5px; }
        .range-slider { position: relative; height: 40px; margin: 10px 0; background: #222; border-radius: 10px; overflow: hidden; }
        .range-fill { position: absolute; height: 100%; background: rgba(0, 230, 118, 0.2); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        .anim-fade { animation: fadeIn 0.5s ease forwards; }
        .anim-zoom { animation: zoomIn 0.5s ease forwards; }
        .anim-slideUp { animation: slideUp 0.5s ease forwards; }
        .anim-rotate { animation: rotateIn 0.5s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-180deg); opacity: 0; } to { transform: rotate(0); opacity: 1; } }
        @keyframes bounceIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            50% { transform: scale(1.05); } 
            70% { transform: scale(0.9); } 
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1920"></canvas>

    <div class="controls">
        <label>1. Bazadan lirikani tanlang:</label>
        <select id="lrc-select">
            <option value="">Yuklanmoqda...</option>
        </select>

        <label>2. MP3 faylni yuklang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">

        <div class="select-group">
            <div>
                <label>Matn hajmi:</label>
                <input type="range" id="font-size-slider" min="30" max="180" value="80" oninput="updateLivePreview()">
            </div>
            <div>
                <label>Shrift Stili:</label>
                <select id="font-style" onchange="updateLivePreview()">
                    <option value="sans-serif">Standart Sans</option>
                    <option value="serif">Klassik Serif</option>
                    <option value="monospace">Texno Mono</option>
                    <option value="cursive">Qo'lyozma</option>
                    <option value="Impact">Qalin Impact</option>
                    <option value="Georgia">Elegant Georgia</option>
                    <option value="Verdana">Aniq Verdana</option>
                    <option value="Arial Black">Og'ir Arial</option>
                    <option value="Helvetica">Minimalist</option>
                    <option value="Futura">Kosmik</option>
                </select>
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Animatsiya:</label>
                <select id="anim-style" onchange="updateLivePreview()">
                    <option value="none">Oddiy almashish</option>
                    <option value="fade">Yumshoq paydo bo'lish</option>
                    <option value="zoom">Kattalashish</option>
                    <option value="slideUp">Yuqoriga surilish</option>
                    <option value="rotate">Aylanish</option>
                    <option value="bounce">Sakrash</option>
                    <option value="pulse">Yurak urishi</option>
                </select>
            </div>
            <div>
                <label>Fon Effekti:</label>
                <select id="effect-style" onchange="updateLivePreview()">
                    <option value="black">Deep Black (AMOLED)</option>
                    <option value="neon">Neon nurlar</option>
                    <option value="gradient">Rivojlanuvchi rang</option>
                    <option value="vignette">Vinyetka</option>
                    <option value="scanline">TV chiziqlar</option>
                </select>
            </div>
        </div>

        <label>Qirqish vaqtini belgilash:</label>
        <div class="range-slider" id="trim-slider-container">
            <div class="range-fill" id="range-fill"></div>
        </div>
        <div class="trim-info">
            <span id="label-start">00:00.0</span>
            <span id="label-duration">Davomiyligi: 0s</span>
            <span id="label-end">00:30.0</span>
        </div>

        <div class="trim-group">
            <div><label>Boshlanishi (s):</label><input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()"></div>
            <div><label>Tugashi (s):</label><input type="number" id="trim-end" value="30" step="0.1" oninput="syncSliders()"></div>
        </div>

        <div id="status-text">Kuting...</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">HD VIDEONI YASASH VA BOTGA YUBORISH</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
      authDomain: "songlyrics-caption.firebaseapp.com",
      projectId: "songlyrics-caption",
      storageBucket: "songlyrics-caption.firebasestorage.app",
      messagingSenderId: "363615493684",
      appId: "1:363615493684:web:35752e22517bfaedae7461",
      measurementId: "G-C7RRLG6ELQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const previewBox = document.getElementById('p-box');
    const rangeFill = document.getElementById('range-fill');
    const lrcSelect = document.getElementById('lrc-select');

    let lyrics = [];
    let audioFile = null;
    let fullDuration = 30;
    let dbTracks = [];

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    // Bazadan lirikani yuklash
    async function loadTracks() {
        try {
            const q = query(collection(db, "tracklist"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            lrcSelect.innerHTML = '<option value="">-- Qoshiqni tanlang --</option>';
            dbTracks = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                dbTracks.push(data);
                const opt = document.createElement('option');
                opt.value = data.title;
                opt.innerText = data.title;
                lrcSelect.appendChild(opt);
            });
            statusText.innerText = "Bazadan lirikalar yuklandi.";
        } catch (e) {
            console.error(e);
            statusText.innerText = "Bazaga ulanishda xato!";
        }
    }
    loadTracks();

    lrcSelect.onchange = () => {
        const selected = dbTracks.find(t => t.title === lrcSelect.value);
        if (selected && selected.lyricsBody) {
            parseLyrics(selected.lyricsBody);
            statusText.innerText = "Lirika yuklandi: " + selected.title;
        }
    };

    function parseLyrics(data) {
        lyrics = data.split('\n').map(line => {
            const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
            return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
        }).filter(x => x);
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    }

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || fullDuration;
        const left = (start / fullDuration) * 100;
        const width = ((end - start) / fullDuration) * 100;
        rangeFill.style.left = left + "%";
        rangeFill.style.width = width + "%";
        document.getElementById('label-start').innerText = formatTime(start);
        document.getElementById('label-end').innerText = formatTime(end);
        document.getElementById('label-duration').innerText = `Davomiyligi: ${(end - start).toFixed(1)}s`;
    }

    window.updateLivePreview = function() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const effect = document.getElementById('effect-style').value;
        const anim = document.getElementById('anim-style').value;
        
        displayText.style.fontSize = (size / 4) + "px";
        displayText.style.fontFamily = font;
        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;

        previewBox.style.background = "#000";
        previewBox.style.boxShadow = "none";
        previewBox.style.border = "2px solid #333";

        if(effect === 'neon') {
            previewBox.style.border = "2px solid #00e676";
            previewBox.style.boxShadow = "inset 0 0 20px rgba(0,230,118,0.4)";
        }
    }

    document.getElementById('audio-input').onchange = (e) => { 
        audioFile = e.target.files[0]; 
        const tempAudio = new Audio(URL.createObjectURL(audioFile));
        tempAudio.onloadedmetadata = () => {
            fullDuration = tempAudio.duration;
            document.getElementById('trim-end').value = fullDuration.toFixed(1);
            syncSliders();
            statusText.innerText = "Audio yuklandi.";
        };
    };

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let lines = [];
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                lines.push(line);
                line = words[n] + ' ';
            } else { line = testLine; }
        }
        lines.push(line);
        let startY = y - ((lines.length - 1) * lineHeight) / 2;
        for(let k = 0; k < lines.length; k++) {
            context.fillText(lines[k], x, startY + (k * lineHeight));
        }
    }

    window.startHDProcess = async function() {
        if (!audioFile || lyrics.length === 0) return alert("Bazadan lirikani tanlang va MP3 yuklang!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);

        const stream = canvas.captureStream(60); 
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
        
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 15000000 
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Stories_HD_${Date.now()}.mp4`);
            formData.append('caption', "✅ Instagram Stories HD (60 FPS, 15Mbps) tayyor!");

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if (response.ok) { statusText.innerText = "✅ YUBORILDI!"; tg.showAlert("Video botga yuborildi!"); }
            } catch (err) { alert("Xato: " + err.message); }
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            const now = audioTag.currentTime;
            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";
            
            if (text !== lastText) { 
                lastText = text; 
                animStartTime = now; 
            }
            
            let animProgress = Math.min((now - animStartTime) / 0.4, 1); 

            ctx.fillStyle = "#000000"; 
            ctx.fillRect(0, 0, 1080, 1920);

            const effect = document.getElementById('effect-style').value;
            if(effect === 'neon') {
                ctx.strokeStyle = `hsl(${now * 50 % 360}, 70%, 50%)`; 
                ctx.lineWidth = 20; ctx.strokeRect(40, 40, 1000, 1840);
            } else if (effect === 'vignette') {
                let g = ctx.createRadialGradient(540, 960, 200, 540, 960, 1000);
                g.addColorStop(0, "rgba(30,30,30,1)"); g.addColorStop(1, "black");
                ctx.fillStyle = g; ctx.fillRect(0, 0, 1080, 1920);
            }

            const font = document.getElementById('font-style').value;
            const anim = document.getElementById('anim-style').value;
            const size = parseInt(document.getElementById('font-size-slider').value);
            
            ctx.font = `bold ${size}px ${font}`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            ctx.save();
            ctx.translate(540, 960);
            
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') ctx.scale(0.8 + animProgress * 0.2, 0.8 + animProgress * 0.2);
            if(anim === 'slideUp') ctx.translate(0, (1-animProgress)*60);
            if(anim === 'rotate') ctx.rotate((1-animProgress)*0.5);
            if(anim === 'bounce') ctx.scale(animProgress, animProgress);
            if(anim === 'pulse') {
                let s = 1 + Math.sin(Date.now()/150)*0.03;
                ctx.scale(s, s);
            }

            ctx.fillStyle = "#00e676";
            ctx.shadowColor = "rgba(0,230,118,0.8)"; ctx.shadowBlur = 35;
            
            wrapText(ctx, text, 0, 0, 900, size * 1.2);
            
            ctx.restore();

            statusText.innerText = `JARAYON: ${Math.floor(((now - startT) / duration) * 100)}%`;

            if (now < endT && !audioTag.paused) requestAnimationFrame(drawFrame);
            else { audioTag.pause(); recorder.stop(); }
        }
        drawFrame();
    }
    
    window.syncSliders = syncSliders;
    tg.ready();
    tg.expand();
    updateLivePreview();
</script>
</body>
</html>
