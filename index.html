<script>
    let lyrics = [];
    let recorder;
    let chunks = [];
    const tg = window.Telegram.WebApp;
    const audioPlayer = document.getElementById('audio-player');
    const captionDisplay = document.getElementById('caption-display');
    const previewBox = document.getElementById('preview-box');
    const styleSelect = document.getElementById('style-select');
    const startTimeInput = document.getElementById('start-time');
    const endTimeInput = document.getElementById('end-time');
    const fileSizeInfo = document.getElementById('file-size-info');
    const saveBtn = document.getElementById('save-btn');

    styleSelect.onchange = () => captionDisplay.className = styleSelect.value;
    document.getElementById('bg-color').oninput = (e) => previewBox.style.backgroundColor = e.target.value;

    document.getElementById('audio-input').onchange = function(e) {
        if(e.target.files[0]) {
            audioPlayer.src = URL.createObjectURL(e.target.files[0]);
            audioPlayer.onloadedmetadata = () => {
                endTimeInput.value = Math.floor(audioPlayer.duration);
                updateEstimatedSize();
            };
        }
    };

    document.getElementById('lrc-input').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => parseLRC(ev.target.result);
        reader.readAsText(e.target.files[0]);
    };

    function parseLRC(lrcText) {
        lyrics = [];
        const lines = lrcText.split('\n');
        const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        lines.forEach(line => {
            const match = timeReg.exec(line);
            if (match) {
                const totalSeconds = parseInt(match[1]) * 60 + parseInt(match[2]) + (parseInt(match[3]) / 100);
                const text = line.replace(timeReg, '').trim();
                if (text) lyrics.push({ time: totalSeconds, text: text });
            }
        });
        captionDisplay.innerText = "LRC yuklandi!";
    }

    audioPlayer.ontimeupdate = function() {
        const current = audioPlayer.currentTime;
        const start = parseFloat(startTimeInput.value);
        const end = parseFloat(endTimeInput.value);

        if (current < start) audioPlayer.currentTime = start;
        if (current > end && !recorder) {
            audioPlayer.pause();
            audioPlayer.currentTime = start;
        }

        const active = lyrics.findLast(l => current >= l.time);
        if (active && captionDisplay.innerText !== active.text) {
            captionDisplay.innerText = active.text;
        }
    };

    function updateEstimatedSize() {
        const duration = endTimeInput.value - startTimeInput.value;
        const res = document.getElementById('res-select').value;
        const size = (duration * (res / 100)).toFixed(1);
        fileSizeInfo.innerText = `Taxminiy hajm: ${size} MB`;
    }

    async function saveProject() {
        if (!audioPlayer.src) { tg.showAlert("Musiqa yuklang!"); return; }

        const start = parseFloat(startTimeInput.value);
        const end = parseFloat(endTimeInput.value);
        const duration = end - start;
        
        saveBtn.disabled = true;
        tg.MainButton.show();
        
        // MediaRecorder va stream tayyorlash
        audioPlayer.currentTime = start;
        const stream = previewBox.captureStream(30); // 30 FPS

        // Audio qo'shish (agar captureStream ishlasa)
        let audioStream = null;
        if (audioPlayer.captureStream) {
            audioStream = audioPlayer.captureStream();
        } else if (audioPlayer.mozCaptureStream) {
            audioStream = audioPlayer.mozCaptureStream();
        }

        if (audioStream) {
            audioStream.getAudioTracks().forEach(track => stream.addTrack(track));
        }

        // WebM formatida MediaRecorder
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus' });
        chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' }); // WebM mobil bilan mos
            const url = URL.createObjectURL(blob);

            // Mobil va Telegramda ishlash uchun
            // 1. Brauzerda ochib foydalanuvchi saqlaydi
            window.open(url, '_blank');

            // 2. Klassik download fallback
            const a = document.createElement('a');
            a.href = url;
            a.download = `caption_video_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            saveBtn.disabled = false;
            saveBtn.innerText = "SAQLASH (SAVE)";
            tg.MainButton.hide();
            tg.showAlert("Video tayyor! Brauzeringizda saqlang.");
            recorder = null;
        };

        recorder.start();
        audioPlayer.play();

        const interval = setInterval(() => {
            const currentPos = audioPlayer.currentTime - start;
            const progress = Math.min(Math.floor((currentPos / duration) * 100), 100);
            
            saveBtn.innerText = `EKSPORT: ${progress}%`;
            tg.MainButton.setText(`TAYYORLANMOQDA: ${progress}%`);

            if (audioPlayer.currentTime >= end || audioPlayer.paused) {
                clearInterval(interval);
                recorder.stop();
                audioPlayer.pause();
            }
        }, 100);
    }

    tg.ready();
</script>
