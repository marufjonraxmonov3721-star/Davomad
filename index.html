<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #video-area {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
        }

        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #lyric-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            min-height: 60px;
            color: #00f2ff;
        }

        .input-box {
            width: 100%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #111;
            color: #fff;
            font-size: 20px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: #00f2ff; }

        #score-view {
            position: absolute;
            top: 10px;
            right: 15px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="score-view">Ball: 0</div>

    <div id="video-area">
        <div id="player"></div>
    </div>

    <div class="game-content">
        <div id="lyric-display">Yuklanmoqda...</div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="..." autocomplete="off">
        </div>
    </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const tg = window.Telegram.WebApp;
    tg.expand();

    let player, lyricsData = [], currentLineIdx = 0, score = 0;
    const input = document.getElementById('userInput');

    async function initGame() {
        const snap = await getDocs(collection(db, "tracklist"));
        const tracks = snap.docs.map(d => d.data());
        const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];

        lyricsData = randomTrack.lyrics.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), txt: m[3].trim() } : null;
        }).filter(x => x && x.txt);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player', {
                height: '100%', width: '100%', 
                videoId: randomTrack.youtubeId,
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
                events: { 'onStateChange': (e) => {
                    if(e.data == 1) setInterval(gameLoop, 100);
                }}
            });
        };
    }

    function gameLoop() {
        const now = player.getCurrentTime();
        const line = lyricsData.find((l, i) => l.t <= now && i >= currentLineIdx);

        if(line) {
            const words = line.txt.split(' ');
            const hiddenWord = words.pop(); // Oxirgi so'zni yashiramiz
            document.getElementById('lyric-display').innerText = words.join(' ') + " ...";

            input.oninput = () => {
                if(input.value.toLowerCase().trim() === hiddenWord.toLowerCase().trim()) {
                    score += 10;
                    document.getElementById('score-view').innerText = "Ball: " + score;
                    input.value = "";
                    currentLineIdx++;
                    tg.HapticFeedback.impactOccurred('medium'); // Vibratsiya
                }
            };
        }
    }

    initGame();
</script>
</body>
</html>
