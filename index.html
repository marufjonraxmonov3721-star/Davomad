<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Video Maker</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #333; }
        h2 { color: #00f2ff; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00f2ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .note { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Video Maker</h2>
    <input type="text" id="chatId" placeholder="Telegram Chat ID (masalan: 12345678)">
    <textarea id="lrcInput" rows="10" placeholder="[00:03.15]Muhabbat yomon ekan..."></textarea>
    <button onclick="sendRequest()">VIDEONI YARATISH</button>
    <p class="note">Video tayyor bo'lgach, botingizga yuboriladi.</p>
</div>

<script>
    async function sendRequest() {
        const chatId = document.getElementById('chatId').value;
        const lrc = document.getElementById('lrcInput').value;

        if(!chatId || !lrc) return alert("Ma'lumotlarni to'ldiring!");

        const response = await fetch('http://localhost:8080/api/video/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chatId: chatId, lyrics: lrc })
        });

        if(response.ok) alert("So'rov yuborildi! Kuting...");
        else alert("Xatolik yuz berdi!");
    }
</script>

</body>
</html>
