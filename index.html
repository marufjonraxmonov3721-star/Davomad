<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | Creative Lyrics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Pacifico&family=Playfair+Display:ital,wght@1,900&family=Roboto+Mono:wght@700&family=Space+Grotesk:wght@700&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --bg-color: #0c0c0e;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: #fff; 
            margin: 0; padding: 0;
            overflow-x: hidden; padding-bottom: 100px;
        }

        .header {
            padding: 25px 20px; text-align: left;
            background: rgba(12, 12, 14, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h1 { margin: 0; font-size: 26px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 0; font-size: 13px; color: #a1a1aa; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 28px; padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #e4e4e7; }

        /* Grids for Selection */
        .selection-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .select-btn { 
            background: #1f1f23; border: 1px solid #333; color: #fff; padding: 12px; 
            border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.2s;
            text-align: center;
        }
        .select-btn.active { border-color: #bc1888; background: rgba(188, 24, 136, 0.1); }

        .color-selector { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .color-option { 
            min-width: 65px; height: 90px; border-radius: 18px; cursor: pointer; 
            border: 2.5px solid transparent; transition: 0.3s;
        }
        .color-option.active { border-color: #fff; transform: scale(1.05); }

        input[type="file"] { display: none; }
        .file-label {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #1f1f23; padding: 16px; border-radius: 18px; cursor: pointer;
            margin-bottom: 12px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .offset-controls { display: flex; align-items: center; justify-content: space-between; background: #09090b; padding: 10px; border-radius: 14px; }
        .offset-btn { background: #27272a; border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        .trim-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; }
        .input-group { display: flex; flex-direction: column; flex: 1; margin-bottom: 15px; }
        .input-group span { font-size: 11px; color: #71717a; margin-bottom: 5px; }

        .range-input { width: 100%; padding: 5px; cursor: pointer; accent-color: #bc1888; }

        .preview-wrapper {
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 30px; overflow: hidden; margin-top: 10px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }
        canvas { width: 100%; height: 100%; display: block; }

        .player-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .control-circle {
            width: 50px; height: 50px; border-radius: 50%; background: #1f1f23;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-main {
            width: 100%; padding: 20px; background: var(--primary-gradient);
            color: white; border: none; border-radius: 20px; margin-top: 30px;
            font-weight: 700; font-size: 17px; cursor: pointer; transition: 0.3s;
        }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(12, 12, 14, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 18px 0;
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000;
        }
        .nav-item { color: #52525b; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-item.active { color: #bc1888; }

        #status { margin-top: 18px; text-align: center; font-size: 14px; color: #bc1888; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1>InstaCaption</h1>
        <p>Professional Lyric Studio</p>
    </div>

    <div class="container">
        <div class="preview-wrapper">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
        </div>

        <div class="player-controls">
            <div class="control-circle" id="prevBtn"><i class="fa-solid fa-backward"></i></div>
            <div class="control-circle" id="playBtn" style="background: #bc1888;"><i class="fa-solid fa-play"></i></div>
            <div class="control-circle" id="stopBtn"><i class="fa-solid fa-stop"></i></div>
        </div>

        <div class="glass-card" style="margin-top: 25px;">
            <label><i class="fa-solid fa-font"></i> Shriftni tanlang (10 xil)</label>
            <div class="selection-grid" id="fontGrid">
                <button class="select-btn active" onclick="setFont('SF Pro Display')">Modern Sans</button>
                <button class="select-btn" style="font-family: 'Montserrat';" onclick="setFont('Montserrat')">Bold Impact</button>
                <button class="select-btn" style="font-family: 'Bebas Neue';" onclick="setFont('Bebas Neue')">Tall Movie</button>
                <button class="select-btn" style="font-family: 'Dancing Script';" onclick="setFont('Dancing Script')">Handwritten</button>
                <button class="select-btn" style="font-family: 'Playfair Display';" onclick="setFont('Playfair Display')">Luxury Serif</button>
                <button class="select-btn" style="font-family: 'Anton';" onclick="setFont('Anton')">Heavy Block</button>
                <button class="select-btn" style="font-family: 'Pacifico';" onclick="setFont('Pacifico')">Retro Vibe</button>
                <button class="select-btn" style="font-family: 'Space Grotesk';" onclick="setFont('Space Grotesk')">Cyberpunk</button>
                <button class="select-btn" style="font-family: 'Roboto Mono';" onclick="setFont('Roboto Mono')">Typewriter</button>
                <button class="select-btn" style="font-family: 'Unbounded';" onclick="setFont('Unbounded')">Future Bold</button>
            </div>
        </div>

        <div class="glass-card">
            <label><i class="fa-solid fa-wand-magic-sparkles"></i> Effektlar (10 xil)</label>
            <div class="selection-grid" id="effectGrid">
                <button class="select-btn active" onclick="setEffect('fade')">Smooth Fade</button>
                <button class="select-btn" onclick="setEffect('zoom')">Zoom In</button>
                <button class="select-btn" onclick="setEffect('neon')">Neon Glow</button>
                <button class="select-btn" onclick="setEffect('glitch')">Glitch Art</button>
                <button class="select-btn" onclick="setEffect('slide')">Slide Up</button>
                <button class="select-btn" onclick="setEffect('blur')">Focus Blur</button>
                <button class="select-btn" onclick="setEffect('shake')">Bass Shake</button>
                <button class="select-btn" onclick="setEffect('rainbow')">RGB Wave</button>
                <button class="select-btn" onclick="setEffect('karaoke')">Karaoke Fill</button>
                <button class="select-btn" onclick="setEffect('shadow')">Deep Shadow</button>
            </div>
        </div>

        <div class="glass-card">
            <label><i class="fa-solid fa-palette"></i> Fon va Media</label>
            <div class="color-selector">
                <div class="color-option active" style="background: #000;" data-c1="#000000" data-c2="#1a1a1a"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #1e3c72, #2a5298);" data-c1="#1e3c72" data-c2="#2a5298"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #8e2de2, #4a00e0);" data-c1="#8e2de2" data-c2="#4a00e0"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #11998e, #38ef7d);" data-c1="#11998e" data-c2="#38ef7d"></div>
            </div>

            <label for="imageUpload" class="file-label"><i class="fa-solid fa-image"></i> <span id="imageName">Fon rasmi</span></label>
            <input type="file" id="imageUpload" accept="image/*">
            
            <label for="audioUpload" class="file-label"><i class="fa-solid fa-music"></i> <span id="audioName">Qo'shiq (.mp3)</span></label>
            <input type="file" id="audioUpload" accept="audio/*">

            <label for="lrcUpload" class="file-label"><i class="fa-solid fa-file-lines"></i> <span id="lrcName">LRC matn</span></label>
            <input type="file" id="lrcUpload" accept=".lrc">
            
            <div class="offset-controls">
                <button class="offset-btn" onclick="adj(-0.2)">-0.2s</button>
                <span id="offsetVal" style="font-weight: bold;">0.0s</span>
                <button class="offset-btn" onclick="adj(0.2)">+0.2s</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="input-group">
                <span>Shrift o'lchami: <b id="fsVal">65px</b></span>
                <input type="range" id="fontSize" class="range-input" min="30" max="150" value="65">
            </div>
            <div class="input-group">
                <span>Matn pozitsiyasi: <b id="tpVal">50%</b></span>
                <input type="range" id="textPos" class="range-input" min="0.1" max="0.9" step="0.01" value="0.5">
            </div>
            <div class="trim-box">
                <div class="input-group">
                    <span>Boshlanish: <b id="stVal">0s</b></span>
                    <input type="range" id="startTime" class="range-input" min="0" max="100" step="0.1" value="0">
                </div>
                <div class="input-group">
                    <span>Davomiyligi: <b id="drVal">15s</b></span>
                    <input type="range" id="duration" class="range-input" min="5" max="60" step="1" value="15">
                </div>
            </div>
        </div>

        <div id="status"></div>
        <button class="btn-main" id="renderBtn">VIDEONI TAYYORLASH VA YUBORISH</button>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-film"></i>Studio</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-wand-magic"></i>AI Edit</a>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const audioEl = new Audio();
    audioEl.crossOrigin = "anonymous";

    let lyrics = [];
    let lrcOffset = 0;
    let currentFont = "SF Pro Display";
    let currentEffect = "fade";
    let bgImg = null;
    let bgColor1 = "#000000", bgColor2 = "#1a1a1a";
    let isRendering = false;

    // Helpers
    const $ = id => document.getElementById(id);
    const setFont = f => { currentFont = f; document.querySelectorAll('#fontGrid .select-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(f) || b.style.fontFamily.includes(f))); };
    const setEffect = e => { currentEffect = e; document.querySelectorAll('#effectGrid .select-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(e))); };
    const adj = v => { lrcOffset += v; $('offsetVal').innerText = lrcOffset.toFixed(1)+'s'; };

    // Inputs
    $('fontSize').oninput = () => $('fsVal').innerText = $('fontSize').value + 'px';
    $('textPos').oninput = () => $('tpVal').innerText = Math.round($('textPos').value * 100) + '%';
    $('startTime').oninput = () => { $('stVal').innerText = $('startTime').value + 's'; audioEl.currentTime = parseFloat($('startTime').value); };
    $('duration').oninput = () => $('drVal').innerText = $('duration').value + 's';

    // File Handlers
    $('audioUpload').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            audioEl.src = URL.createObjectURL(file);
            audioEl.onloadedmetadata = () => { $('startTime').max = audioEl.duration; };
            $('audioName').innerText = file.name.slice(0,20);
        }
    };

    $('imageUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { bgImg = new Image(); bgImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
        $('imageName').innerText = e.target.files[0].name.slice(0,15);
    };

    $('lrcUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const lines = ev.target.result.split('\n');
            lyrics = [];
            lines.forEach(l => {
                const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if(m) lyrics.push({ time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() });
            });
            $('lrcName').innerText = e.target.files[0].name;
        };
        reader.readAsText(e.target.files[0]);
    };

    document.querySelectorAll('.color-option').forEach(o => {
        o.onclick = () => {
            document.querySelectorAll('.color-option').forEach(x => x.classList.remove('active'));
            o.classList.add('active');
            bgColor1 = o.dataset.c1; bgColor2 = o.dataset.c2; bgImg = null;
        }
    });

    // Player
    $('playBtn').onclick = () => { if(audioEl.paused) audioEl.play(); else audioEl.pause(); };
    $('stopBtn').onclick = () => { audioEl.pause(); audioEl.currentTime = parseFloat($('startTime').value); };

    // Drawing Engine
    function draw() {
        ctx.clearRect(0,0,1080,1920);
        
        // BG
        if(bgImg) {
            ctx.drawImage(bgImg, 0, 0, 1080, 1920);
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fillRect(0,0,1080,1920);
        } else {
            const g = ctx.createLinearGradient(0,0,0,1920);
            g.addColorStop(0, bgColor1); g.addColorStop(1, bgColor2);
            ctx.fillStyle = g; ctx.fillRect(0,0,1080,1920);
        }

        const now = audioEl.currentTime - lrcOffset;
        let activeIdx = -1;
        lyrics.forEach((l, i) => { if(now >= l.time) activeIdx = i; });

        if(activeIdx >= 0) {
            const lyric = lyrics[activeIdx];
            const nextTime = lyrics[activeIdx+1] ? lyrics[activeIdx+1].time : lyric.time + 3;
            const progress = (now - lyric.time) / (nextTime - lyric.time);
            
            ctx.textAlign = "center";
            ctx.fillStyle = "white";
            const fs = parseInt($('fontSize').value);
            ctx.font = `bold ${fs}px "${currentFont}"`;
            
            const x = 540;
            const y = 1920 * parseFloat($('textPos').value);

            ctx.save();
            applyEffect(currentEffect, progress, x, y, lyric.text);
            ctx.restore();
        }
        requestAnimationFrame(draw);
    }

    function applyEffect(eff, p, x, y, txt) {
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        switch(eff) {
            case 'fade':
                ctx.globalAlpha = p < 0.2 ? p*5 : (p > 0.8 ? (1-p)*5 : 1);
                ctx.fillText(txt, x, y);
                break;
            case 'zoom':
                const s = 0.8 + (p * 0.4);
                ctx.translate(x, y); ctx.scale(s, s);
                ctx.fillText(txt, 0, 0);
                break;
            case 'neon':
                ctx.shadowColor = "#bc1888";
                ctx.shadowBlur = 20 + Math.sin(Date.now()/200)*10;
                ctx.fillText(txt, x, y);
                break;
            case 'glitch':
                if(Math.random() > 0.9) {
                    ctx.fillStyle = "#ff00ff"; ctx.fillText(txt, x+5, y);
                    ctx.fillStyle = "#00ffff"; ctx.fillText(txt, x-5, y);
                }
                ctx.fillStyle = "white"; ctx.fillText(txt, x, y);
                break;
            case 'slide':
                ctx.fillText(txt, x, y + (1-p)*50);
                break;
            case 'blur':
                const b = p < 0.2 ? (0.2-p)*100 : 0;
                ctx.filter = `blur(${b}px)`;
                ctx.fillText(txt, x, y);
                break;
            case 'shake':
                const sh = Math.sin(Date.now()/50)*5;
                ctx.fillText(txt, x + sh, y + sh);
                break;
            case 'rainbow':
                const h = (Date.now()/20) % 360;
                ctx.fillStyle = `hsl(${h}, 100%, 70%)`;
                ctx.fillText(txt, x, y);
                break;
            case 'karaoke':
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.fillText(txt, x, y);
                ctx.save();
                const tw = ctx.measureText(txt).width;
                ctx.beginPath();
                ctx.rect(x - tw/2, y - 200, tw * p, 400);
                ctx.clip();
                ctx.fillStyle = "white";
                ctx.fillText(txt, x, y);
                ctx.restore();
                break;
            case 'shadow':
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillText(txt, x+10, y+10);
                ctx.fillStyle = "white";
                ctx.fillText(txt, x, y);
                break;
        }
    }

    draw();

    $('renderBtn').onclick = async () => {
        if(!audioEl.src || lyrics.length === 0) return tg.showAlert("Fayllarni yuklang!");
        isRendering = true;
        $('status').innerText = "Video tayyorlanmoqda (Render)...";
        
        audioEl.pause();
        audioEl.currentTime = parseFloat($('startTime').value);
        
        const stream = canvas.captureStream(60);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 5000000 });
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const fd = new FormData();
            fd.append('chat_id', tg.initDataUnsafe.user?.id);
            fd.append('video', blob, 'video.mp4');
            
            $('status').innerText = "Telegramga yuborilmoqda...";
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: 'POST', body: fd });
            $('status').innerText = "Tayyor! ✅";
            isRendering = false;
        };

        recorder.start();
        audioEl.play();
        setTimeout(() => { recorder.stop(); audioEl.pause(); }, parseFloat($('duration').value)*1000);
    };
</script>
</body>
</html>
