<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Maker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: var(--tg-theme-button-color, #2481cc);
        }

        .preview-box {
            width: 100%;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            text-align: center;
            padding: 10px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .caption-text {
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 1.2rem;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Caption Ilovasi</h2>
    
    <div class="preview-box" id="preview">
        <span class="caption-text" id="output">Sizning matningiz bu yerda ko'rinadi</span>
    </div>

    <textarea id="captionInput" placeholder="Matnni kiriting..."></textarea>
    
    <button class="btn" id="sendBtn">Botga yuborish</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const input = document.getElementById('captionInput');
    const output = document.getElementById('output');
    const sendBtn = document.getElementById('sendBtn');

    // Ilovani kengaytirish
    tg.expand();

    // Matnni real vaqtda ko'rsatish
    input.addEventListener('input', () => {
        output.innerText = input.value || "Sizning matningiz bu yerda ko'rinadi";
    });

    // Ma'lumotni botga yuborish
    sendBtn.addEventListener('click', () => {
        const data = {
            caption: input.value
        };
        tg.sendData(JSON.stringify(data)); // Botga JSON formatda yuboradi
        tg.close(); // Ilovani yopish
    });
</script>

</body>
</html>
