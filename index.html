<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Quiz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 90%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .vinyl { width: 150px; height: 150px; margin: 20px auto; background: radial-gradient(circle, #333 5%, #111 30%, #000 100%); border-radius: 50%; border: 4px solid #222; display: flex; align-items: center; justify-content: center; }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .options-grid { display: grid; gap: 10px; margin-top: 20px; }
        .option-btn { background: #222; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 15px; cursor: pointer; }
        .correct { background: var(--primary) !important; color: #000 !important; font-weight: bold; }
        .wrong { background: #ff3e3e !important; }
        #start-screen { position: absolute; inset: 0; background: var(--card); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="start-screen">
        <h1 style="color:var(--primary); margin-bottom:20px;">SongLyrics</h1>
        <button onclick="startGame()" style="background:var(--primary); border:none; padding:15px 40px; border-radius:12px; font-weight:bold; font-size:18px;">BOSHLASH</button>
    </div>
    <div id="quiz-screen">
        <div style="display:flex; justify-content:space-between; font-size:14px; color:var(--primary);">
            <span id="score">Ball: 0</span> <span id="timer" style="color:#ff3e3e">15</span>
        </div>
        <div class="vinyl" id="disc"><div style="width:35px;height:35px;background:var(--primary);border-radius:50%;border:5px solid #000;"></div></div>
        <p id="status" style="color:#888; font-size:13px;">Tayyorlaning...</p>
        <div id="yt-player" style="position:absolute; visibility:hidden;"></div>
        <div class="options-grid" id="options-box"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    let questions = [], currentIdx = 0, score = 0, timerInterval;
    let audio = new Audio();
    let ytPlayer, ytReady = false;

    window.onYouTubeIframeAPIReady = () => {
        ytPlayer = new YT.Player('yt-player', {
            events: { 'onStateChange': (e) => {
                if(e.data == YT.PlayerState.PLAYING) { 
                    document.getElementById('disc').classList.add('spinning');
                    startTimer();
                }
            }}
        });
    };

    window.startGame = () => {
        document.getElementById('start-screen').style.display = 'none';
        audio.play().catch(() => {});
        init();
    };

    async function init() {
        const s = await get(ref(db, 'questions'));
        if(s.exists()) {
            questions = Object.values(s.val()).sort(() => 0.5 - Math.random());
            loadRound();
        }
    }

    async function loadRound() {
        if(currentIdx >= questions.length) return alert("Tamom! Ball: " + score) || location.reload();
        const q = questions[currentIdx];
        const status = document.getElementById('status');
        const optionsBox = document.getElementById('options-box');
        const disc = document.getElementById('disc');

        optionsBox.innerHTML = "";
        disc.classList.remove('spinning');
        audio.pause();
        if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

        let loaded = false;
        status.innerText = "Qidirilmoqda...";

        // YouTube ustuvor
        if(q.youtube_id) {
            ytPlayer.loadVideoById({ videoId: q.youtube_id, startSeconds: 40 });
            status.innerText = "YouTube yuklanmoqda...";
            loaded = true;
        } else {
            try {
                // iTunes Search API - Eng mosini qidirish
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q.search_term)}&limit=1&entity=song`);
                const data = await res.json();
                if(data.results[0]) {
                    audio.src = data.results[0].previewUrl;
                    await audio.play();
                    disc.classList.add('spinning');
                    startTimer();
                    status.innerText = "Eshiting...";
                    loaded = true;
                }
            } catch(e) {}
        }

        if(!loaded) {
            push(ref(db, 'errors'), { song: q.search_term, time: new Date().toLocaleTimeString() });
            status.innerText = "Topilmadi, o'tkazildi...";
            setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            return;
        }

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                if(i === q.correct) {
                    btn.classList.add('correct');
                    score += 10;
                    document.getElementById('score').innerText = "Ball: " + score;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    btn.classList.add('wrong');
                    btns[q.correct].classList.add('correct');
                    tg.HapticFeedback.notificationOccurred('error');
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            };
            optionsBox.appendChild(btn);
        });
    }

    function startTimer() {
        let t = 15;
        document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timerInterval); currentIdx++; loadRound(); }
        }, 1000);
    }
</script>
</body>
</html>
