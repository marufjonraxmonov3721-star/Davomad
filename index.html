<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editor Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        video, canvas { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: none; background: #2c2c2e; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #2481cc; color: white; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        #previewCanvas { display: block; background: #000; }
    </style>
</head>
<body>

<div class="card">
    <h2>Caption & Music Editor</h2>
    
    <label>Video tanlang:</label>
    <input type="file" id="videoUpload" accept="video/*">

    <label>Muzika tanlang:</label>
    <input type="file" id="audioUpload" accept="audio/*">

    <div style="display: flex; gap: 10px;">
        <input type="number" id="startTime" placeholder="Boshlanishi (sek)" value="0">
        <input type="number" id="duration" placeholder="Davomiyligi" value="15">
    </div>

    <textarea id="captionInput" placeholder="Video ustidagi matnni yozing..."></textarea>

    <canvas id="previewCanvas" width="640" height="360"></canvas>
    
    <button class="btn" id="renderBtn">Videoni Saqlash / Yuborish</button>
    <p id="status"></p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const videoInput = document.getElementById('videoUpload');
    const audioInput = document.getElementById('audioUpload');
    const captionInput = document.getElementById('captionInput');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let videoEl = document.createElement('video');
    let audioEl = new Audio();

    // Video tanlanganda
    videoInput.onchange = (e) => {
        const file = e.target.files[0];
        videoEl.src = URL.createObjectURL(file);
        videoEl.muted = true;
        videoEl.play();
        drawFrame();
    };

    // Canvasga matn va videoni chizish
    function drawFrame() {
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        
        // Matn sozlamalari
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.shadowBlur = 7;
        ctx.shadowColor = "black";
        
        const text = captionInput.value;
        ctx.fillText(text, canvas.width / 2, canvas.height - 50);

        requestAnimationFrame(drawFrame);
    }

    // Videoni generatsiya qilish va saqlash
    document.getElementById('renderBtn').onclick = () => {
        status.innerText = "Tayyorlanmoqda... (Brauzerda ishlov berilyapti)";
        
        // Bu yerda MediaRecorder orqali canvashni videoga aylantirish mumkin
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream);
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            // Yuklab olish uchun havola yaratish
            const a = document.createElement('a');
            a.href = url;
            a.download = "caption_video.mp4";
            a.click();
            
            status.innerText = "Tayyor! Video yuklab olindi.";
        };

        recorder.start();
        videoEl.currentTime = 0;
        videoEl.play();

        // Belgilangan vaqtdan keyin to'xtatish
        const duration = document.getElementById('duration').value * 1000;
        setTimeout(() => {
            recorder.stop();
            videoEl.pause();
        }, duration);
    };
</script>

</body>
</html>
