<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRC Caption Maker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent-color: #ff5722; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 15px; margin: 0; }
        
        .preview-area {
            width: 100%; height: 250px; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px; background: #1a1a1a; border: 2px solid #333;
            overflow: hidden; position: relative;
        }

        #caption-display { padding: 20px; font-size: 22px; font-weight: bold; z-index: 2; word-wrap: break-word; }

        /* Matn Stillari */
        .style-classic { color: white; text-shadow: 2px 2px 5px #000; }
        .style-neon { color: #fff; text-shadow: 0 0 10px #0088cc, 0 0 20px #0088cc; }
        .style-minimal { letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }
        .style-bold { font-size: 30px; font-weight: 900; color: #ffcc00; font-style: italic; }
        .style-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); border-radius: 10px; padding: 10px; }

        .controls { background: #181818; padding: 20px; border-radius: 15px; text-align: left; margin-bottom: 50px; }
        .section-title { font-size: 16px; font-weight: bold; color: var(--accent-color); margin: 15px 0 10px; border-left: 3px solid var(--accent-color); padding-left: 10px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #252525; color: white; border: 1px solid #333; box-sizing: border-box; }
        .btn-main { background: var(--accent-color); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-main:disabled { background: #444; }
        audio { width: 100%; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="preview-area" id="preview-box">
        <div id="caption-display" class="style-classic">Tayyor...</div>
    </div>

    <div class="controls">
        <div class="section-title">FAYLLAR</div>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <div class="section-title">QIRQISH (SONIYA)</div>
        <div style="display:flex; gap:10px;">
            <input type="number" id="start-time" value="0">
            <input type="number" id="end-time" value="0">
        </div>

        <div class="section-title">DIZAYN</div>
        <select id="style-select">
            <option value="style-classic">Klassik</option>
            <option value="style-neon">Neon</option>
            <option value="style-minimal">Minimal</option>
            <option value="style-bold">Qalin</option>
            <option value="style-glass">Oyna</option>
        </select>
        <input type="color" id="bg-color" value="#1a1a1a">

        <audio id="audio-player" controls crossorigin="anonymous"></audio>
        
        <button class="btn-main" id="save-btn" onclick="startExport()">SAQLASH (MP4)</button>
    </div>

<script>
    let lyrics = [];
    let mediaRecorder;
    let recordedChunks = [];
    const tg = window.Telegram.WebApp;
    const audio = document.getElementById('audio-player');
    const display = document.getElementById('caption-display');
    const saveBtn = document.getElementById('save-btn');

    document.getElementById('style-select').onchange = (e) => display.className = e.target.value;
    document.getElementById('bg-color').oninput = (e) => document.getElementById('preview-box').style.backgroundColor = e.target.value;

    document.getElementById('audio-input').onchange = (e) => {
        audio.src = URL.createObjectURL(e.target.files[0]);
        audio.onloadedmetadata = () => document.getElementById('end-time').value = Math.floor(audio.duration);
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x && x.text);
            display.innerText = "LRC Yuklandi!";
        };
        reader.readAsText(e.target.files[0]);
    };

    audio.ontimeupdate = () => {
        const active = lyrics.findLast(l => audio.currentTime >= l.t);
        if (active) display.innerText = active.text;
        
        if (audio.currentTime >= document.getElementById('end-time').value) {
            audio.pause();
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        }
    };

    async function startExport() {
        if (!audio.src) return tg.showAlert("Musiqa yo'q!");
        
        recordedChunks = [];
        const start = parseFloat(document.getElementById('start-time').value);
        audio.currentTime = start;
        
        // Preview div-dan stream olish
        const stream = document.getElementById('preview-box').captureStream(30);
        
        // Audio streamni qo'shish (Xavfsiz usul)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audio);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));

        try {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        } catch (e) {
            mediaRecorder = new MediaRecorder(stream); // iPhone uchun oddiy format
        }

        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            // Yuklab olishni majburiy qilish
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `video_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            
            // Telegram orqali ham havola berish
            tg.showAlert("Video tayyor! Agar yuklanish boshlanmasa, brauzerda qayta tekshiring.");
            saveBtn.innerText = "SAQLASH (MP4)";
            saveBtn.disabled = false;
        };

        mediaRecorder.start();
        audio.play();
        saveBtn.disabled = true;
        saveBtn.innerText = "Yozilmoqda...";
    }

    tg.ready();
</script>
</body>
</html>
