<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; --nav: #1a1a1a; --danger: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }
        
        #loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { display: flex; align-items: center; gap: 5px; height: 50px; }
        .bar { width: 8px; height: 20px; background: var(--primary); border-radius: 10px; animation: scaleY 1s infinite ease-in-out; }
        @keyframes scaleY { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }

        #app-container { height: 100vh; display: none; flex-direction: column; }
        .page { flex: 1; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        .game-card { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .vinyl { width: 140px; height: 140px; margin: 15px auto; background: radial-gradient(circle, #333 5%, #111 30%, #000 100%); border-radius: 50%; border: 5px solid #222; position: relative; }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Lyrics Animation */
        #lyrics-display { min-height: 50px; margin: 15px 0; color: var(--primary); font-style: italic; font-size: 16px; font-weight: 500; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .option-btn, .start-btn { background: #222; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 12px; margin-top: 10px; width: 100%; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        .start-btn { background: var(--primary); color: #000; border: none; font-size: 18px; padding: 18px; }
        .correct { background: var(--primary) !important; color: #000 !important; }
        .wrong { background: var(--danger) !important; }

        .lives-container { font-size: 18px; color: var(--danger); letter-spacing: 2px; }

        #result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .result-card { background: var(--card); border: 1px solid #333; width: 100%; max-width: 350px; border-radius: 30px; padding: 40px 20px; text-align: center; position: relative; }
        
        .leaderboard-card { width: 100%; max-width: 400px; height: 80vh; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; overflow-y: auto; }
        .rank-item { display: flex; align-items: center; background: #222; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); }
        .rank-name { flex: 1; font-size: 14px; margin-left: 10px; }
        .rank-score { font-weight: bold; color: var(--primary); }

        .nav-bar { height: 70px; background: var(--nav); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: #555; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .hidden-nav { display: none; }
    </style>
</head>
<body>

<div id="offline-notice">⚠️ Internet aloqasi yo'q!</div>

<div id="loading-screen">
    <div class="loader"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <h1 style="color:var(--primary); margin-top:20px;">SongLyrics</h1>
</div>

<div id="result-modal">
    <div class="result-card">
        <h1 id="result-title" style="color:var(--primary); margin-bottom:10px;">O'yin tugadi!</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 800; color: #fff; margin-bottom: 30px;">0</div>
        <button class="start-btn" onclick="restartGame()">QAYTA O'YNASH</button>
    </div>
</div>

<div id="app-container">
    <div id="page-game" class="page active-page">
        <div class="game-card">
            <div id="game-ui" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items: center; font-size:14px; color:var(--primary); font-weight:bold;">
                    <span id="score">BALL: 0</span>
                    <div id="lives" class="lives-container">❤️❤️❤️</div>
                    <span id="timer">15</span>
                </div>
                <div class="vinyl" id="disc"><div style="position:absolute; inset:50px; background:var(--primary); border-radius:50%; border:5px solid #000;"></div></div>
                
                <div id="lyrics-display">🎵 Musiqa eshitilmoqda...</div>
                
                <div id="options-box"></div>
            </div>
            
            <div id="pre-game">
                <h2 style="margin-bottom:10px;">Tayyormisiz?</h2>
                <p style="color:#666; margin-bottom:20px;">Qo'shiqning aytadigan joyini toping!</p>
                <button class="start-btn" onclick="startGame()">BOSHLASH</button>
            </div>
        </div>
    </div>

    <div id="page-rank" class="page">
        <div class="leaderboard-card">
            <h2 style="color:var(--primary); text-align:center; margin-bottom:20px;">TOP O'YINCHILAR</h2>
            <div id="rank-list"></div>
        </div>
    </div>

    <nav class="nav-bar" id="bottom-nav">
        <div class="nav-item active" onclick="showPage('game', this)"><span>🎮 O'yin</span></div>
        <div class="nav-item" onclick="showPage('rank', this)"><span>🏆 Reyting</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        dbURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Mehmon" };
    let questions = [], currentIdx = 0, score = 0, lives = 3, timerInterval, audio = new Audio();
    let isPlaying = false;

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }, 2000);
    };

    window.startGame = () => {
        isPlaying = true;
        document.getElementById('bottom-nav').classList.add('hidden-nav');
        document.getElementById('pre-game').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        initGame();
    };

    async function initGame() {
        const snap = await get(ref(db, 'questions'));
        if(snap.exists()) {
            questions = Object.values(snap.val()).sort(() => 0.5 - Math.random());
            loadRound();
        }
    }

    async function loadRound() {
        if(!isPlaying || lives <= 0) { endGame(true); return; }
        if(currentIdx >= questions.length) { endGame(false); return; }
        
        const q = questions[currentIdx];
        const optionsBox = document.getElementById('options-box');
        const lyricsBox = document.getElementById('lyrics-display');
        const disc = document.getElementById('disc');

        optionsBox.innerHTML = "";
        disc.classList.remove('spinning');
        audio.pause();
        lyricsBox.innerText = "Yuklanmoqda...";

        const musicUrl = await fetchMusic(q.search_term);
        if(musicUrl) {
            audio.src = musicUrl;
            audio.oncanplaythrough = () => {
                // 1-O'ZGARTIRISH: Qo'shiqni o'rtasidan boshlash (preview 30 sek bo'lsa, 5-10 sekdan boshlaydi)
                if (audio.duration > 10) {
                    audio.currentTime = Math.floor(Math.random() * 10) + 5;
                }
                audio.play();
                disc.classList.add('spinning');
                startTimer(15);
                
                // 2-O'ZGARTIRISH: Matnni ko'rsatish
                // Agar Firebase'da 'lyrics' maydoni bo'lsa uni ko'rsatadi, bo'lmasa standart matn
                lyricsBox.innerText = q.lyrics || "🎶 Qo'shiqni topishga harakat qiling...";
            };
        } else {
            currentIdx++; loadRound(); return;
        }

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                if(i === q.correct) {
                    btn.classList.add('correct'); score += 10;
                    document.getElementById('score').innerText = "BALL: " + score;
                } else {
                    btn.classList.add('wrong'); lives--;
                    updateLivesUI();
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            };
            optionsBox.appendChild(btn);
        });
    }

    function updateLivesUI() {
        document.getElementById('lives').innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
    }

    async function fetchMusic(term) {
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=1&entity=song`);
            const data = await res.json();
            return data.results[0]?.previewUrl;
        } catch (e) { return null; }
    }

    function startTimer(t) {
        document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timerInterval); lives--; updateLivesUI(); currentIdx++; loadRound(); }
        }, 1000);
    }

    function endGame(isGameOver) {
        isPlaying = false;
        document.getElementById('bottom-nav').classList.remove('hidden-nav');
        audio.pause();
        saveScore();
        document.getElementById('final-score').innerText = score;
        document.getElementById('result-modal').style.display = 'flex';
    }

    window.restartGame = () => {
        location.reload();
    };

    async function saveScore() {
        if (score <= 0) return;
        const userRef = ref(db, `leaderboard/${user.id}`);
        await update(userRef, { name: user.first_name, score: score, id: user.id });
    }

    window.showPage = (pageId, el) => {
        if(isPlaying) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active-page');
        el.classList.add('active');
        if(pageId === 'rank') loadLeaderboard();
    };

    async function loadLeaderboard() {
        const listDiv = document.getElementById('rank-list');
        listDiv.innerHTML = "Yuklanmoqda...";
        const snap = await get(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10)));
        if(snap.exists()) {
            listDiv.innerHTML = "";
            const data = [];
            snap.forEach(c => { data.push(c.val()); });
            data.reverse().forEach((u, i) => {
                listDiv.innerHTML += `<div class="rank-item"><span>${i+1}</span><span class="rank-name">${u.name}</span><span class="rank-score">${u.score}</span></div>`;
            });
        }
    }
</script>
</body>
</html>
