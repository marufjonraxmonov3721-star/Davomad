<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Auto LRC Genius</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e676; --bg: #050505; --card: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; max-width: 500px; margin: 0 auto; }
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin: 10px 0; box-sizing: border-box; }
        
        .wave-container {
            height: 100px; display: flex; align-items: center; justify-content: center;
            background: #000; border-radius: 15px; margin: 15px 0; border: 2px solid var(--primary);
            position: relative; overflow: hidden;
        }
        .pulse-ring {
            position: absolute; width: 50px; height: 50px; border: 2px solid var(--primary);
            border-radius: 50%; animation: ripple 1.5s infinite;
        }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .btn-start { 
            background: var(--primary); color: #000; font-weight: 800; border: none; 
            width: 100%; padding: 18px; border-radius: 15px; cursor: pointer; font-size: 16px;
        }
        #current-word { font-size: 24px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
        #log { font-size: 11px; color: #666; margin-top: 10px; height: 50px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin: 0 0 10px;">Auto LRC AI</h2>
        <p style="font-size: 11px; color: #888;">AI qo'shiqni eshitadi va vaqtni belgilaydi</p>

        <input type="file" id="audio-file" accept="audio/*">
        <textarea id="lyrics-input" rows="5" placeholder="Matinni bu yerga tashlang..."></textarea>

        <div class="wave-container" id="visualizer">
            <div class="pulse-ring" id="pulse" style="display: none;"></div>
            <div id="current-word">Tayyor...</div>
        </div>

        <button class="btn-start" onclick="startAutoSync()">ESHTISHNI BOSHLASH</button>
        
        <div id="log">Tizim kutmoqda...</div>
        <button onclick="sendLrc()" style="margin-top: 15px; background: none; border: 1px solid #444; color: #888; padding: 8px; border-radius: 8px; width: 100%;">LRC faylni botga yuborish</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const audio = new Audio();
    let lyricsLines = [];
    let syncedLrc = [];
    let isListening = false;

    // Web Speech API - Nutqni aniqlash (Chrome va Android uchun)
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = Recognition ? new Recognition() : null;

    if (recognizer) {
        recognizer.continuous = true;
        recognizer.interimResults = true;
        recognizer.lang = 'uz-UZ'; // O'zbek tiliga sozlangan
    }

    document.getElementById('audio-file').onchange = (e) => {
        audio.src = URL.createObjectURL(e.target.files[0]);
    };

    function startAutoSync() {
        if (!recognizer) return alert("Brauzeringiz AI nutqni aniqlashni qo'llab-quvvatlamaydi.");
        if (!audio.src) return alert("Avval musiqa yuklang.");
        
        const text = document.getElementById('lyrics-input').value;
        lyricsLines = text.split('\n').filter(l => l.trim() !== "");
        
        if (lyricsLines.length === 0) return alert("Matn kiriting.");

        isListening = true;
        audio.play();
        recognizer.start();
        document.getElementById('pulse').style.display = 'block';
        document.getElementById('log').innerText = "AI musiqani tahlil qilmoqda...";
    }

    if (recognizer) {
        recognizer.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            document.getElementById('log').innerText = "Eshitildi: " + transcript;

            // Matn ichidan mos keladigan so'zni qidirish
            lyricsLines.forEach((line, index) => {
                if (transcript.includes(line.toLowerCase().split(' ')[0])) {
                    // Agar matndagi qator aytilgan bo'lsa, vaqtni muhrlaymiz
                    const time = audio.currentTime;
                    // Bir marta saqlanganini tekshirish
                    if (!syncedLrc.find(item => item.text === line)) {
                        syncedLrc.push({ t: time, text: line });
                        document.getElementById('current-word').innerText = line;
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            });
        };
    }

    function sendLrc() {
        if (syncedLrc.length === 0) return alert("Hali hech narsa sinxronlanmadi.");
        
        let lrcContent = "[ti:Auto LRC AI]\n";
        syncedLrc.sort((a,b) => a.t - b.t).forEach(item => {
            let m = Math.floor(item.t / 60);
            let s = (item.t % 60).toFixed(2);
            lrcContent += `[${m.toString().padStart(2, '0')}:${s.toString().padStart(5, '0')}]${item.text}\n`;
        });

        const blob = new Blob([lrcContent], { type: 'text/plain' });
        const fd = new FormData();
        fd.append('chat_id', '8533456947');
        fd.append('document', blob, "auto_lyrics.lrc");

        fetch(`https://api.telegram.org/bot8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw/sendDocument`, {
            method: 'POST',
            body: fd
        }).then(() => {
            tg.showConfirm("Avtomatik LRC botga yuborildi!");
        });
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
