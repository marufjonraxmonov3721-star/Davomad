<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Video Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 10px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 100%; padding: 12px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Video uchun Caption</h3>
        <p>Pastga video ostida chiqishi kerak bo'lgan matnni yozing:</p>
        <textarea id="captionText" placeholder="Matnni shu yerga yozing..."></textarea>
        <button id="sendData">Videoni Matn bilan yuborish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('sendData');
        const input = document.getElementById('captionText');

        tg.expand();

        btn.addEventListener('click', () => {
            const val = input.value.trim();
            if (val === "") {
                alert("Iltimos, matn kiriting!");
                return;
            }
            // Botga ma'lumot yuborish
            tg.sendData(val);
        });
    </script>
</body>
</html>
