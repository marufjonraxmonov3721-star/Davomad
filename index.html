<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Builder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
        }
        .app-card {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #222;
        }
        .upload-btn {
            background: #222;
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
            display: block;
            cursor: pointer;
        }
        audio { width: 100%; margin-bottom: 20px; }
        
        .line-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        .time-badge {
            background: #1DB954;
            color: #000;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add { background: #333; color: #fff; }
        .btn-done { background: #fff; color: #000; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-card">
    <label class="upload-btn" id="label">
        🎵 Qo'shiq yuklash (MP3)
        <input type="file" id="audioFile" accept="audio/*" style="display:none">
    </label>

    <audio id="player" controls></audio>

    <div id="lyricsArea">
        </div>

    <div class="controls">
        <button class="btn-add" onclick="addLine()">➕ Yangi qator qo'shish</button>
        <button class="btn-done" onclick="finishProject()">✅ Videoni tayyorlash</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const player = document.getElementById('player');
    const lyricsArea = document.getElementById('lyricsArea');
    const audioFile = document.getElementById('audioFile');

    audioFile.onchange = (e) => {
        const file = e.target.files[0];
        player.src = URL.createObjectURL(file);
        document.getElementById('label').innerText = "Fayl: " + file.name;
    };

    function addLine() {
        const currentTime = player.currentTime.toFixed(2);
        const div = document.createElement('div');
        div.className = 'line-input';
        div.innerHTML = `
            <div class="time-badge">${currentTime}s</div>
            <input type="text" placeholder="Matnni yozing..." class="lyric-text" data-time="${currentTime}">
        `;
        lyricsArea.appendChild(div);
    }

    function finishProject() {
        const lines = document.querySelectorAll('.line-input');
        let data = {
            fileName: audioFile.files[0] ? audioFile.files[0].name : "unknown",
            captions: []
        };

        lines.forEach(line => {
            const input = line.querySelector('.lyric-text');
            data.captions.push({
                time: input.getAttribute('data-time'),
                text: input.value
            });
        });

        if (data.captions.length === 0) {
            tg.showAlert("Hech bo'lmasa bitta qator yozing!");
            return;
        }

        // Barcha ma'lumotni Botga yuboramiz
        tg.sendData(JSON.stringify(data));
    }
</script>

</body>
</html>
