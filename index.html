<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Game & Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00f2ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Rejim tanlash */
        #menu { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: #000; }
        .mode-btn { width: 80%; padding: 20px; margin: 10px; border: 2px solid var(--blue); background: transparent; color: #fff; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* Video */
        #player-container { width: 100%; aspect-ratio: 16/9; background: #111; z-index: 10; position: relative; }

        /* O'yin maydoni (Piano tiles style) */
        #game-area { position: relative; flex: 1; width: 100%; height: calc(100vh - 200px); overflow: hidden; background: linear-gradient(to bottom, #000, #111); }
        .tile { position: absolute; width: 100%; text-align: center; color: var(--blue); font-size: 22px; font-weight: bold; transition: transform 0.1s linear; text-shadow: 0 0 10px rgba(0,242,255,0.5); }

        /* Lirik rejim (Oddiy) */
        #simple-lyrics { position: absolute; bottom: 50px; width: 100%; text-align: center; font-size: 24px; color: var(--blue); font-weight: bold; display: none; }

        /* Input qismi */
        #input-container { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #000; box-sizing: border-box; display: none; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 18px; text-align: center; outline: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: var(--blue);">SongLyrics</h1>
        <button class="mode-btn" onclick="startGame('listen')">🎧 SHUNCHAKI ESHITISH</button>
        <button class="mode-btn" onclick="startGame('game')">🎮 O'YIN REJIMI</button>
    </div>

    <div id="player-container">
        <div id="player"></div>
    </div>

    <div id="game-area">
        <div id="simple-lyrics"></div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="So'zni yozing..." autocomplete="off">
    </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        projectId: "songlyrics-a5df9",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const tg = window.Telegram.WebApp;
    let player, lyricsData = [], currentMode = '', activeTiles = [];

    window.startGame = async (mode) => {
        currentMode = mode;
        document.getElementById('menu').style.display = 'none';
        if(mode === 'game') document.getElementById('input-container').style.display = 'block';
        if(mode === 'listen') document.getElementById('simple-lyrics').style.display = 'block';

        const snap = await getDocs(collection(db, "tracklist"));
        const tracks = snap.docs.map(d => d.data());
        const track = tracks[Math.floor(Math.random() * tracks.length)];

        lyricsData = track.lyrics.split('\n').map(l => {
            const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), txt: m[3].trim(), used: false } : null;
        }).filter(x => x && x.txt);

        initPlayer(track.youtubeId);
    };

    function initPlayer(id) {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: id,
            playerVars: { 'autoplay': 1, 'controls': 0 },
            events: { 'onStateChange': (e) => {
                if(e.data == 1) setInterval(updateLoop, 100);
            }}
        });
    }

    function updateLoop() {
        const now = player.getCurrentTime();

        if(currentMode === 'listen') {
            const line = lyricsData.filter(l => l.t <= now).pop();
            if(line) document.getElementById('simple-lyrics').innerText = line.txt;
        } 
        else if(currentMode === 'game') {
            // Yangi tile qo'shish
            lyricsData.forEach(l => {
                if(l.t <= now + 2 && !l.used) { // 2 soniya oldin tusha boshlaydi
                    l.used = true;
                    createTile(l);
                }
            });
            moveTiles();
        }
    }

    function createTile(data) {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerText = data.txt;
        el.style.top = '-50px';
        document.getElementById('game-area').appendChild(el);
        activeTiles.push({ el, data, top: -50 });
    }

    function moveTiles() {
        activeTiles.forEach((tile, index) => {
            tile.top += 5; // Tushish tezligi
            tile.el.style.top = tile.top + 'px';

            // Agar juda pastga tushib ketsa yoki to'g'ri yozilsa
            if(tile.top > window.innerHeight - 250) {
                tile.el.remove();
                activeTiles.splice(index, 1);
            }
        });
    }

    // O'yin rejimi uchun input tekshiruvi
    document.getElementById('userInput').oninput = (e) => {
        const val = e.target.value.toLowerCase().trim();
        activeTiles.forEach((tile, index) => {
            if(tile.data.txt.toLowerCase().includes(val) && val.length > 3) {
                tile.el.style.color = '#00ff00';
                setTimeout(() => {
                    tile.el.remove();
                    activeTiles.splice(index, 1);
                    e.target.value = '';
                    tg.HapticFeedback.impactOccurred('light');
                }, 200);
            }
        });
    };
</script>
</body>
</html>
