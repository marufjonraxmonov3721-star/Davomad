<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border-radius: 20px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }

        #display-text { 
            font-size: 30px; font-weight: bold; color: var(--accent); 
            padding: 30px; line-height: 1.4; 
            text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease; 
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 400px; overflow-y: auto; }
        
        .trim-group, .select-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 140px; }

        input, button, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        input[type=range] { -webkit-appearance: none; background: #333; height: 8px; border: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; position: sticky; bottom: 0; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }

        /* Animatsiyalar uchun CSS klasslar */
        .anim-fade { animation: fadeIn 0.5s ease forwards; }
        .anim-zoom { animation: zoomIn 0.5s ease forwards; }
        .anim-slideUp { animation: slideUp 0.5s ease forwards; }
        .anim-rotate { animation: rotateIn 0.5s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-180deg); opacity: 0; } to { transform: rotate(0); opacity: 1; } }
        @keyframes bounceIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            50% { transform: scale(1.05); } 
            70% { transform: scale(0.9); } 
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1080"></canvas>

    <div class="controls">
        <label>Fayllarni yuklang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <div class="select-group">
            <div>
                <label>Matn hajmi:</label>
                <input type="range" id="font-size-slider" min="20" max="150" value="60" oninput="updateLivePreview()">
            </div>
            <div>
                <label>Shrift Stili:</label>
                <select id="font-style" onchange="updateLivePreview()">
                    <option value="sans-serif">Standart Sans</option>
                    <option value="serif">Klassik Serif</option>
                    <option value="monospace">Texno Mono</option>
                    <option value="cursive">Qo'lyozma</option>
                    <option value="Impact">Qalin Impact</option>
                    <option value="Georgia">Elegant Georgia</option>
                    <option value="Verdana">Aniq Verdana</option>
                    <option value="Comic Sans MS">Quvnoq Comic</option>
                    <option value="Trebuchet MS">Modern Trebuchet</option>
                    <option value="Courier New">Mashinka</option>
                    <option value="Arial Black">Og'ir Arial</option>
                    <option value="Lucida Console">Terminal</option>
                    <option value="Palatino">Aritokrat</option>
                    <option value="Garamond">Kitobiy</option>
                    <option value="Bookman">Qalin Bookman</option>
                    <option value="Avant Garde">Geometrik</option>
                    <option value="Helvetica">Minimalist</option>
                    <option value="Copperplate">Rasmiy</option>
                    <option value="Futura">Kosmik</option>
                    <option value="Optima">Yumshoq Optima</option>
                </select>
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Animatsiya:</label>
                <select id="anim-style" onchange="updateLivePreview()">
                    <option value="none">Oddiy almashish</option>
                    <option value="fade">Yumshoq paydo bo'lish</option>
                    <option value="zoom">Kattalashish</option>
                    <option value="slideUp">Yuqoriga surilish</option>
                    <option value="rotate">Aylanish</option>
                    <option value="bounce">Sakrash</option>
                    <option value="pulse">Yurak urishi</option>
                </select>
            </div>
            <div>
                <label>Fon Effekti:</label>
                <select id="effect-style" onchange="updateLivePreview()">
                    <option value="black">Toza qora</option>
                    <option value="neon">Neon nurlar</option>
                    <option value="gradient">Rivojlanuvchi rang</option>
                    <option value="vignette">Vinyetka</option>
                    <option value="scanline">TV chiziqlar</option>
                </select>
            </div>
        </div>

        <label>Qirqish oralig'i (soniyalarda):</label>
        <div class="trim-group">
            <div><input type="number" id="trim-start" value="0" step="0.1"></div>
            <div><input type="number" id="trim-end" value="30" step="0.1"></div>
        </div>

        <div id="status-text">Fayllarni tanlang</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">HD VIDEONI YASASH VA BOTGA YUBORISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const previewBox = document.getElementById('p-box');

    let lyrics = [];
    let audioFile = null;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const effect = document.getElementById('effect-style').value;
        const anim = document.getElementById('anim-style').value;
        
        displayText.style.fontSize = size + "px";
        displayText.style.fontFamily = font;
        
        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;

        previewBox.style.boxShadow = "none";
        previewBox.style.background = "#0a0a0a";
        previewBox.style.border = "2px solid #333";

        if(effect === 'neon') {
            previewBox.style.border = "2px solid #00e676";
            previewBox.style.boxShadow = "inset 0 0 20px rgba(0,230,118,0.4), 0 0 15px rgba(0,230,118,0.2)";
        } else if(effect === 'gradient') {
            previewBox.style.background = "linear-gradient(45deg, #000, #004d40)";
        } else if(effect === 'vignette') {
            previewBox.style.background = "radial-gradient(circle, #1a1a1a 0%, #000 100%)";
        } else if(effect === 'scanline') {
            previewBox.style.backgroundImage = "linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06))";
            previewBox.style.backgroundSize = "100% 4px, 3px 100%";
        }
    }

    document.getElementById('audio-input').onchange = (e) => { audioFile = e.target.files[0]; statusText.innerText = "Audio yuklandi."; };
    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "LRC yuklandi.";
            if(lyrics.length > 0) {
                displayText.innerText = lyrics[0].text;
                updateLivePreview();
            }
        };
        reader.readAsText(e.target.files[0]);
    };

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Hamma fayllarni yuklang!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;
        if (duration <= 0) return alert("Vaqt xato!");

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);

        const stream = canvas.captureStream(30);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 10000000 });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "BOTGA YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Lyric_Pro_${Date.now()}.mp4`);
            formData.append('caption', "✅ Maxsus Effektli HD Video tayyor!");

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if (response.ok) { statusText.innerText = "✅ YUBORILDI!"; tg.showAlert("Botga yuborildi!"); }
                else { alert("Yuborishda xato!"); }
            } catch (err) { alert("Xato: " + err.message); }
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            const now = audioTag.currentTime;
            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";
            
            if (text !== lastText) { 
                lastText = text; 
                animStartTime = now; 
            }
            
            let animProgress = Math.min((now - animStartTime) / 0.5, 1); 

            const effect = document.getElementById('effect-style').value;
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if(effect === 'neon') {
                ctx.strokeStyle = varColor(now); ctx.lineWidth = 15; ctx.strokeRect(40, 40, 1000, 1000);
            } else if (effect === 'gradient') {
                let g = ctx.createLinearGradient(0,0,1080,1080);
                g.addColorStop(0, "#000"); g.addColorStop(1, "#004d40");
                ctx.fillStyle = g; ctx.fillRect(0,0,1080,1080);
            }

            const font = document.getElementById('font-style').value;
            const anim = document.getElementById('anim-style').value;
            const customFontSize = document.getElementById('font-size-slider').value;
            
            ctx.font = `bold ${customFontSize * 2}px ${font}`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') ctx.scale(0.5 + animProgress * 0.5, 0.5 + animProgress * 0.5);
            if(anim === 'rotate') ctx.rotate((1-animProgress)*0.5);
            if(anim === 'slideUp') ctx.translate(0, (1-animProgress)*80);
            if(anim === 'pulse') {
                let s = 1 + Math.sin(Date.now()/200)*0.05;
                ctx.scale(s, s);
            }

            ctx.fillStyle = "#00e676";
            ctx.shadowColor = "rgba(0,230,118,0.8)"; ctx.shadowBlur = 30;
            ctx.fillText(text, 0, 0);
            ctx.restore();

            statusText.innerText = `JARAYON: ${Math.floor(((now - startT) / duration) * 100)}%`;
            if (now < endT && !audioTag.paused) requestAnimationFrame(drawFrame);
            else { audioTag.pause(); recorder.stop(); }
        }
        
        function varColor(t) { return `hsl(${t * 40 % 360}, 70%, 50%)`; }
        drawFrame();
    }
    tg.ready();
    tg.expand();
    updateLivePreview();
</script>
</body>
</html>
