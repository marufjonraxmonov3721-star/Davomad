<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - Cloud Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 240px; height: 426px; background: #000; border-radius: 20px; 
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 20px; line-height: 1.4; text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; 
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 550px; overflow-y: auto; }
        
        /* Qidiruv tizimi */
        .search-section { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .search-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .track-results { max-height: 150px; overflow-y: auto; display: grid; gap: 8px; }
        .track-card { background: #252525; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid transparent; transition: 0.2s; }
        .track-card:hover { border-color: var(--accent); }
        .track-card.active { background: rgba(0, 230, 118, 0.1); border-color: var(--accent); }

        .select-group { display: flex; gap: 10px; margin: 10px 0; }
        .select-group div { flex: 1; }

        input[type="range"], select, input[type="file"], input[type="number"] { 
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box;
        }

        .btn-main { background: var(--accent); color: #000; font-weight: 800; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 12px; margin-top: 10px; }
        
        #status-text { font-size: 12px; color: var(--accent); margin: 10px 0; text-align: center; font-weight: bold; }
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }

        .range-slider { position: relative; height: 35px; background: #222; border-radius: 8px; margin: 10px 0; overflow: hidden; }
        .range-fill { position: absolute; height: 100%; background: rgba(0, 230, 118, 0.2); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        /* Animatsiyalar */
        .anim-fade { animation: fadeIn 0.4s ease; }
        .anim-zoom { animation: zoomIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1920"></canvas>

    <div class="controls">
        
        <div class="search-section">
            <label>🔎 Bazadan lirikani toping:</label>
            <input type="text" id="search-input" class="search-input" placeholder="Qo'shiqchi yoki qo'shiq nomi..." oninput="searchFromDB()">
            <div class="track-results" id="results-container">
                <div style="font-size: 11px; color: #555;">Qidirishni boshlang...</div>
            </div>
        </div>

        <label>📁 Telefotingizdan MP3 tanlang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">

        <div class="select-group">
            <div>
                <label>Matn hajmi:</label>
                <input type="range" id="font-size" min="40" max="150" value="80" oninput="updatePreview()">
            </div>
            <div>
                <label>Animatsiya:</label>
                <select id="anim-style" onchange="updatePreview()">
                    <option value="none">Yo'q</option>
                    <option value="fade">Fade</option>
                    <option value="zoom">Zoom</option>
                </select>
            </div>
        </div>

        <label>Vaqtni qirqish (sekund):</label>
        <div class="range-slider">
            <div class="range-fill" id="range-fill"></div>
        </div>
        <div class="select-group">
            <input type="number" id="t-start" value="0" step="0.1" oninput="syncRange()">
            <input type="number" id="t-end" value="30" step="0.1" oninput="syncRange()">
        </div>

        <div id="status-text">Kutilmoqda...</div>
        <button class="btn-main" id="start-btn" onclick="generateHDVideo()">HD VIDEO YASASH</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
      authDomain: "songlyrics-caption.firebaseapp.com",
      projectId: "songlyrics-caption",
      storageBucket: "songlyrics-caption.firebasestorage.app",
      messagingSenderId: "363615493684",
      appId: "1:363615493684:web:35752e22517bfaedae7461"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tg = window.Telegram.WebApp;

    let dbTracks = [];
    let selectedLyrics = [];
    let audioFile = null;
    let fullDuration = 30;

    // BAZANI YUKLASH
    async function initDB() {
        const q = query(collection(db, "tracklist"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        dbTracks = snap.docs.map(doc => doc.data());
    }
    initDB();

    window.searchFromDB = () => {
        const val = document.getElementById('search-input').value.toLowerCase();
        const container = document.getElementById('results-container');
        container.innerHTML = "";
        
        const filtered = dbTracks.filter(t => t.title.toLowerCase().includes(val));
        
        filtered.forEach(track => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerText = track.title;
            card.onclick = () => {
                document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                parseLRC(track.lyricsBody);
                document.getElementById('status-text').innerText = "Lirika yuklandi: " + track.title;
                tg.HapticFeedback.impactOccurred('light');
            };
            container.appendChild(card);
        });
    };

    function parseLRC(data) {
        selectedLyrics = data.split('\n').map(line => {
            const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
            return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
        }).filter(x => x);
    }

    document.getElementById('audio-input').onchange = (e) => {
        audioFile = e.target.files[0];
        const audio = new Audio(URL.createObjectURL(audioFile));
        audio.onloadedmetadata = () => {
            fullDuration = audio.duration;
            document.getElementById('t-end').value = Math.min(fullDuration, 30).toFixed(1);
            syncRange();
        };
    };

    window.syncRange = () => {
        const s = document.getElementById('t-start').value;
        const e = document.getElementById('t-end').value;
        document.getElementById('range-fill').style.left = (s / fullDuration * 100) + "%";
        document.getElementById('range-fill').style.width = ((e - s) / fullDuration * 100) + "%";
    };

    window.updatePreview = () => {
        const size = document.getElementById('font-size').value;
        displayText.style.fontSize = (size / 4) + "px";
        const anim = document.getElementById('anim-style').value;
        displayText.className = anim !== 'none' ? "anim-" + anim : "";
    };

    window.generateHDVideo = async function() {
        if(!audioFile || selectedLyrics.length === 0) return alert("Lirikani tanlang va MP3 yuklang!");
        
        const startT = parseFloat(document.getElementById('t-start').value);
        const endT = parseFloat(document.getElementById('t-end').value);
        const duration = endT - startT;

        document.getElementById('start-btn').disabled = true;
        const audio = new Audio(URL.createObjectURL(audioFile));
        audio.currentTime = startT;

        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const stream = canvas.captureStream(60);
        
        // Audio qo'shish
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(audio);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const fd = new FormData();
            fd.append('chat_id', '8533456947');
            fd.append('video', videoBlob, 'HD_Lyrics.mp4');
            await fetch(`https://api.telegram.org/bot8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw/sendVideo`, { method: 'POST', body: fd });
            document.getElementById('status-text').innerText = "✅ TAYYOR!";
            document.getElementById('start-btn').disabled = false;
        };

        recorder.start();
        audio.play();

        function render() {
            const now = audio.currentTime;
            const current = selectedLyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";

            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
            ctx.fillStyle = "#00e676";
            ctx.font = `bold ${document.getElementById('font-size').value}px sans-serif`;
            ctx.textAlign = "center";
            
            // Matnni wrap qilish (ko'p qatorli)
            const words = text.split(' ');
            let line = '', y = 960;
            words.forEach(w => {
                if(ctx.measureText(line + w).width > 900) { ctx.fillText(line, 540, y); line = w + ' '; y += 110; }
                else line += w + ' ';
            });
            ctx.fillText(line, 540, y);

            document.getElementById('status-text').innerText = `ISHLANMOQDA: ${Math.floor((now-startT)/duration*100)}%`;
            if(now < endT && !audio.paused) requestAnimationFrame(render);
            else { audio.pause(); recorder.stop(); }
        }
        render();
    };

    const displayText = document.getElementById('display-text');
    tg.ready();
    tg.expand();
</script>
</body>
</html>
