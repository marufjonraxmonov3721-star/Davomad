<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: #fff; padding: 50px 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #0088cc; color: #fff; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Linkni kiriting</h2>
    <input type="text" id="inp" placeholder="https://instagram.com/...">
    <button onclick="send()">Yuborish</button>
    <script>
        const tg = window.Telegram.WebApp;
        function send() {
            const val = document.getElementById('inp').value;
            if(val) { tg.sendData(val); tg.close(); }
        }
    </script>
</body>
</html>
