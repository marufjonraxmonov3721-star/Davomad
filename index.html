<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Battle TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; color: white; background: #222; }
        #game-area { width: 100vw; height: 70vh; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-size: 24px; font-weight: bold; margin-top: 20px; border-radius: 20px;}
        .waiting { background-color: #f39c12; }
        .ready { background-color: #e74c3c; }
        .go { background-color: #2ecc71; }
        #results { padding: 20px; text-align: left; background: #333; margin: 10px; border-radius: 10px; }
        .player-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0; }
        button { padding: 10px 20px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; background: #3498db; color: white; margin: 10px; }
    </style>
</head>
<body>

    <h2>Reaction Battle</h2>
    <div id="setup">
        <input type="text" id="playerName" placeholder="Ismingizni yozing" style="padding: 10px; border-radius: 5px;">
        <button onclick="joinGame()">O'yinga kirish</button>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="game-area" class="waiting" onclick="handleClick()">
            Tayyor turing...
        </div>
        <button id="startBtn" onclick="startGame()">O'yinni boshlash</button>
        
        <div id="results">
            <h3>Natijalar:</h3>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com", // O'zgartirishingiz kerak bo'lishi mumkin
            storageBucket: "songlyrics-caption.firebasestorage.app",
            messagingSenderId: "363615493684",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomRef = ref(db, 'rooms/global_room');

        let myId = Math.random().toString(36).substring(7);
        let myName = "";
        let currentStatus = "waiting";
        let startTime = 0;

        window.joinGame = () => {
            myName = document.getElementById('playerName').value;
            if(!myName) return alert("Ism kiriting!");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            set(ref(db, 'rooms/global_room/players/' + myId), {
                name: myName,
                score: null
            });
        };

        window.startGame = () => {
            const delay = Math.floor(Math.random() * 3000) + 2000; // 2-5 soniya
            update(roomRef, { status: 'ready', startTime: null });
            
            setTimeout(() => {
                update(roomRef, { 
                    status: 'go', 
                    startTime: serverTimestamp() 
                });
            }, delay);
        };

        window.handleClick = () => {
            if (currentStatus === 'go') {
                const now = Date.now();
                // Bu yerda serverTimestamp bilan hisoblash aniqroq bo'ladi
                // Oddiyroq variant uchun hozirgi vaqtni yuboramiz
                update(ref(db, 'rooms/global_room/players/' + myId), {
                    score: "Hisoblanmoqda..."
                });
                
                // Natijani aniqlash (oddiyroq usulda)
                const reaction = (Date.now() - startTime) / 1000;
                update(ref(db, 'rooms/global_room/players/' + myId), {
                    score: reaction.toFixed(3)
                });
            } else if (currentStatus === 'ready') {
                alert("Juda erta!");
            }
        };

        // Bazani kuzatish
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            currentStatus = data.status;
            const area = document.getElementById('game-area');
            
            if (currentStatus === 'ready') {
                area.className = 'ready';
                area.innerText = 'KUTING...';
            } else if (currentStatus === 'go') {
                area.className = 'go';
                area.innerText = 'BOSING!!!';
                if(!startTime) startTime = Date.now();
            } else {
                area.className = 'waiting';
                area.innerText = 'Tayyor turing...';
                startTime = null;
            }

            // Leaderboardni yangilash
            const players = data.players || {};
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';
            
            const sorted = Object.values(players)
                .filter(p => p.score !== null)
                .sort((a, b) => a.score - b.score);

            sorted.forEach((p, index) => {
                leaderboard.innerHTML += `
                    <div class="player-row">
                        <span>${index + 1}. ${p.name}</span>
                        <span>${p.score}s</span>
                    </div>`;
            });
        });

        // Telegram Web App rangini moslashtirish
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
