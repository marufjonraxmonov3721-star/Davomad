<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texnik Ishlar - eFootball Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --accent-color: #f1c40f;
            --ef-blue: #004dff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .maintenance-container {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }

        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-block;
            background: #2c3e50;
            color: #f1c40f;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #f1c40f;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin-top: 30px;
            border-radius: 10px;
            overflow: hidden;
        }

        .loading-progress {
            width: 40%;
            height: 100%;
            background: var(--accent-color);
            animation: loading 2s infinite linear;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="icon-box">⚙️</div>
        <div class="status-badge">MAINTENANCE IN PROGRESS</div>
        <h1>Texnik Ishlar</h1>
        <p>
            O'yin sifatini yaxshilash maqsadida qisqa tanaffus e'lon qilindi. 
            Tez orada yangi imkoniyatlar bilan qaytamiz!
        </p>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
