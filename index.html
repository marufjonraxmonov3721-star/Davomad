<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Test Platform - Light Mode</title>
    <style>
        :root {
            /* Kunduzgi rejim uchun yangi ranglar palitrasi */
            --bg: #f8f9fa;
            --card: #ffffff;
            --gold: #b8860b; /* To'qroq oltin rang matnlar uchun */
            --gold-glow: #8b6b0d;
            --text: #2d3436;
            --wrong: #d63031;
            --right: #27ae60;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .back-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            cursor: pointer;
            font-size: 14px;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .back-btn:hover {
            background: rgba(184, 134, 11, 0.1);
        }

        .quiz-top-bar {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .mode-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: bold; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .progress-indicator { color: var(--text); font-size: 14px; font-weight: bold; }
        .timer-box { color: var(--wrong); font-size: 18px; font-weight: bold; }

        .question-text {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 30px;
            text-align: left;
        }
        
        /* Rasmlar oq fonda yaxshi ko'rinishi uchun */
        .question-text img, .opt-btn img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px;
            background: #fff;
        }

        .options-list { display: grid; gap: 12px; }
        .opt-btn {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: clamp(14px, 4vw, 16px);
            text-align: left;
            transition: 0.2s;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn:hover { border-color: var(--gold); }
        .opt-btn.correct { background: var(--right) !important; border-color: var(--right); color: white; }
        .opt-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); color: white; }

        .gold-btn {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 8px 0;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
        }
        .gold-btn:active { transform: translateY(2px); }

        .subject-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        @media (min-width: 480px) { .subject-grid { grid-template-columns: 1fr 1fr; } }

        .subject-card { 
            padding: 25px; 
            border: 2px solid var(--border); 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer; 
            background: var(--card);
            font-weight: bold;
            color: var(--gold);
            transition: 0.3s;
        }
        .subject-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .hidden { display: none !important; }
        #final-score { font-size: 60px; margin: 15px 0; text-align: center; color: var(--gold); font-weight: 800; }
        
        #scr-res {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-menu">
        <h2 style="text-align: center; letter-spacing: 2px; color: var(--gold); font-size: 24px; font-weight: 800;">TEST PORTAL</h2>
        <div id="list-subs" class="subject-grid">Yuklanmoqda...</div>
        
        <div id="mode-box" class="hidden" style="margin-top: 25px;">
            <button class="back-btn" onclick="goBackToMenu()">✕ Bekor qilish</button>
            <h3 id="sub-name" style="text-align: center; color: var(--text); margin-bottom: 20px; font-size: 20px;"></h3>
            <button class="gold-btn" onclick="startTest('practice')">Mashq Rejimi</button>
            <button class="gold-btn" style="background: #2d3436; margin-top: 10px;" onclick="startTest('exam')">Imtihon Rejimi</button>
        </div>
    </div>

    <div id="scr-quiz" class="hidden">
        <button class="back-btn" onclick="confirmExit()">✕ Chiqish</button>
        <div class="quiz-top-bar">
            <span id="label-mode" class="mode-label">MASHQ REJIMIDAGI</span>
            <div class="info-row">
                <div id="quiz-progress" class="progress-indicator">SAVOL: 1 / 10</div>
                <div id="timer-val" class="timer-box hidden">35:00</div>
            </div>
        </div>

        <div id="text-q" class="question-text">Savol yuklanmoqda...</div>
        <div id="list-opts" class="options-list"></div>
    </div>

    <div id="scr-res" class="hidden" style="text-align: center;">
        <h2 id="res-title" style="margin-top: 0;">TEST YAKUNLANDI</h2>
        <div id="final-score">0</div>
        <p id="res-detail" style="margin-bottom: 25px; color: #636e72; font-size: 16px;"></p>
        <button class="gold-btn" onclick="location.reload()">BOSH SAHIFA</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrDiJYCjjlTwUnZGvoSevawlO55yNCLs",
        authDomain: "raxmonov-22df0.firebaseapp.com",
        projectId: "raxmonov-22df0",
        databaseURL: "https://raxmonov-22df0-default-rtdb.firebaseio.com",
        storageBucket: "raxmonov-22df0.firebasestorage.app",
        messagingSenderId: "624672987926",
        appId: "1:624672987926:web:729132d8edb03c6f134e37"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let rawQuestions = [];
    let currentSet = [];
    let idx = 0;
    let corrects = 0;
    let mode = '';
    let timer;
    let sec = 35 * 60;

    async function loadSubjects() {
        const snap = await get(ref(db, 'savollar'));
        const box = document.getElementById('list-subs');
        box.innerHTML = "";
        if (snap.exists()) {
            Object.keys(snap.val()).forEach(s => {
                const d = document.createElement('div');
                d.className = 'subject-card';
                d.innerText = s;
                d.onclick = () => {
                    rawQuestions = Object.values(snap.val()[s]);
                    document.getElementById('sub-name').innerText = s;
                    document.getElementById('mode-box').classList.remove('hidden');
                    document.getElementById('list-subs').classList.add('hidden');
                };
                box.appendChild(d);
            });
        }
    }
    loadSubjects();

    window.goBackToMenu = () => {
        document.getElementById('mode-box').classList.add('hidden');
        document.getElementById('list-subs').classList.remove('hidden');
    };

    window.confirmExit = () => {
        if(confirm("Testni to'xtatib chiqasizmi?")) location.reload();
    };

    window.startTest = (m) => {
        mode = m; idx = 0; corrects = 0;
        if (mode === 'exam') {
            currentSet = rawQuestions.sort(() => Math.random() - 0.5).slice(0, 35);
            document.getElementById('timer-val').classList.remove('hidden');
            document.getElementById('label-mode').innerText = "IMTIHON REJIMIDAGI";
            sec = 35 * 60;
            runClock();
        } else {
            currentSet = [...rawQuestions];
            document.getElementById('timer-val').classList.add('hidden');
            document.getElementById('label-mode').innerText = "MASHQ REJIMIDAGI";
        }
        document.getElementById('scr-menu').classList.add('hidden');
        document.getElementById('scr-quiz').classList.remove('hidden');
        renderQuestion();
    };

    function renderQuestion() {
        const q = currentSet[idx];
        document.getElementById('quiz-progress').innerText = `SAVOL: ${idx + 1} / ${currentSet.length}`;
        
        document.getElementById('text-q').innerHTML = q.question; 
        
        const box = document.getElementById('list-opts');
        box.innerHTML = "";

        const variants = [
            { t: q.options[0], ok: true },
            ...q.options.slice(1).map(opt => ({ t: opt, ok: false }))
        ].sort(() => Math.random() - 0.5);

        variants.forEach(v => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerHTML = v.t;
            b.onclick = () => handleAnswer(b, v.ok, q.options[0]);
            box.appendChild(b);
        });
        window.scrollTo(0,0);
    }

    function handleAnswer(btn, isOk, correctText) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        
        if (isOk) { 
            btn.classList.add('correct'); 
            corrects++; 
        } else { 
            btn.classList.add('wrong'); 
            if(mode === 'practice') {
                btns.forEach(b => { 
                    if(b.innerHTML === correctText) b.classList.add('correct'); 
                });
            }
        }
        
        setTimeout(() => {
            idx++;
            if (idx < currentSet.length) renderQuestion();
            else finishTest();
        }, mode === 'practice' ? 1500 : 600);
    }

    function runClock() {
        timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (sec <= 0) finishTest();
        }, 1000);
    }

    function finishTest() {
        clearInterval(timer);
        document.getElementById('scr-quiz').classList.add('hidden');
        document.getElementById('scr-res').classList.remove('hidden');
        const score = Math.round((corrects / currentSet.length) * 70);
        document.getElementById('final-score').innerText = `${score} BALL`;
        document.getElementById('res-detail').innerText = `Jami ${currentSet.length} savoldan ${corrects} tasiga to'g'ri javob berdingiz.`;
        const title = document.getElementById('res-title');
        if(score >= 42) { title.innerText = "TABRIKLAYMIZ! O'TDINGIZ"; title.style.color = "#27ae60"; } 
        else { title.innerText = "YIQILDINGIZ"; title.style.color = "#d63031"; }
    }
</script>
</body>
</html>
