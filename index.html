<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Cinematic Effect</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #E1306C; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Asosiy konteyner */
        #main-container { padding: 20px; }
        
        /* Story oynasi (9:16 formatda) */
        #story-window {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; flex-direction: column;
        }

        /* YouTube Pleyer (Butun ekranda, lekin orqa fonda) */
        #yt-player-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.3; /* Video xira ko'rinib turadi, matn yaxshi chiqishi uchun */
            pointer-events: auto; /* Video bosilishi kerak */
        }

        /* Matn qatlami (Video ustida) */
        #lyric-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 80%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2; pointer-events: none; /* Matnni bossa ham video bosilaveradi */
            text-align: center; font-size: 2.5rem; font-weight: 900;
            padding: 30px; box-sizing: border-box; text-align: center; font-weight: 800; line-height: 1.25;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.4s ease;
        }

        .lyric-in { animation: lyricIn 0.5s ease; }
        @keyframes lyricIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Pastki boshqaruv paneli */
        #controls {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 20px; box-sizing: border-box; z-index: 3; border-top: 1px solid #222;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: #fff; border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; margin-top: 10px;
        }

        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid #222; cursor: pointer;
        }
        
        input[type=range] { width: 100%; accent-color: var(--primary); }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 style="color: #1DB954">Musiqalar</h2>
        <div id="list">Yuklanmoqda...</div>
    </div>

    <div id="story-window">
        <div id="yt-player-container">
            <div id="player"></div>
        </div>
        
        <div id="lyric-layer">
            <div id="current-lyric">Klipni yoqing...</div>
        </div>

        <div id="controls">
            <p style="text-align:center; margin:0 0 10px;">Vaqt: <b id="crop-time">0s - 15s</b></p>
            <input type="range" id="start-slider" min="0" value="0">
            <button class="btn-insta" id="share-btn">📲 Instagram Story</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#777; width:100%; margin-top:10px;">⬅️ Orqaga</button>
        </div>
    </div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncTask, startPos = 0, currentSongData = null;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'playsinline': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            startSync();
        } else {
            stopSync();
        }
    }

    function startSync() {
        stopSync();
        syncTask = setInterval(() => {
            const now = ytPlayer.getCurrentTime();
            if (now >= startPos + 15) ytPlayer.seekTo(startPos); // 15s Loop

            const hit = currentLyrics.findLast(l => now >= l.time);
            if (hit) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== hit.text) {
                    el.innerText = hit.text;
                    el.classList.remove('lyric-in');
                    void el.offsetWidth;
                    el.classList.add('lyric-in');
                }
            }
        }, 100);
    }

    function stopSync() { clearInterval(syncTask); }

    function openStory(data) {
        currentSongData = data;
        currentLyrics = parseLRC(data.lyrics || "");
        document.getElementById('main-container').style.display = 'none';
        document.getElementById('story-window').style.display = 'flex';
        
        const slider = document.getElementById('start-slider');
        slider.oninput = function() {
            startPos = parseInt(this.value);
            document.getElementById('crop-time').innerText = `${startPos}s - ${startPos + 15}s`;
            ytPlayer.seekTo(startPos);
        };
        
        ytPlayer.loadVideoById(data.youtubeId, startPos);
        ytPlayer.playVideo();
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const listContainer = document.getElementById('list');
        listContainer.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<div><b>${data.track}</b><br><small>${data.artist}</small></div> <div style="color:var(--accent)">▶</div>`;
            div.onclick = () => openStory(data);
            listContainer.appendChild(div);
        });
    });
</script>
</body>
</html>
