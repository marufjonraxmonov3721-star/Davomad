<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #121212;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
        }

        .page { display: none; height: calc(100vh - 70px); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-page { display: block; }

        /* MENU STYLE (Yangi qo'shilgan qism) */
        .menu-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .menu-card {
            background: white;
            border-radius: 25px;
            width: 160px;
            height: 240px;
            padding: 20px;
            color: #333;
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-card:active { transform: scale(0.95); }

        .menu-card.ai { background: white; }
        .menu-card.pvp { background: white; }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #0088cc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #0088cc;
        }

        .card-title { font-weight: 800; font-size: 18px; margin-bottom: 5px; color: #000; }
        .card-desc { font-size: 12px; color: #777; line-height: 1.3; }

        .div-badge-mini {
            position: absolute;
            bottom: 0;
            right: 0;
            background: orange;
            border-top-left-radius: 100%;
            padding: 15px 10px 5px 20px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        /* Taymer maydoni */
        #timer-container {
            width: 100%;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            border-radius: 30px;
            border: 2px solid #333;
            margin-top: 10px;
        }

        #display {
            font-size: 64px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        .target-text { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .start { background: #2ecc71; color: white; }
        .stop { background: #e74c3c; color: white; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: #1a1a1a; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; }
        .nav-item.active { color: var(--tg-theme-button-color); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

        .rank-item {
            background: #1e1e1e; margin-bottom: 8px; padding: 15px;
            border-radius: 15px; display: flex; justify-content: space-between;
        }
        .diff { font-size: 12px; color: #e74c3c; }

        .user-stats {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 14px;
        }
        .stat-badge { background: #333; padding: 5px 12px; border-radius: 20px; color: #f1c40f; font-weight: bold; }
        
        .back-btn {
            background: #0088cc; color: white; border: none; padding: 8px 15px; 
            border-radius: 10px; margin-bottom: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="page-menu" class="page active-page">
        <div class="menu-container">
            <div class="menu-card ai" onclick="showPage('game')">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" width="30" fill="currentColor"><path d="M13,2V4H11V2H13M15,10V12H9V10H15M19,13V15H17V13H19M7,13V15H5V13H7M12,6A6,6 0 0,1 18,12C18,14.22 16.79,16.16 15,17.2V19A2,2 0 0,1 13,21H11A2,2 0 0,1 9,19V17.2C7.21,16.16 6,14.22 6,12A6,6 0 0,1 12,6M12,8A4,4 0 0,0 8,12C8,13.31 8.64,14.47 9.63,15.19L10,15.45V19H14V15.45L14.37,15.19C15.36,14.47 16,13.31 16,12A4,4 0 0,0 12,8Z"/></svg>
                </div>
                <div class="card-title">VS AI Category</div>
                <div class="card-desc">Play Against the AI.</div>
                <div class="div-badge-mini" id="menu-div-badge">Div 10</div>
            </div>

            <div class="menu-card pvp" onclick="tg.showAlert('PvP bo\'limi tez kunda ishga tushadi!')">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" width="30" fill="currentColor"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                </div>
                <div class="card-title">PvP Category</div>
                <div class="card-desc">Compete Against Other Users.</div>
            </div>
        </div>
    </div>

    <div id="page-game" class="page">
        <button class="back-btn" onclick="showPage('menu')">❮ Orqaga</button>
        <div style="text-align: center;">
            <p id="user-name" style="color: #aaa; margin: 0; margin-bottom: 5px;">Yuklanmoqda...</p>
            <div class="user-stats">
                <span class="stat-badge" id="user-div">Div: 10</span>
                <span class="stat-badge" id="user-pts">Ball: 0</span>
            </div>
        </div>

        <div id="timer-container">
            <div class="target-text" id="target-label">Maqsad: 10.000s</div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result" style="text-align: center; margin-top: 20px; font-weight: bold;"></p>
    </div>

    <div id="page-rating" class="page">
        <h2 style="text-align: center;">Division Reytingi</h2>
        <div id="leaderboard"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('menu', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
            <span>Asosiy</span>
        </div>
        <div class="nav-item" onclick="showPage('rating', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16,11V3H8V11H2V21H22V11H16M10,5H14V11H10V5M4,13H8V19H4V13M20,19H16V13H20V19Z"/></svg>
            <span>Reyting</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        document.getElementById('user-name').innerText = myName;

        let startTime;
        let timerInterval;
        let isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 0, division: 10 };

        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            updateGameUI();
        });

        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = snapshot.val();
                document.getElementById('user-div').innerText = `Div: ${myCurrentData.division || 10}`;
                document.getElementById('user-pts').innerText = `Ball: ${myCurrentData.points || 0}`;
                document.getElementById('menu-div-badge').innerText = `Div ${myCurrentData.division || 10}`;
                updateGameUI();
            } else {
                update(ref(db, 'leaderboard/' + myId), {
                    name: myName,
                    points: 100, 
                    division: 10
                });
            }
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            if (divSettings && divSettings[d]) {
                document.getElementById('target-label').innerText = `Maqsad: ${divSettings[d].target.toFixed(3)}s`;
            }
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            const currentDiv = myCurrentData.division || 10;
            
            const rules = divSettings && divSettings[currentDiv] 
                ? divSettings[currentDiv] 
                : { target: 10, nearLimit: 0.05, plusPoints: 30, minusPoints: 30, promotionPoints: 500 };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP";
                btn.className = "btn-main stop";
                tg.HapticFeedback.impactOccurred('medium');

                timerInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    display.innerText = elapsed.toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START";
                btn.className = "btn-main start";

                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                let pointChange = 0;
                let newDivision = currentDiv;
                let newPoints = myCurrentData.points || 0;

                if (diffStr === "0.000" && currentDiv > 1) {
                    newDivision = currentDiv - 1;
                    const targetDivRules = divSettings && divSettings[newDivision + 1] ? divSettings[newDivision + 1] : { promotionPoints: 500 };
                    newPoints = targetDivRules.promotionPoints;
                    document.getElementById('last-result').style.color = "#f1c40f";
                    document.getElementById('last-result').innerText = `DAHSHAT! DIVIZIONGA SAKRASH!`;
                    tg.HapticFeedback.notificationOccurred('success');
                } 
                else if (diffVal <= rules.nearLimit) {
                    pointChange = parseInt(rules.plusPoints);
                    newPoints += pointChange;
                    document.getElementById('last-result').style.color = "#2ecc71";
                    document.getElementById('last-result').innerText = `Zo'r! +${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('success');
                    if (newPoints >= rules.promotionPoints && currentDiv > 1) {
                        newDivision = currentDiv - 1;
                    }
                } 
                else {
                    pointChange = -parseInt(rules.minusPoints);
                    newPoints += pointChange;
                    if (newPoints < 0) newPoints = 0;
                    document.getElementById('last-result').style.color = "#e74c3c";
                    document.getElementById('last-result').innerText = `Uzoq! ${pointChange} ball`;
                    tg.HapticFeedback.notificationOccurred('error');
                    if (currentDiv < 10) {
                        const prevDivRules = divSettings && divSettings[currentDiv + 1] ? divSettings[currentDiv + 1] : null;
                        if (prevDivRules && newPoints < prevDivRules.promotionPoints) {
                            newDivision = currentDiv + 1;
                        }
                    }
                }

                if (newDivision < 1) newDivision = 1;
                if (newDivision > 10) newDivision = 10;

                update(ref(db, 'leaderboard/' + myId), {
                    name: myName,
                    points: newPoints,
                    division: newDivision,
                    bestDiff: diffStr,
                    lastTime: finalTime.toFixed(3)
                });
            }
        };

        window.showPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active-page');
            if(el) el.classList.add('active');
        };

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const list = Object.values(data).sort((a, b) => {
                if (a.division !== b.division) return a.division - b.division;
                return (b.points || 0) - (a.points || 0);
            }).slice(0, 30);
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';
            list.forEach((p, i) => {
                container.innerHTML += `
                    <div class="rank-item">
                        <span><b>#${i+1}</b> ${p.name} <small style="color:#888">(Div: ${p.division || 10})</small></span>
                        <div style="text-align: right">
                            <div style="color:#f1c40f; font-weight:bold;">${p.points || 0} pts</div>
                            <div class="diff">Farq: ${p.bestDiff || '0'}s</div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
