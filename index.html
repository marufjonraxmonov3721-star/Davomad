<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #121212;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            overflow: hidden;
            -webkit-user-select: none;
        }

        .page { display: none; height: calc(100vh - 70px); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-page { display: block; }

        /* Taymer maydoni */
        #timer-container {
            width: 100%;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            border-radius: 30px;
            border: 2px solid #333;
            margin-top: 20px;
        }

        #display {
            font-size: 64px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        .target-text { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* Tugmalar */
        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .start { background: #2ecc71; color: white; }
        .stop { background: #e74c3c; color: white; }

        /* Navigatsiya */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: #1a1a1a; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; }
        .nav-item.active { color: var(--tg-theme-button-color); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

        /* Reyting */
        .rank-item {
            background: #1e1e1e; margin-bottom: 8px; padding: 15px;
            border-radius: 15px; display: flex; justify-content: space-between;
        }
        .diff { font-size: 12px; color: #e74c3c; } /* Xatolik ko'rsatkichi */
    </style>
</head>
<body>

    <div id="page-game" class="page active-page">
        <div style="text-align: center;">
            <p id="user-name" style="color: #aaa; margin: 0;">Yuklanmoqda...</p>
        </div>

        <div id="timer-container">
            <div class="target-text">Maqsad: 10.000s</div>
            <div id="display">0.000</div>
        </div>

        <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
        <p id="last-result" style="text-align: center; margin-top: 20px; font-weight: bold;"></p>
    </div>

    <div id="page-rating" class="page">
        <h2 style="text-align: center;">Eng Aniq O'yinchilar</h2>
        <div id="leaderboard"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('game', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg>
            <span>O'yin</span>
        </div>
        <div class="nav-item" onclick="showPage('rating', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16,11V3H8V11H2V21H22V11H16M10,5H14V11H10V5M4,13H8V19H4V13M20,19H16V13H20V19Z"/></svg>
            <span>Reyting</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        document.getElementById('user-name').innerText = myName;

        let startTime;
        let timerInterval;
        let isRunning = false;

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');

            if (!isRunning) {
                // START
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP";
                btn.className = "btn-main stop";
                tg.HapticFeedback.impactOccurred('medium');

                timerInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    
                    // 3 sekunddan keyin raqamlarni berkitish (o'yin qiyin bo'lishi uchun)
                    if (elapsed > 3.000 && elapsed < 10.000) {
                        display.innerText = "?.???";
                        display.style.color = "#555";
                    } else {
                        display.innerText = elapsed.toFixed(3);
                        display.style.color = "var(--accent-color)";
                    }
                }, 10);
            } else {
                // STOP
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                display.style.color = "var(--accent-color)";
                btn.innerText = "START";
                btn.className = "btn-main start";

                const diff = Math.abs(10.000 - finalTime).toFixed(3);
                document.getElementById('last-result').innerText = `Farq: ${diff}s`;

                // Bazaga saqlash (eng yaxshi natijani saqlash)
                update(ref(db, 'leaderboard/' + myId), {
                    name: myName,
                    bestDiff: diff,
                    time: finalTime.toFixed(3)
                });

                if(diff == 0.000) {
                    tg.HapticFeedback.notificationOccurred('success');
                    alert("DAHSHAT! ROSTIDANHAM 10 SEKUND!");
                } else {
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
        };

        window.showPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active-page');
            el.classList.add('active');
        };

        // Reytingni yangilash
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const list = Object.values(data).sort((a, b) => a.bestDiff - b.bestDiff).slice(0, 20);
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            list.forEach((p, i) => {
                container.innerHTML += `
                    <div class="rank-item">
                        <span><b>#${i+1}</b> ${p.name}</span>
                        <div style="text-align: right">
                            <div>${p.time}s</div>
                            <div class="diff">Farq: ${p.bestDiff}s</div>
                        </div>
                    </div>
                `;
            });
        });

    </script>
</body>
</html>
