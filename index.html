<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto LRC Flow</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e676; --bg: #050505; --card: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        .box { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; max-width: 450px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; margin: 10px 0; box-sizing: border-box; font-size: 14px; outline: none; }
        textarea:focus { border-color: var(--primary); }

        .display-zone {
            height: 140px; background: #000; border-radius: 20px; margin: 15px 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed #333; position: relative; overflow: hidden;
        }
        .active-border { border: 2px solid var(--primary); animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--primary); } 50% { box-shadow: 0 0 20px var(--primary); } 100% { box-shadow: 0 0 5px var(--primary); } }

        #current-lyric { font-size: 22px; font-weight: 900; color: var(--primary); padding: 0 15px; text-transform: uppercase; line-height: 1.2; }
        #next-lyric { font-size: 13px; color: #666; margin-top: 10px; }

        .main-btn { 
            background: var(--primary); color: #000; font-weight: 800; border: none; 
            width: 100%; padding: 20px; border-radius: 18px; cursor: pointer; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.2); transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.96); }
        
        #progress-info { font-size: 11px; color: #888; margin-bottom: 5px; text-align: right; }
        #status-msg { font-size: 12px; color: var(--primary); margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin: 0 0 5px; font-size: 24px;">Auto LRC Flow</h2>
        <p style="font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px;">Smart Auto-Stamping System</p>

        <div class="card" style="text-align: left; margin-top: 20px;">
            <label style="font-size: 11px; color: #888; margin-left: 5px;">1. MUSIQA VA MATN</label>
            <input type="file" id="audio-file" accept="audio/*">
            <textarea id="lyrics-input" rows="6" placeholder="Qatorma-qator matnni kiriting..."></textarea>
        </div>

        <div id="progress-info">Tayyor: 0/0</div>
        <div class="display-zone" id="display-box">
            <div id="current-lyric">KUTILMOQDA...</div>
            <div id="next-lyric">Tayyor bo'lsangiz "START" bosing</div>
        </div>

        <button class="main-btn" id="action-btn" onclick="toggleFlow()">AVTO-SINXRONNI BOSHLASH</button>
        
        <div id="status-msg">Tizim tayyor</div>
        
        <button onclick="sendLrcToBot()" style="margin-top: 20px; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 600;">LRC FAYLNI BOTGA YUBORISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const audio = new Audio();
    let lyricsArray = [];
    let syncedData = [];
    let currentIndex = 0;
    let isFlowing = false;
    let autoTimer;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    document.getElementById('audio-file').onchange = (e) => {
        audio.src = URL.createObjectURL(e.target.files[0]);
        document.getElementById('status-msg').innerText = "✅ Musiqa yuklandi!";
    };

    function toggleFlow() {
        if (!audio.src) return alert("Avval musiqa yuklang!");
        const text = document.getElementById('lyrics-input').value.trim();
        if (!text) return alert("Matnni kiriting!");

        if (!isFlowing) {
            // FLOW BOSHLASH
            isFlowing = true;
            lyricsArray = text.split('\n').filter(l => l.trim() !== "");
            syncedData = [];
            currentIndex = 0;
            
            document.getElementById('display-box').classList.add('active-border');
            document.getElementById('action-btn').innerText = "STOP (TO'XTATISH)";
            document.getElementById('action-btn').style.background = "#ff5252";
            
            audio.play();
            startAutoStep();
        } else {
            // STOP
            stopFlow();
        }
    }

    function startAutoStep() {
        if (!isFlowing) return;

        // Har bir qator aytilishini kutish (Manual emas, avtomatik o'tish)
        // Lekin siz matnni musiqa bilan moslab o'zingiz ham bittada TAP qilishingiz mumkin
        // Mana bu funksiya sizga har bir "TAP" lahzasini saqlab beradi
        updateUI();
    }

    // Siz xohlagandek: Qoshiqchi aytganda bosib ketaverasiz, u avtomat saqlaydi
    window.onclick = function(e) {
        if(isFlowing && e.target.id !== "action-btn") {
            saveCurrentStep();
        }
    };

    function saveCurrentStep() {
        if (!isFlowing || currentIndex >= lyricsArray.length) return;

        syncedData.push({
            time: audio.currentTime,
            text: lyricsArray[currentIndex]
        });

        currentIndex++;
        
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        if (currentIndex >= lyricsArray.length) {
            stopFlow();
            document.getElementById('current-lyric').innerText = "TUGADI!";
            document.getElementById('next-lyric').innerText = "Barcha qatorlar saqlandi.";
        } else {
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('current-lyric').innerText = lyricsArray[currentIndex];
        document.getElementById('next-lyric').innerText = "Keyingi: " + (lyricsArray[currentIndex + 1] || "Tamom");
        document.getElementById('progress-info').innerText = `Progress: ${currentIndex + 1}/${lyricsArray.length}`;
    }

    function stopFlow() {
        isFlowing = false;
        audio.pause();
        document.getElementById('display-box').classList.remove('active-border');
        document.getElementById('action-btn').innerText = "QAYTA BOSHLASH";
        document.getElementById('action-btn').style.background = "#00e676";
        document.getElementById('status-msg').innerText = "✅ Sinxronlash yakunlandi!";
    }

    function sendLrcToBot() {
        if (syncedData.length === 0) return alert("Hali hech narsa sinxronlanmadi!");
        
        let lrcContent = "[ti:Auto Flow LRC]\n[ar:User]\n";
        syncedData.forEach(item => {
            let m = Math.floor(item.time / 60);
            let s = (item.time % 60).toFixed(2);
            lrcContent += `[${m.toString().padStart(2, '0')}:${s.toString().padStart(5, '0')}]${item.text}\n`;
        });

        const blob = new Blob([lrcContent], { type: 'text/plain' });
        const fd = new FormData();
        fd.append('chat_id', MY_ID);
        fd.append('document', blob, "auto_flow.lrc");
        fd.append('caption', "🔥 Yangi LRC tayyor!");

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
            method: 'POST',
            body: fd
        }).then(() => {
            tg.showConfirm("LRC fayl botga yuborildi!");
        });
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
