<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Pro - Division League</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #0a0a0a; 
            --card: #151515; 
            --nav: #1a1a1a; 
            --danger: #ff3e3e; 
            --accent: #ffcc00; 
            --boss: #ff0055; 
            --friend: #00d4ff;
            --text: #ffffff;
            --subtext: #888888;
            --border: #333333;
            --division-gold: #ffd700;
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --nav: #ffffff;
            --text: #1a1a1a;
            --subtext: #666666;
            --border: #dddddd;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; position: relative; transition: background 0.3s, color 0.3s; }
        
        #visualizer { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; z-index: 1; pointer-events: none; opacity: 0.8; }

        #loading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { display: flex; align-items: center; gap: 5px; height: 50px; }
        .bar { width: 8px; height: 20px; background: var(--primary); border-radius: 10px; animation: scaleY 1s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes scaleY { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }

        #reg-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 900;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .reg-card { background: var(--card); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .reg-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .reg-input:focus { border-color: var(--primary); }

        #app-container { height: 100vh; display: none; flex-direction: column; position: relative; z-index: 2; }
        .page { flex: 1; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        .start-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .main-play-btn { 
            background: linear-gradient(135deg, var(--primary), #00cc6e); 
            color: #000; border: none; padding: 18px 35px; border-radius: 50px; 
            font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.4s; 
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4); 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            letter-spacing: 1.5px; text-transform: uppercase;
            position: relative; overflow: hidden;
            width: 80%;
        }
        .main-play-btn:active { transform: scale(0.92); }

        .game-card { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 40px; border: 1px solid var(--border); text-align: center; position: relative; z-index: 5; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .vinyl { 
            width: 180px; height: 180px; margin: 20px auto; 
            background: radial-gradient(circle, #222 0%, #111 40%, #000 100%); 
            border-radius: 50%; border: 8px solid #1a1a1a; 
            position: relative; z-index: 6;
        }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #disc-center { position:absolute; inset:65px; background:var(--primary); border-radius:50%; border:6px solid #000; box-shadow: 0 0 15px var(--primary); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease-in; }
        .options-grid.show-options { opacity: 1; pointer-events: auto; }
        
        .option-btn, .start-btn { background: var(--nav); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .option-btn { opacity: 0; transform: translateY(20px); }
        .option-btn.reveal { opacity: 1; transform: translateY(0); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .start-btn { background: var(--primary); color: #000; border: none; font-size: 18px; padding: 18px; margin-top: 10px; }
        .correct { background: var(--primary) !important; color: #000 !important; transform: scale(1.02); }
        .wrong { background: var(--danger) !important; color: #fff !important; }

        .lives-container { font-size: 18px; color: var(--primary); letter-spacing: 2px; }

        #combo-badge {
            position: absolute; top: 80px; right: 20px; background: var(--accent); color: #000;
            padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 14px;
            display: none; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); z-index: 10;
        }
        
        .combo-flame { 
            position: absolute; inset: -5px; border-radius: 35px; border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent); pointer-events: none; animation: flamePulse 0.5s infinite alternate;
            display: none;
        }
        @keyframes flamePulse { from { opacity: 0.3; transform: scale(1); } to { opacity: 0.8; transform: scale(1.05); } }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .floating-text {
            position: absolute; color: var(--primary); font-weight: bold; font-size: 20px;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        #result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .result-card { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 350px; border-radius: 30px; padding: 40px 20px; text-align: center; animation: slideUp 0.4s ease-out; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--subtext); cursor: pointer; }

        #level-complete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2500; display: none; align-items: center; justify-content: center; padding: 20px; }
        .level-card { background: #111; border: 2px solid var(--division-gold); width: 100%; max-width: 320px; border-radius: 35px; padding: 30px 20px; text-align: center; }
        .progress-container { width: 100%; height: 12px; background: #222; border-radius: 10px; margin: 25px 0; overflow: hidden; border: 1px solid #333; }
        .progress-fill-anim { width: 0%; height: 100%; background: linear-gradient(90deg, var(--division-gold), #fff); transition: width 1.5s ease-in-out; }
        .star-anim { font-size: 40px; color: var(--accent); margin: 10px 0; display: block; animation: starPop 0.6s infinite alternate; }

        .leaderboard-card { width: 100%; max-width: 400px; height: 85vh; background: var(--card); border-radius: 25px; padding: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin-bottom: 25px; height: 190px; position: relative; }
        .podium-item { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; text-align: center; }
        .podium-avatar { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #333; background: #222; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .podium-step { width: 100%; border-radius: 10px 10px 5px 5px; display: flex; flex-direction: column; align-items: center; padding-top: 10px; position: relative; }
        .rank-1 { height: 100px; background: linear-gradient(180deg, #ffd700, #b8860b); order: 2; z-index: 3; }
        .rank-2 { height: 75px; background: linear-gradient(180deg, #e0e0e0, #708090); order: 1; z-index: 2; }
        .rank-3 { height: 60px; background: linear-gradient(180deg, #cd7f32, #8b4513); order: 3; z-index: 1; }

        .rank-list-container { flex: 1; overflow-y: auto; }
        .rank-item { display: flex; align-items: center; background: var(--nav); padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
        .rank-num { width: 30px; font-weight: 900; color: var(--subtext); }
        .rank-name { flex: 1; padding: 0 10px; color: var(--text); overflow: hidden; text-overflow: ellipsis; }

        .profile-card { width: 100%; max-width: 400px; background: var(--card); border-radius: 30px; padding: 30px; text-align: center; }
        .avatar-container { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .avatar-circle { width: 100%; height: 100%; background: var(--nav); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid var(--primary); overflow: hidden; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .edit-avatar-badge { position: absolute; bottom: 0; right: 0; background: var(--primary); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; border: 3px solid var(--card); }

        #crop-modal { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .crop-container { width: 100%; max-width: 350px; height: 350px; margin-bottom: 30px; }
        .crop-btns { display: flex; gap: 15px; width: 100%; max-width: 350px; }
        .crop-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; }

        .nav-bar { height: 70px; background: var(--nav); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: var(--subtext); font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }
        .hidden-nav { display: none; }

        #offline-notice { position: fixed; top: -100px; left: 0; right: 0; background: var(--danger); color: white; padding: 15px; text-align: center; z-index: 5000; transition: 0.5s; }
        #offline-notice.show { top: 0; }

        .boss-active #main-game-card { border-color: var(--boss); box-shadow: 0 0 30px rgba(255, 0, 85, 0.6); }
        #resume-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #resume-countdown { font-size: 100px; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

<canvas id="visualizer"></canvas>

<div id="offline-notice">⚠️ Internet aloqasi yo'q!</div>

<div id="loading-screen">
    <div class="loader">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <h1 style="color:var(--primary); margin-top:20px;">SongLyrics</h1>
</div>

<div id="reg-screen">
    <div class="reg-card">
        <h2 style="color:var(--primary); margin-bottom:20px; text-align:center;">Ro'yxatdan o'tish</h2>
        <input type="text" id="reg-name" class="reg-input" placeholder="Ismingiz">
        <input type="text" id="reg-surname" class="reg-input" placeholder="Familiyangiz">
        <input type="date" id="reg-birthdate" class="reg-input">
        <button class="start-btn" onclick="completeRegistration()">TAYYOR</button>
    </div>
</div>

<div id="resume-overlay">
    <div id="resume-countdown">3</div>
</div>

<div id="level-complete-modal">
    <div class="level-card">
        <span class="star-anim">🏆</span>
        <h2 id="lvl-complete-title" style="color:var(--division-gold);">DIVISION UP!</h2>
        <div class="progress-container"><div id="lvl-progress-fill" class="progress-fill-anim"></div></div>
        <p id="lvl-info-text"></p>
    </div>
</div>

<div id="result-modal">
    <div class="result-card">
        <span class="close-modal" onclick="closeResultModal()">✕</span>
        <h1 id="result-title">O'yin tugadi!</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 800; margin-bottom: 5px;">0</div>
        <p id="final-level" style="color:var(--division-gold); margin-bottom: 25px;">DIVISION: 10</p>
        <button class="start-btn" onclick="restartGame()">QAYTA O'YNASH</button>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-container"><div id="crop-area"></div></div>
    <div class="crop-btns">
        <button class="crop-btn" onclick="cancelCrop()">BEKOR</button>
        <button class="crop-btn" onclick="confirmCrop()" style="background:var(--primary)">TAYYOR</button>
    </div>
</div>

<div id="app-container">
    <div id="page-game" class="page active-page">
        <div class="game-card" id="main-game-card">
            <div id="combo-flame" class="combo-flame"></div>
            <div id="combo-badge">COMBO x1</div>
            <div id="game-ui" style="display:none;">
                <div style="display:flex; justify-content:space-between; margin-bottom: 25px;">
                    <div id="game-stats-left"><span id="score">BALL: 0</span><br><span id="round-counter"></span></div>
                    <div style="text-align: right;"><div id="lives" class="lives-container">🎵🎵🎵</div><span id="timer">--</span></div>
                </div>
                <div class="vinyl" id="disc"><div id="disc-center"></div></div>
                <p id="status" style="margin: 15px 0; font-weight: bold;"></p>
                <div id="options-box" class="options-grid"></div>
            </div>
            <div id="pre-game">
                <div id="pre-division-badge" class="division-badge">DIVISION 10</div>
                <h2>SongLyrics League</h2>
                <button class="main-play-btn" onclick="startGame('uzbek')">O'yinni boshlash</button>
            </div>
        </div>
    </div>

    <div id="page-rank" class="page">
        <div class="leaderboard-card">
            <h2 style="text-align:center; margin-bottom:10px;">LEADERBOARD</h2>
            <div class="podium-container" id="top-three-podium"></div>
            <div class="rank-list-container" id="rank-list"></div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-card">
            <input type="file" id="avatar-upload" style="display: none;">
            <div class="avatar-container">
                <div class="avatar-circle" id="profile-avatar" onclick="document.getElementById('avatar-upload').click()">👤</div>
            </div>
            <input type="text" id="profile-input-name" style="background:none; border:none; color:#fff; text-align:center; font-size:20px; font-weight:bold; width:100%;">
            <p id="profile-age-info"></p>
            <button id="save-profile-btn" class="start-btn" style="display:none;">SAQLASH</button>
            <div style="margin-top:20px;">
                <p>DIVISION: <span id="best-level">10</span></p>
                <p>XP: <span id="total-xp">0</span></p>
            </div>
        </div>
    </div>

    <nav class="nav-bar" id="bottom-nav">
        <div class="nav-item active" onclick="showPage('game', this)"><span>🎮</span><span>O'yin</span></div>
        <div class="nav-item" onclick="showPage('rank', this)"><span>🏆</span><span>Liga</span></div>
        <div class="nav-item" onclick="showPage('profile', this)"><span>👤</span><span>Profil</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, query, orderByChild, limitToLast, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "guest_" + Math.floor(Math.random()*1000), first_name: "Mehmon" };
    let allQuestions = [], questions = [], currentIdx = 0, score = 0, lives = 3, timerInterval, audio = new Audio();
    let isPlaying = false, isPaused = false, comboCount = 0, currentDivision = 10, totalXp = 0;
    let isBossRound = false, bossQuestion = null, adminTimerSettings = {}, usedQuestions = new Set();
    let audioContext, analyser, dataArray, canvas, ctx, animationId, croppieInstance = null;

    const XP_REQS = { 10: 0, 9: 500, 8: 1500, 7: 3000, 6: 5000, 5: 8000, 4: 12000, 3: 18000, 2: 25000, 1: 40000 };

    function getDivFromXp(xp) {
        let div = 10;
        for (let d = 10; d >= 1; d--) { if (xp >= XP_REQS[d]) div = d; }
        return div;
    }

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            checkRegistration();
        }, 2000);
    };

    async function checkRegistration() {
        try {
            const snap = await get(ref(db, `leaderboard/${user.id}`));
            if (snap.exists() && snap.val().registered) {
                document.getElementById('app-container').style.display = 'flex';
                loadProfileData();
            } else {
                document.getElementById('reg-screen').style.display = 'flex';
            }
        } catch (e) { document.getElementById('reg-screen').style.display = 'flex'; }
    }

    window.completeRegistration = async () => {
        const name = document.getElementById('reg-name').value.trim();
        const bday = document.getElementById('reg-birthdate').value;
        if (name.length < 3 || !bday) return tg.showAlert("Ma'lumotlarni to'ldiring!");
        await set(ref(db, `leaderboard/${user.id}`), { id: user.id, name, birthdate: bday, score: 0, level: 10, total_xp: 0, registered: true });
        location.reload();
    };

    window.startGame = async (cat) => {
        isPlaying = true;
        document.getElementById('pre-game').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('bottom-nav').classList.add('hidden-nav');
        initGame();
    };

    async function initGame() {
        const snap = await get(ref(db, `questions/uzbek`));
        if(snap.exists()) {
            allQuestions = Object.values(snap.val());
            loadLevelQuestions();
        }
    }

    function loadLevelQuestions() {
        let diff = 11 - currentDivision;
        questions = allQuestions.filter(q => (q.level || 1) == diff).sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIdx = 0;
        loadRound();
    }

    async function loadRound() {
        if (currentIdx >= questions.length || lives <= 0) return endGame();
        const q = questions[currentIdx];
        document.getElementById('round-counter').innerText = `SAVOL: ${currentIdx + 1}/5`;
        const url = await fetchMusic(q.search_term);
        if (url) {
            audio.src = url;
            audio.play();
            startTimer(10);
            renderOptions(q);
        } else { currentIdx++; loadRound(); }
    }

    function renderOptions(q) {
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        box.classList.add('show-options');
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn reveal';
            btn.innerText = opt;
            btn.onclick = () => {
                if (opt === q.options[q.correct]) {
                    score += 10;
                    btn.classList.add('correct');
                } else {
                    lives--;
                    btn.classList.add('wrong');
                    updateLivesUI();
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1000);
            };
            box.appendChild(btn);
        });
    }

    function startTimer(s) {
        let t = s;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if (t <= 0) { clearInterval(timerInterval); currentIdx++; loadRound(); }
        }, 1000);
    }

    async function fetchMusic(term) {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=1&entity=song`);
        const data = await res.json();
        return data.results[0]?.previewUrl;
    }

    function updateLivesUI() { document.getElementById('lives').innerText = "🎵".repeat(lives); }

    function endGame() {
        isPlaying = false;
        audio.pause();
        document.getElementById('result-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        saveScore();
    }

    async function saveScore() {
        const snap = await get(ref(db, `leaderboard/${user.id}`));
        const d = snap.val();
        const newXp = (d.total_xp || 0) + score;
        await update(ref(db, `leaderboard/${user.id}`), { total_xp: newXp, level: getDivFromXp(newXp) });
    }

    window.showPage = (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('page-' + id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if (id === 'rank') loadLeaderboard();
    };

    async function loadLeaderboard() {
        const snap = await get(query(ref(db, 'leaderboard'), orderByChild('total_xp'), limitToLast(10)));
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        Object.values(snap.val() || {}).sort((a,b) => b.total_xp - a.total_xp).forEach((u, i) => {
            list.innerHTML += `<div class="rank-item"><span>#${i+1}</span><span>${u.name}</span><span>${u.total_xp} XP</span></div>`;
        });
    }

    function loadProfileData() {
        get(ref(db, `leaderboard/${user.id}`)).then(snap => {
            const d = snap.val();
            document.getElementById('profile-input-name').value = d.name;
            document.getElementById('total-xp').innerText = d.total_xp;
            document.getElementById('best-level').innerText = d.level;
        });
    }

    window.restartGame = () => location.reload();
    window.closeResultModal = () => location.reload();

</script>
</body>
