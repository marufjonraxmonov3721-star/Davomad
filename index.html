<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRC Maker Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #ff5722; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .preview-box { 
            width: 100%; height: 250px; background: #1a1a1a; border-radius: 15px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }
        #text-render { font-size: 22px; font-weight: bold; padding: 20px; transition: 0.2s; }
        .controls { background: #111; padding: 20px; border-radius: 15px; text-align: left; }
        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box;
        }
        .btn-save { background: var(--primary); font-weight: bold; border: none; font-size: 16px; cursor: pointer; }
        .btn-save:disabled { background: #555; }
        #progress-bar { width: 0%; height: 5px; background: var(--primary); position: fixed; top: 0; left: 0; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <div class="preview-box" id="capture-zone">
        <div id="text-render">Musiqa va LRC yuklang</div>
    </div>

    <div class="controls">
        <label>MP3 fayl:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        
        <label>LRC fayl:</label>
        <input type="file" id="lrc-input" accept=".lrc">

        <label>Matn stili:</label>
        <select id="style-select">
            <option value="white">Klassik Oq</option>
            <option value="#ffcc00">Oltin rang</option>
            <option value="#00e676">Neon Yashil</option>
            <option value="#ff4081">Pushti</option>
        </select>

        <audio id="player" controls style="width: 100%;"></audio>

        <button class="btn-save" id="save-btn" onclick="startExport()">VIDEONI SAQLASH (MP4)</button>
        <p style="font-size: 10px; color: #777; text-align: center;">Eksport tugaguncha sahifani yopmang!</p>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const player = document.getElementById('player');
    const textRender = document.getElementById('text-render');
    const saveBtn = document.getElementById('save-btn');
    const progressBar = document.getElementById('progress-bar');
    let lyrics = [];

    // Stil o'zgarishi
    document.getElementById('style-select').onchange = (e) => textRender.style.color = e.target.value;

    // LRC o'qish
    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x && x.text);
            textRender.innerText = "LRC tayyor!";
        };
        reader.readAsText(e.target.files[0]);
    };

    document.getElementById('audio-input').onchange = (e) => {
        player.src = URL.createObjectURL(e.target.files[0]);
    };

    // Sinxronizatsiya
    player.ontimeupdate = () => {
        const active = lyrics.findLast(l => player.currentTime >= l.t);
        if (active) textRender.innerText = active.text;
    };

    async function startExport() {
        if (!player.src || lyrics.length === 0) return tg.showAlert("Fayllarni to'liq yuklang!");

        saveBtn.disabled = true;
        const duration = player.duration;
        const chunks = [];
        const stream = document.getElementById('capture-zone').captureStream(30);
        
        // Audio qo'shish
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        audioCtx.createMediaElementSource(player).connect(dest);
        dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            // Yuklab olish uchun havola
            const a = document.createElement('a');
            a.href = url;
            a.download = `lyric_video_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            
            // Telegram bot orqali yuborishga urinish (Eng ishonchli yo'l)
            tg.showAlert("Eksport tugadi! Agar yuklanish boshlanmasa, buni bosing.");
            saveBtn.disabled = false;
            saveBtn.innerText = "YANA SAQLASH";
            progressBar.style.width = "0%";
        };

        player.currentTime = 0;
        recorder.start();
        player.play();

        const trackProgress = setInterval(() => {
            const p = (player.currentTime / duration) * 100;
            progressBar.style.width = p + "%";
            saveBtn.innerText = `YOZILMOQDA: ${Math.floor(p)}%`;

            if (player.ended || player.currentTime >= duration) {
                recorder.stop();
                player.pause();
                clearInterval(trackProgress);
            }
        }, 500);
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
