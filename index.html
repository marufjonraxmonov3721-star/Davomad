<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | 100% Fixed Audio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .list-screen { padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer;
        }

        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }

        /* Matn maydoni */
        #lyric-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 60%;
            z-index: 2; display: flex; align-items: center; justify-content: center;
            padding: 30px; box-sizing: border-box; text-align: center;
        }
        #current-lyric { font-size: 2rem; font-weight: 800; line-height: 1.3; text-shadow: 0 0 10px rgba(0,0,0,1); }

        /* Telegram uchun majburiy Play tugmasi */
        #central-play-btn {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: var(--accent); color: #000; border: none;
            width: 80px; height: 80px; border-radius: 50%; font-size: 30px;
            cursor: pointer; box-shadow: 0 0 20px var(--accent);
        }

        /* YouTube pleyerini butunlay yashirmaymiz (bloklamasligi uchun) */
        #yt-wrapper {
            position: absolute; bottom: 120px; left: 10px; 
            width: 80px; height: 45px; z-index: 1; border-radius: 8px; overflow: hidden;
            opacity: 0.3; /* Bir oz ko'rinib turishi xavfsizroq */
        }

        #style-panel {
            position: absolute; bottom: 0; width: 100%; background: #111;
            padding: 15px; box-sizing: border-box; z-index: 3; border-top: 1px solid #333;
        }
        .setting-row { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; }
        .style-btn {
            background: #222; border: 1px solid #444; color: #fff; padding: 6px 12px;
            border-radius: 15px; font-size: 0.75rem; white-space: nowrap;
        }
        .style-btn.active { background: var(--accent); color: #000; }

        .close-btn {
            position: absolute; top: 15px; right: 15px; z-index: 10001;
            background: #333; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%;
        }

        .anim-fade { animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="list-screen" id="list-ui">
        <h2 style="color: var(--accent); text-align:center;">SongLyrics</h2>
        <div id="songs-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <button id="central-play-btn" onclick="startAudio()">▶</button>
        
        <div id="lyric-container">
            <div id="current-lyric">Musiqani tanlang</div>
        </div>

        <div id="yt-wrapper">
            <div id="player"></div>
        </div>

        <div id="style-panel">
            <div style="font-size: 0.7rem; color: #888;">SHRIFT</div>
            <div class="setting-row" id="font-settings">
                <button class="style-btn active" onclick="changeFont('sans-serif', this)">Oddiy</button>
                <button class="style-btn" onclick="changeFont('serif', this)">Klassik</button>
                <button class="style-btn" onclick="changeFont('cursive', this)">Qo'lyozma</button>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncInt, isReady = false, activeVid = "";

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'playsinline': 1, 'controls': 0, 'modestbranding': 1 },
            events: { 
                'onReady': () => { isReady = true; },
                'onStateChange': (e) => { if(e.data == 1) startLyrics(); else clearInterval(syncInt); }
            }
        });
    }

    function startLyrics() {
        clearInterval(syncInt);
        syncInt = setInterval(() => {
            const time = ytPlayer.getCurrentTime();
            const line = currentLyrics.findLast(l => time >= l.time);
            if (line) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== line.text) {
                    el.innerText = line.text;
                    el.classList.remove('anim-fade');
                    void el.offsetWidth;
                    el.classList.add('anim-fade');
                }
            }
        }, 100);
    }

    function openPlayer(data) {
        activeVid = data.youtubeId;
        currentLyrics = parseLRC(data.lyrics || "");
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('central-play-btn').style.display = 'block';
        document.getElementById('current-lyric').innerText = "Tayyor";
    }

    function startAudio() {
        if(!isReady) return;
        document.getElementById('central-play-btn').style.display = 'none';
        ytPlayer.loadVideoById(activeVid);
        ytPlayer.playVideo();
    }

    function closePlayer() {
        clearInterval(syncInt);
        ytPlayer.stopVideo();
        document.getElementById('list-ui').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function changeFont(f, b) {
        document.getElementById('current-lyric').style.fontFamily = f;
        const btns = document.querySelectorAll('#font-settings .style-btn');
        btns.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `<div><b>${data.track}</b><br><small>${data.artist}</small></div><div style="color:var(--accent)">▶</div>`;
            card.onclick = () => openPlayer(data);
            list.appendChild(card);
        });
    });
</script>
</body>
</html>
