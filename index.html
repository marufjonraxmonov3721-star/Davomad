<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaCaption Pro | LRC Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --bg-color: #09090b;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .header {
            padding: 20px;
            text-align: left;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin: 0; font-size: 24px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 0; font-size: 12px; color: #71717a; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #a1a1aa; }

        .bg-selector { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .bg-selector::-webkit-scrollbar { display: none; }
        .bg-option { 
            min-width: 70px; height: 110px; border-radius: 14px; cursor: pointer; 
            border: 2px solid transparent; object-fit: cover; transition: 0.3s;
            filter: brightness(0.7);
        }
        .bg-option.active { border-color: #bc1888; transform: scale(1.05); filter: brightness(1); }

        input[type="file"] { display: none; }
        .file-label {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #27272a; padding: 12px; border-radius: 14px; cursor: pointer; transition: 0.2s;
            margin-bottom: 10px; font-size: 14px;
        }

        select, .num-input {
            width: 100%; background: #18181b; border: 1px solid #27272a; border-radius: 14px;
            padding: 15px; color: #fff; font-size: 16px; margin-top: 10px; box-sizing: border-box;
        }

        .row { display: flex; gap: 10px; }

        .preview-wrapper {
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 20px; overflow: hidden; margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        canvas { width: 100%; height: 100%; object-fit: cover; }

        .btn-main {
            width: 100%; padding: 18px; background: var(--primary-gradient);
            color: white; border: none; border-radius: 16px; margin-top: 25px;
            font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3);
        }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #27272a; z-index: 1000;
        }
        .nav-item { color: #71717a; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: #bc1888; }
        .nav-item i { font-size: 20px; }

        #status { margin-top: 15px; font-size: 13px; color: #bc1888; font-weight: 500; }
        .lyrics-preview { font-size: 12px; color: #2481cc; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>InstaCaption</h1>
        <p>LRC matn bilan sinxron video yarating</p>
    </div>

    <div class="container">
        <div class="glass-card">
            <label><i class="fa-solid fa-image"></i> Orqa fonni tanlang</label>
            <div class="bg-selector" id="bgSelector">
                <img src="https://picsum.photos/id/10/1080/1920" class="bg-option active" data-url="https://picsum.photos/id/10/1080/1920">
                <img src="https://picsum.photos/id/15/1080/1920" class="bg-option" data-url="https://picsum.photos/id/15/1080/1920">
                <img src="https://picsum.photos/id/22/1080/1920" class="bg-option" data-url="https://picsum.photos/id/22/1080/1920">
                <img src="https://picsum.photos/id/28/1080/1920" class="bg-option" data-url="https://picsum.photos/id/28/1080/1920">
                <img src="https://picsum.photos/id/48/1080/1920" class="bg-option" data-url="https://picsum.photos/id/48/1080/1920">
            </div>

            <label><i class="fa-solid fa-music"></i> Fayllarni yuklang</label>
            
            <label for="audioUpload" class="file-label">
                <i class="fa-solid fa-music"></i> <span id="audioName">Qoshiqni tanlang (.mp3)</span>
            </label>
            <input type="file" id="audioUpload" accept="audio/*">

            <label for="lrcUpload" class="file-label">
                <i class="fa-solid fa-file-lines"></i> <span id="lrcName">LRC faylni tanlang (.lrc)</span>
            </label>
            <input type="file" id="lrcUpload" accept=".lrc">
            <div id="lyricsStatus" class="lyrics-preview"></div>
        </div>

        <div class="glass-card">
            <label><i class="fa-solid fa-sliders"></i> Sozlamalar</label>
            <div class="row">
                <select id="videoQuality">
                    <option value="8000000">Ultra HD (4K)</option>
                    <option value="4000000">HD (1080p)</option>
                    <option value="1500000">Standart (720p)</option>
                </select>
                <input type="number" id="startTime" class="num-input" placeholder="Start (sek)" value="0">
                <input type="number" id="duration" class="num-input" placeholder="Davomiyligi" value="15">
            </div>
        </div>

        <div class="preview-wrapper">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
        </div>
        
        <button class="btn-main" id="renderBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> VIDEONI TAYYORLASH
        </button>
        <div id="status"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Asosiy</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Tez kunda!')"><i class="fa-solid fa-layer-group"></i>Shablonlar</a>
        <a href="#" class="nav-item" onclick="tg.showConfirm('Yordam kerakmi?')"><i class="fa-solid fa-circle-question"></i>Yordam</a>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();
    tg.ready();

    const audioInput = document.getElementById('audioUpload');
    const lrcInput = document.getElementById('lrcUpload');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const bgOptions = document.querySelectorAll('.bg-option');

    let audioEl = new Audio();
    let bgImage = new Image();
    let lyrics = []; // Sinxronlangan matnlar uchun massiv
    let currentText = "";

    bgImage.crossOrigin = "anonymous";
    bgImage.src = bgOptions[0].dataset.url;

    // LRC Parser: [00:12.34] Matn -> {time: 12.34, text: "Matn"}
    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const result = [];
        const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;

        lines.forEach(line => {
            const matches = line.match(timeExp);
            if (matches) {
                const text = line.replace(timeExp, '').trim();
                matches.forEach(m => {
                    const parts = m.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                    const time = parseInt(parts[1]) * 60 + parseInt(parts[2]) + parseInt(parts[3]) / 100;
                    result.push({ time, text });
                });
            }
        });
        return result.sort((a, b) => a.time - b.time);
    }

    lrcInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                lyrics = parseLRC(event.target.result);
                document.getElementById('lrcName').innerText = file.name;
                document.getElementById('lyricsStatus').innerText = "Matn yuklandi: " + lyrics.length + " qator";
            };
            reader.readAsText(file);
        }
    };

    bgOptions.forEach(opt => {
        opt.onclick = () => {
            bgOptions.forEach(b => b.classList.remove('active'));
            opt.classList.add('active');
            bgImage.src = opt.dataset.url;
            tg.HapticFeedback.impactOccurred('light');
        };
    });

    audioInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            audioEl.src = URL.createObjectURL(file);
            document.getElementById('audioName').innerText = file.name.substring(0, 20);
        }
    };

    function updateLyrics(currentTime) {
        const active = lyrics.filter(l => l.time <= currentTime).pop();
        currentText = active ? active.text : "";
    }

    bgImage.onload = () => drawFrame();

    function drawFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        
        // Dark Overlay
        let grad = ctx.createLinearGradient(0, canvas.height * 0.6, 0, canvas.height);
        grad.addColorStop(0, "transparent");
        grad.addColorStop(1, "rgba(0,0,0,0.85)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Lyrics Text
        ctx.fillStyle = "white";
        ctx.font = "bold 72px 'SF Pro Display'";
        ctx.textAlign = "center";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        
        ctx.fillText(currentText, canvas.width / 2, canvas.height / 2);

        requestAnimationFrame(drawFrame);
    }

    document.getElementById('renderBtn').onclick = async () => {
        if (!audioInput.files[0] || lyrics.length === 0) {
            tg.HapticFeedback.notificationOccurred('error');
            return tg.showPopup({message: "Iltimos, qo'shiq va LRC faylni yuklang!"});
        }
        
        const startTime = parseFloat(document.getElementById('startTime').value);
        const duration = parseFloat(document.getElementById('duration').value);
        const quality = document.getElementById('videoQuality').value;

        tg.HapticFeedback.impactOccurred('medium');
        status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Video tayyorlanmoqda...';
        
        const stream = canvas.captureStream(60); 
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: parseInt(quality)
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', tg.initDataUnsafe.user?.id);
            formData.append('video', videoBlob, 'sync_video.mp4');
            formData.append('caption', "🚀 LRC Sync orqali tayyorlandi!");

            try {
                status.innerHTML = 'Botga yuborilmoqda...';
                const response = await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                if(response.ok) {
                    status.innerHTML = 'Muvaffaqiyatli yuborildi! ✅';
                    tg.HapticFeedback.notificationOccurred('success');
                }
                const a = document.createElement('a');
                a.href = URL.createObjectURL(videoBlob);
                a.download = "caption_video.mp4";
                a.click();
            } catch (err) { status.innerText = "Xatolik!"; }
        };

        audioEl.currentTime = startTime;
        audioEl.play();
        recorder.start();

        const renderInterval = setInterval(() => {
            updateLyrics(audioEl.currentTime);
        }, 50);

        setTimeout(() => {
            recorder.stop();
            audioEl.pause();
            clearInterval(renderInterval);
        }, duration * 1000);
    };
</script>

</body>
</html>
