<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Solo Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #151515; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #game-container { width: 92%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid #222; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .vinyl { width: 160px; height: 160px; margin: 20px auto; background: radial-gradient(circle, #333 5%, #111 30%, #000 100%); border-radius: 50%; border: 5px solid #222; position: relative; }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .option-btn { background: #222; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; margin-top: 10px; width: 100%; cursor: pointer; font-size: 16px; transition: 0.2s; outline: none; }
        .correct { background: var(--primary) !important; color: #000 !important; font-weight: bold; border-color: var(--primary); }
        .wrong { background: #ff3e3e !important; border-color: #ff3e3e; }
        #start-screen { position: absolute; inset: 0; background: var(--card); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 30px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="color:var(--primary); font-size: 32px; margin-bottom:10px;">SongLyrics</h1>
        <p style="color:#666; margin-bottom:30px;">Faqat yakkaxon qo'shiqlar</p>
        <button onclick="startGame()" style="background:var(--primary); border:none; padding:18px 50px; border-radius:15px; font-weight:bold; font-size:18px; cursor:pointer;">BOSHLASH</button>
    </div>
    
    <div id="quiz-screen">
        <div style="display:flex; justify-content:space-between; font-size:14px; color:var(--primary); font-weight:bold;">
            <span id="score">BALL: 0</span> <span id="timer">15</span>
        </div>
        <div class="vinyl" id="disc">
            <div style="position:absolute; inset: 60px; background:var(--primary); border-radius:50%; border:6px solid #000;"></div>
        </div>
        <p id="status" style="color:#888; font-size:13px; height: 20px;"></p>
        <div id="options-box"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;

    let questions = [], currentIdx = 0, score = 0, timerInterval, audio = new Audio();

    window.startGame = () => {
        document.getElementById('start-screen').style.display = 'none';
        audio.play().catch(() => {});
        init();
    };

    async function init() {
        const snap = await get(ref(db, 'questions'));
        if(snap.exists()) {
            questions = Object.values(snap.val()).sort(() => 0.5 - Math.random());
            loadRound();
        }
    }

    // DUET FILTRLASH FUNKSIYASI
    async function fetchMusic(term, isRetry = false) {
        try {
            // Ko'proq natija olamiz (5 ta), shunda duet bo'lsa keyingisiga o'ta olamiz
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&limit=10&entity=song`);
            const data = await res.json();
            
            if (data.results && data.results.length > 0) {
                // Duet qo'shiqlarni chiqarib tashlaymiz
                const soloTracks = data.results.filter(track => {
                    const fullName = (track.artistName + " " + track.trackName).toLowerCase();
                    const duetMarkers = ["&", "feat", "with", " x ", " va "];
                    // Agar xonanda ismida & bo'lmasa-yu, qo'shiqchi ismida duet belgilari bo'lsa rad etiladi
                    return !duetMarkers.some(marker => track.artistName.toLowerCase().includes(marker)) && 
                           !duetMarkers.some(marker => track.trackCensoredName.toLowerCase().includes(marker));
                });

                if (soloTracks.length > 0) {
                    return soloTracks[0].previewUrl; // Eng birinchi yakkaxon qo'shiq
                }
            }
            
            // Agar solo topilmasa va qidiruvda "-" bo'lsa, faqat xonanda ismini o'zi bilan qayta urinish
            if (!isRetry && term.includes('-')) {
                return await fetchMusic(term.split('-')[0].trim(), true);
            }
            
            // Agar hech narsa topilmasa, borini qaytaramiz (lekin duet ehtimoli kamaydi)
            return data.results && data.results[0] ? data.results[0].previewUrl : null;
        } catch (e) { return null; }
    }

    async function loadRound() {
        if(currentIdx >= questions.length) { 
            tg.showPopup({ message: `O'yin tugadi! Jami ball: ${score}` });
            location.reload(); 
            return; 
        }
        
        const q = questions[currentIdx];
        const status = document.getElementById('status');
        const optionsBox = document.getElementById('options-box');
        const disc = document.getElementById('disc');

        status.innerText = "Yakkaxon qo'shiq qidirilmoqda...";
        optionsBox.innerHTML = "";
        disc.classList.remove('spinning');
        audio.pause();

        const musicUrl = await fetchMusic(q.search_term);

        if(musicUrl) {
            audio.src = musicUrl;
            audio.play().then(() => {
                disc.classList.add('spinning');
                startTimer();
                status.innerText = "Musiqa yangramoqda...";
            });
        } else {
            status.innerText = "Musiqa topilmadi, o'tkazildi...";
            setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            return;
        }

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                
                if(i === q.correct) {
                    btn.classList.add('correct');
                    score += 10;
                    document.getElementById('score').innerText = "BALL: " + score;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    btn.classList.add('wrong');
                    btns[q.correct].classList.add('correct');
                    tg.HapticFeedback.notificationOccurred('error');
                }
                setTimeout(() => { currentIdx++; loadRound(); }, 1500);
            };
            optionsBox.appendChild(btn);
        });
    }

    function startTimer() {
        let t = 15;
        document.getElementById('timer').innerText = t;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timerInterval); currentIdx++; loadRound(); }
        }, 1000);
    }
</script>
</body>
</html>
