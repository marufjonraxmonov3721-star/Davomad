<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Caption Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; margin: 0; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #2481cc; max-width: 400px; margin: auto; }
        
        /* Instagram 9:16 Preview Box */
        .preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #333;
        }
        canvas { width: 100%; height: 100%; object-fit: cover; }

        input, textarea { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; background: #262626; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: none; border-radius: 12px; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #status { margin-top: 12px; font-size: 13px; color: #0095f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0; font-size: 22px;">Insta High Quality 💎</h2>
    
    <label style="display:block; margin-top:10px; font-size:12px; color:#aaa;">Video (9:16 bo'lsa yaxshi):</label>
    <input type="file" id="videoUpload" accept="video/*">
    
    <label style="display:block; margin-top:10px; font-size:12px; color:#aaa;">Muzika:</label>
    <input type="file" id="audioUpload" accept="audio/*">

    <div style="display: flex; gap: 10px;">
        <input type="number" id="startTime" placeholder="Boshlanishi" value="0">
        <input type="number" id="duration" placeholder="Sekund" value="10">
    </div>

    <textarea id="captionInput" placeholder="Caption yozing (Masalan: Muhabbat yomon ekan...)"></textarea>

    <div class="preview-container">
        <canvas id="previewCanvas" width="1080" height="1920"></canvas>
    </div>
    
    <button class="btn" id="renderBtn">HQ FORMATDA TAYYORLASH</button>
    <div id="status"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const videoInput = document.getElementById('videoUpload');
    const audioInput = document.getElementById('audioUpload');
    const captionInput = document.getElementById('captionInput');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let videoEl = document.createElement('video');
    let audioEl = new Audio();
    let isDrawing = false;

    videoInput.onchange = (e) => {
        const file = e.target.files[0];
        videoEl.src = URL.createObjectURL(file);
        videoEl.muted = true;
        videoEl.loop = true;
        videoEl.play();
        if(!isDrawing) { isDrawing = true; drawFrame(); }
    };

    audioInput.onchange = (e) => {
        audioEl.src = URL.createObjectURL(e.target.files[0]);
    };

    function drawFrame() {
        // Video-ni 9:16 formatda to'liq to'ldirib chizish (Cover effect)
        const vWidth = videoEl.videoWidth;
        const vHeight = videoEl.videoHeight;
        const canvasRatio = canvas.width / canvas.height;
        const videoRatio = vWidth / vHeight;

        let sx, sy, sWidth, sHeight;
        if (videoRatio > canvasRatio) {
            sHeight = vHeight;
            sWidth = vHeight * canvasRatio;
            sx = (vWidth - sWidth) / 2;
            sy = 0;
        } else {
            sWidth = vWidth;
            sHeight = vWidth / canvasRatio;
            sx = 0;
            sy = (vHeight - sHeight) / 2;
        }

        ctx.drawImage(videoEl, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
        
        // Kinematik qora soya (gradient) - matn yaxshi o'qilishi uchun
        let grad = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
        grad.addColorStop(0, "transparent");
        grad.addColorStop(1, "rgba(0,0,0,0.8)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height * 0.5, canvas.width, canvas.height * 0.5);

        // Professional Matn (Instagram uslubida)
        ctx.fillStyle = "white";
        ctx.font = "bold 65px sans-serif"; // Katta va aniq shrift
        ctx.textAlign = "center";
        
        const text = captionInput.value;
        const lines = text.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, canvas.width / 2, (canvas.height / 2) + (i * 80));
        });

        requestAnimationFrame(drawFrame);
    }

    document.getElementById('renderBtn').onclick = async () => {
        if (!videoInput.files[0]) return alert("Video yuklang!");
        
        status.innerText = "HQ Render boshlandi... 4K sifatda tayyorlanmoqda...";
        
        // Yuqori sifat (Video Bits per second ni oshiramiz)
        const stream = canvas.captureStream(60); // 60 FPS silliq video uchun
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: 8000000 // 8 Mbps - High Quality
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const chatId = tg.initDataUnsafe.user.id;
            
            // Botga yuborish
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', videoBlob, 'insta_hq_video.mp4');
            formData.append('caption', "🚀 1 Mln Prosmotr uradigan video tayyor!\n\n#instagram #viral #caption");

            try {
                status.innerText = "Telegramga yuklanmoqda...";
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                status.innerText = "Tayyor! ✅ Video botga yuborildi.";
                // Avtomatik telefonga ham saqlaydi
                const a = document.createElement('a');
                a.href = URL.createObjectURL(videoBlob);
                a.download = "insta_pro.mp4";
                a.click();
            } catch (err) {
                status.innerText = "Xatolik! Sifat juda balandlik qildi.";
            }
        };

        videoEl.currentTime = 0;
        audioEl.currentTime = document.getElementById('startTime').value;
        videoEl.play();
        audioEl.play();
        recorder.start();

        setTimeout(() => {
            recorder.stop();
            videoEl.pause();
            audioEl.pause();
        }, document.getElementById('duration').value * 1000);
    };
</script>

</body>
</html>
