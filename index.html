<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - Instagram HD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        /* Preview 9:16 (Stories) formatga moslandi */
        .preview-box { 
            width: 280px; height: 497px; background: #0a0a0a; border-radius: 20px; 
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }

        #display-text { 
            font-size: 24px; font-weight: bold; color: var(--accent); 
            padding: 20px; line-height: 1.4; text-align: center;
            text-shadow: 0 0 15px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease; 
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 400px; overflow-y: auto; }
        
        .trim-group, .select-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 140px; }

        input, button, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; position: sticky; bottom: 0; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }

        .range-slider { position: relative; height: 40px; margin: 10px 0; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .range-fill { position: absolute; height: 100%; background: rgba(0, 230, 118, 0.3); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        /* Animatsiyalar */
        .anim-fade { animation: fadeIn 0.5s ease forwards; }
        .anim-zoom { animation: zoomIn 0.5s ease forwards; }
        .anim-slideUp { animation: slideUp 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1920"></canvas>

    <div class="controls">
        <label>Media yuklash:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <div class="select-group">
            <div>
                <label>Matn o'lchami:</label>
                <input type="range" id="font-size-slider" min="30" max="180" value="80" oninput="updateLivePreview()">
            </div>
            <div>
                <label>Shrift:</label>
                <select id="font-style" onchange="updateLivePreview()">
                    <option value="sans-serif">Modern Sans</option>
                    <option value="serif">Classic Serif</option>
                    <option value="Impact">Bold Impact</option>
                    <option value="cursive">Handwriting</option>
                    <option value="Verdana">Clear Verdana</option>
                </select>
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Animatsiya:</label>
                <select id="anim-style" onchange="updateLivePreview()">
                    <option value="none">Oddiy</option>
                    <option value="fade">Yumshoq</option>
                    <option value="zoom">Kattalashish</option>
                    <option value="slideUp">Surilish</option>
                </select>
            </div>
            <div>
                <label>Effekt:</label>
                <select id="effect-style" onchange="updateLivePreview()">
                    <option value="black">Deep Black (AMOLED)</option>
                    <option value="neon">Neon Glow</option>
                    <option value="vignette">Cinematic</option>
                </select>
            </div>
        </div>

        <label>Qirqish (Timeline):</label>
        <div class="range-slider" id="trim-slider-container">
            <div class="range-fill" id="range-fill"></div>
        </div>
        
        <div class="trim-group">
            <div><label>Start (s):</label><input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()"></div>
            <div><label>End (s):</label><input type="number" id="trim-end" value="15" step="0.1" oninput="syncSliders()"></div>
        </div>

        <div id="status-text">Fayllarni tanlang</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">INSTAGRAM HD FORMATDA YARATISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const rangeFill = document.getElementById('range-fill');

    let lyrics = [];
    let audioFile = null;
    let fullDuration = 15;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || fullDuration;
        rangeFill.style.left = (start / fullDuration * 100) + "%";
        rangeFill.style.width = ((end - start) / fullDuration * 100) + "%";
    }

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const anim = document.getElementById('anim-style').value;
        
        displayText.style.fontSize = (size / 3) + "px"; // Preview uchun kichraytirildi
        displayText.style.fontFamily = font;
        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;
    }

    document.getElementById('audio-input').onchange = (e) => { 
        audioFile = e.target.files[0]; 
        const tempAudio = new Audio(URL.createObjectURL(audioFile));
        tempAudio.onloadedmetadata = () => {
            fullDuration = tempAudio.duration;
            document.getElementById('trim-end').value = Math.min(fullDuration, 60).toFixed(1);
            syncSliders();
            statusText.innerText = "Audio tayyor.";
        };
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "LRC yuklandi.";
        };
        reader.readAsText(e.target.files[0]);
    };

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Fayllar yetarli emas!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;

        const stream = canvas.captureStream(60); // 60 FPS silliqlik uchun
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        audioCtx.createMediaElementSource(audioTag).connect(dest);
        audioCtx.createMediaElementSource(audioTag).connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

        // Instagram uchun maksimal bitret: 12-15 Mbps
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 15000000 
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            statusText.innerText = "YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Instagram_HD.mp4`);
            formData.append('caption', "🔥 Instagram Stories uchun optimallashgan HD Video!");

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
            statusText.innerText = "✅ TAYYOR!";
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            const now = audioTag.currentTime;
            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";
            
            if (text !== lastText) { lastText = text; animStartTime = now; }
            let animProgress = Math.min((now - animStartTime) / 0.4, 1);

            // Orqa fon (True Black)
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, 1080, 1920);

            const effect = document.getElementById('effect-style').value;
            if(effect === 'neon') {
                ctx.shadowColor = "#00e676"; ctx.shadowBlur = 40;
                ctx.strokeStyle = "#00e676"; ctx.lineWidth = 10;
                ctx.strokeRect(50, 50, 980, 1820);
            }

            const font = document.getElementById('font-style').value;
            const anim = document.getElementById('anim-style').value;
            const fontSize = document.getElementById('font-size-slider').value;

            ctx.save();
            ctx.translate(540, 960);
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${fontSize}px ${font}`;

            // Animatsiya mantiqi
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') ctx.scale(0.8 + animProgress * 0.2, 0.8 + animProgress * 0.2);
            if(anim === 'slideUp') ctx.translate(0, (1 - animProgress) * 50);

            // Matnni o'rtaga chiqarish (ko'p qatorli matn uchun)
            const words = text.split(" ");
            let line = "";
            let y = 0;
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + " ";
                if (ctx.measureText(testLine).width > 900) {
                    ctx.fillText(line, 0, y);
                    line = words[n] + " ";
                    y += parseInt(fontSize) + 20;
                } else { line = testLine; }
            }
            ctx.fillText(line, 0, y);
            ctx.restore();

            if (now < endT && !audioTag.paused) requestAnimationFrame(drawFrame);
            else { audioTag.pause(); recorder.stop(); }
        }
        drawFrame();
    }
    updateLivePreview();
</script>
</body>
</html>
