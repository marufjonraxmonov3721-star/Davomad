<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Battle - Flag Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000; /* AMOLED qora */
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 95%;
            max-width: 400px;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        #score-box { color: #00ff88; font-size: 20px; font-weight: bold; }
        #timer-box { 
            color: #ff3e3e; 
            font-size: 22px; 
            font-weight: bold;
            background: #111;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        /* Bayroq rasmi uchun stil */
        .image-container {
            width: 100%;
            height: 200px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #flag-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* Rasm yuklanguncha ko'rinmaydi */
        }

        .question-text {
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 50px;
            color: #eee;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }
        .option-btn {
            background: #161616;
            border: 1px solid #333;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active { transform: scale(0.97); background: #222; }
        
        /* To'g'ri va xato javob ranglari */
        .correct { background: #00ff88 !important; color: #000 !important; font-weight: bold; border-color: #00ff88; }
        .wrong { background: #ff3e3e !important; color: #fff !important; border-color: #ff3e3e; }

        #result-screen { display: none; }
        .btn-restart {
            margin-top: 25px;
            padding: 15px 40px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-screen">
        <div class="header">
            <div id="score-box">Ball: 0</div>
            <div id="timer-box">15</div>
        </div>

        <div class="image-container">
            <div id="loader" style="color: #555;">Yuklanmoqda...</div>
            <img id="flag-img" src="" alt="Flag">
        </div>

        <div class="question-text" id="q-text">Savol yuklanmoqda...</div>

        <div class="options-grid" id="options-box">
            </div>
    </div>

    <div id="result-screen">
        <h1 style="color: #00ff88; margin-bottom: 10px;">Tamom!</h1>
        <p id="final-result" style="font-size: 24px;">Siz 0 ball to'pladingiz</p>
        <button class="btn-restart" onclick="location.reload()">Qayta boshlash</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;

    const imgEl = document.getElementById('flag-img');
    const loader = document.getElementById('loader');
    const textEl = document.getElementById('q-text');
    const optionsEl = document.getElementById('options-box');
    const scoreEl = document.getElementById('score-box');
    const timerEl = document.getElementById('timer-box');

    async function initGame() {
        const snapshot = await get(ref(db, 'questions'));
        if (snapshot.exists()) {
            questions = Object.values(snapshot.val()).sort(() => 0.5 - Math.random());
            startRound();
        } else {
            textEl.innerText = "Bazada savollar topilmadi!";
        }
    }

    function startRound() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }

        const q = questions[currentIdx];
        
        // Rasmni tayyorlash
        imgEl.style.display = 'none';
        loader.style.display = 'block';
        if (q.image_url) {
            imgEl.src = q.image_url;
            imgEl.onload = () => {
                loader.style.display = 'none';
                imgEl.style.display = 'block';
            };
        }

        textEl.innerText = q.text || "Ushbu bayroq qaysi davlatga tegishli?";
        optionsEl.innerHTML = "";

        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, q.correct, btn);
            optionsEl.appendChild(btn);
        });

        resetTimer();
    }

    function checkAnswer(selected, correct, btn) {
        clearInterval(timer);
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            score += (questions[currentIdx].points || 10);
            scoreEl.innerText = `Ball: ${score}`;
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
        }

        setTimeout(() => {
            currentIdx++;
            startRound();
        }, 1500);
    }

    function resetTimer() {
        clearInterval(timer);
        timeLeft = 15;
        timerEl.innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                currentIdx++;
                startRound();
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-result').innerText = `Siz jami ${score} ball to'pladingiz!`;
    }

    initGame();
</script>

</body>
</html>
