<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD & Audio Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border-radius: 20px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; overflow: hidden; position: relative;
        }

        #display-text { font-size: 28px; font-weight: bold; color: var(--accent); padding: 30px; line-height: 1.4; }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; }
        
        .trim-group { display: flex; gap: 10px; margin: 10px 0; }
        .trim-group div { flex: 1; }

        input, button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
        }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="preview-box" id="render-box">
        <div id="display-text">HD VIDEO MAKER</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1080"></canvas>

    <div class="controls">
        <label style="font-size: 12px; color: #888;">Fayllarni yuklang:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        <input type="file" id="lrc-input" accept=".lrc">

        <label style="font-size: 12px; color: #888;">Qirqish (soniyalarda):</label>
        <div class="trim-group">
            <div>
                <input type="number" id="trim-start" value="0" step="0.1" placeholder="Boshi">
            </div>
            <div>
                <input type="number" id="trim-end" value="30" step="0.1" placeholder="Oxiri">
            </div>
        </div>

        <div id="status-text">Tayyor</div>
        <button class="btn-download" id="start-btn" onclick="startHDExport()">HD VIDEONI YUKLASH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const audioInput = document.getElementById('audio-input');

    let lyrics = [];
    let audioFile = null;

    audioInput.onchange = (e) => {
        audioFile = e.target.files[0];
        statusText.innerText = "Audio yuklandi: " + audioFile.name;
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "LRC yuklandi.";
        };
        reader.readAsText(e.target.files[0]);
    };

    async function startHDExport() {
        if (!audioFile || lyrics.length === 0) return alert("Fayllarni tanlang!");

        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        if (duration <= 0) return alert("Vaqtni to'g'ri kiriting!");

        startBtn.disabled = true;
        
        // 1. Audio tizimi (Ovozni tiniq qilish uchun)
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;
        
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);

        // 2. Video tizimi (Sifatli Bitrate bilan)
        const stream = canvas.captureStream(30);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));

        const recorder = new MediaRecorder(stream, {
            mimeType: 'video/webm;codecs=vp9,opus',
            videoBitsPerSecond: 10000000 // 10 Mbps (HD sifat)
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `HD_Lyric_${Date.now()}.mp4`;
            link.click();
            
            statusText.innerText = "YUKLANDI!";
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        // 3. Renderlash
        function render() {
            const now = audioTag.currentTime;
            
            // Canvas tozalash (HD qora fon)
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Matnni chizish
            const current = lyrics.findLast(l => now >= l.t);
            const text = current ? current.text : "";
            displayText.innerText = text; // Preview

            ctx.fillStyle = "#00e676";
            ctx.font = "bold 60px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Matnni o'rtaga chizish
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            statusText.innerText = `YOZILMOQDA: ${Math.floor(((now - startT) / duration) * 100)}%`;

            if (now < endT && !audioTag.paused) {
                requestAnimationFrame(render);
            } else {
                audioTag.pause();
                recorder.stop();
            }
        }
        render();
    }

    tg.ready();
</script>
</body>
</html>
