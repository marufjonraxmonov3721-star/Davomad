<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Sekund Battle - Division Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-button-color: #0088cc;
            --accent-color: #f1c40f;
            --card-bg: #1a1a1a;
            --win-green: #2ecc71;
            --loss-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: white;
            -webkit-user-select: none;
            padding: 15px;
            overflow-x: hidden;
        }

        /* eFootball Style Header Card */
        .div-card {
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #333;
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .div-badge {
            background: linear-gradient(45deg, #2c3e50, #00008b);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .div-num { font-size: 28px; font-weight: 900; color: white; }
        .div-title { color: #f1c40f; font-size: 22px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-box { display: flex; align-items: center; gap: 10px; }
        .stat-icon { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .promotion-text { color: #888; font-size: 12px; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }

        /* Timer Section */
        #timer-container {
            width: 100%;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f171e;
            border-radius: 25px;
            border: 1px solid #222;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        #display { font-size: 64px; font-weight: bold; color: var(--accent-color); font-family: monospace; z-index: 2; }
        .target-text { font-size: 14px; color: #555; letter-spacing: 1px; margin-bottom: 10px; z-index: 2; }
        
        /* Result Pop Animation */
        #result-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            opacity: 0;
            transition: 0.3s;
            z-index: 3;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            border: none;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .start { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .stop { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        /* Leaderboard */
        .leaderboard-title { font-size: 16px; color: #aaa; margin-bottom: 15px; padding-left: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .rank-item {
            background: #161616; margin-bottom: 8px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .rank-info { display: flex; align-items: center; gap: 15px; }
        .rank-pos { font-weight: bold; color: #f1c40f; min-width: 25px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="div-card">
        <div class="header-row">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="div-badge">
                    <span class="div-num" id="user-div-icon">?</span>
                </div>
                <div class="div-title">Division <span id="user-div-title">...</span></div>
            </div>
            <div style="color: #aaa; font-size: 12px;">Phase: 2026</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">Rating</span>
                    <span class="stat-value" id="user-pts">0</span>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👑</div>
                <div class="stat-info">
                    <span class="stat-label">Ranking</span>
                    <span class="stat-value" id="user-rank-pos">#---</span>
                </div>
            </div>
        </div>

        <p class="promotion-text" id="promo-info">Yuklanmoqda...</p>
    </div>

    <div id="timer-container">
        <div id="result-popup"></div>
        <div class="target-text" id="target-label">MAQSAD: 10.000s</div>
        <div id="display">0.000</div>
    </div>

    <button id="actionBtn" class="btn-main start" onclick="handleAction()">START</button>
    
    <div class="leaderboard-title">TOP O'YINCHILAR</div>
    <div id="leaderboard"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSzwEYIG54B2_ddgmA6QtkRp6a80s6gtM",
            authDomain: "songlyrics-caption.firebaseapp.com",
            projectId: "songlyrics-caption",
            databaseURL: "https://songlyrics-caption-default-rtdb.firebaseio.com",
            appId: "1:363615493684:web:35752e22517bfaedae7461"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myId = user?.id || "guest_" + Math.random().toString(36).substring(7);
        const myName = (user?.first_name || "O'yinchi");

        let startTime;
        let timerInterval;
        let isRunning = false;
        let divSettings = {};
        let myCurrentData = { points: 0, division: 10 };

        onValue(ref(db, 'settings/divisions'), (snapshot) => {
            divSettings = snapshot.val();
            updateGameUI();
        });

        onValue(ref(db, 'leaderboard/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCurrentData = snapshot.val();
                document.getElementById('user-div-icon').innerText = myCurrentData.division || 10;
                document.getElementById('user-div-title').innerText = myCurrentData.division || 10;
                document.getElementById('user-pts').innerText = (myCurrentData.points || 0).toLocaleString();
                updateGameUI();
            } else {
                update(ref(db, 'leaderboard/' + myId), {
                    name: myName, points: 0, division: 10
                });
            }
        });

        function updateGameUI() {
            const d = myCurrentData.division || 10;
            if (divSettings && divSettings[d]) {
                const rules = divSettings[d];
                document.getElementById('target-label').innerText = `MAQSAD: ${rules.target.toFixed(3)}s`;
                if(d > 1) {
                    document.getElementById('promo-info').innerText = `Siz ${rules.promotionPoints.toLocaleString()} ball to'plasangiz, Division ${d-1}ga ko'tarilasiz.`;
                } else {
                    document.getElementById('promo-info').innerText = `Siz eng yuqori diviziondasiz!`;
                }
            }
        }

        function showResult(text, color) {
            const popup = document.getElementById('result-popup');
            const display = document.getElementById('display');
            popup.innerText = text;
            popup.style.color = color;
            popup.style.opacity = '1';
            display.style.opacity = '0.2';
            
            setTimeout(() => {
                popup.style.opacity = '0';
                display.style.opacity = '1';
            }, 1500);
        }

        window.handleAction = () => {
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('display');
            const currentDiv = myCurrentData.division || 10;
            
            const rules = divSettings && divSettings[currentDiv] 
                ? divSettings[currentDiv] 
                : { target: 10.000, nearLimit: 0.050, plusPoints: 30, minusPoints: 30, promotionPoints: 500 };

            if (!isRunning) {
                isRunning = true;
                startTime = Date.now();
                btn.innerText = "STOP";
                btn.className = "btn-main stop";
                display.style.color = "var(--accent-color)";
                tg.HapticFeedback.impactOccurred('medium');

                timerInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    display.innerText = elapsed.toFixed(3);
                }, 10);
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                const finalTime = (Date.now() - startTime) / 1000;
                display.innerText = finalTime.toFixed(3);
                btn.innerText = "START";
                btn.className = "btn-main start";

                const diffVal = Math.abs(rules.target - finalTime);
                const diffStr = diffVal.toFixed(3);
                let pointChange = 0;
                let newDivision = currentDiv;
                let newPoints = myCurrentData.points || 0;

                if (diffStr === "0.000") {
                    pointChange = rules.plusPoints * 2;
                    newPoints += pointChange;
                    showResult(`+${pointChange} PERFECT!`, '#f1c40f');
                    tg.HapticFeedback.notificationOccurred('success');
                } 
                else if (diffVal <= rules.nearLimit) {
                    pointChange = parseInt(rules.plusPoints);
                    newPoints += pointChange;
                    showResult(`+${pointChange} BALL`, '#2ecc71');
                    tg.HapticFeedback.notificationOccurred('success');
                } 
                else {
                    pointChange = -parseInt(rules.minusPoints);
                    newPoints += pointChange;
                    if (newPoints < 0) newPoints = 0;
                    showResult(`${pointChange} BALL`, '#e74c3c');
                    tg.HapticFeedback.notificationOccurred('error');
                }

                // Division logic
                if (newPoints >= rules.promotionPoints && currentDiv > 1) {
                    newDivision = currentDiv - 1;
                } else if (currentDiv < 10) {
                    const prevDivRules = divSettings[currentDiv + 1];
                    if (prevDivRules && newPoints < prevDivRules.promotionPoints) {
                        newDivision = currentDiv + 1;
                    }
                }

                update(ref(db, 'leaderboard/' + myId), {
                    points: newPoints,
                    division: newDivision,
                    bestDiff: diffStr,
                    lastTime: finalTime.toFixed(3)
                });
            }
        };

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const list = Object.entries(data).map(([id, val]) => ({id, ...val}))
                .sort((a, b) => {
                    if (a.division !== b.division) return a.division - b.division;
                    return (b.points || 0) - (a.points || 0);
                });

            const myRankIndex = list.findIndex(p => p.id === myId);
            document.getElementById('user-rank-pos').innerText = myRankIndex !== -1 ? `#${myRankIndex + 1}` : "#---";

            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            list.slice(0, 30).forEach((p, i) => {
                container.innerHTML += `
                    <div class="rank-item" style="${p.id === myId ? 'border: 1px solid #f1c40f;' : ''}">
                        <div class="rank-info">
                            <span class="rank-pos">${i+1}</span>
                            <div style="display:flex; flex-direction:column">
                                <span style="font-size:15px; font-weight:bold;">${p.name}</span>
                                <span style="font-size:11px; color:#666;">Div ${p.division || 10}</span>
                            </div>
                        </div>
                        <div style="text-align: right">
                            <div style="color:#f1c40f; font-weight:bold; font-size:16px;">${(p.points || 0).toLocaleString()}</div>
                            <div style="font-size:11px; color:#444;">Farq: ${p.bestDiff || '0'}s</div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
