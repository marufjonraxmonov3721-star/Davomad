<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Caption Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; margin: 0; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #2481cc; max-width: 400px; margin: auto; }
        
        .preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #333;
        }
        canvas { width: 100%; height: 100%; object-fit: cover; }

        input, textarea, select { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; background: #262626; color: #fff; box-sizing: border-box; }
        
        .bg-selector { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .bg-option { width: 60px; height: 100px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; object-fit: cover; }
        .bg-option.active { border-color: #0095f6; }

        .btn { width: 100%; padding: 16px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: none; border-radius: 12px; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #status { margin-top: 12px; font-size: 13px; color: #0095f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0; font-size: 22px;">Insta High Quality 💎</h2>
    
    <label style="display:block; margin-top:10px; font-size:12px; color:#aaa;">Orqa fonni tanlang:</label>
    <div class="bg-selector" id="bgSelector">
        <img src="https://picsum.photos/id/10/1080/1920" class="bg-option active" data-url="https://picsum.photos/id/10/1080/1920">
        <img src="https://picsum.photos/id/15/1080/1920" class="bg-option" data-url="https://picsum.photos/id/15/1080/1920">
        <img src="https://picsum.photos/id/22/1080/1920" class="bg-option" data-url="https://picsum.photos/id/22/1080/1920">
        <img src="https://picsum.photos/id/28/1080/1920" class="bg-option" data-url="https://picsum.photos/id/28/1080/1920">
        <img src="https://picsum.photos/id/37/1080/1920" class="bg-option" data-url="https://picsum.photos/id/37/1080/1920">
    </div>

    <label style="display:block; margin-top:10px; font-size:12px; color:#aaa;">Muzika yuklang:</label>
    <input type="file" id="audioUpload" accept="audio/*">

    <div style="display: flex; gap: 10px;">
        <select id="videoQuality">
            <option value="8000000">Ultra HD (High)</option>
            <option value="4000000">HD (Medium)</option>
            <option value="1500000">Low Quality</option>
        </select>
        <input type="number" id="duration" placeholder="Sekund" value="10">
    </div>

    <textarea id="captionInput" placeholder="Matnni yozing..."></textarea>

    <div class="preview-container">
        <canvas id="previewCanvas" width="1080" height="1920"></canvas>
    </div>
    
    <button class="btn" id="renderBtn">HQ FORMATDA TAYYORLASH</button>
    <div id="status"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const token = "8659683353:AAHboju3qieoKA9gSgMgKJtHHUSo12qO6dE";
    tg.expand();

    const audioInput = document.getElementById('audioUpload');
    const captionInput = document.getElementById('captionInput');
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const bgOptions = document.querySelectorAll('.bg-option');

    let audioEl = new Audio();
    let bgImage = new Image();
    bgImage.crossOrigin = "anonymous";
    bgImage.src = bgOptions[0].dataset.url;

    // Fon tanlash
    bgOptions.forEach(opt => {
        opt.onclick = () => {
            bgOptions.forEach(b => b.classList.remove('active'));
            opt.classList.add('active');
            bgImage.src = opt.dataset.url;
        };
    });

    audioInput.onchange = (e) => {
        audioEl.src = URL.createObjectURL(e.target.files[0]);
    };

    bgImage.onload = () => drawFrame();

    function drawFrame() {
        // Fonni chizish
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        
        // Gradientli soya
        let grad = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
        grad.addColorStop(0, "transparent");
        grad.addColorStop(1, "rgba(0,0,0,0.8)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height * 0.5, canvas.width, canvas.height * 0.5);

        // Matn
        ctx.fillStyle = "white";
        ctx.font = "bold 65px sans-serif";
        ctx.textAlign = "center";
        
        const text = captionInput.value;
        const lines = text.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, canvas.width / 2, (canvas.height / 2) + (i * 80));
        });

        requestAnimationFrame(drawFrame);
    }

    document.getElementById('renderBtn').onclick = async () => {
        if (!audioInput.files[0]) return alert("Muzika yuklang!");
        
        const quality = document.getElementById('videoQuality').value;
        status.innerText = "Tayyorlanmoqda...";
        
        const stream = canvas.captureStream(60); 
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9',
            videoBitsPerSecond: parseInt(quality)
        });
        
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const chatId = tg.initDataUnsafe.user.id;
            
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', videoBlob, 'video.mp4');
            formData.append('caption', "🚀 Yangi video tayyor!");

            try {
                status.innerText = "Telegramga yuborilmoqda...";
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                status.innerText = "Tayyor! ✅ Botga yuborildi.";
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(videoBlob);
                a.download = "insta_pro.mp4";
                a.click();
            } catch (err) {
                status.innerText = "Xatolik yuz berdi.";
            }
        };

        audioEl.currentTime = 0;
        audioEl.play();
        recorder.start();

        setTimeout(() => {
            recorder.stop();
            audioEl.pause();
        }, document.getElementById('duration').value * 1000);
    };
</script>

</body>
</html>
