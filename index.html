<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; }
        body { font-family: sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 100%; height: 280px; background: #121212; border-radius: 20px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #333; position: relative;
        }

        #text-render { font-size: 24px; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); padding: 20px; }

        .controls { background: #181818; padding: 20px; border-radius: 20px; text-align: left; }
        label { font-size: 12px; color: #888; margin-left: 5px; }
        
        input, select, button { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; font-size: 16px;
        }

        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-save:active { transform: scale(0.98); }
        
        #progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 15px; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; transition: 0.1s; }
    </style>
</head>
<body>

    <div class="preview-box" id="capture-zone">
        <div id="text-render">Matn topilmadi</div>
    </div>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="controls">
        <label>MP3 fayl:</label>
        <input type="file" id="audio-input" accept="audio/mp3">
        
        <label>LRC fayl:</label>
        <input type="file" id="lrc-input" accept=".lrc">

        <audio id="player" controls style="width: 100%; margin: 10px 0;"></audio>

        <button class="btn-save" id="save-btn" onclick="startExport()">VIDEONI SAQLASH (Tashqi Brauzer)</button>
        <p style="font-size: 11px; color: #666; text-align: center;">Eksport tugagach, video yangi oynada ochiladi. Uni "Yuklab olish" tugmasi orqali saqlang.</p>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const player = document.getElementById('player');
    const textRender = document.getElementById('text-render');
    const saveBtn = document.getElementById('save-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    let lyrics = [];

    document.getElementById('audio-input').onchange = (e) => {
        player.src = URL.createObjectURL(e.target.files[0]);
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x && x.text);
            textRender.innerText = "LRC Tayyor!";
        };
        reader.readAsText(e.target.files[0]);
    };

    player.ontimeupdate = () => {
        const active = lyrics.findLast(l => player.currentTime >= l.t);
        if (active) textRender.innerText = active.text;
    };

    async function startExport() {
        if (!player.src || lyrics.length === 0) return tg.showAlert("Avval fayllarni tanlang!");

        saveBtn.disabled = true;
        progressContainer.style.display = "block";
        const duration = player.duration;
        const chunks = [];
        
        const stream = document.getElementById('capture-zone').captureStream(30);
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        audioCtx.createMediaElementSource(player).connect(dest);
        dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const videoUrl = URL.createObjectURL(blob);
            
            // AQLLI YECHIM: Videoni yangi oynada (Chrome/Safari) ochish
            // Bu Telegram cheklovini chetlab o'tadi
            const newWindow = window.open(videoUrl, '_blank');
            
            if (!newWindow) {
                // Agar brauzer popupni bloklasa, havola ko'rsatamiz
                tg.showAlert("Brauzer oynani blokladi. Iltimos, Chrome'da oching.");
                const a = document.createElement('a');
                a.href = videoUrl;
                a.download = "video.mp4";
                a.click();
            }

            saveBtn.disabled = false;
            saveBtn.innerText = "QAYTA SAQLASH";
            progressContainer.style.display = "none";
            tg.showAlert("Video tayyor! Yangi oynada 'Yuklab olish'ni bosing.");
        };

        player.currentTime = 0;
        recorder.start();
        player.play();

        const trackProgress = setInterval(() => {
            const p = (player.currentTime / duration) * 100;
            progressBar.style.width = p + "%";
            saveBtn.innerText = `EKSPORT: ${Math.floor(p)}%`;

            if (player.ended || player.currentTime >= duration) {
                recorder.stop();
                player.pause();
                clearInterval(trackProgress);
            }
        }, 100);
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
