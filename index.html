<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System (Captions Lite Edition)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #00e676; 
            --bg: #0a0a0a; 
            --surface: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            text-align: center;
            overflow-x: hidden;
        }

        /* Play Market Style Header */
        .app-header {
            padding: 20px;
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #333;
            text-align: left;
        }
        .app-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }
        .app-info h1 { font-size: 18px; margin: 0; }
        .app-info p { font-size: 12px; color: var(--accent); margin: 0; font-weight: 600; }

        .preview-box { 
            width: 280px; height: 497px; background: #000; border-radius: 32px; 
            margin: 25px auto; display: flex; align-items: center; justify-content: center;
            border: 6px solid #222; position: relative; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 25px; line-height: 1.4; 
            text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease;
            position: absolute; width: 100%; box-sizing: border-box;
            letter-spacing: -0.5px;
        }
        
        canvas { display: none; }

        .main-container {
            padding: 0 15px 100px 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .section-title {
            text-align: left;
            font-size: 14px;
            color: var(--text-dim);
            margin: 20px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .controls { 
            background: var(--surface); 
            padding: 20px; 
            border-radius: 24px; 
            text-align: left; 
            border: 1px solid #333;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .trim-group, .select-group { display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 120px; }

        input, select { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 16px; 
            border: 1px solid #333; background: #262626; color: #fff; box-sizing: border-box; font-size: 14px;
            outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--accent); background: #2d2d2d; }

        /* Custom File Input */
        .file-card {
            background: var(--card-bg);
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-card:hover { border-color: var(--accent); background: rgba(0, 230, 118, 0.05); }

        input[type=range] { -webkit-appearance: none; background: #333; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; 
            background: var(--accent); cursor: pointer; border: 4px solid #1a1a1a;
            box-shadow: 0 0 10px rgba(0,230,118,0.4);
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-top: 1px solid #333;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .btn-download { 
            background: var(--gradient); 
            color: #000; font-weight: 800; border: none; cursor: pointer; 
            text-transform: uppercase; width: 100%; max-width: 400px;
            padding: 18px; border-radius: 18px; font-size: 16px;
            letter-spacing: 1px; box-shadow: 0 10px 25px rgba(0, 230, 118, 0.3);
            transition: 0.3s;
        }
        .btn-download:active { transform: scale(0.96); }
        .btn-download:disabled { background: #333; color: #777; box-shadow: none; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 15px 0; font-weight: 600; text-align: center; }
        label { font-size: 12px; color: var(--text-dim); margin-left: 5px; font-weight: 600; }

        .trim-info { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 12px; margin-bottom: 8px; }
        .range-slider { position: relative; height: 12px; margin: 15px 0; background: #333; border-radius: 6px; overflow: hidden; }
        .range-fill { position: absolute; height: 100%; background: var(--gradient); border-radius: 6px; }

        /* Animations */
        .anim-fade { animation: fadeIn 0.4s ease forwards; }
        .anim-zoom { animation: zoomIn 0.4s ease forwards; }
        .anim-slideUp { animation: slideUp 0.4s ease forwards; }
        .anim-rotate { animation: rotateIn 0.4s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }
        .anim-glitch { animation: glitch 0.3s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-10deg) scale(0.9); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes bounceIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }

        /* Stats chips */
        .chip-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: #222; padding: 6px 14px; border-radius: 20px; font-size: 11px; white-space: nowrap; border: 1px solid #333; color: var(--text-dim); }
        .chip.active { background: rgba(0, 230, 118, 0.1); border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-icon">S</div>
        <div class="app-info">
            <h1>Songlyrics Pro</h1>
            <p>v4.0 Ultra HD Editor</p>
        </div>
    </div>

    <div class="main-container">
        <div class="chip-container">
            <div class="chip active">60 FPS</div>
            <div class="chip">25 MBPS</div>
            <div class="chip">4K RENDER</div>
            <div class="chip">AMOLED</div>
            <div class="chip">SYNC 2.0</div>
        </div>

        <div class="preview-box" id="p-box">
            <div id="display-text">Editorga xush kelibsiz!</div>
        </div>

        <canvas id="video-canvas" width="1080" height="1920"></canvas>

        <div class="section-title">Fayllarni yuklash</div>
        <div class="controls">
            <div class="select-group">
                <div class="file-card" onclick="document.getElementById('audio-input').click()">
                    <span style="font-size: 20px;">🎵</span><br><label>MP3 Audio</label>
                    <input type="file" id="audio-input" accept="audio/mp3" style="display:none">
                </div>
                <div class="file-card" onclick="document.getElementById('lrc-input').click()">
                    <span style="font-size: 20px;">📝</span><br><label>LRC Matn</label>
                    <input type="file" id="lrc-input" accept=".lrc" style="display:none">
                </div>
            </div>
        </div>

        <div class="section-title">Matn Sozlamalari</div>
        <div class="controls">
            <div class="select-group">
                <div>
                    <label>Shrift hajmi</label>
                    <input type="range" id="font-size-slider" min="30" max="180" value="85" oninput="updateLivePreview()">
                </div>
                <div>
                    <label>Joylashuv</label>
                    <select id="text-position" onchange="updateLivePreview()">
                        <option value="center">Markazda</option>
                        <option value="top">Yuqorida</option>
                        <option value="bottom">Pastda</option>
                    </select>
                </div>
            </div>

            <div class="select-group">
                <div>
                    <label>Shrift uslubi</label>
                    <select id="font-style" onchange="updateLivePreview()">
                        <option value="sans-serif">Standard</option>
                        <option value="serif">Classic</option>
                        <option value="monospace">Tech</option>
                        <option value="Impact">Bold Impact</option>
                        <option value="cursive">Handwriting</option>
                        <option value="Futura">Space Futura</option>
                    </select>
                </div>
                <div>
                    <label>Matn rangi</label>
                    <input type="color" id="text-color" value="#00e676" oninput="updateLivePreview()">
                </div>
            </div>
        </div>

        <div class="section-title">Vizual Effektlar</div>
        <div class="controls">
            <div class="select-group">
                <div>
                    <label>Matn Animatsiyasi</label>
                    <select id="anim-style" onchange="updateLivePreview()">
                        <option value="none">Yo'q</option>
                        <option value="fade">Fade</option>
                        <option value="zoom">Pop Up</option>
                        <option value="slideUp">Slide</option>
                        <option value="bounce">Bounce</option>
                        <option value="pulse">Beat</option>
                        <option value="glitch">Glitch</option>
                    </select>
                </div>
                <div>
                    <label>Fon Effekti</label>
                    <select id="effect-style" onchange="updateLivePreview()">
                        <option value="black">Pure Black</option>
                        <option value="neon">Neon Border</option>
                        <option value="vignette">Cinema</option>
                        <option value="blur">Glow</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-title">Vaqtni qirqish</div>
        <div class="controls">
            <div class="trim-info">
                <span id="label-start">00:00.0</span>
                <span id="label-duration">0s</span>
                <span id="label-end">00:30.0</span>
            </div>
            <div class="range-slider">
                <div class="range-fill" id="range-fill"></div>
            </div>

            <div class="trim-group">
                <div><label>Boshlash (sekund)</label><input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()"></div>
                <div><label>Tugash (sekund)</label><input type="number" id="trim-end" value="30" step="0.1" oninput="syncSliders()"></div>
            </div>
        </div>

        <div id="status-text">Barcha tizimlar tayyor</div>
    </div>

    <div class="bottom-nav">
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">Eksport qilish (MP4)</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const previewBox = document.getElementById('p-box');
    const rangeFill = document.getElementById('range-fill');

    let lyrics = [];
    let audioFile = null;
    let fullDuration = 30;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    }

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || fullDuration;
        const left = (start / fullDuration) * 100;
        const width = ((end - start) / fullDuration) * 100;
        rangeFill.style.left = left + "%";
        rangeFill.style.width = width + "%";
        document.getElementById('label-start').innerText = formatTime(start);
        document.getElementById('label-end').innerText = formatTime(end);
        document.getElementById('label-duration').innerText = `Domiyligi: ${(end - start).toFixed(1)}s`;
    }

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const color = document.getElementById('text-color').value;
        const pos = document.getElementById('text-position').value;
        const anim = document.getElementById('anim-style').value;
        const effect = document.getElementById('effect-style').value;
        
        displayText.style.fontSize = (size / 4.5) + "px";
        displayText.style.fontFamily = font;
        displayText.style.color = color;
        displayText.style.textShadow = `0 0 15px ${color}88`;

        if(pos === 'top') { displayText.style.top = "10%"; displayText.style.bottom = "auto"; displayText.style.transform = "none"; }
        else if(pos === 'bottom') { displayText.style.bottom = "10%"; displayText.style.top = "auto"; displayText.style.transform = "none"; }
        else { displayText.style.top = "50%"; displayText.style.transform = "translateY(-50%)"; }

        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;

        previewBox.style.background = "#000";
        previewBox.style.border = "6px solid #222";
        if(effect === 'neon') previewBox.style.border = `4px solid ${color}`;
    }

    document.getElementById('audio-input').onchange = (e) => { 
        audioFile = e.target.files[0]; 
        const tempAudio = new Audio(URL.createObjectURL(audioFile));
        tempAudio.onloadedmetadata = () => {
            fullDuration = tempAudio.duration;
            document.getElementById('trim-end').value = fullDuration.toFixed(1);
            syncSliders();
            statusText.innerText = "🎵 Audio: " + audioFile.name;
        };
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseFloat("0." + m[3]), text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "✅ LRC yuklandi (" + lyrics.length + " qator)";
        };
        reader.readAsText(e.target.files[0]);
    };

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let lines = [];
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                lines.push(line);
                line = words[n] + ' ';
            } else { line = testLine; }
        }
        lines.push(line);
        let startY = y - ((lines.length - 1) * lineHeight) / 2;
        for(let k = 0; k < lines.length; k++) {
            context.fillText(lines[k], x, startY + (k * lineHeight));
        }
    }

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Avval musiqani va LRC matnni yuklang!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;
        
        const stream = canvas.captureStream(60); 
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
        
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 25000000 
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "🚀 TELEGRAMGA YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Video_${Date.now()}.mp4`);
            formData.append('caption', "✨ Songlyrics Pro HD Render\n🚀 Sifat: 60 FPS | 25 Mbps\n🎨 Effekt: " + document.getElementById('anim-style').value);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if (response.ok) { 
                    statusText.innerText = "✅ TAYYOR! BOTGA QARANG."; 
                    tg.showConfirm("Video botga yuborildi. Yana video yaratasizmi?"); 
                }
            } catch (err) { alert("Xato: " + err.message); }
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            if (audioTag.paused || audioTag.ended || audioTag.currentTime >= endT) {
                recorder.stop();
                audioTag.pause();
                return;
            }

            const now = audioTag.currentTime;
            let current = null;
            for(let i = 0; i < lyrics.length; i++) {
                if(now >= lyrics[i].t) {
                    current = lyrics[i];
                }
            }
            
            const text = current ? current.text : "";
            const color = document.getElementById('text-color').value;
            const pos = document.getElementById('text-position').value;
            
            if (text !== lastText) { 
                lastText = text; 
                animStartTime = performance.now(); 
            }
            
            let animElapsed = (performance.now() - animStartTime) / 1000;
            let animProgress = Math.min(animElapsed / 0.3, 1);

            ctx.fillStyle = "#000000"; 
            ctx.fillRect(0, 0, 1080, 1920);

            const effect = document.getElementById('effect-style').value;
            if(effect === 'neon') {
                ctx.strokeStyle = color; 
                ctx.lineWidth = 20; ctx.strokeRect(40, 40, 1000, 1840);
                ctx.shadowBlur = 50; ctx.shadowColor = color;
            } else if (effect === 'vignette') {
                let g = ctx.createRadialGradient(540, 960, 200, 540, 960, 1100);
                g.addColorStop(0, "rgba(30,30,30,1)"); g.addColorStop(1, "black");
                ctx.fillStyle = g; ctx.fillRect(0, 0, 1080, 1920);
            }

            const font = document.getElementById('font-style').value;
            const anim = document.getElementById('anim-style').value;
            const size = parseInt(document.getElementById('font-size-slider').value);
            
            ctx.font = `bold ${size}px ${font}`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            ctx.save();
            let textY = 960;
            if(pos === 'top') textY = 400;
            if(pos === 'bottom') textY = 1520;

            ctx.translate(540, textY);
            
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') {
                let s = 0.8 + animProgress * 0.2;
                ctx.scale(s, s);
            }
            if(anim === 'slideUp') ctx.translate(0, (1 - animProgress) * 60);
            if(anim === 'bounce' && text) {
                let s = 1 + Math.abs(Math.sin(animProgress * Math.PI)) * 0.1;
                ctx.scale(s, s);
            }
            if(anim === 'pulse') {
                let s = 1 + Math.sin(performance.now()/120) * 0.05;
                ctx.scale(s, s);
            }
            if(anim === 'glitch' && text) {
                ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
                ctx.shadowColor = "red"; ctx.shadowBlur = 15;
            }

            ctx.fillStyle = color;
            ctx.shadowColor = color + "99"; ctx.shadowBlur = 40;
            
            if(text) wrapText(ctx, text.toUpperCase(), 0, 0, 940, size * 1.3);
            
            ctx.restore();

            statusText.innerText = `HD RENDER: ${Math.floor(((now - startT) / duration) * 100)}%`;
            requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);
    }
    
    tg.ready();
    tg.expand();
    updateLivePreview();
</script>
</body>
</html>
