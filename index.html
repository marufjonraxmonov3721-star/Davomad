<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Fixed Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #E1306C; --bg: #000; --green: #1DB954; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }

        .container { padding: 20px; }
        
        /* Story Displeyi */
        #story-window {
            display: none; width: 100%; max-width: 350px; aspect-ratio: 9/16;
            background: #000; border-radius: 20px; margin: 0 auto;
            position: relative; border: 1px solid #333; overflow: hidden;
        }

        #lyric-box {
            position: absolute; width: 100%; top: 40%; transform: translateY(-50%);
            text-align: center; font-size: 2.2rem; font-weight: 900; padding: 20px;
            box-sizing: border-box; text-shadow: 0 0 20px var(--primary);
        }

        /* YouTube pleyerini kichik qilib ko'rsatamiz (Telegram bloklamasligi uchun) */
        #yt-wrapper {
            position: absolute; bottom: 10px; left: 10px; 
            width: 120px; height: 70px; border-radius: 10px; overflow: hidden;
            z-index: 100; border: 1px solid #444;
        }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-play { background: var(--green); color: #000; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; }

        .song-item {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid #222; cursor: pointer;
        }
        
        #editor-ui { display: none; }
        .slider-ui { background: #111; padding: 15px; border-radius: 15px; margin-top: 10px; }
        input[type=range] { width: 100%; accent-color: var(--primary); }
    </style>
</head>
<body>

    <div class="container" id="list-ui">
        <h2 style="color: var(--green)">Pleylist</h2>
        <div id="songs-render">Yuklanmoqda...</div>
    </div>

    <div class="container" id="editor-ui">
        <div id="story-window">
            <div id="lyric-box">...</div>
            <div id="yt-wrapper"><div id="player"></div></div>
        </div>

        <div class="slider-ui">
            <p style="text-align:center; margin:0;">Vaqt: <b id="time-txt">0s - 15s</b></p>
            <input type="range" id="time-slide" min="0" value="0">
            
            <button class="btn btn-play" id="play-trigger">▶️ Musiqani Yoqish</button>
            <button class="btn btn-insta" id="insta-btn" style="display:none;">📲 Instagram Story</button>
            <button onclick="location.reload()" style="background:none; color:#555; border:none; width:100%; margin-top:10px;">⬅️ Orqaga</button>
        </div>
    </div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLrc = [], startAt = 0;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '70', width: '120',
            playerVars: { 'playsinline': 1, 'autoplay': 0, 'controls': 0 },
            events: { 'onStateChange': syncLyrics }
        });
    }

    function syncLyrics(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            setInterval(() => {
                let now = ytPlayer.getCurrentTime();
                if (now >= startAt + 15) ytPlayer.seekTo(startAt); // Loop

                let line = currentLrc.findLast(l => now >= l.time);
                if (line) document.getElementById('lyric-box').innerText = line.text;
            }, 100);
        }
    }

    function openEditor(data) {
        document.getElementById('list-ui').style.display = 'none';
        document.getElementById('editor-ui').style.display = 'block';
        document.getElementById('story-window').style.display = 'block';
        
        currentLrc = parseLRC(data.lyrics || "");
        
        document.getElementById('time-slide').oninput = function() {
            startAt = parseInt(this.value);
            document.getElementById('time-txt').innerText = `${startAt}s - ${startAt + 15}s`;
            ytPlayer.seekTo(startAt);
        };

        document.getElementById('play-trigger').onclick = function() {
            ytPlayer.loadVideoById(data.youtubeId, startAt);
            ytPlayer.playVideo();
            this.style.display = 'none';
            document.getElementById('insta-btn').style.display = 'block';
        };
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('songs-render');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `<b>${data.track}</b><br><small>${data.artist}</small>`;
            div.onclick = () => openEditor(data);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
