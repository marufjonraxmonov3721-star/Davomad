<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Classic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }

        /* Pleylist */
        .header { padding: 25px 20px; text-align: center; background: linear-gradient(to bottom, #111, #000); }
        .header h1 { margin: 0; font-size: 22px; color: var(--accent); letter-spacing: 1px; }

        .song-list { padding: 10px 15px; }
        .song-card {
            background: #121212; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; cursor: pointer; transition: 0.3s;
        }
        .song-card:active { transform: scale(0.97); background: #1a1a1a; }
        .song-info b { font-size: 17px; display: block; margin-bottom: 3px; }
        .song-info span { color: #888; font-size: 14px; }

        /* Pleyer Ekrani */
        #player-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; flex-direction: column;
        }

        #video-container {
            width: 100%; aspect-ratio: 16/9; background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #lyric-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 30px; text-align: center; box-sizing: border-box;
        }

        #current-lyric {
            font-size: 2.2rem; font-weight: 800; line-height: 1.3;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .lyric-anim { animation: lyricIn 0.5s ease; }
        @keyframes lyricIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .close-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1100;
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
            backdrop-filter: blur(5px);
        }

        .artist-tag {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: var(--accent); font-weight: bold; letter-spacing: 2px;
            text-transform: uppercase; font-size: 12px; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="header"><h1>SongLyrics</h1></div>
        <div class="song-list" id="main-list">Yuklanmoqda...</div>
    </div>

    <div id="player-screen">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        
        <div id="video-container">
            <div id="player"></div>
        </div>
        
        <div id="lyric-area">
            <div id="current-lyric">Musiqani yoqing...</div>
        </div>

        <div class="artist-tag" id="artist-name"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // YouTube API yuklash
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], syncTimer;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: { 
                'playsinline': 1, 
                'controls': 1, 
                'modestbranding': 1,
                'rel': 0
            },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            startSync();
        } else {
            stopSync();
        }
    }

    function startSync() {
        stopSync();
        syncTimer = setInterval(() => {
            const now = ytPlayer.getCurrentTime();
            const hit = currentLyrics.findLast(l => now >= l.time);
            
            if (hit) {
                const el = document.getElementById('current-lyric');
                if (el.innerText !== hit.text) {
                    el.innerText = hit.text;
                    el.classList.remove('lyric-anim');
                    void el.offsetWidth; // Animatsiyani qayta ishga tushirish
                    el.classList.add('lyric-anim');
                }
            }
        }, 100);
    }

    function stopSync() { clearInterval(syncTimer); }

    function openPlayer(data) {
        // Avvalgi holatni tozalash
        document.getElementById('current-lyric').innerText = "Musiqani yoqing...";
        document.getElementById('current-lyric').classList.remove('lyric-anim');
        document.getElementById('artist-name').innerText = data.artist;
        
        currentLyrics = parseLRC(data.lyrics || "");
        
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'flex';
        
        ytPlayer.loadVideoById(data.youtubeId);
    }

    function closePlayer() {
        stopSync();
        ytPlayer.stopVideo();
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('player-screen').style.display = 'none';
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const listDiv = document.getElementById('main-list');
        listDiv.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `
                <div class="song-info">
                    <b>${data.track}</b>
                    <span>${data.artist}</span>
                </div>
                <div style="color:var(--accent); font-size:18px;">▶</div>
            `;
            div.onclick = () => openPlayer(data);
            listDiv.appendChild(div);
        });
    });
</script>
</body>
</html>
