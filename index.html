<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Auto LRC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #00e676; text-align: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; }
        #visualizer { height: 60px; background: #000; margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 2px; }
        .bar { width: 4px; height: 10px; background: #00e676; transition: 0.1s; }
        .status { font-size: 14px; color: #888; margin-top: 10px; }
        #current-line { font-size: 20px; font-weight: bold; margin: 20px 0; min-height: 30px; }
        button { background: #00e676; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h3>AUTO LYRIC DETECTOR</h3>
    <input type="file" id="audio-input" accept="audio/*">
    <textarea id="lyrics-input" rows="5" placeholder="Matnni tashlang..."></textarea>
    <button onclick="startAutoProcess()">AVTOMAT BOSHLASH</button>
</div>

<div id="visualizer"></div>
<div id="current-line">KUTILMOQDA...</div>
<div class="status" id="status">Musiqa va matnni yuklab, tugmani bosing.</div>

<script>
    const tg = window.Telegram.WebApp;
    const audio = new Audio();
    let lyrics = [];
    let synced = [];
    let idx = 0;
    let isProcessing = false;

    // Visualizer uchun barlar yaratish
    const viz = document.getElementById('visualizer');
    for(let i=0; i<30; i++) {
        let bar = document.createElement('div');
        bar.className = 'bar';
        viz.appendChild(bar);
    }

    function startAutoProcess() {
        const text = document.getElementById('lyrics-input').value.trim();
        if(!audio.src || !text) return alert("Hamma narsani yuklang!");

        lyrics = text.split('\n').filter(l => l.trim() !== "");
        idx = 0;
        synced = [];
        isProcessing = true;

        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const source = ctx.createMediaElementSource(audio);
        const analyzer = ctx.createAnalyser();
        analyzer.fftSize = 256;
        source.connect(analyzer);
        analyzer.connect(ctx.destination);

        const bufferLength = analyzer.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        audio.play();
        document.getElementById('status').innerText = "AI ovozni eshityapti...";

        function checkAudio() {
            if(!isProcessing || audio.ended) {
                if(audio.ended) finish();
                return;
            }

            analyzer.getByteFrequencyData(dataArray);
            
            // Ovoz balandligini o'rtacha hisoblash (Vokal borligini aniqlash)
            let sum = 0;
            for(let i=0; i<bufferLength; i++) sum += dataArray[i];
            let average = sum / bufferLength;

            // Vizualizatsiya
            const bars = document.querySelectorAll('.bar');
            bars.forEach(b => b.style.height = (average * 2) + 'px');

            // Agar ovoz balandligi ma'lum darajadan oshsa (Gapirilgan lahza)
            if(average > 35 && idx < lyrics.length) { 
                // Bir qatorni muhrlash (Kamida 1.5 sekund farq bilan)
                const lastTime = synced.length > 0 ? synced[synced.length-1].t : -2;
                if(audio.currentTime - lastTime > 1.8) {
                    synced.push({ t: audio.currentTime, text: lyrics[idx] });
                    document.getElementById('current-line').innerText = lyrics[idx];
                    idx++;
                }
            }
            requestAnimationFrame(checkAudio);
        }
        checkAudio();
    }

    async function finish() {
        isProcessing = false;
        document.getElementById('status').innerText = "Tugadi! Botga yuborilmoqda...";
        
        let lrc = "[ti:Full Auto LRC]\n";
        synced.forEach(item => {
            let m = Math.floor(item.t / 60);
            let s = (item.t % 60).toFixed(2);
            lrc += `[${m.toString().padStart(2, '0')}:${s.toString().padStart(5, '0')}]${item.text}\n`;
        });

        const blob = new Blob([lrc], { type: 'text/plain' });
        const fd = new FormData();
        fd.append('chat_id', '8533456947');
        fd.append('document', blob, "auto.lrc");

        await fetch(`https://api.telegram.org/bot8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw/sendDocument`, {
            method: 'POST', body: fd
        });
        
        tg.showConfirm("LRC tayyor va botga yuborildi!");
    }

    document.getElementById('audio-input').onchange = (e) => {
        audio.src = URL.createObjectURL(e.target.files[0]);
    };

    tg.ready();
</script>
</body>
</html>
