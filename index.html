<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Songlyrics Pro - Precision Trimmer & Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00e676; --bg: #050505; --surface: #121212;
            --gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; text-align: center; overflow-x: hidden; user-select: none; }
        .app-header { padding: 15px; background: var(--surface); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .app-icon { width: 45px; height: 45px; background: var(--gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }
        
        .preview-box { 
            width: 260px; height: 460px; background: #000; border-radius: 30px; 
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            border: 6px solid #1a1a1a; position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #display-text { font-size: 22px; font-weight: 900; color: var(--accent); padding: 25px; text-transform: uppercase; z-index: 5; position: absolute; width: 100%; box-sizing: border-box; text-shadow: 0 0 15px var(--accent); }
        #preview-bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }

        .main-container { padding: 0 15px 140px 15px; max-width: 500px; margin: 0 auto; }
        .controls { background: var(--surface); padding: 20px; border-radius: 25px; text-align: left; border: 1px solid #252525; margin-bottom: 15px; }
        .section-title { font-size: 12px; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; text-align: left; }

        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 15px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .trim-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .trim-inputs div { flex: 1; }

        .sync-btn { background: #ff9800; color: black; font-weight: 800; border: none; padding: 18px; border-radius: 15px; width: 100%; margin: 10px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .sync-active { background: #f44336; color: white; box-shadow: 0 0 20px rgba(244, 67, 54, 0.4); }

        .file-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .file-card { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px dashed #444; cursor: pointer; font-size: 12px; text-align: center; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); padding: 20px; border-top: 1px solid #222; z-index: 1000; }
        .btn-download { background: var(--gradient); color: #000; font-weight: 800; border: none; width: 100%; padding: 18px; border-radius: 20px; font-size: 16px; box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3); cursor: pointer; }
        
        #status-text { font-size: 12px; color: var(--accent); margin-top: 10px; font-weight: 700; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-icon">S</div>
        <div class="app-info" style="text-align: left;">
            <h1 style="font-size: 18px; margin: 0;">Songlyrics Pro</h1>
            <p style="font-size: 10px; color: var(--accent); margin: 0;">2K • 120 FPS • SMART TRIMMER</p>
        </div>
    </div>

    <div class="main-container">
        <div class="preview-box">
            <img id="preview-bg-img" src="">
            <div id="display-text">Tayyor...</div>
        </div>

        <canvas id="video-canvas"></canvas>

        <div class="section-title">1. Resurslarni yuklash</div>
        <div class="controls">
            <div class="file-group">
                <div class="file-card" onclick="document.getElementById('audio-input').click()">🎵 Audio Yuklash<input type="file" id="audio-input" accept="audio/*" hidden></div>
                <div class="file-card" onclick="document.getElementById('bg-input').click()">🖼 Fon Rasmi<input type="file" id="bg-input" accept="image/*" hidden></div>
            </div>
            <textarea id="lyrics-input" rows="3" placeholder="Qo'shiq matnini bu yerga yozing (Har bir qatorni yangi satrdan)..."></textarea>
        </div>

        <div class="section-title">2. Audio qirqish (Soniya)</div>
        <div class="controls">
            <div class="trim-inputs">
                <div>
                    <label style="font-size: 11px;">Boshlanish vaqti</label>
                    <input type="number" id="start-time" value="0" step="0.1" min="0">
                </div>
                <div>
                    <label style="font-size: 11px;">Tugash vaqti</label>
                    <input type="number" id="end-time" value="30" step="0.1" min="1">
                </div>
            </div>
            <p id="duration-info" style="font-size: 11px; color: #888; margin: 0;">Audio uzunligi: 0.0s</p>
        </div>

        <div class="section-title">3. Matnni sinxronlash (TAP)</div>
        <div class="controls">
            <button id="sync-trigger" class="sync-btn" onclick="handleSync()">
                <span id="sync-instruction">STRELKANI BOSING ➜</span>
                <span id="sync-label">TAP</span>
            </button>
            <div id="sync-status" style="font-size: 12px; color: #ff9800; font-weight: 600;">Tayyorlanmoqda...</div>
        </div>

        <div class="section-title">4. Video Sifati</div>
        <div class="controls">
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label style="font-size: 11px;">Rezolyutsiya</label>
                    <select id="quality">
                        <option value="2K">2K Cinema (1440p)</option>
                        <option value="FHD" selected>Full HD (1080p)</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label style="font-size: 11px;">Kadr (FPS)</label>
                    <select id="fps">
                        <option value="120">120 FPS</option>
                        <option value="60" selected>60 FPS</option>
                        <option value="30">30 FPS</option>
                    </select>
                </div>
            </div>
            <input type="text" id="watermark" placeholder="Suv belgisi: @username" style="margin-top: 15px;">
        </div>

        <div id="status-text">Tizim tayyor</div>
    </div>

    <div class="bottom-nav">
        <button class="btn-download" id="export-btn" onclick="exportFinalVideo()">VIDEONI TAYYORLASH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const audio = new Audio();
    
    let lyricsArray = [];
    let syncedData = [];
    let isSyncing = false;
    let currentIdx = 0;
    let bgImg = new Image();

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    document.getElementById('audio-input').onchange = (e) => {
        const file = e.target.files[0];
        audio.src = URL.createObjectURL(file);
        audio.onloadedmetadata = () => {
            document.getElementById('duration-info').innerText = `Audio uzunligi: ${audio.duration.toFixed(1)}s`;
            document.getElementById('end-time').value = audio.duration.toFixed(1);
        };
    };

    document.getElementById('bg-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            bgImg.src = ev.target.result;
            document.getElementById('preview-bg-img').src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function handleSync() {
        if(!audio.src) return alert("Audioni yuklang!");
        const lines = document.getElementById('lyrics-input').value.split('\n').filter(l => l.trim() !== "");
        if(lines.length === 0) return alert("Matn kiriting!");

        const startTime = parseFloat(document.getElementById('start-time').value);
        const endTime = parseFloat(document.getElementById('end-time').value);

        if(!isSyncing) {
            // Boshlash
            isSyncing = true;
            lyricsArray = lines;
            syncedData = [];
            currentIdx = 0;
            audio.currentTime = startTime;
            audio.play();
            
            document.getElementById('sync-trigger').classList.add('sync-active');
            document.getElementById('sync-instruction').innerText = "HOZIR BOSING ➜";
            updateSyncUI();
        } else {
            // Har bir TAP
            syncedData.push({ t: audio.currentTime, text: lyricsArray[currentIdx] });
            currentIdx++;

            if(currentIdx >= lyricsArray.length || audio.currentTime >= endTime) {
                finishSync();
            } else {
                updateSyncUI();
            }
        }
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
    }

    function updateSyncUI() {
        document.getElementById('sync-status').innerText = `Keyingi qator: "${lyricsArray[currentIdx]}"`;
        document.getElementById('display-text').innerText = lyricsArray[currentIdx] || "Tamom";
    }

    function finishSync() {
        isSyncing = false;
        audio.pause();
        document.getElementById('sync-trigger').classList.remove('sync-active');
        document.getElementById('sync-instruction').innerText = "Sinxronlandi!";
        document.getElementById('sync-status').innerText = "✅ Tayyor! Endi Eksport tugmasini bosing.";
    }

    async function exportFinalVideo() {
        if(syncedData.length === 0) return alert("Avval sinxronlashni bajaring!");
        
        const startTime = parseFloat(document.getElementById('start-time').value);
        const endTime = parseFloat(document.getElementById('end-time').value);
        const qual = document.getElementById('quality').value;
        const fps = parseInt(document.getElementById('fps').value);

        canvas.width = (qual === '2K') ? 1440 : 1080;
        canvas.height = (qual === '2K') ? 2560 : 1920;

        const stream = canvas.captureStream(fps);
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(dest);
        source.connect(audioCtx.destination);
        stream.addTrack(dest.stream.getAudioTracks()[0]);

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 60000000 });
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            document.getElementById('status-text').innerText = "📤 Botga yuborilmoqda...";
            const blob = new Blob(chunks, { type: 'video/mp4' });
            
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', blob, 'final_video.mp4');
            formData.append('caption', `🔥 Songlyrics Pro HD\n🎬 Qirqilgan: ${startTime}s - ${endTime}s\n💎 Sifat: ${qual} | ${fps} FPS\n👤 User: ${document.getElementById('watermark').value}`);

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                document.getElementById('status-text').innerText = "✅ MUVAFFAQIYATLI YUBORILDI!";
                tg.showConfirm("Video botga yuborildi!");
            } catch (e) { alert("Yuborishda xatolik!"); }
        };

        audio.currentTime = startTime;
        recorder.start();
        audio.play();

        function renderFrame() {
            if(audio.currentTime >= endTime || audio.ended) { recorder.stop(); audio.pause(); return; }
            
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(bgImg.src) {
                ctx.globalAlpha = 0.5;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
            }

            let activeLine = syncedData.filter(l => audio.currentTime >= l.t).pop();
            if(activeLine) {
                ctx.font = `900 ${canvas.width * 0.085}px Inter`;
                ctx.fillStyle = "#00e676";
                ctx.textAlign = "center";
                ctx.shadowBlur = 40;
                ctx.shadowColor = "#00e676";
                ctx.fillText(activeLine.text.toUpperCase(), canvas.width / 2, canvas.height / 2);
            }

            const wm = document.getElementById('watermark').value;
            if(wm) {
                ctx.shadowBlur = 0;
                ctx.font = "40px Inter"; ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.fillText(wm, canvas.width / 2, canvas.height - 100);
            }

            requestAnimationFrame(renderFrame);
        }
        renderFrame();
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
