<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlyrics Pro - HD Bot System (Captions Lite Edition)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00e676; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .preview-box { 
            width: 240px; height: 426px; background: #000; border-radius: 20px; 
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
            transition: all 0.5s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #display-text { 
            font-size: 20px; font-weight: bold; color: var(--accent); 
            padding: 20px; line-height: 1.4; 
            text-shadow: 0 0 20px rgba(0,230,118,0.5); 
            z-index: 5; transition: all 0.3s ease;
            position: absolute; width: 100%; box-sizing: border-box;
        }
        
        canvas { display: none; }

        .controls { background: #141414; padding: 20px; border-radius: 20px; text-align: left; border: 1px solid #222; max-height: 450px; overflow-y: auto; }
        
        .trim-group, .select-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .trim-group div, .select-group div { flex: 1; min-width: 140px; }

        input, button, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-size: 15px;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        input[type=range] { -webkit-appearance: none; background: #333; height: 8px; border: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        .btn-download { background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; position: sticky; bottom: 0; z-index: 10; }
        .btn-download:disabled { background: #333; color: #777; }
        
        #status-text { font-size: 13px; color: var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; font-weight: 600; }

        .trim-info { display: flex; justify-content: space-between; font-family: monospace; color: var(--accent); font-size: 12px; margin-bottom: 5px; }
        .range-slider { position: relative; height: 40px; margin: 10px 0; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .range-fill { position: absolute; height: 100%; background: rgba(0, 230, 118, 0.2); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        /* Animations */
        .anim-fade { animation: fadeIn 0.4s ease forwards; }
        .anim-zoom { animation: zoomIn 0.4s ease forwards; }
        .anim-slideUp { animation: slideUp 0.4s ease forwards; }
        .anim-rotate { animation: rotateIn 0.4s ease forwards; }
        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-pulse { animation: pulse 0.8s infinite; }
        .anim-glitch { animation: glitch 0.3s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-10deg) scale(0.9); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes bounceIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }
    </style>
</head>
<body>

    <div class="preview-box" id="p-box">
        <div id="display-text">Tayyor...</div>
    </div>

    <canvas id="video-canvas" width="1080" height="1920"></canvas>

    <div class="controls">
        <label>Media yuklash:</label>
        <div class="select-group">
            <input type="file" id="audio-input" accept="audio/mp3">
            <input type="file" id="lrc-input" accept=".lrc">
        </div>

        <div class="select-group">
            <div>
                <label>Matn hajmi:</label>
                <input type="range" id="font-size-slider" min="30" max="180" value="85" oninput="updateLivePreview()">
            </div>
            <div>
                <label>Matn Joylashuvi:</label>
                <select id="text-position" onchange="updateLivePreview()">
                    <option value="center">Markazda</option>
                    <option value="top">Yuqorida</option>
                    <option value="bottom">Pastda</option>
                </select>
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Shrift Stili:</label>
                <select id="font-style" onchange="updateLivePreview()">
                    <option value="sans-serif">Standart Sans</option>
                    <option value="serif">Klassik Serif</option>
                    <option value="monospace">Texno Mono</option>
                    <option value="cursive">Qo'lyozma</option>
                    <option value="Impact">Qalin Impact</option>
                    <option value="Georgia">Elegant Georgia</option>
                    <option value="Verdana">Aniq Verdana</option>
                    <option value="Arial Black">Og'ir Arial</option>
                    <option value="Helvetica">Minimalist</option>
                    <option value="Futura">Kosmik</option>
                </select>
            </div>
            <div>
                <label>Matn Rangi:</label>
                <input type="color" id="text-color" value="#00e676" oninput="updateLivePreview()">
            </div>
        </div>

        <div class="select-group">
            <div>
                <label>Animatsiya (Captions):</label>
                <select id="anim-style" onchange="updateLivePreview()">
                    <option value="none">Oddiy</option>
                    <option value="fade">Fade In</option>
                    <option value="zoom">Pop Up</option>
                    <option value="slideUp">Slide Up</option>
                    <option value="rotate">Tilt</option>
                    <option value="bounce">Bounce</option>
                    <option value="pulse">Beat</option>
                    <option value="glitch">Glitch</option>
                </select>
            </div>
            <div>
                <label>Fon (Visualizer):</label>
                <select id="effect-style" onchange="updateLivePreview()">
                    <option value="black">Amoled Black</option>
                    <option value="neon">Neon Border</option>
                    <option value="vignette">Cinematic Vignette</option>
                    <option value="blur">Soft Glow</option>
                    <option value="dynamic">Dynamic Color</option>
                </select>
            </div>
        </div>

        <label>Qirqish vaqti:</label>
        <div class="range-slider" id="trim-slider-container">
            <div class="range-fill" id="range-fill"></div>
        </div>
        <div class="trim-info">
            <span id="label-start">00:00.0</span>
            <span id="label-duration">0s</span>
            <span id="label-end">00:30.0</span>
        </div>

        <div class="trim-group">
            <div><label>Boshlash:</label><input type="number" id="trim-start" value="0" step="0.1" oninput="syncSliders()"></div>
            <div><label>Tugallash:</label><input type="number" id="trim-end" value="30" step="0.1" oninput="syncSliders()"></div>
        </div>

        <div id="status-text">Captions Lite tizimi tayyor</div>
        <button class="btn-download" id="start-btn" onclick="startHDProcess()">INSTAGRAM HD VIDEO YARATISH</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const displayText = document.getElementById('display-text');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const previewBox = document.getElementById('p-box');
    const rangeFill = document.getElementById('range-fill');

    let lyrics = [];
    let audioFile = null;
    let fullDuration = 30;

    const BOT_TOKEN = '8034357680:AAHiJgpdI5kcnHDxK2jqHXtSZyAz1gAzMOw';
    const MY_ID = '8533456947';

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    }

    function syncSliders() {
        const start = parseFloat(document.getElementById('trim-start').value) || 0;
        const end = parseFloat(document.getElementById('trim-end').value) || fullDuration;
        const left = (start / fullDuration) * 100;
        const width = ((end - start) / fullDuration) * 100;
        rangeFill.style.left = left + "%";
        rangeFill.style.width = width + "%";
        document.getElementById('label-start').innerText = formatTime(start);
        document.getElementById('label-end').innerText = formatTime(end);
        document.getElementById('label-duration').innerText = `Domiyligi: ${(end - start).toFixed(1)}s`;
    }

    function updateLivePreview() {
        const size = document.getElementById('font-size-slider').value;
        const font = document.getElementById('font-style').value;
        const color = document.getElementById('text-color').value;
        const pos = document.getElementById('text-position').value;
        const anim = document.getElementById('anim-style').value;
        const effect = document.getElementById('effect-style').value;
        
        displayText.style.fontSize = (size / 4) + "px";
        displayText.style.fontFamily = font;
        displayText.style.color = color;
        displayText.style.textShadow = `0 0 15px ${color}88`;

        if(pos === 'top') { displayText.style.top = "10%"; displayText.style.bottom = "auto"; displayText.style.transform = "none"; }
        else if(pos === 'bottom') { displayText.style.bottom = "10%"; displayText.style.top = "auto"; displayText.style.transform = "none"; }
        else { displayText.style.top = "50%"; displayText.style.transform = "translateY(-50%)"; }

        displayText.className = "";
        void displayText.offsetWidth; 
        if(anim !== 'none') displayText.className = "anim-" + anim;

        previewBox.style.background = "#000";
        previewBox.style.border = "2px solid #333";
        if(effect === 'neon') previewBox.style.border = `2px solid ${color}`;
    }

    document.getElementById('audio-input').onchange = (e) => { 
        audioFile = e.target.files[0]; 
        const tempAudio = new Audio(URL.createObjectURL(audioFile));
        tempAudio.onloadedmetadata = () => {
            fullDuration = tempAudio.duration;
            document.getElementById('trim-end').value = fullDuration.toFixed(1);
            syncSliders();
            statusText.innerText = "Audio yuklandi: " + audioFile.name;
        };
    };

    document.getElementById('lrc-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            lyrics = ev.target.result.split('\n').map(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseFloat("0." + m[3]), text: line.replace(/\[.*\]/, '').trim() } : null;
            }).filter(x => x);
            statusText.innerText = "Subtitrlar (LRC) yuklandi.";
        };
        reader.readAsText(e.target.files[0]);
    };

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let lines = [];
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                lines.push(line);
                line = words[n] + ' ';
            } else { line = testLine; }
        }
        lines.push(line);
        let startY = y - ((lines.length - 1) * lineHeight) / 2;
        for(let k = 0; k < lines.length; k++) {
            context.fillText(lines[k], x, startY + (k * lineHeight));
        }
    }

    async function startHDProcess() {
        if (!audioFile || lyrics.length === 0) return alert("Iltimos, avval media fayllarni yuklang!");
        const startT = parseFloat(document.getElementById('trim-start').value);
        const endT = parseFloat(document.getElementById('trim-end').value);
        const duration = endT - startT;

        startBtn.disabled = true;
        const audioTag = new Audio(URL.createObjectURL(audioFile));
        audioTag.currentTime = startT;
        audioTag.muted = false;

        const stream = canvas.captureStream(60); 
        
        // Audio streamni ulash
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioTag);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);
        dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
        
        const recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp9', 
            videoBitsPerSecond: 25000000 
        });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = async () => {
            statusText.innerText = "TELEGRAMGA YUBORILMOQDA...";
            const videoBlob = new Blob(chunks, { type: 'video/mp4' });
            const formData = new FormData();
            formData.append('chat_id', MY_ID);
            formData.append('video', videoBlob, `Captions_SyncHD_${Date.now()}.mp4`);
            formData.append('caption', "✨ Captions Sync Ultra HD\n🚀 Sifat: 60 FPS | Sinxron\n✅ Tayyor!");

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                if (response.ok) { 
                    statusText.innerText = "✅ VIDEO BOTGA YUBORILDI!"; 
                    tg.showAlert("Video muvaffaqiyatli botga yuborildi."); 
                }
            } catch (err) { alert("Xato yuz berdi: " + err.message); }
            startBtn.disabled = false;
        };

        recorder.start();
        audioTag.play();

        let lastText = "";
        let animStartTime = 0;

        function drawFrame() {
            if (audioTag.paused || audioTag.ended || audioTag.currentTime >= endT) {
                recorder.stop();
                audioTag.pause();
                return;
            }

            // Sinxronizatsiya optimallash: currentTime ni aniqroq o'qish
            const now = audioTag.currentTime;
            
            // LRC ichidan eng yaqin matnni topish (vaqtga qarab)
            let current = null;
            for(let i = 0; i < lyrics.length; i++) {
                if(now >= lyrics[i].t) {
                    current = lyrics[i];
                }
            }
            
            const text = current ? current.text : "";
            const color = document.getElementById('text-color').value;
            const pos = document.getElementById('text-position').value;
            
            if (text !== lastText) { 
                lastText = text; 
                animStartTime = performance.now(); 
            }
            
            let animElapsed = (performance.now() - animStartTime) / 1000;
            let animProgress = Math.min(animElapsed / 0.3, 1);

            ctx.fillStyle = "#000000"; 
            ctx.fillRect(0, 0, 1080, 1920);

            const effect = document.getElementById('effect-style').value;
            if(effect === 'neon') {
                ctx.strokeStyle = color; 
                ctx.lineWidth = 25; ctx.strokeRect(40, 40, 1000, 1840);
                ctx.shadowBlur = 40; ctx.shadowColor = color;
            } else if (effect === 'vignette') {
                let g = ctx.createRadialGradient(540, 960, 200, 540, 960, 1100);
                g.addColorStop(0, "rgba(40,40,40,1)"); g.addColorStop(1, "black");
                ctx.fillStyle = g; ctx.fillRect(0, 0, 1080, 1920);
            }

            const font = document.getElementById('font-style').value;
            const anim = document.getElementById('anim-style').value;
            const size = parseInt(document.getElementById('font-size-slider').value);
            
            ctx.font = `bold ${size}px ${font}`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            ctx.save();
            let textY = 960;
            if(pos === 'top') textY = 480;
            if(pos === 'bottom') textY = 1440;

            ctx.translate(540, textY);
            
            if(anim === 'fade') ctx.globalAlpha = animProgress;
            if(anim === 'zoom') {
                let s = 0.8 + animProgress * 0.2;
                ctx.scale(s, s);
            }
            if(anim === 'slideUp') ctx.translate(0, (1 - animProgress) * 80);
            if(anim === 'rotate') ctx.rotate((1 - animProgress) * -0.1);
            if(anim === 'pulse') {
                let s = 1 + Math.sin(performance.now()/150) * 0.04;
                ctx.scale(s, s);
            }
            if(anim === 'glitch' && text) {
                ctx.translate((Math.random()-0.5)*15, 0);
                ctx.shadowColor = "red"; ctx.shadowBlur = 20;
            }

            ctx.fillStyle = color;
            ctx.shadowColor = color + "BB"; ctx.shadowBlur = 45;
            
            if(text) wrapText(ctx, text.toUpperCase(), 0, 0, 940, size * 1.3);
            
            ctx.restore();

            statusText.innerText = `HD SYNC RENDER: ${Math.floor(((now - startT) / duration) * 100)}%`;
            requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);
    }
    tg.ready();
    tg.expand();
    updateLivePreview();
</script>
</body>
</html>
