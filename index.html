<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics | Telegram Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #E1306C; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Asosiy konteyner */
        #main-container { padding: 20px; }
        
        /* Story oynasi (9:16 formatda) */
        #story-window {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; flex-direction: column;
        }

        /* YouTube Pleyer (Butun ekranda, lekin orqa fonda) */
        #yt-player-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.3; /* Video xira ko'rinib turadi, matn yaxshi chiqishi uchun */
            pointer-events: auto; /* Video bosilishi kerak */
        }

        /* Matn qatlami (Video ustida) */
        #lyric-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 80%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2; pointer-events: none; /* Matnni bossa ham video bosilaveradi */
            text-align: center; font-size: 2.5rem; font-weight: 900;
            padding: 30px; box-sizing: border-box; text-shadow: 0 0 20px #000;
        }

        /* Pastki boshqaruv paneli */
        #controls {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 20px; box-sizing: border-box; z-index: 3; border-top: 1px solid #222;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: #fff; border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; margin-top: 10px;
        }

        .song-card {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid #222; cursor: pointer;
        }
        
        input[type=range] { width: 100%; accent-color: var(--primary); }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 style="color: #1DB954">Musiqalar</h2>
        <div id="list">Yuklanmoqda...</div>
    </div>

    <div id="story-window">
        <div id="yt-player-container">
            <div id="player"></div>
        </div>
        
        <div id="lyric-layer">
            <div id="lyric-text">Videoni o'rtasidan bosing...</div>
        </div>

        <div id="controls">
            <p style="text-align:center; margin:0 0 10px;">Vaqt: <b id="time-val">0s - 15s</b></p>
            <input type="range" id="time-slider" min="0" value="0">
            <button class="btn-insta" id="share-btn">📲 Instagram Story</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#777; width:100%; margin-top:10px;">⬅️ Orqaga</button>
        </div>
    </div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var ytPlayer, currentLyrics = [], startAt = 0;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'playsinline': 1, 'controls': 1, 'modestbranding': 1 },
            events: { 'onStateChange': onStateChange }
        });
    }

    function onStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            setInterval(() => {
                let now = ytPlayer.getCurrentTime();
                if (now >= startAt + 15) ytPlayer.seekTo(startAt); // 15s Loop

                let line = currentLyrics.findLast(l => now >= l.time);
                if (line) document.getElementById('lyric-text').innerText = line.text;
            }, 100);
        }
    }

    function openStory(data) {
        document.getElementById('main-container').style.display = 'none';
        document.getElementById('story-window').style.display = 'flex';
        currentLyrics = parseLRC(data.lyrics || "");
        
        ytPlayer.cueVideoById(data.youtubeId, startAt);

        document.getElementById('time-slider').oninput = function() {
            startAt = parseInt(this.value);
            document.getElementById('time-val').innerText = `${startAt}s - ${startAt + 15}s`;
            ytPlayer.seekTo(startAt);
        };

        document.getElementById('share-btn').onclick = async () => {
            if (navigator.share) {
                await navigator.share({ title: 'SongLyrics', url: window.location.href });
            }
        };
    }

    function parseLRC(lrc) {
        return lrc.split('\n').map(line => {
            const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "tracklist"), (snap) => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<b>${data.track}</b><br><small>${data.artist}</small>`;
            div.onclick = () => openStory(data);
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
